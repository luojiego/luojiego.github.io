  {
    title: "从Grep 到 Grafana Loki 的日志分析之路",
    content: "\"我走了太多弯路 说实话，在日志处理这件事上，我被“知识陷阱”困了很久。\\n因为我太熟悉命令行了，grep、rg、awk 玩得飞起，所以过去很长一段时间，我都固执地认为这就是分析日志的“正统”方式。但现实经常打脸：当日志散落在不同服务器、不同路径下时，我得开无数个终端窗口跳来跳去，查个链路问题跟查案一样。\\n更惨的是，以前公司不给硬件资源，我根本不敢想 Elasticsearch 这种“吞金兽”。为了解决查询问题，我还自己折腾过一套特原始的方案：写脚本去 OSS 上拉压缩包，下载、解压、再用 rg 扫。还能只查找固定时间短的日志，使用者必须先在 GM 后台上查询到用户的登录记录，再根据日期查询具体时间的日志。\\n后来入职新公司，我这套“土法炼钢”的操作甚至被同事吐槽过：“你怎么还在当原始人？我们早都用 Grafana 查了。”\\n直到最近，我硬着头皮自己试着搭了一套 Grafana + Loki + Promtail，真的感觉推开了新世界的大门。那种震撼感在于：我只花了不到三十分钟部署，那种多机协同、可视化检索的爽感，瞬间就秒杀了过去几年的肉搏操作。\\n现在回头看，天天蹲在黑框框里人肉搜索，确实像个原始人。这篇文章就记录一下这个让我“走出石器时代”的工具组合，以及我的安装过程。讲真，以后哪怕项目再小、只有一个服务，我也要把日志接入 Loki。人生苦短，不要把生命浪费在 cd 和 grep 上。\\n记录安装过程 轻量 Loki + Grafana\\nLoki 用来收集日志，Grafana 用来查询。这两者不需要安装在同一台机器，网络通畅即可。\\nLoki # 下载 Loki cd /tmp wget https://github.com/grafana/loki/releases/download/v2.9.0/loki-linux-amd64.zip unzip loki-linux-amd64.zip chmod +x loki-linux-amd64 sudo mv loki-linux-amd64 /usr/local/bin/loki # 创建配置目录 sudo mkdir -p /etc/loki sudo mkdir -p /var/lib/loki # 创建配置文件 sudo vim /etc/loki/config.yaml 配置文件内容\\nauth_enabled: false server: http_listen_port: 3100 grpc_listen_port: 9096 common: path_prefix: /var/lib/loki storage: filesystem: chunks_directory: /var/lib/loki/chunks rules_directory: /var/lib/loki/rules replication_factor: 1 ring: instance_addr: 127.0.0.1 kvstore: store: inmemory schema_config: configs: - from: 2020-10-24 store: boltdb-shipper object_store: filesystem schema: v11 index: prefix: index_ period: 24h storage_config: boltdb_shipper: active_index_directory: /var/lib/loki/boltdb-shipper-active cache_location: /var/lib/loki/boltdb-shipper-cache shared_store: filesystem limits_config: retention_period: 744h # 31天 enforce_metric_name: false reject_old_samples: true reject_old_samples_max_age: 168h ingestion_rate_mb: 16 ingestion_burst_size_mb: 32 创建 systemd 服务\\nsudo vim /etc/systemd/system/loki.service [Unit] Description=Loki log aggregation system After=network.target [Service] Type=simple User=root ExecStart=/usr/local/bin/loki -config.file=/etc/loki/config.yaml Restart=on-failure RestartSec=5s [Install] WantedBy=multi-user.target 启动\\nsudo systemctl daemon-reload sudo systemctl start loki sudo systemctl enable loki sudo systemctl status loki Promtail 用来将日志上传到 Loki，安装在收集日志的服务器上面。\\n安装\\n# 下载 Promtail cd /tmp wget https://github.com/grafana/loki/releases/download/v2.9.0/promtail-linux-amd64.zip unzip promtail-linux-amd64.zip chmod +x promtail-linux-amd64 sudo mv promtail-linux-amd64 /usr/local/bin/promtail # 创建配置目录 sudo mkdir -p /etc/promtail # 创建配置文件 sudo vim /etc/promtail/config.yaml 配置文件内容（需要根据实际情况来修改）\\nserver: http_listen_port: 9080 grpc_listen_port: 0 positions: filename: /tmp/positions.yaml clients: - url: http://localhost:3100/loki/api/v1/push scrape_configs: # Gateway 服务日志 - job_name: gateway static_configs: - targets: - localhost labels: job: gateway service: gateway __path__: /var/log/gateway/*.log pipeline_stages: - json: expressions: level: level request_id: request_id msg: msg timestamp: ts method: method path: path status: status - labels: level: request_id: - timestamp: source: timestamp format: RFC3339Nano # 内部服务日志（可以配置多个 job，收集多个目录的日志） - job_name: internal-service static_configs: - targets: - localhost labels: job: internal-service service: internal-service __path__: /var/log/internal-service/*.log pipeline_stages: - json: expressions: level: level request_id: request_id msg: msg timestamp: ts - labels: level: request_id: - timestamp: source: timestamp format: RFC3339Nano 创建启动脚本\\nsudo vim /etc/systemd/system/promtail.service 脚本内容\\n[Unit] Description=Promtail log collector After=network.target [Service] Type=simple User=root ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/config.yaml Restart=on-failure RestartSec=5s [Install] WantedBy=multi-user.target 启动\\nsudo systemctl daemon-reload sudo systemctl start promtail sudo systemctl enable promtail sudo systemctl status promtail Grafana 用于展示与查询日志\\n# 添加 Grafana 仓库 sudo apt-get install -y software-properties-common sudo add-apt-repository \\u0026#34;deb https://packages.grafana.com/oss/deb stable main\\u0026#34; sudo wget -q -O - https://packages.grafana.com/gpg.key | apt-key add - # 如果出现以下报错 W: GPG error: https://packages.grafana.com/oss/deb stable InRelease: The following signatures couldn\\u0026#39;t be verified because the public key is not available: NO_PUBKEY 963FA27710458545 E: The repository \\u0026#39;https://packages.grafana.com/oss/deb stable InRelease\\u0026#39; is not signed. N: Updating from such a repository can\\u0026#39;t be done securely, and is therefore disabled by default. N: See apt-secure(8) manpage for repository creation and user configuration details. # 由于手动添加了 Grafana 的存储库，系统本地没有对应的公钥来验证软件包的签名，导致安全检查失败。 # 将报错提示的 ID 为 963FA27710458545 的公钥导入系统的受信任的密钥库中 sudo mkdir -p /etc/apt/keyrings wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/grafana.gpg \\u0026gt; /dev/null # 关联密钥与存储库 # 查找 list 文件，文件位置：/etc/apt/sources.list.d/archive_uri-https_packages_grafana_com_oss_deb-noble.list # 修改文件内容，将内容修改为指向刚才下载的密钥： deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://packages.grafana.com/oss/deb stable main # 安装 sudo apt-get update sudo apt-get install grafana -y # 启动 sudo systemctl start grafana-server sudo systemctl enable grafana-server 我又学到新东西啦，由于 apt 通常需要 sudo 权限，直接 export 变量可能不会被 sudo 环境继承，所以建议直接写在命令前，或者使用 sudo -E。\\nsudo https_proxy=http://127.0.0.1:7890 apt install grafana 开始 Grafana 之旅\\n打开网页，默认的端口是 3000，我的机器为 http://192.168.200.30:3000\\n默认的账号和密码均为 admin\\n登录会提示修改密码，可以选择跳过，为了安全，最好设置一个新的密码。\\n选择 Explore，点击 Outline 右侧的下拉菜单，选择 Open advanced data source picker-\\u0026gt;\\n点击 Configure a new data source\\n选择 Loggin \\u0026amp; document databases 下面的 Loki\\n配置 URL，也是唯一的必填参数，表示从访问那个机器上的 Loki 日志，我的配置 URL 为 http://192.168.200.30:3100\\n点击 Save \\u0026amp; Test，如果显示成功，则可以选择 Loki 并查询日志啦\\n\"",
    url: "https:\/\/luojiego.com\/posts\/goodbye-grep-transition-from-cli-grafana-loki\/"
  },
  
  {
    title: "这些年我用过的 IDE",
    content: "\"有一天打开代码时，突然有些想不起第一个用的编辑器叫啥了，这才意识到是时候记录下这些年我和各种 IDE 的爱恨情仇了。\\n大学 第一年高考失利，跟家里人的关系也几乎到了冰点。我随便选择了一些计算机的专业，但是最后因为自己的倔强，重新复读了。\\n2009 年，二战高考勉强上了二本线，最开始听了堂姐的建议，报了某外国语大学，但是没有被录取。最后补填志愿，重新回到了计算机的怀抱。\\n我也不知道什么原因，坚决选择了软件工程。\\n在大学学的第一门编程语言是 C 语言，还用 Turbo C 写过一些简单的代码。后面就开始使用 VC++ 6.0，记得老师讲解\\u0026quot;友元\\u0026quot;时一大节课都没将代码编译通过，现在想来还挺好笑的。在 Win7 上面使用时，打开文件和添加到工程会有问题，我记得当时还要添加个动态库（FileTool.dll），使用新的按钮替换原有功能。\\n当时专门自学过一套 VC++ 的视频是 孙鑫 VC++。\\n后来短暂接触过 Visual Studio，但是觉得还是 VC++ 6.0 用的顺手，毕竟 VS 在我的笔记本的确是有些卡卡的。\\n职场 毕业后才发现，学校那些 Photoshop、Flash 甚至 Java 在我工作中从来就没都没用过。\\n2013 年入职第一家公司，发现组内成员用的是 SourceInsight 3.5。但是这个 IDE 的中文注释显示，简直能折磨死强迫症。挣扎了一年后，还是放弃了。但是就是这样的一个工具，在 IDE 都是免费使用的年代，2020 年后发布了 4.0 版本，而且收费两百美万。虽然支持了 Unicode,我可没空去回忆青春。\\n2014 年我开始使用 Visual Studio 2012。虽然最终代码要在 Linux（CentOS 6）上运行，但没找到更加顺手的 Linux IDE。那时候的跨平台开发，真的只能用\\u0026quot;痛苦\\u0026quot;两字形容——Windows 写代码，Linux 编译运行，两边反复横跳。\\n受不了这种效率，2015 年开始着手学习 Vim。最开始有些不太适应，但是在大学期间第一次学习 Linux 时，我就对命令行比较感兴趣，慢慢习惯了在终端下来写代码。也是在这一年，我开始使用 Wakatime 来追踪自己的编码时长。我的编码统计\\n最新的统计我在 Vim 的时间超过了 2100 多小时。说实话，即使配置了一些搜索插件，搜索功能还是不如 VS 直观。不过能在服务器上直接改代码、编译、运行的感觉，效率还是更高一些。\\n2016-2018 年间，因为主力语言是 C++，VS 和 Vim 混合使用。只不过这段时间后，C++ 代码几乎全部迁移到了 Linux 环境。有搜索需求时，grep 就成了最好的朋友。\\n2018 年我决定向 Go 语言迁移，因为在西安实在很难招到合适的 C++ 候选人，所以新项目中的一部分功能开始使用 Go 语言。由于项目的要求，我要实现完整的游戏管理后台，但是此前几乎没有前端的任何经验，所以开始学习前端知识。也是在这个时候我接触了 IntelliJ 社区版，总使用时间大概 300 小时。\\n2019 年我购买 Goland 的授权。JS 和 HTML 页面也能在 Goland 里完成，简直完美。有两年的时间都在用它，累计使用时间超过 1700 小时。\\n但作为一款 IDE，经常要绑定 Go 语言的版本，语言的新特性要等 Goland 的新版本，我开始尝试 VS Code，2021 年我终于接受了 VS Code 也能胜任 Go 开发的事实。立刻取消了 Goland 的订阅，全面拥抱 VS Code。哈哈，这也是因为我们家老二快出生了，养育两个男孩不容易，能省下的钱就省下来。\\n借助于 Remote SSH 插件和 Vim 插件，简直如虎添翼。轻量、快速、免费，还有一大堆扩展可用，三年下来累计使用超过 3700 小时，绝对是我的最长情编辑器了。\\n2023 年，Vim 在 CentOS 服务器上总会莫名其妙崩溃，也没有找到合适的解决办法。开始尝试使用 NEOVim，就我的需求而言，可以百分百替换掉 Vim。因为内置 LSP 支持也让配置简单不少。虽然目前使用了 300 多小时，但绝对是老 Vim 的完美继任者。最近发现 LazyVim 的神奇之后，我估计后续还会有更多的时间在其身上。\\n2024 年开始使用 Cursor，彻底被惊到了。用了两年的 Copilot 与它一比，简直是小巫见大巫。有了 Agent 的加持，使用要远比订阅 Claude 要划算，在启动了年费订阅之后，我取消了 Claude 每个月 $20 的花费。\\n很多时候，我只需要清楚描述需求，AI 就能生成完整可用的代码。我现在的工作更像是一个\\u0026quot;代码审核员\\u0026quot;——专注于 Review 代码质量和业务逻辑，AI 负责繁琐的实现细节。版本控制做好了，效率蹭蹭往上涨。至今累计使用超过 1200 小时。\\n后记 回头看这些年换过的 IDE，就像看自己的成长轨迹。从菜鸟到慢慢对这一切充满掌控感，从盲目跟风到理性选择，每一步都充满了成长的痛感。\\n以前总想着 IDE 的细节，现在却在思考：未来我们真的还需要\\u0026quot;编写\\u0026quot;代码吗？AI 会不会彻底改变编程的本质？\\n不管工具怎么变，核心还是解决问题的思维和对业务的理解。这些年，IDE 换了一个又一个，但我对编程的热情没有变，依然对新的 IDE 以及现有的各种终端 AI 充满兴趣。\\n倒是挺期待下一个颠覆我认知的工具是什么。毕竟，唯一不变的就是变化本身！加油，Go Go Go……\\n\"",
    url: "https:\/\/luojiego.com\/posts\/key-takeaway-after-switching-8-ides\/"
  },
  
  {
    title: "从 C\u002b\u002b 向全栈方向迈进",
    content: "\"2017 年之前我是一名拥有四年多 C++ 开发经验的“老”后端。如果你也曾像我一样，在后端的世界里挥洒青春，却因为工作需要不得不硬着头皮踏入前端这片“新大陆”，那么这篇文章或许能给你一些共鸣和启发。\\n在我的职业生涯早期，C++ 是我的主要武器。我习惯了它的严谨、高效，以及对底层细节的掌控。Python 和 Go 也曾涉猎，但始终未能成为工作中的主力。至于 Shell 脚本，简单的操作尚可应付，一旦遇到复杂的安装脚本，就如同天书一般，让我一头雾水。\\n转折点出现在 2018 年，当时我作为后端主程负责一款新游戏的开发。其中一项重要的任务就是构建管理后台以及设计相关的 HTTP 接口。起初，我们自然而然地考虑过使用熟悉的 C++ 来实现这些需求。然而，C++ 在提供 HTTP 接口方面的复杂性让我望而却步，这个方案很快就被否决了。\\n最终，我们选择了 Go 来实现游戏登录前的数据获取等服务。不得不承认，Go 在构建 Web 服务方面确实有着得天独厚的优势，开发效率也相对较高。然而，真正的挑战还在后面——前端页面的开发。\\n对于一个没有任何前端基础的后端工程师来说，Go 的 Template 只能解决最简单的页面展示问题。例如，实现一个简单的用户列表和分页功能，就花费了我相当长的时间。随着业务逻辑的复杂性增加，Template 的局限性也暴露无遗。它能处理简单的参数传递，但对于稍微复杂一些的逻辑，就显得力不从心。\\n没办法，我只能硬着头皮开始学习 JavaScript。HTML 相对简单，CSS 当时也没被我放在重点关注的位置，心想大不了界面难看点，能用就行。很多前端框架也自带了基础的样式，这在当时对我来说简直是救命稻草。\\n然而，单纯学习 JS 语法只是万里长征的第一步。如何在浏览器端真正运行 JS 代码，这其中涉及到的知识远不止语法本身。JS 缓存如何禁用？如何调试 JS 代码？这些看似基础的问题，在最初都像一座座大山横亘在我面前。在那个没有强大 AI 辅助的年代，一个小小的报错就可能耗费我一整天的时间。我还记得我的一个同事，为了解决一个看似简单的 if 判断总是进入 {} 代码块的问题，熬了一个通宵，最终才发现竟然是在 if 语句的括号后面多加了一个分号！现在回想起来，虽然有些哭笑不得，但当时的无助感却是真真切切的。\\n好不容易JS的基本问题解决了，接下来又要面临技术选型——选择哪个前端框架？当时的我，并没有选择流行的 Vue 或 React，总觉得它们过于“笨重”，不太符合我们当时两三个后端既要开发业务逻辑、后台管理系统，还要兼顾运维工作的“小而美”团队的需求。最终，我们选择了一个策划提供的基于 Bootstrap 开发的框架就开始了。\\n然而，仅仅掌握 JS 和一个简单的框架，离实现功能完善的管理后台还差得很远。后台管理系统往往需要展示和处理大量的数据，而我当时的 MySQL 水平也仅仅停留在“会一点点”的程度。于是，我又开始了 MySQL 的学习之路。\\n随着时间的推移和不断的实践，我逐渐熟练掌握了前端和数据库相关的技术。当我把这些功能一点点实现出来后，又开始反过来补足 Go 语言的使用。毕竟，我也曾因为对 Goroutine 的理解不够深入，在发送推送消息时，错误地使用了闭包环境中的变量，导致给一个用户发送了几万条重复消息，场面一度非常尴尬。\\n当掌握的知识越来越多，我反而不再畏惧学习新的东西了。后续再实现游戏管理后台的各种功能，就变得越来越得心应手。特别是当我将常用的框架结构整理出来，并对权限管理、页面布局等内容进行抽象和封装后，再加上近几年 AI 技术的飞速发展，以前需要一周才能完成的功能，现在往往只需要半天就能高效完成，而且 bug 也极少出现。\\n回顾这段从后端“被迫”转前端的经历，我有一些经验想和大家分享：\\n拥抱变化，不要给自己设限： 最初我以为后端就应该只专注于后端，但现实告诉我，掌握一些前端技能对于提升工作效率和解决问题非常有帮助。 善用工具，特别是 AI： AI 不仅仅是一个代码助手，更是一个可以帮你拓展思路、发现更优方案的伙伴。 技术选型要谨慎： 不要盲目跟风，选择最适合自己团队和项目需求的才是最好的。务必在 Github 上查看框架或库的 star 数量和维护状态，避免使用无人维护的“僵尸代码”。对于 Go 语言来说，我个人建议尽量选择 star 数超过 1K 的仓库。 学习新语言要抛开固有思维： 不要试图用你熟悉的语言的模式去套用新的语言，更不要进行简单的代码翻译。学习一门语言的最佳实践，才能真正理解它的精髓。 这段经历虽然充满挑战，但也让我从一个纯粹的后端工程师，成长为能够独立负责前后端开发的“准全栈”。我希望我的这段经历能给正在经历类似困境的朋友一些鼓励和启发。前端并非洪水猛兽，只要你愿意迈出第一步，并坚持学习，终将能够破茧而出，拥抱更广阔的技术世界。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/from-cplusplus-to-full-stack\/"
  },
  
  {
    title: "远程控制完整指南：从局域网到云端的全方位解决方案",
    content: "\"在现代工作环境中，远程控制已成为提高工作效率和灵活性的重要工具。无论是在家办公、技术支持还是多设备协作，掌握各种远程控制方案都显得尤为重要。本文将详细介绍从同一局域网内的桌面连接到跨网络的远程控制解决方案。\\n同一局域网的桌面连接解决方案 Mac 控制 Windows 在 MacOS 上控制 Windows 设备是最简单的方案之一。苹果在 App Store 提供了官方的远程桌面客户端。\\n安装步骤：\\n在 Mac 上打开 App Store 搜索 \\u0026ldquo;Windows App\\u0026rdquo;（这是新的名称，旧版本叫 \\u0026ldquo;Microsoft Remote Desktop\\u0026rdquo;） 下载并安装应用 连接设置：\\n在 Windows 设备上启用远程桌面功能： 打开\\u0026quot;设置\\u0026quot; → \\u0026ldquo;系统\\u0026rdquo; → \\u0026ldquo;远程桌面\\u0026rdquo; 启用\\u0026quot;启用远程桌面\\u0026quot; 在 Mac 上打开 Windows App 点击\\u0026quot;添加桌面\\u0026quot;，输入 Windows 设备的 IP 地址 输入 Windows 的用户名和密码即可连接 Mac 控制 Mac MacOS 系统内置了强大的屏幕共享功能，可以通过访达（Finder）直接实现。\\n设置步骤：\\n在目标 Mac 上开启屏幕共享： 打开\\u0026quot;系统偏好设置\\u0026quot; → \\u0026ldquo;共享\\u0026rdquo; 勾选\\u0026quot;屏幕共享\\u0026quot; 设置允许访问的用户 在控制端 Mac 上： 打开访达（Finder） 在侧边栏找到目标 Mac（或按 ⌘+K 手动连接） 点击\\u0026quot;共享屏幕\\u0026quot;按钮 输入凭据即可连接 Windows 控制 Mac 虽然使用频率不高，但有时确实需要从 PC 控制 Mac。推荐使用 VNC（Virtual Network Computing）协议。\\n设置步骤：\\n在 Mac 上启用 VNC： 打开\\u0026quot;系统偏好设置\\u0026quot; → \\u0026ldquo;共享\\u0026rdquo; 勾选\\u0026quot;屏幕共享\\u0026quot; 点击\\u0026quot;电脑设置\\u0026quot;，启用\\u0026quot;VNC 显示程序可以使用密码控制屏幕\\u0026quot; 设置 VNC 密码 在 Windows 上安装 VNC 客户端（如 RealVNC Viewer） 输入 Mac 的 IP 地址和 VNC 密码连接 使用 RustDesk 自建远程桌面控制 考虑到 TeamViewer 曾出现的安全问题，以及向日葵等商业软件在画质和功能上的限制，自建 RustDesk 服务器是一个优秀的替代方案，毕竟我并没有长期使用远程桌面的需求，恰好有闲置的云服务器，那就好好利用一下。\\n云主机端部署 安装脚本：\\nwget https://raw.githubusercontent.com/techahold/rustdeskinstall/master/install.sh chmod +x install.sh ./install.sh 重要的安全组设置：\\nRustDesk 使用的端口范围在 21110-21120 之间，必须在云服务器的安全组中开放这些端口：\\n登录云服务器控制台 找到安全组设置 添加入站规则： 端口范围：21110-21120 协议：TCP 和 UDP（两者都必须添加） 来源：根据需要设置（建议限制 IP 范围以提高安全性） 获取 Public Key：\\n安装完成后，屏幕会显示一个 public key，务必保存好这个密钥，客户端连接时需要使用。如果错过了屏幕显示，可以在日志文件中找到：\\ncat /var/log/rustdesk/signalserver.log 客户端配置 PC/Android 客户端：\\n访问 https://github.com/rustdesk/rustdesk/releases 下载对应平台的客户端 安装后在设置中配置自建服务器地址和 public key iOS 客户端：\\n直接在 App Store 搜索 \\u0026ldquo;RustDesk\\u0026rdquo; 下载 同样需要配置服务器信息 连接步骤：\\n打开 RustDesk 客户端 在设置中输入自建服务器的 IP 地址 输入保存的 public key 获取目标设备的 ID 和密码即可连接 更常用的 SSH 终端远程控制 对于开发人员来说，SSH 连接往往比图形界面远程控制更加高效和实用。\\n本地 SSH 连接 Mac 系统对 SSH 支持完善，可以直接使用终端：\\nssh username@target_ip 结合 VS Code Remote 开发 现代开发工作流中，很少直接在 Windows 上进行开发，更多是使用 VS Code 的 Remote 功能连接 Linux 进行开发：\\n安装 VS Code 的 \\u0026ldquo;Remote - SSH\\u0026rdquo; 扩展 按 F1 打开命令面板，输入 \\u0026ldquo;Remote-SSH: Connect to Host\\u0026rdquo; 输入 SSH 连接信息即可在远程环境中开发 使用 FRP 实现内网穿透 当需要访问位于 NAT 后面的设备时，可以使用 FRP（Fast Reverse Proxy）服务。\\n云主机端配置（frps）：\\n下载 FRP： wget https://github.com/fatedier/frp/releases/download/v0.52.3/frp_0.52.3_linux_amd64.tar.gz tar -xzf frp_0.52.3_linux_amd64.tar.gz cd frp_0.52.3_linux_amd64 编辑 frps.ini： [common] bind_port = 7000 token = your_secure_token 启动服务： ./frps -c frps.ini 本地 Ubuntu 客户端配置（frpc）：\\n下载并解压 FRP 客户端 编辑 frpc.ini： [common] server_addr = your_server_ip server_port = 7000 token = your_secure_token [ssh] type = tcp local_ip = 127.0.0.1 local_port = 22 remote_port = 2222 使用 systemd 创建服务： sudo vim /etc/systemd/system/frpc.service 内容如下：\\n[Unit] Description=FRP Client After=network.target [Service] Type=simple User=root ExecStart=/path/to/frpc -c /path/to/frpc.ini Restart=on-failure RestartSec=5s [Install] WantedBy=multi-user.target 启用并启动服务： sudo systemctl enable frpc sudo systemctl start frpc 这样配置后，就可以通过云主机的 2222 端口 SSH 连接到内网的 Ubuntu 设备了：\\nssh -p 2222 username@your_server_ip 总结 不同的远程控制方案适用于不同的场景：\\n局域网内：优先使用系统内置方案，简单可靠 跨网络图形界面：推荐自建 RustDesk，安全性和性能都有保障 开发工作：SSH + VS Code Remote 是最佳组合 内网穿透：FRP 提供了稳定的解决方案 选择合适的远程控制方案，可以大大提高工作效率和灵活性。在实际使用中，建议根据具体需求组合使用多种方案，以获得最佳的远程控制体验。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/remote-control-solutions\/"
  },
  
  {
    title: "陪伴的艺术-《何以为父》读书笔记",
    content: "\"作为两个儿子的父亲，这本书触动了我内心深处的共鸣。24 岁那年，我们家老大出生，而我的父亲也是在 24 岁时有了我——这种代际的巧合让我深思父子关系的传承与断裂。\\n我选择从深圳回到西安，只为一个朴素而深刻的愿望：陪伴孩子成长。我的童年记忆中，父亲总是缺席的身影——即使过年回家，他不是在喝酒就是在打牌。正是这种缺失的痛楚，让我更加珍惜与孩子相处的每一个时光。\\n然而，陪伴并不等同于称职。在老大四岁之前，我也曾是个失格的父亲。虽然人在身边，但状态糟糕、身体不佳，经常对孩子发脾气。2018 年底的扁桃体手术成了一个转折点，身体状态的改善为心理成长铺平了道路。\\n2019 年 9 月，在妻子的建议下，我开始听《樊登读书》。两个月内听完超过 100 本书，专注于教育、亲密关系和心灵成长类书籍。短短一个月，我与孩子的关系就发生了质的飞跃。尽管疫情期间居家办公时有所反复，但这次觉醒为我后续的父亲之路奠定了基础。\\n2021 年中，二宝出生，大宝也步入小学。这四年来，我们一家四口几乎形影不离，看着二宝一天天长大。对比之下，我深深遗憾当初没有如此用心地陪伴大宝。由于我们情绪更加稳定，二宝显得更加活泼可爱，情绪也更稳定——这印证了父母状态对孩子的深刻影响。\\n作为父亲，要从固有的错误观念中走出来确实不易，原生家庭的影响根深蒂固。但我坚信，认定是错误的东西，就要用强大的信念将其纠正。成为合格父母需要一点一滴的学习和努力，活到老学到老。\\n这本书让我更清楚地认识到：孩子其实是来教育父母的，是让我们人生更加完善的存在，是修补我们受伤心灵的良药。我需要思考如何更好地引导孩子，同时也要思考如何面对我的父亲——这个一直让我头疼却无法回避的命题。\\n成为父亲不仅是角色的转换，更是人生的重新定义。在陪伴孩子成长的过程中，我们其实也在重新养育那个内在的小男孩，修复童年的创伤，完成未完成的成长任务。这是一场关于爱、责任、智慧与勇气的修行之旅。\\n读书笔记 持棒是为“举”，表示棒子是悬空的，没有落下；如果落下，那就是“击”或者“打”了。一个“父亲”不管以什么理由打孩子，都是在向孩子泄愤的方式掩盖自己的无能——那个棒子本来是应该落在他自己身上的。\\n好父亲能够看见并接纳自己内在未长大的小男孩，所以他不会通过巨大的外在成就来掩盖小男孩的弱小和无助。\\n殊不知，真正健康而美丽的人格，一定是雌雄同体的，这个世界上最美的艺术作品，莫过于英气逼人的母亲和温情脉脉的父亲了。\\n一个男人充分成为他自己的同时，也成为了一个好的父亲。我们因此不会被爱撕裂，这是造物主对人类的最大恩赐，需要永远铭记和感恩。\\n太多的责任感也会破坏做父亲的天然乐趣，使父亲成了一种职业或劳役。\\n既渴望认同，又渴望分化；既可以回头理解自己的父亲，又可以向前张望去想象自己儿子未来的生活。这一系列复杂的互动和情感的交流，构成了父子关系的核心。\\n通过成为一个父亲，通过持续性地教育孩子，一个男人会经历情感、心理、品德甚至是身体面貌上的改变。\\n通常参与度高的父亲情感会更加丰沛，头脑会更加灵活，思想会更加开发，并且身体会更加健康，寿命也会更长。\\n是孩子，造就了一个男人。\\n虽然宝宝长在妈妈的肚子里，但是爸爸在理性和感性层面上都应该要清楚——自己在孩子的孕育、成长和发展过程中所扮演的角色的分量，绝不会比妈妈轻！\\n大多数的男人通过创造，可以转化自己在老婆孕期产生的各种负面情绪。\\n我无法想象，我们在童年还会有什么需要会超过被父亲保护的需要。——西格蒙德·弗洛伊德\\n如果一个父亲既能保护妻子以及妻儿之间的联结，又能逐渐沉浸在自己与孩子的直接关系中，那么这意味着他既能深切意识到这个世界有独立于他自己的“他者”存在，同时他也会爱上这个世界。\\n男人需要通过学习，才能成为一个负责任的父亲，并且他也需要这样教自己的儿子。正如 17 世界法国哲学家卢梭所说：母亲与孩子之间的联结是纯天然的，而父亲和孩子之间的联结则是需要被培养的。\\n英国著名的儿科医生兼精神分析师温尼科特发明了一个术语叫作“足够好的母亲”（good enough mother）,“足够好”并不是指父母仅仅“足够”满足孩子需要，或者为孩子提供“足够”多的服务。事实上，温尼科特指的“足够好”是：妈妈和孩子之间的关系足够亲近，从而可以帮助孩子的心灵成长，但又不会太近，不至于让其感到窒息。\\n一个“足够好的父亲”走的也是一条“中道”（a middle path）：一方面引导和孩子调节自己的情绪，获得对事物的掌控感；另一方面又要促使孩子最大限度地接受这个世界的挑战。\\n当一个男人可以去养育，可以去关照他人，满足他人的需要，同时也可以娴熟地、有建设地运用自己的父性权威和男性攻击性时，他会感到自己更加灵活自由。\\n要理解如何成为一个足够好的父亲，就需要明白父亲角色的本质在于：从自己的孩子还是受精卵开始，直到自己离世的整个生命历程里，他都需要回应孩子的需要。\\n父亲如果能帮助母亲抵御那些过度的焦虑、强烈的担忧和不必要的外界滋扰，母亲便有能力去帮助她的孩子发展出强大的自我。父亲做得越多，母亲便能做得越多。\\n根据鲍尔比的说法，安全基地就像一座“炼丹神炉”，一个情绪稳定的人在里面炼化成长并终身受益。一个拥有安全基地的孩子，当他去更广阔的世界冒险时，会拥有一种“只要需要，我随时都可以回家，并且受到欢迎”的踏实感。\\n那些能够守望、抱持、保护自己妻儿的男人会发现：自己在漫漫前路中，一直都会被寄望于承担这个角色。在每一个新的发展阶段，也都会有新的挑战，那些希望参与到儿子生活中去的男人需要调整他们“守护”的方式，以跟上孩子逐渐成熟的需求，以及他们与孩子间关系的不断变化。\\n参与度高的父亲可以教自己的儿子（同时也被儿子教着），更少以非黑即白的视角来看待这个世界。\\n教导孩童行他当行的道，即使到老他亦不偏不倚。\\n一个父亲需要做的，是观察儿子对胜利和失败做出的具体反应。父亲的目的是挑战儿子，推他一把，而不是压制他。\\n男孩在小学阶段如果和父亲互动频密，那么他就会更具同理心和高自尊，抑郁的出现概率会较低，他们对性别角色和整个生命的态度，也会更加柔软的灵活。\\n受到父亲指导的男孩，会建立一个内在的“刹车系统”以调控自己的性欲和攻击欲。\\n作为一个父亲，你需要看到孩子的归属需要，同时也要教他们在面对某些集体行为产生的压力时，保有自己的底线。\\n一个孩子靠着自己的现实感和逻辑性完成任务，而在完成了以后，他们会获得一种“我胜任”的体验，以及一种被著名精神分析学家爱利克·埃里克森（Erik Erikson）称为“勤奋感”（sense of industry）的心理感受。\\n一个父亲，一方面要敢于承认自己的局限，自己也会犯错误；另一方面他也要在儿子失败的时候，继续支持儿子，而非在他失败时奚落他，落井下石。\\n你是一个坚强的风筝，等待风的来临，你是甜甜的白雪深爱着我，你也是一个受伤的老虎，需要我的帮助。\\n我认为，做一个父亲，尽力教便好，至于教得好还是教不好，则不完全在我们的掌控之内。承认自己指导能力有限，也实在是身为人父，最难咽下的苦水之一。\\n为什么西方文明如此看重语言？究其本质是因为：律法只有通过语言才能被制定出来。没有律法就没秩序。没有秩序，人一辈子就只能在原始的、未分化的潜意识欲望、感受和念头中打转。\\n当你面对失望和失落等情绪的时候，其实有多种应对方式，本能的情绪反应只是其中一种，并非全部。\\n我觉得即使一个男人也有错误和局限，也不会因此放弃自己的目标。\\n你千万别跟任何人谈任何事情。你只要一谈起，就会想念起每一个人来。——J·D·塞林格（J.D.Salinger）\\n要知道，把愤怒转移到理想化形象崩塌的父亲身上，总比对这个既困惑，自我意识又脆弱的自己失望要容易得多，在很大程度上这也要健康得多。\\n一个高度参与儿子的养育过程的男人，会有更多机会直视自己作为一个人和作为一个父亲的局限，并且他也更能够接受自己不再年少的事实。\\n面对这种局限，一个父亲要牢记：无论自己的青春期孩子多么勇于冒险，他其实都不想自我伤害，也并不想放弃自己在家中的位置。\\n要成为一个男人，准确地说，就是要负起责任。\\n一个成年男人有了可以为之奋斗的目标，便可提高他倾听自己的能力。在最后，他可以倾听自己的内在权威，从而他在成为一个负责任的成年男人的道路上更清晰：哪此应取，哪些该舍。\\n朱迪思·维奥斯特所言：“对我们的孩子放手，不再期待他们去完成我们的梦想，这是为人父母的一堂必修课。”\\n正如盖尔·希伊所说：“最终，当我们不再害怕让父母失望的时候，漫长的青春期才告结束。”\\n父亲若不能作为表率，展现出建立亲密关系的能力，那么年轻男性常常就会回避亲密关系。\\n萨姆·奥谢尔松曾经写过“一个男人给自己的父亲正名，清楚地看到自己的父亲，接受父亲过去和现在的样子，这比他自己的成长，比成为一个孩子的父亲，成为一个妻子的丈夫，成为一个年轻人的导师更加困难。”\\n有机会去理解自己的父亲并与之和解，是人生莫大的福气。\\n放手，是一种属于父亲的大爱，它反映出一个父亲的成熟的工情能力，它反映出一个父亲无须以牺牲儿子的进步个体化为代价，来满足自己的自恋需要。\\n发展精神病学家罗杰·古尔德（Roger Gould）提醒我们：大多数男人在 30 多岁的档口会体验到一种“幻觉”的消失，也就是“绝对安全感”的丧失。这种幻觉曾帮助男性迈入成年期，而现在他们会意识到：不但爸爸无法保护自己，而且在这个世上，也不存在一种绝对的保护。\\n发展心理学家伯尼斯·诺嘉顿（Bernice Neugarten）曾把中年的基本转变界定为“人格的内在性增加”（increased interiority of the personality）：中年男性不是一种执着于完成特定的外在目标，而是转向更加享受生活的过程本身。\\n即渐渐苍老，亦永葆年轻，我既笨拙愚钝，亦洞悉世情，我既罔顾他人，亦善解人意，我即为母，亦为幼为长——沃尔特·惠特曼（Walt Whitman）\\n若一位父亲能坦然接受即将到来的死亡，他便会产生强烈的渴望，渴望能将自己的智慧和财富慷慨给予他人。\\n一位父亲，需要直接面对自己的衰老和迟暮，如此方能体验到自身生命的完整。\\n身虽死，此神不灭。\\n父若知子，智者也。\\n在真实而有爱的父子联结中，父和子都能更饱满地领悟到生命循环且进化的本质。\\n我自相矛盾吗？那很好……我就是自相矛盾：因为我大，故能涵容众多。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/my-father-before-me\/"
  },
  
  {
    title: "在AI时代寻找自我 - 《预测之书》读书笔记",
    content: "\"在这本内容丰富的书中，我提炼出四个关键词：AI、游戏、表达、活出自我。这些词汇不仅概括了书中的核心思想，也映射出我对当下的思考与未来的展望。\\nAI 革新浪潮中的思考 2024 年被称为 AI 元年诚非偶然。当下 AI 领域正处于群雄逐鹿的态势，尚未出现真正的\\u0026quot;赢家\\u0026quot;。作为普通人，积极拥抱 AI 显然是明智之选。然而，我观察到身边仍有不少人持观望态度，有的执着于\\u0026quot;手写代码\\u0026quot;的纯粹性，有的因初次使用遇到瑕疵就完全放弃。这些态度或许都值得商榷——在技术革新的浪潮中，保持开放和学习的心态才是关键。\\n游戏行业的职业思考 身在西安，游戏相关的工作机会确实相对有限，远程工作机会也多局限于 Web3 领域。但正如书中所言，未来的\\u0026quot;游戏\\u0026quot;概念可能会更加宽泛。这给了我新的启发：作为一名后端开发者，不应该局限于现有的技能范畴，而是要积极拓展视野，尝试掌握客户端开发知识，通过实践小型 demo 来丰富自己的技术储备。\\n表达的力量 回想之前，我并不热衷于写作。但在阅读积累的过程中，我发现记录和表达的重要性。现在，我坚持每天记录思考，通过博客分享个人见解。这不仅是一种自我督促的方式，更期待能够和他人产生共鸣，或许还能找到志同道合的朋友。\\n在 AI 时代活出自我 在 AI 技术日益渗透生活的今天，\\u0026ldquo;活出自我\\u0026quot;的重要性愈发凸显。每个人都是独特的个体，幸福的关键在于走出属于自己的人生道路。我们可以借鉴他人的经验，但不必盲目模仿。正如那句老话：\\u0026ldquo;走自己的路，让别人去说吧。\\u0026rdquo;\\n这些思考不仅是对书中内容的总结，更是对个人发展道路的一次重新审视。在 AI 时代，保持开放和进取的心态，同时坚守个人本真，或许正是立足未来的重要基石。\\n读书笔记 预测未来的真正意义在于突破个人视野的局限，从那些当下难以察觉的事物中找到能够改变未来的力量。\\n游戏不仅是一种娱乐形式，更是一种能够培养解决问题和适应变化的能力的工具，它正在重塑人们对学习和成长的认知方式。\\n未来从不是孤立存在的，它是一种由人类行为和选择纺织而成的网。\\n个人的幸福感和创造力并非来自无休止的忙碌，而是源于对自我状态的理解与调整。\\n未来的我会更好吗 人类 2.0 会以一种全新的方式存在 2.0 版的人类不只是自然演化的结果，更是技术加速进化的产物；不只是身体与心灵的结合，更是技术与意识的复合体。\\n感谢伟大的新技术文明，人类 2.0 不必走那条艰难的道路通向自由，因为虚拟世界总可以如你所愿，每个平凡之人都能心想事成。\\n技术从来不只是人类发明出来使用的工具，技术的存在与使用会对我们的身体、精神、情感及社会文化产生深远的影响，因此技术始终在塑造人类。\\n烹饪过的食物为人类提供了更高质量的营养，这种被认为是推动人类大脑进化的重要因素；对火的控制也改变了我们的社会组织方式，围绕篝火的互动增加了人类的社交和语言能力，甚至从根本上改变了我们与自然环境的关系。\\n海德格尔曾指出，技术并非简单的工具，它是一种具有独立力量的“存在关系”，不仅服务于人类，还重塑了人类与世界的关系。法国哲学家贝尔纳·斯蒂格勒（Bernard Stiegler）的著作更详细阐述了人类与技术之间根本的共生关系。\\n技术从根本上塑造了人类的感知、行为和存在方式。\\n我们的技术和机器是我们人性的一部分，我们创造它们来扩展我们自己，这正是人类的独特之处。——雷·库兹韦尔（Ray Kurzweil）\\n生活的所有方面都变得越来越自由和便利，以至于我们“尚未启程就已经抵达”，却常常不清楚究竟要通向何处，因为我们无法将技术编织到我们的生活的“意义结构”之中。\\n人类一直是自己制造的生物。\\n既是自己有意设计的对象，同时又完全不确定我们在做什么。\\n无历史的时间（每一天都新颖得像是从零开始，与过去只有稀薄的联系）、“无实体的空间”（主要的生命活动发生在一个既不存在又无所不在的互联网空间），以及“无目标的体验”（活在当下的点状存在）。在这个意义上，我们不仅在创造模仿人类的机器，也在模仿我们自己创造的机器。\\n落日时分，查尔斯河倒映夕阳的颜色，一时间竟难以分辨是晚霞还是朝霞。\\n或许，有人在别人的夕阳中已经看到了自己的朝霞。\\n或许，不会有漫长的暗夜，晚霞与朝霞正交相辉映，这是人性的黄昏，也是后人类的黎明。\\n或许，我们只是路过人间，而宇宙的演化只是路过人类文明。\\n让自己拥有一种通往未来的门票 人们只在意自己在意的事情，答案命中目标是其中一种。\\n什么是学习？我可以极为粗略地说，学习是一个人在人类的总书库里读了多少本书，读得多，他就学得多，因为学习的行为可以理解为占据信息。当然，学习的本质是另外一件事，那是在占据信息的基础上理解信息的内部关联。\\n无论是从学习的行为还是学习的本质来说，机器的效率都会比人类高得多。未来的某一天，机器知道人类所不知道的知识是可能的，人类理解不了机器所理解的知识也是可能的。\\n理论上讲，AI 完全可以教会一个文盲如何制造航天飞机。\\n我只关心自家孩子能不能掌握新工具，能不能在新工具的帮助下探索个人能力的边界。\\n我个人认为，每一次技术进步，人类社会就会发生一次大型重置。在重置的短暂时间里，有些资源是平等的。\\n人应该不时思考一下自己的处境，思考一下自身的存在，找出自身的独特价值来。\\n在我们日复一日、因循守旧、不假思索过活的生活里，因此出现了一次打断，来自未来的威胁迫使人们停下来，想一想自己手上正在做的事，想一想自己的存在方式。在这个思考过程中，人们会发现自己存在的价值和意义，发现生活的价值和意义。以此作为基础，人们才会从生活中无数纷乱的噪声里，分辨出来自未来的微弱信号。\\n如果你是你，那么未来就一定存在着一张你的门票。如果你不是你，你认为自己是齿轮的一部分，那么机器就会传代机器。\\n有这四种能力，AI 将无法取代你 人类大脑对负面的信息更敏感，所以悲观的声音往往更容易占上风。\\nAI 的不断进步是由人类的需求驱动的。\\n能够敏锐地感知需求、提出需求，会成为未来人类的核心能力之一。\\n未来，解决问题的能力将得到最大化的发展，谁能提出更有价值的需求，谁就能引领时代的进步。\\n犯错怎么能算一种能力呢？但你想想看，生命的进化是怎么发生的？就是基因在复制过程中出现了一些错漏，才导致每一代的发送都有微小变异。然后通过自然选择，一部分有用的变异被保留下来，代代积累，最终形成物种的进化。如果基因永远 100% 精确复制，进化就不会发生。所以换个角度看，犯错就是创新。\\n在未来，那些敢于犯错的人是最有生命力的创作者、发明家和冒险家。\\n“错”是在不求犯错的前提下，因为有意无意的巧合，妙手偶得的游离和惊喜。\\n随着 AI 能做的事情越来越多，人类的灵感也变得越来越有价值。\\n一个人的口误，也许反映了他在无意识层面的真实意愿。人类是创造错误的专家，更是解读错误的专家。\\n正确的世界千篇一律，而错误才会创造更多惊喜。\\n人与机器对话，感受到的意义无论如何都比不上与真实的人交流。人与人之间自然的情感联结，在未来将会是我们的天然优势。\\n只有当一个人接收到这个作品传递的信息，触及自己的经验，他才会被打动。他被打动了，这个作品也就有了意义。\\n在未来，“创造”的定义很可能会发生改变。一个用心去感受和欣赏的人，并非不是生产，他只是在从事另一种形式的创造。就像我们看体育竞赛时感到振奋，与人交谈受到鼓舞，因为被爱而满足，因为理解而流泪。你感受到的每一点意义，都是在创造人与人之间的共鸣。\\n无论发生了什么，人都有权力做出选择：选择接受现状或否认，选择顺应变化或逃避，选择积极度过当下或沉浸于对未来的忧虑。通过这些选择，我们就有可能一步步把生活推向自己想要的方向。一切坏事都有可能变成好事，一切好事都有可能变得更好。\\n不管环境如何变化，人永远有能力拥抱变化，将其为己所用，过上自己想要的生活。\\n虚拟空间让我们趋于平等 通过 AI 辅助教学工具，任何一位专家都随时待命。我们可以与亚里士多德畅谈形而上学，可以聆听费曼讲授物理学讲义，也可以安排哈耶克与凯恩斯进行一场关于经济刺激政策的利弊的辩论。\\n传统教学将面临进一步的挑战，也不得不做出相应的调整。学校越来越不是学习知识的地方，而是给人贴标签的地方。一个毕业生所获得的文凭，更多地反映了他所经历的磨炼和具备的品质，而非他掌握的知识与技能。\\n学校应该发挥的是磨炼和贴标签的作用。一般学校奉行的是快乐教育，而特殊学校奉行的是严苛教育。不同的标签，是为市场里的雇主准备的。\\n游戏产业的发展将远远超过电影产业，因为前者为消费者提供了参与的机会。\\n虚拟空间里的感受是同质的，这使得不同背景的人在其中趋于平等。\\n图书和音像制品所体现的贫富差距已经缩到很小了，假如你是一个醉心于阅读、看电影和听音乐的人，那你很容易成为一个富人。\\n用图像和故事来表达，比如通过 AI 制作自己的影视作品，将会和昔日的写作、演讲一样，成为新人类的基本技能。未来教育普及的标准，除了听说读写以外，还会加上用图片和视频讲故事的基本要求。\\n创作是一种本能的总能，是一种基本需求，也是一种基本的获得满足感的来源。\\n创作正在逐渐转变为大众的消费活动，而不再是个别天才的生产活动。人人都多才多艺。到那个时候，大量的创作只能用于自娱自乐，它们在市场上很可能已经供过于求了。\\n技术的发展并不会使人类变得更加理智，反而有可能放大人类非理性行为的负面作用。\\n在金融领域，资产价格也不易因 AI 技术变得更稳定。\\n资产的内在价值等于预期资产未来现金流的折现值，只有新消息才能改变预期，而新消息就是不可预测的。\\n人生来希望追求确定性，但在技术提供了一种确定性的同时，另外一种不确定性也会随之产出，不确定性本身似乎是永恒的。\\n提升睡眠质量和合理缩短睡眠时间，是延长寿命的一个重要指标。\\n理查德·道金斯（Richard Dawkins）已经在《自私的基因》中给出了生物意义上的回答——任何生命体都是基因为了不断自我复制而需要的工具。\\n尽管他们的观点符合事实，也就是生活本身可能没有必然的意义，但我们仍然需要，并且显然也能够为生活赋予意义，让有限的生命显得更加精彩。\\n内容传播将会成为每个人的底层能力 历史会记录下更多普通人的日常 茶馆里聚集着形形色色的人，他们怀着不同的目的，却共享同一个空间。\\n我始终认为日常就是最宏大的叙事。\\n历史对普通人的忽视，一方面让他们认为，平凡地度过一生无异于虚度生命；另一方面又让他们误以为，缺乏权利和尊严是理所当然的，而这恰恰是对普通人的误解和蔑视。\\n来到这个世界，辛勤劳作，传宗接代，平凡地度过一生，这本身就是对社会和世界的贡献。\\n普通人才是中华文明真正的建设者，我提出这种历史观，就是希望每个人都意识到自己的价值，珍视自己的权利与尊严。\\n真实很可能是，历史上那些记载稀少的时代，恰恰是百姓安定平和、安居乐业的岁月；而那些史书浓墨重彩的时代，往往是他们受苦受难的岁月。因为那些所谓的“大事业”，经常是以无数生命作为代价换来的。\\n抛弃对“大时代”的幻想，选择专注于“小时代”的日常，才是通往幸福的关键。\\n因为人人都是历史学家，记录历史不仅是一种权利，更是一种责任。\\n表面上看，我们讲述的是故事，但深入挖掘时，往往能发现隐藏在故事背后的历史真相。\\n每个人都是有血有肉的个体，拥有独特的人生经历和情感。只有通过这些真实而独特的记录，历史才能更完整地展现人类的多样性和温度。\\n普通人的声音不应该被湮没，他们的思想不应该压制，他们对公平与自由的渴望更不应该被忽略。每个人都需要具备独立思考的能力，为改变现状、推动社会的进步与文明的发展而努力。\\n我们必须通过记录来勇敢地表达自己，让每一个声音都成为推动社会进步的力量。\\n厂二代们终将完成“弑父” 按照弗洛伊德的说法，人类天生就有“弑父情结”。从一出生，人就注定要和父亲展开斗争，试图摆脱被统治、被支配的地位，以争取独立自主。\\n两代之间很难实现真正意义上的理解。若能彼此谅解，进而达成和解，就已经是极其幸运的事情了。而公司治理中的权力让渡，无一例外都要经历反复的博弈和磨合。\\n如同阿诺德·汤因比（Arnold Toynbee）所揭示的：“高级别的文明体从来都是在异常困难而非异常优越的环境中降生的。挑战越大，刺激越强。每一次都会有一些人失败，同时又有另外一些人成功地找到解决的办法。”\\n我们可以摆脱数字孤独，回归一种更有意义的生活 技术在掌控我们的互动模式的同时，也无形中拉大了人与自我及人与他人之间的距离，一种所谓的“数字孤独感”随之加深。\\n这种跨越空间的“数字群体”并未产生真正的凝聚力。基于“符号”和“头像”的互动缺乏共同的思想基础，因而难以构建一个有内聚力的“我们”。\\n在看似无缝连接的互联网世界背后，人们的孤独感不仅没有被缓解，反而变得更加深刻。\\n个体虽处于同一物理空间，但由于社会结构的分化，彼此之间却依然保持着陌生的距离。在数字时代，这种被疏离感通过社交媒体被进一步放大和延伸。\\n而当我们看到陌生人那些精心包装的成功与欢乐时，往往会不自觉地与之进行比较，结果却忽视了自己生活中真实的美好与价值。\\n法国社会学家涂尔干（Emile Durkheim）的理论似乎提供了一种解释。他曾指出，当社会规范变得模糊或失去约束时，个体会感到孤立于助，陷入一种”无规范状态“。在数字时代，这种”社会会失范“现象以”数字孤独感“的形式表现得尤为明显。\\n从根本上说，人类是社会性动物，我们渴望归属感、理解和情感支持。这些深刻的情感联系需要通过非语言的交流来实现，比如触摸、眼神和肢体语言，而这些在虚拟世界中往往是缺乏的。\\n真正的情感联结依赖的是投入时间和交流的质量，而非通过数字工具堆砌的浅层互动的数量。\\n不妨在使用这些工具时停下来问问自己：你是在主动选择某个信息，还是因为算法推送而”随波逐流“？\\n拒绝被算法和数字工具控制，是一场关乎自我意识的革命。\\n学校将从知识为本转向意义为先 人的价值正在被唤醒，从”被塑造“转向作为独立个体”被看见“。\\n在今天这个人工智能迅猛发展、职业结构快速变化的时代，人的独特性正成为核心竞争力，逐渐取代对工具化的单一追求，推动教育回归”人之与人“的本质。\\n只有当学生被当作独立的个性，他们的兴趣、潜能和情感被真正看见并被接纳时，他们才能形成稳定的心理支撑。而意义感，正是这种心理支撑的核心来源。拥有明确意义感的学生，更容易在面对职业选择或环境变化的不确定性时找到内在的平衡。\\n传统教育往往将学习的意义简化为”取得高分“，强调结果，忽视过程。\\n从孩子熟悉的半径开始，让孩子在学习过程中不断调用已有的经验。\\n具有适度的挑战性，从而激发孩子们的好奇心，让他们始终跃跃欲试。\\n没有标准答案，只有解决方案。\\n创造各种各样的合作的可能性。\\n学习成果作品化。\\n高度承载学习目标。\\n如果我们用昨天的方式教今天的学生，就是在剥夺他们的明天。——杜威\\n数字心智将具有道德主体地位 我们通常会用哲学家所谓的”道德地位“来区分世间万物。一个实体如果具有道德地位，就意味着它自身或者利益具有独立的道德意义。\\n当前的计算机与人不同，因为它们的利益不会受到伤害，所以它们完全不具备道德地位。\\n根据”基质独立性假设“（Substrate-Independence Thesis），一个物体是否具有意识并不取决于其物质基础（如碳基生物的神经元），而取决于实现这种状态的计算模式和过程。\\n数字心智在资源使用上更高效，它能用更少的资源，创造出比生物心智更多的幸福感——这不得不让我们重新思考资源分配和道德权衡的问题。\\n原先我们赋予人类比低等生物更高的道德地位，那么，当更高等的数字心智出现以后，它们是否应该拥有比人类更高的道德地位呢？\\n非歧视原则仍是思考这个问题的起点。它要求那些想要为功能和体验相同的心智赋予不同道德地位的人，必须给出充分的理由来证明这种区别对待是合理的。\\n数字心智将显著提升我们的协作与协调能力。例如，通过精确复制数字心智，可以形成目标和想法完全一致的”群体“。\\n我们有可能设计出既满足人类需求，又符合数字心智需求的双赢方案。\\n拥有道德地位的数字心智的出现，将成为伦理史上最具深远意义的发展之一。\\n我们需要为未来做好准备，设计出合适的框架、实践和制度，来应对一个人类与具有道德地位的数字心智共存的世界。\\n我们的精神世界或将与数字世界连接 随着人工智能和量子计算的飞速发展，”数字世界“的影响力正变得越来越不容忽视。脑机接口技术的独特之处在于，它能够将这三个世界连接起来，为人类文明的下一次跃迁提供全新的可能性。\\n让硅基芯片和碳基大脑直接对话，是一个宏大而激动人心的目标。打个比方，如果这件事是一本 100 页的书，我们现在大概才翻开了第一页。\\n每个人在大脑最活跃的黄金年纪，就能直接掌握最前沿的知识并开展研究工作。人类对世界的认知一定会实现飞跃式突破。\\n死亡也不再是人与所爱之人永别的终点。这种变革不仅会颠覆我们对生死的传统认知，还可能催生一种全新的社会形态，重新定义生命的意义和价值。\\n未来的世界会变糟吗 富足时代即将到来 世界上的资源，本质上是无限的。\\n食物无非是把太阳能转为化学能的一个载体。你把这个馒头吃掉，只是利用了其中的化学能而已——组成馒头的每个原子都不会消失，它们从你的身体中流过，也许将来会组成另一个馒头。\\n只要你能搭上算力这趟快车，你的领域就会跟着指数增长。\\nAGI（Artificial General Intelligence），也就是通用人工智能。AGI 将帮人类解决一系列的科技难题……以及取代现在的很多工作。\\n人们工作将不再是为了谋生，而是为了自我实现，为了所有贡献。人们交往将更少地是为了利益，更多地是出于友情和道义。人与人之间的关系将更少的是竞争，更多的是合作。\\n谁率先走出保守主义浪潮，谁更可能获益 在分析历史趋势的方法里，最常见的当数线性外推法。简言之，就是将当前某种社会发展趋势及其背后的结构性原因进行外推。\\n道家史观首先是循环史观，用现代语言表述就是，任何性质的社会组织、思想和制度，随着其影响力的扩大，削弱其的社会力量和机制就会变得重要。\\n今天世界性的保守主义大潮是对美国发起的民主浪潮的反动，而保守主义大潮带来的负面后果势必会让世界回归到某种更为自由和开放的状态。\\n自启蒙运动以来，自由几乎是所有世俗意识形态的根基，一旦自由主义受到严重损害，整个启蒙运动精神当然也会受到挑战。\\n民主浪潮的退潮和自由主义的严重受损，为世界性保守主义浪潮的兴起提供了契机。\\n正因为这次世界性浪潮是保守主义浪潮，它反过来必然会推动将来的世界朝自由和开放的方向发展。\\n从 T 到 ∏，这六种能力将帮助你穿越周期 俄国经济学家康德拉季耶夫有一个著名的”康波理论“，他认为经济发展以生产力为主线，大约每 5060 年会经历一个完整的周期，每个周期都包含繁荣期、衰退期、萧条期、回升期这四个阶段。\\n乐观地看，从 2025 年起，未来的 35 年内，经济将结束当前的萧条期，围绕新能源和 AI 技术，我们将迎来一个长达 25 年的上升周期。随着新的周期的开启，我们将进入一个高质量发展的阶段。\\n稻盛和夫说过，萧条就像竹子过冬时长出来的”节“。在繁荣时，企业可能只会低速增长，变得脆弱如”竹叶“。而正是经历了冬天的”节“，企业才能获得再次成长的支撑，结构也因此变得更加坚固而强韧。\\n第二技能通常是基于个人兴趣与热情所选的，它不仅提升了你的竞争力，也为你带来了动力。\\n∏ 是一个无限不循环的数字，象征着持续的突破和成长。拥有 ∏ 能力，就相当于拥有无限不循环的职业突破能力。而我认为，在穿越周期的过程中，有六种 ∏ 能力最为关键，它们分别是创造价值、跨越领域创新、+AI、+IP、领导力和守护心力。\\n当一群人被困在沙漠里时，带领大家找到水源的人就是领导者。\\n最有价值的事情往往是你、你的上级，以及你上级的上级的 KPI 重合的部分。\\n大部分职场人的专业创新，都来自跨领域创新——围绕一个真实的业务问题，把一个或多个学科里的专业知识相融合，形成新的竞争力。\\n注意自己工作、生活里的”不便“和”愤怒“，尝试用自己的方式解决。\\n生活中的”不便“和”愤怒“不仅是问题，也是创新的机会。用自己的方式解决，把方案产品化，就是一种最好的创新方式——什么拯救你，你就用什么来拯救世界。\\nIP 的原意是智力资产（Intellectual Property），做 IP 的本质是告诉大家，”我有哪些独特的智力资产，以及这些资产能为你带来什么价值“。\\n选择一件自己擅长的事情，尝试在网上教会别人。\\n不妨把心力想象成四个血条的叠加。底层是体力，其上是情绪，再往上是思维力（如理性、专注、深度思考），最顶层是生命力（如热情、创意、使命感）。\\n创造价值和跨领域是元技能：前者是行动指南针，后者是竞争力保障。\\nAI、领导力、IP 则是放大成果的杠杆技能：AI 是效率杠杆，领导力是劳动力杠杆，IP 则是个人溢价放大器。\\n德鲁克说：”战略不是研究未来我们做什么，而是研究现在做什么才有未来。“在穿越周期的幽暗过程中，守护好自己的心力，盯紧那些更高概率会胜出的组织，长出让自己能持续前行的 ∏ 能力，是我们能够为拥有自己的未来而做的事。\\n“信任溢价”的商业模式将在竞争中胜出 他们不是在服务作为上帝的顾客，而是在用一种长情的方式陪伴自己的街坊邻居。\\n从表面上看，胖东来的走红似乎是社会情绪变化的结果，但更深层次的原因在于其生意模式的改变。这种转变没有太多花哨的地方，就是构建长期信任。\\n真正的商业是要做回头客的，从来不是一锤子买卖，长期信任关系是根本。\\n所有这些举措都围绕一个核心目标展开：始终以较为合理的价格为顾客提供质量过硬的产品，从而建立长期稳定的用户关系，同时与供应链上下游形成牢固的合作关系，让商业进入重复博弈的良性循环。\\n增长的共识少了，企业需要以更温和、更人性化的姿态与社会情绪共振。\\n高薪资、高福利未见得是企业的成本劣势，有时反而可能会带来人效的提高，进而变成企业的成本优势。\\n经济学家凯恩斯在 100 多年前就说过，”未来社会，消费会从有用性转向有益性“。用今天的商业语言来说，就是”服务消费的增速将远超商品消费的增速“。\\n这种转变不是只局限于从卖商品转发卖服务，还包括从卖一次性服务转向卖长期服务，从提供基础服务升级为提供复杂服务。\\n所有企业都面临着这个命题：想要留住顾客，不能止步于推销产品，而是要打造良好的体验，提供一整套解决方案，也就是服务。正如现代营销学大师菲利普·科特勒（Philip Kotler）所言：”公司只有一种类型，那就是服务型企业。“\\n未来的药不像药，病人不像病人 这些新药虽然治疗（或预防）的疾病各不相同，但它们有一个显著的共同点：主要成本都是核酸，作用机制都是在微观层面调控蛋白质的合成。\\n在 2021 年出现的英克司兰的成本不再是某种化学物质，而是一段核酸，或者说是一段可以指导或影响蛋白质合成的”代码“。核酸药物进入人体，可以指导人体合成全新的、具有治疗作用的蛋白质。\\n传统药物研发的核心在于寻找能够抑制疾病症状的化学物质。而在核酸药物时代，研发理念发生了转变——研究人员不再需要去筛选复杂的化学物质了，他们的角色更像程序员，只需要了解某种疾病需要调控哪种蛋白质，然后编码调控这种蛋白质的核酸序列就可以了。\\n称它为”疫苗“并不是说它可以预防高血脂，而是指它的半衰期太长了，就像接种疫苗一样，注射一次就可以维持很久的疗效。\\n随着更多新型治疗手段的出现，病人能够更快地恢复健康，回归正常的工作和生活，为社会创造更多价值。当然，这同时也减轻了医疗系统的负担，提高了医疗资源的利用效率。\\n核酸药物的成功进一步证明了从细胞和分子水平研究疾病的重要性，以及微观研究在推动医学进步中的重要作用。\\n新药的长效机制降低了服药频率，让患者从繁琐的用药过程中解放出来；精准的作用机制有效减少了药物的不良反应，提高了患者的生活质量。\\n超导的未来在中国 超导研究的核心主题在于，如何找到更优质的超导材料，如何深入理解超导现象背后的微观机理，以及如何让超导材料真正实现规模化应用。\\n判断一个超导材料是否好用，不能只看他的超导临界温度高不高，还要看它承载强磁场、大电流的能力如何，并综合比较它的机械性能，化学稳定性、毒性和性价比等。\\n因为人们发现，如果要为大厦扩容电力供应，使用普通电缆就需要在地面架设高压电塔。而这样一来，周围将无法建设高楼，可能导致数百亿元的地皮损失。\\n最直接的应用可能就是在大城市核心区的电网中，使用超导电缆来替代传统电缆，从而大幅提升输电容易，降低损耗。除了电力传输，超导电力设备还可以广泛应用于超级计算集群、高密度储能系统和大功率用电设备。\\n打通孤岛是下一代建筑师的首要任务 建筑和人类的历史一般古老，但伟大的建筑却不是一直都有。极少数人才会认真思考好房子是怎么来的（如果你会这样做，恭喜你，你有希望成为建筑学家了），而绝大多数人只是仰望建筑名作，想着更实际的和自己有关的空间。\\n建筑首先是个经济现象，其次才是社会和思想，换句话说，它从来不是一场小众的演出。\\n现代生活的”极速感“正在改变我们的空间观念——当从北京到天津从高铁所花的时间，比在北京市堵车的时间还要短时，曾经显得遥远广阔的空间，早已装下年轻人对世界的想象力了。\\n城市的未来在乡村。\\n有一部分我们口中的建筑，已经变成了”元宇宙“生发出来的影子。《黑神话·悟空》就是一个典型的例子——人们越来越多地因为游戏里的形象，对现实世界（比如山西古建筑）产生兴趣，而不是反过来。\\n现代科技让创意生产前所未有地活跃，但是现实中你真的盖一座房子，又不能只是依据活跃的思维。相反，它需要相对稳定的与人情有关的基础。这就好像开发一款计算机游戏一样——玩的人看到的是一套简单的规则，开发的人想的要复杂得多，因为他们得照顾方方面面的可能性。\\n疟疾、登革热等蚊媒传热病有望彻底消失 从某种意义上说，现代环保运动就是因为人类没办法精准杀死一种特定的野生动物而产生的。\\n冈比亚按蚊是毒死率最高的一种按蚊，因为它是最危险的恶性疟原虫的宿主。\\n也许有人会问：为什么要在最不发达的非洲率先尝试最先进的技术呢？我的回答是：发达国家没有理由垄断所有的先进技术。消灭疟疾等蚊媒传染病是基因驱动技术阻力最小的一项应用，所以，这项新技术反而最有可能率先在非洲得到应用。\\nAI 不仅会成就超级个体，还会成就超级管理者 很多中小企业有机会跳过数字化，直接进入智能化阶段。反倒是一些大公司，因为有一套既定的数字化系统及其带来的沉没成本和路径信赖，可能没有那么容易通过 AI 来重塑工作流程。\\nAI 不仅大幅降低了组织对资源的需求，同样也减少了个体对资源的需求。\\n我们团队发现，AI 在处理客户投诉时，能很好好把握客户需求，并在规则和灵活性之间表现出一致性。\\n生成式 AI 的工作原理：它不仅能被动地完成我们明确指定的任务，还能在交互中展现出近似于人类的理解和响应能力。\\n按照尝试学习研究者卡洛斯·佩雷斯（Carlos Perez）对 AI 智能体的定义：它们可以接收外部信息，自主采取行动，而不必有人类在旁边控制，可以连续地跟外界进行互动。\\n我认为 AI 智能体之间的互动，至少会给组织沟通带来两个积极的变化：首先，它能消除信息失真。AI 智能体通过直接沟通和信息整合，能确保上下级、跨部门员工之间的信息准确无误，避免信息在不同层级，不同部门之间的传递中被扭曲；AI 智能体能够鼓励员工表达意见。\\n信仰是一种对尚未完全显现的事物的信任和期待，信仰是我们愿意相信尽管目前 AI 在应用中常常报错，但它的表现将日臻成熟。而作为它的工作伙伴的我们，也会在这个过程中收获更多的正反馈和意外之喜。\\n量子计算或将改变每个人的生活 人类制造计算机的尝试，可以追溯到 19 世界 20 年代。英国数学家查尔斯·巴贝奇（Charles Babbage）设计出了第一台能够进行数学运算的机器原型——差分机。\\n大诗人拜伦勋爵的女儿埃达·洛夫莱斯（Ada Lovelace）甚至还为这种能够进行计算的机器编写过运行程序——可惜这台机器及其运行程序最终都只是停留在纸面上。\\n人类早已认识到，描述微观领域物质运动规律的是量子力学，它与人们所熟悉的经典力学形式完全不同。传统计算机的工作模式无法有效地模拟复杂的微观量子系统。\\n1981 年，著名物理学家理查德·费曼（Richard Feyman）首先提出，要摆脱传统计算机的局限性，可以利用量子系统基于量子力学规则进行计算，以此来模拟微观世界。这样必然会极大地提高研究的效率。\\n秀尔算法的出现，为量子计算展示出一个前所未有的境界，在理论上它可以在极短时间内完成传统计算机花费数万年都无法完成的工作。\\n量子计算机与传统计算机的本质区别在于量子计算机使用”量子比特“（qubit）进行工作。所谓的量子比特具有量子系统的特点，比如”叠加态“——它不一定处于”0“或”1“的确定状态，而是可以同时处于这两种状态；再比如”量子纠缠“——不同量子比特的状态会相互关联，这些性质在理论上都可以让量子计算具有超强的工作能力。\\n我个人则一直在期待，随着固态物理学的发展，拓扑绝缘体技术被应用到量子计算中。\\n量子计算的核心是利用量子系统自身的性质进行计算，对能量的需求并不会太高。如果大语言模型可以应用量子计算能力，那么能量消耗问题自然也就得到了解决。\\n一周工作四天或将十年内成为现实 很多 App 本质上是垂直搜索工具，是整合了很多信息的又一处信息孤岛。AI 助手要做的，就是进一步整合这些不同的工具和功能。\\nAI 的加入将推动医疗从生产关系的优化迈向生产力的全面飞跃。\\n如何判断一项技术是否具有革命性：一是广泛性、二是高速性、三是深刻性。\\n历史反复证明，凡是率先拥抱技术变革的个体和企业，往往都能在新生态中占据优势。\\n我们正在步入镜像世界 凯利认为，镜像世界（Mirror World）将是下一代互联网，而功能强大的 AR 眼镜很可能成为镜像世界的”杀手级应用“。\\n凯利认为，智能眼镜是我们进入镜像世界的关键，而实现这一点的核心在于一块卓越的屏幕。这块屏幕需要同时具备两项能力：既能保持透明，确保用户可以清晰地看到现实世界，又能随时切换为显示屏，投射虚拟图像，从而让用户有渲染式的体验。\\n智能眼镜带来的全新人机交互方式，让镜像世界成为一个充满探索可能的新世界。\\n镜像世界将是下一代互联网，一个由 AI 赋能、为所有带来渲染式体验的互联网。\\n凯利认为恰恰相反，他指出，沉浸式体验越接受真实，越能激发人们探索真实世界的欲望。\\n渲染式体验是人类最自然的学习与探索方式，让一点在教育领域尤为明显。\\n空间思考是人类非常自然的思维方式。\\n过去二十多年间，从搜索到推荐转变了我们的互联网体验，而推荐的核心是平台对我们偏好的浓度理解。在未来的镜像世界，智能眼镜会变得比平台更懂我们，并被用于提供更加吸引人的定制化服务。\\n机器人与 AI 的深度整合将是未来制造的趋势 制造的本质，是在物理世界中，将各种有形材料加工或改造成全新的实体物品。这些物品一旦被生产出来，就会在人类社会中留下不可磨灭的印记。\\n”灯塔工厂“灵活地将新兴技术与现有生产模式结合，为全球制造业的创新指引了更加明确的方向。\\n我们当前的目标是实现流程的数据采集，在智能制造的每个环节和工序站点中实现数据的正向反馈，并通过这些反馈不断优化和改进我们的模型。\\n系统决定了组织，而组织反过来也定义了系统。两者相辅相成，共同决定了企业的运营效益和竞争力。\\n正如斯蒂芬·茨威格所说：”世间一切伟大的壮举总是默默完成的，世间一切智者都是深谋远虑的。“\\n我们可能是最后一代普通需要工作的人 用算力换人力这一趋势会催生全新的企业形态：未来，将有更多仅需要几十个人运营的小型团队，以人机协作的方式为数百万甚至上千万用户提供高效服务。\\n将教育与个性化发展结合起来看，这个预测的意义便愈加清晰了。它不仅关乎学生学习效率的提升，更关乎每个人在 AI 时代如何找到自己的定位，发挥自己的特长，并实现真正的自我价值。\\n随着 AI 不断降低工具和资源的使用成本，创造性劳动将变得更加平民化和普及化。\\nUBI（Universal Basic Income，全民基本收入）的核心思想是，国家定期、无条件地向所有公民发放足以保障基本生活的现金。\\n哪些机会正在涌现 中国东西部发展会更加均衡 国家战略的时钟摆动一小步，对个人来说，就是一大步。\\n从明天起，养老争取更多靠自己 想要更高水准的退休生活，就只能在目前的退休养老金之外，也就是在自己和当地工资水平体系之外，尽早规划并落实另一件极为重要的事——投资。\\n每年缴纳的这 12000 元还可以在个税申报时提前扣除，有利于降低个税支出，对个人积累财富也有帮助。\\n我们有必要重新审视投资对个人退休养老的长期价值。在今天，我相信从政府到市场，会有更多的决策者和普通人重新思考投资的意义。\\n要想拥有更加平稳或富足的退休养老生活，恐怕需要在相信政府与政策托底的同时，认真规划自己工资之外的各种财产性收入，尤其是包括个人养老金缴纳与管理在内的长期价值投资。\\n硬科技与大变革，未来的两大关键词 科技创新被定义为经济发展的核心推手，我们要通过革命性的技术突破”催生新产业、新模式、新动能，发展以高技术、高技能、高质量为特征的生产力“。\\n科技强国的背后，必须是教育强国、金融强国、人才强国和产业强国，是一整个配套系统。\\n支持民营企业参与国家科技攻关项目，鼓励有能力的民营企业牵头承担重大技术攻关任务，向民营企业开放国家重大科研基础设施等，都是”新型举国体制“的具体体现。\\n留在城市的摩天大楼会帮助你留住优质人才 就是把传统上横向摆开的工业厂房竖向地摞起来。这样一方面可以大幅节省土地，另一方面也带来了一个重要优势：你的上下游企业就在你的上下楼，产业链就在园里，大大降低了物流成本和交易成本。\\n在工业生产由过去的高污染、高排放、低效益逐步进化为今天的低污染、低排放、高效益的时代背景下，让工业留在城市里完全没有问题的。\\n一代人有一代人的追求，就其代际追求的变化而言，也是符合马斯洛需求层次理论的。\\n对不同代际的人而言，城市始终充满着吸引力，只是吸引力的类型有一些差异——对于我这代人而言，是生产或者叫生存；对他们而言，则是生活。对我这代人而言，是乐业带动安居；对他们而言，则是安居带动乐业。\\n我自己将科特金的理论概括成了三句话：哪里更宜居，知识分子就在哪里居住；知识分子在哪里居住，人类的智慧就在哪里聚集；人类的智慧在哪里聚焦，人类的财富最终就会在哪里汇聚。\\n我们能生产出物美价廉的低碳产品 而在 2040 年，我国新能源汽车数量可能增至 3 亿辆，按每辆车电池容量为 65 度电算，那么每天在路上”跑“着的电就有 200 亿度，这和我国一天的用电量可以说相差不多了。\\n我们在绿色环保方面的竞争力，有可能延伸为贸易竞争力、金融竞争力，最终转化为货币竞争力。\\n“逆全球化”并没有真正发生 生产一个产品，从配件到成品的整个生产过程所涵盖的物理空间，我称之为经济空间；一个国家所占据的物理空间，我称之为政治空间。\\n因为政治空间与经济空间日益分离，国家开始逆全球化，企业反倒在政治的挤压下，能够更多主动地去承载全球化。\\n中国将进入全球化企业涌现的高峰期 海外收入占比就像一把灵敏的标尺，衡量着中制造在全球版图上的价值分布。随着海外市场占比的提升，中国企业如同乘坐观光电梯，看到了更加广阔的世界。\\n当中国制造从零部件的突破走向系统性突破，从单点技术升级走向技术合成时，中国企业也完成了从”复制原物种“到”创建新物种“的”基因突变“。\\n我们正在经历从制造到服务的消费升级和产业转型 中国家庭正在经历一场从制造到服务的消费升级。\\n对一家企业而言，真正的功夫不在制造业的车间，而在它的融资机制、组织管理体系、企业文化，当然还有研发部门。制造业升级靠的其实是服务，也有人喜欢称之为”生产性服务业“。\\n大城市在创造和传播知识、技能的同时，也在大量消费知识、技能，以及各种富含人力资本的产品和服务。\\n后物质文明价值观，这类价值观更注重个体的权利、更多的工作话语权、更人性化的社会、美丽城市和乡村等，满足了人们对受到尊重、实现个人价值的诉求。\\nAI 会改变科学研究范式 从海量实验数据中寻找规律的工作原先是由科学家完成的，现在则可以通过神经网络和机器学习实现。\\n从“以治病为中心”转向“以健康为中心” 今天，我们将糖尿病的完全缓解定义为，在不依赖任何降糖药物的情况下，血糖能够维持在正常水平超过三个月。\\n生活方式医学的有效推广和应用，可能会显著提升人类的健康水平，甚至延长人类的预期寿命。\\n美国心脏协会曾用”生命八要素“来总结与人健康相关的问题，这八要素分别是体重、血糖、血脂、血压、饮食、运动、睡眠和吸烟。\\n生活方式医学能带来更精准的评估、更明确的指导处方和更清晰的导向结果。\\n生活方式医学，未来已来。\\n中国正在抢占深海科技竞争的制高点 谁拥有大洋钻探船，谁就能站在深海科技竞争的制高点。\\n“梦想”号除了可以满足海洋领域全学科研究的要求，还将为深海能源资源勘探与开发，包括新区和新层系的油气勘探、天然气水合物试采和产业化、深海结核和稀土开发、天然氢气的勘探和评价等提供重要的装备保障。\\n天然气水合物是最有可能替代煤炭和石油的新型能源。\\n中国或将率先实现机器人技术突破 所谓技术的溢出效应，是指某个领域的技术不仅推动本产业的发展，还会扩散到其他产业，带来更广泛的影响。\\n一个国家的制造业底盘越大，可溢出的技术就会越多，下一个阶段高端产业能享受到的技术积淀也会越多。而在这种情况下，高端产业实现新突破的可能性就越大。\\n高铁之所以能够以超过 250 千米/小时的速度穿梭于平原与山川，并经受住极寒与高温的严苛考验，离不开轴温传感器、速度传感器、压力传感器等多种传感器的全程守护。而这些守护高铁的传感器经过改进和调整后，也可以用在新能源汽车上。\\n新能源汽车的智能化发展所推动的“端到端”技术，在机器人领域持续演进，让我们的机器人可以自主识别环境、实时做出智能决策。\\n不管多么先进的科技产品，中国都有能力快速把它“卷”成很多人都可负担使用的工具。20 年前的高铁已经证明了这件事，今天的新能源汽车正在证明这件事，而未来的智能机器人也将证明这件事。\\n事实依旧是传播的“硬通货” 互联网内容的核心价值往往是驱动情绪，而非满足你对事实的需求。\\n热搜往往是片段化和极端化信息的温床。为了吸引用户的注意力，这类内容更容易被推上热搜，从而激化冲突，制造争议。\\n无论传播技术如何变化，事实的传播始终是传播的本质，也是推动传播进步的核心力量。\\n事实需要具有真正强大能力的机构来生产。\\nAI 加速融入物理世界，这是属于所有人的机会 因为这些来自不同领域的小尝试表明，AI 正在加速融入物理世界，而 AI 融入的速度将直接决定它对现实世界的影响深度与广度。\\n制造业生产过程中有两个核心目标：一个是提高产能，二是提高良品率。\\nAI 的崛起不仅是 AI 从业者的机会，更是所有行业从业者的机会。\\n中国的大航海时代正在到来 马克·吐温曾说过一句广为流传的话：“历史不会重复，但会押韵。”\\n所谓的全球化，就是在每个国家的本地化。\\n快乐不是目的，快乐是过程。\\n登陆一个国家，你需要先俯下身，棒起当地的“土壤”，仔细观察，看见不同，理解不同，接受不同。然后你才能心平气和地翻开一块又一块不同的“石头”，在底下找到“本地化”的机会。\\n坐在家里，只能揣测。去到现场，才有答案。\\n世界正在拥抱中国科技 中国科技企业的独特之处在于，它们能迅速在十亿消费级别的市场上实现从技术到产品，从发明到应用的跨越。\\n中国的科技企业已经具备了走向全世界的能力，中国的科技产品在过去的几看里正不声不响地赢得全球市场的认可，并且这样的趋势还会持续下去。\\n现在的我该关注什么 “做自己”，是未来的出路 励志既包含隐形的责备，也包含隐形的许诺。\\n“做自己”，成了动荡时代的出路。\\n焦虑的背后蕴藏着新的可能性。当人们认真思考这些问题的，他们会发现：反抗不是终点，它只是过程中的一环。\\n生活在一个焦虑时代的少数幸事之一是， 我们不得不去认识自己。\\n没有一个“完美整合的”社会能够替代个体完成一切，替他们完成获得自我意识以及负责任地自己作出选择的能力这一任务。因为这是自我的责任。——《人的自我寻求》——罗洛·梅\\n变动和不确定的时代给了我们更多的机会去理解这个人生使命。我们都会经历成长的危机，从熟悉迈向未知，直到我们的自我变更更加独立，直到我们在自由选择的爱和创造性的工作中，和他人建立新的关系。我相信，未来会有更多的人走上这条充满意义的成长之路。\\n“参与感”教育会让你的孩子过得更快乐 与其鸡娃，不如鸡自己。\\n堵不如疏，长期共存，互有攻守，共同进步。\\n不忘初心，做好当下，坦面未来。\\n教育的天平会向个性化倾斜 格雷格·托波（Greg Toppo）在《游戏改变教育》中说，游戏是一种艰难的乐趣。而哲学家伯纲德·苏茨（Bernard Suits）对游戏的定义更有趣：游戏是自愿克服不必要的障碍。\\n因为游戏是一种引导玩家主动行动的艺术，玩家不主动，游戏就无法推进。\\n游戏之所以吸引人，是因为它本质上是一种优秀的“学习产品”；游戏设计师的工作，本质上是运用教育心理学家维果茨提出的“最近发展区”理论，通过在玩家现有能力和潜在能力之间设计适当的挑战，逐步引导他们迈向更高水平。\\n近百年前，陶行知先生提出“生活即教育”的理念，他认为好的教育不只是为未来的生活做准备，好的教育就是好的生活本身。同样地，好的学习也不应该只是借助游戏来实现，学习本身应该成为一场精彩的游戏。\\n我认为，真正广义的个性化学习，应该是让学生能够自发生成学习内容，扩展顶层设计的边界，让学习走进真实世界。\\n每个人都有义务充分了解自己，用自己最擅长的方式做自己最喜欢的事情，甚至发明一个“只有我干才合理”的全新职业。\\n好的管理就是激发善意和潜能。\\n如果说工业化教育的目标，是通过标准化教学，让每个孩子变得一样，以此来保障教育公平，那么智能时代的教育，应该是让每个孩子都顺应自己的热情和天赋，变得与众不同。\\n真正有效的挫折教育并不是人为制造困难，而是让孩子在面对真实挫折时学会正确应对和解决问题的方法。\\n创造力=通识教育+联系意识。\\n追求更高、更精准、更全面的教育设计固然重要，但妄求绝对的完美与面面俱到只会徒增负担。\\n教育是对真实世界的模拟，而现实本身     title: "AI时代的引擎 - 《黄仁勋·英伟达之芯》读书笔记",
    content: "\"虽然二十一世纪仅过去了不到四分之一，但英伟达已经可以被称为本世纪最伟大的企业之一。\\n我第一次注意到英伟达（Nvidia）这个品牌是在我的第一台笔记本电脑上，当时对其了解有限，甚至一直误以为它是一家纯粹的硬件公司。直到今年阅读了这本书，我才对英伟达有了更全面的认识——它本质上是一家以软件为核心的公司，尽管大多数人可能和我一样，曾将其归类为硬件制造商。\\n作为人工智能（AI）发展的幕后推手，英伟达无疑加速了 AI 技术的爆发式增长。然而，AI 的潜在威胁仍然是一个悬而未决的问题。马斯克等人对 AI 的担忧是否会成为现实，目前尚无定论。\\n书中对 CPU 和 GPU 的比喻非常生动形象，即使是非专业人士也能轻松理解两者之间的区别。这种通俗易懂的解释方式让我对技术细节有了更清晰的认识。\\n此外，书中提到了李飞飞，这位 AI 领域的杰出人物。今年我在多个场合看到她的名字，这促使我开始阅读她的著作《我看见的世界》，进一步了解她的思想和贡献。\\n读书笔记 算力从贫瘠到可用，某种程度上可以决定一项划时代研究工作的命运。\\n黄仁勋思考问题的方式并不像商人，更像工程师。他擅长将复杂的概念分解为简单的原则，并运用这些原则创造出卓越成果。\\n深度学习并非一种算法，它是一种方法，一种全新的软件开发方式。\\n黄仁勋对这种悲观论调嗤之以鼻。在他看来，人工智能正在引领一场崭新的工业革命。在这个话题上，他不容许有太多异议，而且他的个性强势，可能会让人有点望而生畏。\\n对他来说，金钱只是对未来可能发生的某些灾祸的一种临时保障。\\n驱使黄仁勋向前的，不仅仅是焦虑，他同样被自己所开创的技术所释放出的惊人力量深深吸引。\\n努力工作就是黄仁勋的本性。倘若说他的生活有一个贯穿始终的主题，那便是“放大”（amplification）；他一次又一次地执行着勤奋、勇气和掌握基本原则的简单准则，成效越来越大。\\n比任何人都更努力，似乎从不会感到沮丧或陷入困境，他从未陷入过止步不前的境地。相反，黄仁勋总是带有一种适度的满足感，耐心地专注于打磨基本功，并逐步将这些转化为实战技能。\\n黄仁勋拥有良好的判断力，当他认为问题复杂到一定程度、难以再取得进展时，他会及时地转换思路。\\n黄仁勋很享受这种难度逐渐递增的过程，他喜欢通过这种方式来实现自我提升。他有能力实现 ‘1+1=3’的效果，我的意思是，我们不仅仅是在为客户服务，更是在将这些订单转化为工具，进而将这些工具升华为方法论。——霍斯特曼\\n对黄仁勋而言，做出决策需要冷静分析，容不得憧憬等无用的情感因素的干扰。对他而言，商业不过是另一个工程问题。\\n若要创办初创公司，黄仁勋的首要任务是掌握这些原则。他需要深入研究市场、供应链、竞争态势、技术及产品匹配度。\\nPC 端游戏的核心理念在于，将原本用于绘制模型飞机与恐龙线框骨架的硬件重新应用于 3D 游戏，以创造出可供玩家操控的动画角色。\\n我们自认为与众不同，当看到别人也持相同看法时，这种感觉更为美妙。——马拉科夫斯基\\n对英伟达而言，首要任务是将 NV1 与市场上的其他产品区分开。为了实现这一目标，架构师普里姆在芯片和软件中融入了许多复杂的功能。\\n我们支持这些人的原因在于他们是世界级的一流计算科学家。一般的 CEO 会试图听取客户的意见，但在计算机领域，这是个大忌，因为客户根本不清楚什么是可能的，他们完全不知道能做什么，甚至做到什么程度！从一开始，詹森就是一位世界级的工程师，他能够预见什么是可能的。——考克斯\\n“我们一无所获，”黄仁勋在谈及那些早期岁月时说道，“我们做出的第一个决定都是错误的。”\\n黄仁勋坦言，公司资金已近乎枯竭，不得不放弃 NV1 架构。英伟达唯一的生存希望在于放弃与世嘉的合作，转而联手微软，之后公司将试着抢在其他制造商之前，以廉价的仿制芯片抢占市场。\\n黄仁勋的策略是借助仿真器，跳过昂贵的原型制造环节，直接依据数字草图进行大规模制造。在半导体行业的发展历程中，此前尚无公司尝试跳过原型制作阶段，但英伟达别无他法，这一步必须成功。\\n对黄仁勋而言，观众的存在至关重要。所以当他严厉训斥某名员工时，他通常会选择在公开场合进行，以便让其他人从中汲取教训。“失败必须被公开。”黄仁勋是这么说的。\\n迪克思坦言：“如果有人开始变得具有防御性，你就知道那个人在英伟达待不久了。”\\n望着前方长长的竞争对手队伍，黄仁勋意识到处于最后一句其实相当有趣，事实上比位居中游要好。因为处于最后一名的公司可以做任何它想做的事情，它能选择别人不敢尝试的捷径。\\n“那些说胜利不重要的人，”柯克以轻柔而不带威胁的语气说道，“他们从未赢得过任何东西。”\\n他确实非常热爱学习。他通过阅读所能找到的每一本商业书籍来提升自我。\\n黄仁勋最推荐的商业书籍是哈佛商学院教授克莱顿·克里斯坦森（Clayton Christensen）的《创新者的窘境》（The Innovator\\u0026rsquo;s Dilemma）。\\n克里斯坦森认为，相较于低盈利能力，提升盈利能力其实更为容易。\\n克里斯坦森提出了一个颇具深意且出人意料的观点：“在某些情况下，不听从客户的意见是正确的，投资低性能产品以获取较低的利润也是合理的。甚至追求小市场而非大市场也是明智之举。“\\n有时候，黄仁勋甚至会在召集的高管团队会议上，谈论颠覆英特尔的可能性，要知道，当时的英特尔可是全球最具价值的公司之一。\\n最初由英特尔前 CEO 戈登·摩尔（Gordon Moore）在 1965 年提出，并多次得到实际验证，因而得名”摩尔定律“。\\n莫斯曼说道，”那个领域对处理能力的需求几乎是无穷的。”CPU 永远无法追上 3D 渲染的速度，不仅现在是这样，未来也是如此。即使其速度翻倍，也仍然远远不够。\\nTNT 内部潜藏着一个秘密——一个深藏不露、如同恶魔般的秘密，在沉睡在硅片架构的最深处，以至于黄仁勋、柯克、卡马克、维沃利，乃至世界上的任何一个人都未曾察觉到它的存在。倘若你揭开那块 TNT 芯片的封盖，以显微镜观察那裸露的电路，你会发现，其中所蕴含的不仅仅是晶体管排列上的变革，更是一场针对所有计算机的彻底颠覆，甚至有可能永远地改变全人类的发展轨迹。那块看似微不足道的芯片，实则承载着一个足以改变整个世界的惊天秘密。\\n与传统软件执行程序员编写的的代码不同，“水母”通过向一个人工神经元网络传递信息来做出决策。这些神经元的突触在计算机中表现为一个庞大的数字矩阵，也被称为“权重”。这个网络会评估棋局，并通过这个合成的神经系统给出一个答案。\\n反向传播技术使计算机软件不再需要明确的编程，使计算机系统能自我设定规则，甚至实现自我进化。这种技术被称作“强化学习”（reinforcement learning），而特索罗是首位成功运用此技术的人。\\n你创造了一台聪明的机器，它能够通过经验来学习。这几乎与人类的学习方式如出一撤。\\n这个领域很早就明确了 AI 领域“训练”阶段和“推理”阶段的区别：训练是计算机学习的过程，推理是计算机运用知识的过程，比起人类那颗大约 1.5 公斤重、负责推理的大脑，还有为其训练提供条件的数亿年进化相比，推理的成本要低得多。\\n他说，他的程序“只有大约 100 个脑细胞，这和海蜇差不多”。这就是神经结构的威力：无论是攻克西洋双陆棋，还是在危机四伏的海洋生态系统中存活 5 亿年，甚至抵御敌人，都只需百来个小小的细胞。\\n“水母”成了首个在游戏中超越人类的神经网络。\\n试图通过计算网格中的个体权重来找出游戏策略，就如同试图通过显微镜观察脑细胞来解开意识之谜一样困难。\\n经典编程讲究的是逻辑与顺序，操控神经网络却需要截然不同的思维。\\n许多神经网络的批判者都曾是满怀希望的先驱，他们在技术初期取得过成功，却在多年后收获低于期望的结果。\\n”问题在于，如果你只赢了一场比赛，人们很快就会把你忘记，对吧？“温德尔说道。言语中提及了他的偶像泰格·伍兹（Tigger Woods）。“如果我不再赢下去，人们就会把我忘得一干二净。”\\n维沃利表示：“由于我们创造了这个类别，因此我们自然能成为这个领域的领头羊。”\\n关于黄仁勋的传闻在此时几乎被渲染成了邪恶的化身：他控角员工，窃取创意，操纵评测者，甚至在竞争对手陷入困境时落井下石。然而，大多数人憎恶黄仁勋的真正原因是，黄仁勋把他们整个公司打得落花流水。\\n加利克接手了这份工作，并在接下来的 17 年里为英伟达效力。“我个人的看法是，黄仁勋本质是个善良的人，但环境迫使他变得冷酷无情。”\\n我们曾不惜一切追求完美，结果却一败涂地。\\n真是太混乱了！代码写得一塌糊涂，开发工具链也是一团乱麻，最重要的是，他们对此毫不在意！他们一心只想着下一块芯片流片，其他什么都不顾。——加利克\\n“不断迭代、迭代、再迭代，执行、执行、再执行，”他表示，“在我看来，技术债务就像是幸存者的战斗伤痕。”\\n为了不再重蹈那样的覆辙，柯克坚信，要避免裁员，首先就要严格招聘。\\n微芯片行业却更像时尚界——倘若你今天的产品与昨天雷同，那便犯下了严重的错误。在半导体领域，一切技术每隔几年就需要彻底革新。\\n马克思在《共产党宣言》中曾写道：“一切等级和固定的东西都烟消云散了。”或者，正如格鲁夫所言：“我们都必须迎接变革的疾风。”\\n唯一的生存之道，便是寻得一手好牌，押上所有筹码，然后一次又一次地重复。\\n在他所处的行业中，唯一可能确定的是，未来将有更多晶体管问世。随着这一趋势的发展，图形渲染将愈发经济实惠且易于实现。\\n黄仁勋曾坦言：“倘若我们未能重新塑造计算机图形技术，倘若我们未能重塑自我，并拓展处理器可实现的领域，我们终将沦为货品化而消逝。”对他而言，不勇于冒险才是最大的风险。\\n“我想，没有任何东西像内疚一样激发我。”黄仁勋告诉我。\\n即便是对这种管理策略不以为然的人，通常对黄仁勋本人也持有积极的评价。\\n在英伟达的世界里，真正被看重的并非利润或收入。重要的是那位执着的 CEO 和他那些大胆的高风险决策。你要么信任他，要么不信任。若你不信任他，那你将面临严峻的挑战，因为黄仁勋即将做出他有史以来最大胆的押注。\\n曾经的游戏显卡，如今不再是单纯的游戏工具，它们被赋予了新的使命，变身为科学研究的利器。这种新型客户的涌现，黄仁勋也注意到了。马克提及：“我发表的系统论文获得了大家的广泛支持。接着，在 2004 年左右，詹森邀请我加入英伟达，正式着手开展这项工作。”\\nCUDA 的核心理念在于，将原本用于视频游戏的并行计算电路重新定向给科学家使用。\\n黄仁勋表示：“我们之前已经预见到了这种趋势，但正是尼科尔斯让我确信摩尔定律真的已经走到尽头。他为公司今天的辉煌成就做出了巨大贡献。”\\n尼科尔斯对 CUDA 平台的运行充满了热情。朋友们有时会问他，为何在一家电子游戏公司工作却不玩电子游戏。尼科尔斯回应说，他所做的并非电子游戏的制作，而是一项有史以来最重要的技术。\\n与英特尔的 CPU 每次只能激活少量晶体管不同，英伟达的游戏 GPU 可以一次激活数千个晶体管。\\n乳腺 X 光扫描仪被黄仁勋称为“零亿美元市场”的首个案例，这指的是那些虽无直接收益，却拥有巨大潜力的市场。黄仁勋一直在探索一条能让英伟达与竞品区别开来的道路。他发现，硬件创新并非长久之计，因为这些都太容易被模仿了。\\n首先，我们来探讨电路的工作原理。试想将微芯片放大至舞池的尺寸。舞池内，站满了挥舞荧光棒的舞者，他们便代表了晶体管。灯光忽明忽暗，音乐节奏强劲，然而多数舞者却静止不动，他们唯有在轮到自己时才会移动。某位舞者在第一小节的第一拍起舞，另一位则在第二小节的第四拍动作，以此类推。尽管荧光棒四处挥舞，但多数舞者其实并未真正跳动，他们在静待时机。\\n串行 DJ 试图通过加快节奏来激发人群活力，但效果愈发微弱。此时，并行 DJ 闪亮登场。并行 DJ 并没有加快节奏，而是编排了更为繁复的动作。效果显而易见：活动愈发狂热，地板开始颤动，场地温度骤升，部分舞者甚至可以因过于投入而过热。此刻，无数荧光棒随节拍挥舞。\\n并行计算的难点所在，驾驭如此复杂的编排，后勤工作异常艰巨，要求程度员必须开启全新的思考模式。\\n英伟达的并行 GPU 则更像是一队摩托车在城市中穿梭。他们几乎能同时送达第个包裹，整个过程半小时内便可完成。然而，这种高效的并行解决方案执行起来更为棘手，它需要更多的骑手、更多的车辆以及更为周密的后勤安排。在此情境下，随着摩托车频繁进出仓库，每个包裹都必须精准地分配给对应的车辆，并确保准确送达目的地。\\n对于科学家来说，理解串行计算和并行计算之间差异的最佳方式是将英特尔的串行 CPU 比作高端不锈钢厨房刀具。这把刀是一种美丽的多功能工具，可以进行任何类型的切割。它可以切丝、切条、切块、切片、切丁或剁碎。凭借一点技巧，厨师可以仅用这一件工具就制作出一整餐，但这把刀一次只能切一种蔬菜。相比之下，英伟达的并行 CPU 更像是一台食物处理机。它是一种专用工具，声音大，操作不够精准，耗电量大。它无法在鱿鱼筒上用刀划出十字花纹，但要快速切碎一堆蔬菜，GPU 就是合适的工具。\\nCUDA 核心所采用的许多理念，早已在超级计算机和专业处理器中得到应用，但对它们所服务的小型专业领域而言，成本过于高昂，“CUDA 项目最早的工程师之一布雷特·库恩（Brett Coon）回忆道，”依我看，CUDA 的天才之处就在于它让游戏玩家们为庞大的芯片研发成本买单。“\\n想让硬件设计师理解提高 Unreal 或《毁灭战士》游戏性能的重要性，远比让他们提高矩阵乘法或快速傅里叶变换“性能的重要性来得容易。”库恩回忆道。\\n勒佩特猜测，黄仁勋的怒斥可能是他避免解雇员工的一种方式。”他会责骂你，会部你大吼，甚至会侮辱你，但无论如何，“哈莱佩特解释道，”他绝不会解雇你。“\\n黄仁勋所倡导的”光速“，是希望经理们能够设想到，在没有任何限制、一切条件都最理想的情况下，某项任务能够完成的最快速度。\\n黄仁勋每天都在努力追求这个看似遥不可及的”光速“目标。”我总是要确保自己工作到筋疲力尽，这样到了晚上，就再也没有什么能让我失眠的了，“他曾经说过，”这真的是我唯一能掌握的事情。“\\n化石记录表明，平托的研究方向是正确的——视觉识别能力推动了生物智力的快速发展，而这一能力也即将在计算机上得以实现。\\n克里斯坦森观察到，颠覆性技术往往源自业余爱好者的社群。\\n虽然伽利略的望远镜由改良的眼镜镜片制成，放大倍数甚至不及现代的双筒观鸟望远镜，但它彻底颠覆了我们对宇宙及其定位的认知。黄仁勋希望通过为热忱的科学家们提供低成本的超级计算机，引发一场类似的革命。\\n黄仁勋对未来技术并无明确构想。有些技术专家则不然，比如埃隆·马斯克，他先从设想自己站在火星表面的场景开始，然后逆向构建所需技术，以实现这一目标。黄仁勋则恰恰相反，他从眼前电路的功能出发，极力向前推测其潜能。唯有在理性的边界，他才允许自己稍作逾越，涉足那朦胧未知的领域。\\n灵感并非来自邱定伟这样的量子物理学家，但黄仁勋深信：在某个角落，定有位狂热者，其创意将通过 CUDA 得以验证； 在某处，定有某位研究生跳过烦琐的资助申请，省下住房津贴购买一个英伟达 GPU，从而掀起一场技术革命；在某处，定有某个被忽视的科学领域，正静候 CUDA 的算力加持，以彻底颠覆旧有范式。他只是尚未明确那空间是何物。\\n辛顿认为，试图去破解大脑的功能显得有些荒谬，就好比试图去解析肾脏的功能，然而，这样的观点并未能为他争取到更多的认同。为了掩盖他的工作内容以便更顺利地获取资金支持，他与其他神经网络研究者共同选择将他们的研究描述为“机器学习”，有时也称作“深度学习”，却唯独避免提及“人工智能”一词。\\n辛顿给苏茨克弗和克里泽夫斯基布置了一项艰巨的任务：利用英伟达的 CPU 训练计算机学会图像识别。\\n为了训练他的神经网络，克里泽夫斯基使用了 ImageNet 数据库，这是一个由斯坦福大学的计算机李飞飞组装的图像数据集。\\n在机器学习领域，利用像 ImageNet 这样的带标签数据集进行训练被称作“监督学习”，正因如此，克里泽夫斯基将他的神经网络命名为“SuperVision”。\\n克里泽夫斯基不仅开创了多项编程技术，更关键的是他发现 CPU 训练神经网络的速度比 CPU 快数百倍。\\n卡坦扎罗说道，”我是从最底层，即电路的角度出发接触到人工智能的。我深感人工智能是最重要的计算工作负载，就是无法避免的。“\\n戴利的目光很长远：他认为应该向其他顶尖科学家宣传他的研究工作，以吸引他们加入。”我们会吸引最杰出的学者加入公司，因为他们能看到我们的出版物，“他常说，”质量会说明一切。“\\n吴恩达是斯坦福大学教授，当时在谷歌工作。在山景城的实验室，吴恩达开发了类似于 AlexNet 的技术，不过他运用的是传统的计算架构。\\n黄仁勋的 CUDA 决策如同一场豪赌，使公司跨入了深邃莫测的未知领域。10 年来，他始终站在船头，远望彼岸。如今，仿佛他已寻得传说中的亚特兰蒂斯。\\n“他在周五晚上发了封电子邮件，说我们将全面转向深度学习，不再是一家图形芯片公司，”英伟达副总裁格雷格·埃斯特斯（Greg Estes）讲述道，”到了周一早上，我们已经转型为一家 AI 芯片公司。真的，转变就这么快。“\\n在这些演讲中，他反复强调几个核心主题：”光速“调度理念的关键性，追求传说中的”零亿美元市场“，以及尤其要警惕潜滋暗长的官僚主义危害。\\n他与卡坦扎罗在停车场进行的思想实验，反映了他坚信公司可能需要随时进行万花筒般的重组。”我希望你们每个人能做好准备。“他常对聚焦在一起的执行团队这样说，”你永远不知道自己何时会为公司不可或缺的角色。“\\n在人类的大脑组织中，每个神经元平均维持着约 1000 个与其他相信神经元的突触连接。大脑通过化学方式改变这些连接，而神经网络则通过矩阵乘法来实现这一改变。\\n矩阵乘法是通过结合 2 个网格的数字来生成第 3 个网络。虽然其规则简单，但当矩阵乘法非法合适并行处理。然而，在神经网络兴起之前，英伟达并未将矩阵乘法视为重点。\\n直到后来人 们才广泛理解这一事实：深度学习不仅是软件的革命，而且是硬件的革命。\\n在并行计算上运行的神经网络：这两种紧密相连的技术正是新型强大生命体的 DNA 双螺旋，即将吞噬世间的所有数据。\\n信心与确定性是两个截然不同的概念。在追求目标的过程中，你可以满怀信心地前进，同时开放心态，欣然接受并拥抱其中的不确定性。\\n脆弱并非软弱的表现，不确定性也不是信心的缺失。在这个复杂多变的世界中，你即可以坚强自信地面对挑战，也可以诚实地接纳自己的脆弱和不确定性。\\n作为领导者，你的决策应始终围绕使命展开，以他人的福祉和成为为考量。\\n黄仁勋认为，性格不是靠聪明绝顶的人塑造出来的，而必须是经过磨难的人。\\n一条新的定律正在形成，它是一条超级加速的定律。我们得构建一个替代宇宙。There\\u0026rsquo;s a new law going on, a supercharged law. We have to build an alternative universe.\\n尽管训练成本高昂，但如果操作得当，它可以实现自我回报，正如谷歌努力展示的那样：通过利用神经网络优化其服务器网络的能耗，谷歌每年在电费上节省了数亿美元，几乎立即收回了其在 AI 的投资成本。\\n波斯特洛姆的著作是他多年思考的延伸。此前，他提出了”曲别针制造器“的设想：倘若我们拥有一个人工智能，它的唯一目标就是生产尽可能多的曲别针。很快，这个人工智能就会意识到，没有人类的世界对它更为有利，因为人类可能会选择关闭它。毕竟，一旦人类这样，曲别针的产量就会减少。更何况，人类的身体中包含大量可用于制造曲别针的原子。因此，这个人工智能所追求的理想未来，便是一个遍布曲别针却无人类存在的世界。\\n他们信心满满地踏入那些商业上的废弃之地，这些场所遍布着失败企业家的残迹，他们却有能力让这些地方重获新生。\\n马斯克认为，先进的人工智能可能带来灭绝级威胁。\\n采取了一种非比寻常的组织架构，牵头创立了 OpenAI，汇聚了一群捐赠者和技术专家。”OpenAI 是一家非营利性质的人工智能研究公司，“该组织在首篇博客文章中写道，”我们的目标是以最可能造福全人类的方式来推进数字智能的发展，不受财务回报需求的限制。\\n英伟达的首款 FinFET 芯片架构被命名为帕斯卡，以致敬 17 世纪的哲学家兼数学家布莱兹·帕斯卡，他发明了首台机械计算器，这是他众多成就之一。\\n历经 60 余年的深入研究和数百亿美元的资金投入，计算机现在已经能够准确区分刮刀和小斧。这标志着，一个由机器引领的新时代已经到来。\\nGPU 使科学家能在宏观或微观之下，并行堆叠这些数据“积木”，构建出宇宙奇观的精确三维模型。\\n黑洞与自然的齿轮，它们已经存在了漫长的数百万年，只是从未被人类所察觉。而并行计算的崛起，终于使这一切成为可能。\\n现在他明白了，仅仅模拟一件事是远远不够的；他得模拟所有的事物。“我们得构建一个替换宇宙。”黄仁勋表示。\\n一个真正的现实模拟器，不仅需要拥有完美的物理引擎，还必须能精确呈现碰撞弹性和物体密度。\\n乌斯科雷特决定仅停靠上下文来构建语言模型。他摒弃了所有的记忆结构，取而代之的是一个简洁的知识图谱。\\n以往的神经网络结构总是试图构建完整的句子乃至段落，而 Transformer 则采用基于概率关系的方式，逐个预测词语，每次仅预测一个词，这便是其预测的极限。\\n苏茨克弗里希望利用 Transformer 技术构建一个能够提高高质量、人类可读文本，并能回答任何可理解提示的产品。\\nAGI 的一种定义是“能够完成任何人类任务的软件”。苏茨克弗里在推进 GPT 版本的复杂度时，再次思考了 OpenAI 成立的初衷所担忧的问题。\\n从黄仁勋的角度来看，神经网络并非实质性的成就；真正的成就，是他成功地将庞大的算力打包进了数据中心。\\n他迫切希望掌握数据管道，这一关键的缺失环节将把他的 AI 工厂从一个智能大脑转变为一个更接近于复杂神经网络的实体——这是公司并购罕见协同效应的一个真正典范。\\n英伟达之所以成功，并非因为它的电路更出众，而是因为它的软件更优秀。\\n英伟达的软件工程主管德怀特·迪克斯手下拥有一支万名程序员的庞大团队。“我们其实是一家软件公司，这才是人们不理解的地方。”他说道。\\n每当出现新的科学技术时，他总是第一时间出现，并推出他那些虽然丑陋却极为实用的软件工具。某个竞争者或者会在未来推出成本更低、设计更优雅的产品，但届时已然太迟——行业标准早已尘埃落定。\\nAI 在工业上的应用意味着电网更高效、航班调度更迅速、配送速度更快，以及无数其他逐步的改进。\\nDeepMind 的德米斯·哈萨比斯凭借在蛋白质折叠方面的贡献荣获 2024 年诺贝尔化学奖，而杰弗里·辛顿同时摘得 2024 年诺贝尔物理学奖。同年，黄仁勋当选美国国家工程院院士，很多人都觉得这项荣誉早就该授予他了。\\n“逐渐””突然“这两个词也恰如其分地描述了黄仁勋的财富增长之路。历经 20 余年的投资与不断的小幅改进，如今终于带来了惊人的回报。\\n一些华尔街分析师形象地指出：”AI 领域正上演着一场激战，而英伟达则是这场战争中唯一的军火供应商。“\\n黄仁勋的宏伟愿景，是将英伟达和计算机图形研究与生成式 AI 研究相融合。\\n”人工智能，如果它足够智能的话，它所关注的世界远比人类居住的这层薄薄的地壳要广阔。我不认为它会有兴趣从我们这里掠夺什么。相反，我觉得人工智能会愿意照顾我们。“\\nGPU 已经解决了计算速度的瓶颈问题，而 Mellanox 的 Infiniband 协议解决了数据吞吐量的瓶颈。目前，唯一的瓶颈在于数据中心所消耗的电力。\\n一次标准的谷歌搜索大约需要 0.3 瓦时的电量。而启用生成式 AI 后，同样的谷歌搜索所需电量是原来的 10 倍，这足以为一个灯泡供电约 20 分钟。若让 GPT 为你撰写一篇 5000 字的论文，所耗电量足驱动微波炉运行 1 小时。\\n要在满足英伟达 GPU 所需电力的同时实现碳中和目标，现实中几乎无法找到可行的方法。除了升级高压线路，道明尼公司还在探讨重启已封存的燃煤设施的可能性。\\n戴利投身于人工智能领域的一个重要原因是，他坚信这一技术能推动人类走向碳中和的未来。他曾这样说道：”如果说有什么问题能让全世界的人都夜不能寐，那无疑就是气候变化。\\n台积电在凤凰城建造芯片厂的总预算将超过 400 亿美元，这使其成为美国历史上最大的外国直接投资项目之一，也是全球最昂贵的超级工程之一。一旦完工，凤凰城的这家工厂将雇用 2000 名员工，每年生产 60 万块芯片，足以满足美国国内的全部需求。\\n荷兰公司阿斯麦，作为建造光刻机的巨头，成为欧洲最有价值的科技股。而拥有无与伦比制造设施的台积电，则成为亚洲最有价值的科技股。\\n他并非生来就是一位伟大的 CEO，也并非注定会成为这样的人。他通过不断的抽象思考，通过解决一个好 CEO 应该具备的输入和输出问题，把自己变成了这样一个人。\\n一切的成功都并非难以捉摸，而是有迹可循的：“他们的智慧确实超乎常人。”\\n当一个念头真正触动黄仁勋时，它会在数日乃至数周内慢慢酝酿发酵。它融入他的词汇库，并在每次会议上被反复提及。诸如“零亿美元市场”或“光速”之类的概念，并非在黄仁勋的脑海中一闪而过，而是在历经数月深思后，作为反复打磨的智慧结晶浮现。\\n凌晨 4 点，黄仁勋便已起身投入工作。他总是从自己最看重的长期项目开启新一天，坚信只要着手这个项目，无论当天遭遇何种变故，这一天都算不上失败。\\n“人工智能越强大，就越可能试图控制运行它的计算机，以便为自己获取更多奖励，”本吉奥说，“这就是我们的故事结局。”\\n“人工智能会占上风的，它会为自己争取更多资源。事实上，最自私的变体将表现最佳，你应该能看出这是一条非常危险的道路。”\\n短短 10 年间，人工智能已经两次实现了不可预见且永久的能力跃升。本吉奥认为，当前的模型尚不会对人类生命构成直接威胁，但谁又能预料下一次的突破呢？没人能够断言它将带来什么，或何时到来。\\n“目前有 99 位极其聪明的人正致力于让人工智能变更更出色，但也有一位极其聪明的人正试图探明如何阻止它接管一切。”辛顿说道。\\n黄仁勋的信心还来源于人工智能与生物大脑间的诸多差异。大脑并非通过反向传播来学习，这一点确凿无颖。而神经网络仅仅是模仿神经元。\\n不过，说实话，我也感到一丝其名的兴奋。能成为黄仁勋愤怒的对象，从某种意义上说，竟也算是一种荣幸：这是每个进入他核心圈子的人都必须经历的考验。\\n黄仁勋之所以能在并行计算、人工智能、Omniverse 等他人失败的领域取得成功，源于他不容忍对未来进行毫无根据的臆测。他总能为冷静地从第一性原理出发去审视技术，既不受乐观情绪影响，也不被恐惧所左右，仅凭一种冷静且耐心的商业逻辑，将企业远见推至极限。便除此之外的一切，他既不看也不去想象。人类灭绝的可能性并不属于企业战略层面的问题，对他来说，这纯属无稽之谈。\\nOpenAI 的成立背景便是防范灾难的发生。而几乎只有黄仁勋坚信，人工智能只会带来益处。\\n解决问题的自动化可以归纳为三个核心概念：观察并感知环境，理解并推理环境，然后提出并执行计划。\\nAI 目前尚未能从第一性原理中直接得出答案，它是通过观察数据来学习和得出纵论的。因此，它并非模拟第一性原理的求解器，而是在模仿智能、模仿物理。\\n他敢于摒弃传统观念，依循自己的理性判断行事。正是他坚定的信念，使他在一众中脱颖而出。\\n英伟达一直对规模庞大且利润丰厚的市场视而不见，反而专注于规模较小、处于边缘地带的市场。\\n渴望复制黄仁勋成功之路的企业家们，务必要遵循他的成功蓝图：首要之务是（持续）掌握所在领域顶尖的专业知识。\\n在未来的岁月里，人工智能将以我们几乎无法想象的方式重塑我们的世界。无论是艺术、科学、商业、战争，还是体力劳动，人类活动的每个领域都将发生变化。\\n一切都将焕然一新，没有东西都够维持原状。\\n硬件进化与 AI 算法的协同发展，成为推动这一时代变革的关键力量。\\n\"",

    title: "远离受害者天堂 - 《拆掉思维里的墙》读书笔记",
    content: "\"把一切的错误和责任都怪罪到别人身上，可能会让自己“舒服”一些。但是如果诉说给一个陌生人或者面试官，那么他们肯定会想难道你一点问题都没有吗？\\n从自己出发，去深刻思考，选择离开的原因是什么。不要在离职的时候，吐槽一堆。因为知道无法改变环境，所以选择改变自己。面对老板的客套，我只能说，都是打工的那些事，没必要再提了。\\n通过反思去年的两个选择，我明白了对环境或者对他人的不满，均是因为自己的最重要的诉求无法被满足。无法获得更好的成长以及感受不到尊重。吐槽具体的事都停留在表面，而且这样的事数不胜数。所以想要表达，直接说最终诉求，开门见山。\\n作为一个成年人，我得时刻提醒自己，吐槽环境或者他人时，想想最深层次的原因，有些伤人的话就不会说出来了，想要被尊重也得先尊重别人。同时要教育自己的两个小男孩，勇敢做出自己的选择，尽可能不受环境的影响。\\n读书笔记 你有没有想过，真正限制我们的，是我们思维里看不见的墙，而这堵墙很大一部分来自内心的不安全感。\\n追求安全感是人的本能，但安全感的获得必须通过内心真正的强大。安全感是给予，不是索取。恐惧越多，索取越多，不安全感反而递增。\\n在受害者天堂，大家从来没犯过什么错，美德都是他的，错误都是别人和社会的。\\n很多做坏事的人都拥有一个完美的受害者的故事。\\n别说对得起这家公司，首先得对得起自己，还有什么比自己的时间更宝贵的呢？所谓的为公司干，不就是为自己努力吗？如果这个都想不通，还心安理得，就别一起干了，否则，不如自己找一个更舒服的环境。\\n每个人都在别人的爱害者故事中获得不少廉价的快乐和虚无的安慰。\\n首先要承认一个残酷的现实——这个社会就是不那么公平，但这并不影响你在社会上快乐地工作。\\n这个世界就是不公平的。你做得只是好一点，别人是不认的；你必须做成一个鸵鸟，比鸡大得多的鸵鸟，到那个时候，所有人才会说你好。\\n我们生活在一个处处不公平的世界，我们无法改变这个世界的规则，无法改变自己的过去，但至少可以改变我们面对这个世界的心态，改变自己对于过去的看法，用一种新的思维模式，重新面对这个世界。\\n只要你愿意用一种掌控者的心态去重新面对自己的工作和生活，你就会感受到幸福。\\n人的视野就像手电筒，未知世界如茫茫黑夜。走在清凉黑夜里，大师如同闪亮的星星，在头顶若隐若现，我抓紧自己的手电筒，照着脚下，一步步前行，偶尔见几个同路人，心生欢喜。\\n小成靠聪明的勤奋，大成靠明智的选择。\\n要做好选择，需要战略层面极大的雄心和定力，还需要很多认知和工具。\\n家庭系统咨询的思路，则是把孩子和父亲当成系统，一起面对这个问题。让孩子听到爸爸的烦恼，最后让孩子意识到，爸爸的很多怒火不是冲自己来的，而是爸爸没能控制好他自己。孩子先是是再自责和害怕，甚至会尝试理解和原谅爸爸。爸爸学会了在事后及时道歉，并且独自去完成自己的功课。在融洽的父子（女）关系里，这件事情成为他们更亲密的机会。系统观点认为，重要的不是单个元素，而是元素之间的关系。\\n从认知和方法论再到系统论看问题，这是人类认识事物、层层展开的认知过程。\\n在《跃迁》里，我借用彼得·德鲁克的观点总结自己的创作闭环：用咨询驱动，用讲课整合，用写作产品化；还搞出来一个 IPO（输入问题、解决问题和输出产品）闭环，煞有其事。\\n这就是人生的有趣之外：出发常常是偶然的，到达到是你选择。手攥着一颗小珍珠，就可以出发，尽早你会找到很多珍珠，找到穿珍珠的钱，把它们串成项链。\\n时代的趋势、社会的系统和种种机会，是月光下泛着银色光芒的大小山峰，我顺着山形，保持重心，脚尖轻轻用力，判断自己要拐入的一个个路口和坡道。慢慢地，眼前的视野越来越宽，耳边是风声和雪花的轻抚，月亮当空，我的心里越来越安定了。\\n王小波说，人在年轻时，最头疼的一件事就是决定自己这一生要做什么。\\n我相信“每个人都是一棵树，只给给予足够多的养分，终将成长为自己喜欢的样子”的人生主义。\\n没有什么能通往真诚，真诚本身就是道路。\\n为大意义而活的人因为看不到头而毁灭；活下来的人，则是在糟糕的生活里找到了切实的、可实现的、可追求的小意义。\\n斯蒂格进一步发现，越感知意义，我们的幸福感、自我价值感就越强；而越追求意义，我们的幸福感、生活满意度和积极情绪就会越低。对，你没看错，是“越低”。\\n人除了眼前的苟且，得有点诗和远方，但要去远方，你往往先要走出眼前这摊苟且。\\n古龙的小说《多情剑客无情剑》里讲述了一对厨子在饭馆打烊后，在后厨给自己炒了盘菜，找了点小酒，很惬意地对饮，舒服了一两个时辰。古龙说，他们还活着，就是因为一天还有那么一两个时辰。\\n生命是一个持续不断的积累过程。人的各种能力、眼界会随着年龄的增长而成熟，他能一扇扇地推开他面前的门，看到更大的世界。\\n有意思，就是你的那把尺子。你经历的“有意思”的事情越多，你就拥有越大的自主权、能力和安全感，你也能慢慢找开更多有意思的事，让生活变得越来越有意思。\\n这就是人生的“爬山算法：全力以赴地爬上你目之所及的一个小山头，你会看到更多的山，看到下一个山头和路。就这样凭着“有意思”一个个地把你关心的事做到极致，你会走到你想象不到的高处。\\n别想什么大意义，先成为一个有趣的人。\\n在做别人的路上给自己放生，你才能走上属于自己的路。\\n斯蒂芬·盖斯说：“我的经验法则是把我想要的习惯缩小，直到小得不可能失败为止。”\\n很多的人的拖延，其实是一开始的目标就不对，要么是追寻外在动机太强、自己无感的目标，要么是给自己安排了完全不靠谱的强度。\\n她提出一个触动社会神经的问题：老一代人应该羡慕年轻人，因为他们拥有更多大的世界，但我不羡慕今天的年轻人。\\n如果你盯着糟糕，这个时代就会前所未有的糟糕；但如果你盯着机会，那么这个时代也会有前所未有的机会。今天这个时代，就看你怎么玩儿。\\n美学家贡布里希曾说，没有比完全不受约束的自由更加难以忍受的东西了。\\n创造类游戏的唯一玩法，是回来做自己。\\n得看到了世界，才有世界观；你得看到全部，才能安心守住局部；你得看到了自己的优势和局限，才能回来做自己。\\n极限运动员，就是这么狂热。你和他的差距，不是能力，而是价值观。\\n吃苦能熬出来优秀，但熬不出来卓越。\\n极限运动员成功率最大，因为他们总在长期地、不计成本地尝试。\\n成功=卓越*概率 卓越=天赋*刻意练习*时间 概率=正确的方式*热情*时间\\n极限运动员总有两份回报：一份在过程里，他们已经足够享受；另一份在成功后，成不成功也只是副产品罢了。\\n兴趣就是让你完全置身于事物之中。当你真正投入当下的事物中，不管这个事情多么简单、多么微小，你能能感受到无穷的乐趣。\\n担忧之墙永远把他们和乐趣隔离开来。他们就好像那种糟糕的读者，刚打开小说的第一页，就忍不住翻到最后去看结局，从而完全失去了阅读的快乐。\\n乐趣源于全情投入，而不是投入后的结果。正是因为这样，乐趣可以是无条件的。\\n我不禁问自己，如果我不是花时间去评价和围观别人，是不是我也能够做到？我开始明白为什么有些人总是那么优秀。\\n投入是热爱生命的钥匙。什么是快乐？快乐就是做事情既快，又乐！\\n不看钱工作的人，往往觉得能做这份工作本身就是最大的报酬。\\n无趣之人，往往不是无能之人，而是无胆之人。\\n像没有人看一样跳舞，像不需要钱一样工作，像没有受过伤那样爱，像就要死那样活着。\\n心理学家认为，快乐源于紧张感的释放，一旦一个需求已经完全被满足，紧张感就会消失，快乐就没有了，自然也就没有了持续的兴趣。\\n找那么不能够被满足的深层兴趣，比如爱、成长、超越自己、快乐、助人、宁静……它们会让你幸福一辈子。\\nThe world has kissed my soul with its pain, asking for its return is songs.（世界吻我以痛，我报之以歌）\\n霍夫曼从中悟到一个 ABZ 理论，就是人要同时有三个计划：A 计划目标远大，B 计划稳中求胜，Z 计划是底线。霍夫曼把家里的房间当成了 Z 计划，他知道即便 A 计算、B 计划全部失效，他也可以安稳地过一辈子。\\n安全感是一个力量强大的主子，它用一个看不见的牢房来囚禁奴隶，这是牢房用恐惧作墙，用恶毒的信念作水泥。\\n爱有两种：一种是死死抓住，你紧张，他也紧张；一种是轻松托住，你舒服，他也舒服。\\n所有的爱只有溢出来，才是爱。\\n这个世界没有谁都能够活下去，而且都会活得很好。当拥有了说走就走的能力，你反而能收获真正的爱情。\\n真正的爱，是给对方自由，也给自己自由。\\n如果没有内在安全感，但是内心又迫切需要安全感，我们只好慢慢地转向外界，寻找外部的寄托。\\n特蕾莎修女说，上帝不是要你成功，只是要你尝试。\\n站在阳光里，你会慢慢地赶走黑暗。\\n困难和问题总是导出不穷的，尽管如此，你仍然要每天坚持下去，坚持去做对你的未来意义重大的事情。它们最多花掉你十分钟的时间，可就是这十分钟，能给你你带来真正的改变。\\n哈伦坎普先生曾对我说，勇敢不是毫无恐惧。勇敢的意思是，一个人尽管心怀恐惧，但仍然能克服恐惧向前走去。\\n恐惧就是这样一个懦夫，当你触碰它的底线，接受事情最坏的结果，然后开始准备和它干一场的时候，它早就不知道躲到哪里去了。\\n第一，如果我失败了，代替我的家伙会怎么办？第二，既然这样，为什么我们不这样做呢？\\n你有没有注意到，安全感不是从别人身上得到什么，而是内心深处一种被需要的感觉。\\n支持别人是这个世界上最安全的事情，支持者也永远不会失败。\\n美国“心灵女王”奥普拉·温弗瑞在 2008 年斯坦福大学的毕业典礼上说：“如果你受了伤，你需要帮助他人减轻伤痛。如果你感到痛苦，那就去帮助他人减轻痛苦。如果你的生活一团糟，就去帮助其他处在困境中的摆脱困境。”\\n人们会因为自己相信“星座格格”，就慢慢发展出那样的性格。\\n我们按照过去的经验和记忆在大脑里构建了一个自己的世界。\\n我们给自己创造了一个世界模型，然后根据这个创造出来的世界生活。\\n一切你以为真实的事物，都是心智模型的计算，而一切心智模型对你来说都是实在的世界。\\n《第五项修炼》的作者彼得·圣吉说：“心智模型是深植于我们心灵之中，关于我们自己、别人、组织以及世界每个层面的形象、假设和故事。就好像一块玻璃微妙地扭曲了我们的视野一样，心智模式也决定了我们对世界的看法。”\\n《孙子兵法》曰：“兵无常势，水无常形；能因敌变化而取胜者，谓之神。”\\n如果你是金子，并且想要发光，那么首先你要提高自己的含金量。只有达到一定程度，你才会成为金矿。\\n穷困、孱弱和低学历的经历，被松下幸之助的心智模式构建成生命中受益无穷的恩惠。不管过去怎么样，我们完全有能力调整自己的心智模式，重新认识我们的过去，改变我们的未来。\\n很多人之所以没有长进，其实是在不断重复错误，不断掉进一个“坑”。作为自我学习最重要的途径，复盘可以帮助你克服自己的惯性。\\n复盘既是在重新理解过去，也是在酝酿未来。\\n读理工科的同学都学习过“正态分布”的概念，这个曲线告诉大家，无论在什么群体，随机变量的概率分布大多数都会停留在某一个值前后——离这个值越远，出现的概率就越小。\\n坚持不等于成功，坚持只是成功的必要工具之一，放弃也是成功的必要工具。\\n坚持或者放弃都是达到目标价值的手段，看清楚成功背后的东西才是最关键的。\\n大部分的矛盾与冲突，就是因为对方都在坚持自己的形式，而不是结果，打着爱的旗号来伤人，而且还坚持不懈。佛教里讲的“三毒”（贪、嗔、痴）之一的“痴”，说法是这种势头于形式，而不是结果的行为。\\n成功的真正意义应该是：越走越近，这是我听过到的对成功最好的解释。\\n什么是你人生的真正目标？就是那些随着外界环境的改变而你不会改变的目标。\\n我不能停止呼吸，因为明天，当太阳升起来，谁知道潮水能带来什么？（I have got to keep breathing. Because tomorrow, the sun will rise. Who knows what the tide could bring?)\\n当你把成功的定义放在外界，你会让自己陷入一种不可控的焦虑，一种获得前恐惧，获得后空虚的生活中。你的天花板是别人的地板，而你总在向上看，从来没有留意过窗边的风景。\\nYou got a dream, you gotta protect it. People can\\u0026rsquo;t do something themselves, they wanna tell you you can\\u0026rsquo;t do it. If you want something, go get it. Period\\n尝试总是要冒险的，而不尝试是最大的冒险。\\n亚里士多德说：“你的天赋与社会需求的结合点，就是你的职业所在。”天赋在慢慢增长，社会需求在不断变化，你的最佳职业也在不断变化。\\n“Swatch 之父”尼古拉斯·海耶克成功报挽救了瑞士破产的钟表产业，他说：“你的时间需要规划，但永远不要百分之百的规划它。那样的话，你会扼杀自己创造性的冲动。”\\n不管多坏，对未来保持希望，因为一切都会好起来的。\\n在你的视野范围内，你需要精细地计划；在你听说的范围内，你需要有大方向的规划；而在那些你连听都没有听过的地方，你需要的是相信。\\n道不易，法简易，术常易。\\n对新的机会和趋势永远保持警醒。\\n一件事情的价值，不取决于它在当下的价值，而取决于在未来中的价值，这就叫作未来价值。\\n法国诗人勒内·夏尔的两句诗：“懂得静观大地开花结果的人，绝不会为失去的一切而痛心。”\\n沉没成本其实是已经损失的成本，为了这个损失而追加成本，最后只让头破血流。\\n千万不要为了一个谎言，再说一个谎言。\\n印度诗人泰戈尔在他的诗中写道：如果因失去太阳而流泪，那么你也将失去群星了。（If you shed tears when you miss the sun, you also miss the stars）\\n漂泊者注定一辈子都在躲避什么，而不是追寻什么。\\n航行者最终能走出去很远很远，穿过那些风暴，走到自己想去的地方，漂泊者则被恐惧诅咒，一辈子胡乱地漂泊在海上。Impossible（不可能）和 I\\u0026rsquo;m possible（一切皆有可能）只差一点。那一点，就是你心中真正的目标。\\n我当初种兰花，不是为今天生气的。\\n你没有必要得到允许才开始学习，也没有必要得到机会才开始努力。如果愿意，你现在就能够为这件事情做些什么，除非你的受害者模式让你陷入深深的抱怨与自怜中。\\n不管你跑到哪里，世界都是不公平的，我们既无法让这个世界永远公平，也找不到一个永远公平的地方。\\n有人说，社会就是一棵大树，树上爬满了猴子，每一只猴子都笑脸向上，屁股向下。如果你向上看，看到的全是屁股；如果你向下看，看到的全是笑脸。\\n学会如何面对不公平，远远比学会如何评价不公平重要。\\n面对不公平，无聊的人冷嘲，懦弱的人抱怨，聪明的人跟随，清亮的人躲避，勇敢而智慧的人则尝试自己的方式去改变，用自己的力量来掌控这个世界。\\nYou may say I am a dreamer, But I am not the only one. If some day you join us, The world will be as one.—— Imagine\\n在按照自己的方式生活之路上，错误是一种最好的也是必需的学习方式。\\n每一个人身上都有两套系统：社会系统（男人）负责满足外界要求，换回生活需要；自我系统（女人）负责满足内心需求，把这些东西转换为我们心灵需要的价值，让我们快乐。社会系统总去做更有用的事情，自我系统总去做更有有趣的事情。\\n我们的幸福感，很大部分就是在这种”比你更好“的比较中流失的。\\n我们很听话地长成一群有脑无心的人，就像北京大学徐凯文教授说的那样，我们罹患一种”空心病“。这是一种有逻辑没情感的人，一群讲高度不讲尊重的人。我们长成别人要求的样子，并以此为容。\\n价值让人感到生活的意义，让人活得幸福。\\n有些人不用社会意义的成功，也能很好地走完职业的所有阶段，在普通的职位上活出自己生命的意义。\\n感情是不能够放在秤上称的。\\n一旦陷入等死模式，你最好的选择就是行动起来，穿越过去，因为等待的成本远远高于穿越的成本。\\n《战胜拖拉》的作者尼·匪奥里在书中写道：”我们真正的痛苦，来自因耽误而产生的持续的焦虑，来自因最后时刻所完成项目质量之低劣而产生的负罪感，还来自因失去人生中许多机会而产生的深深的悔恨。“\\n如果没有一个好的开始，你不妨试试一个坏的开始。因为完美的开始永远都不会来到，一个坏的开始总比没有开始强。\\n职业发展不好的人往往不是能力太低，而是能力太强，所以”开始“也太多，慢慢推动了核心竞争力。\\n如果你真的想到认真地开始，一定要让自己等一等，再等一次，然后再等一次，最后才真正开始。如果这个开始的激情都不能推动你三次等待，那一定是个夭折的开始。\\n纪伯伦说：”在每个开始中都有过去，在每个过去中都有开始。“\\n你可以不成功，但是不能不成长。\\n加缪说：”人是这样奇怪的一种动物，一方面希望自己进入群体，一方面又需要自己与众不同。“\\n亚里士多德说：”人格就是社会与天性的结合。“\\n成功不可能是大部分人的出路。作为一种比较后的结果，成为永远是小众的、不民主的，无法满足大部分人的单一的社会标准。作为一个集体游戏，成功永远都是少数人欢笑、多数人哭泣。\\n成长是你内心的一个尺度。你能感觉到成长，内心知道自己会成长为什么样子。就好像一柆橡树籽，无须教导，也会成长为一棵挺拔的橡树。\\n罗素说，孔雀是世界上最温顺的鸟，那是因为每一只孔雀认为自己是最美丽的。\\n这个世界一定是一个从成功到成长的世界。\\n这个世界一定是一个每个人能成长为自己样子的世界。\\n\"",

    title: "2024 年度总结：勇气",
    content: "\"总结 勇敢迈出一步，离开了工作七年的地方，开始寻找更多的可能性，也为寻找内心的安宁。\\n说实话我在没有离开自己的舒适区时，我非常没有安全感，因为不知道自己的能力边界在哪里，所以换了一家公司之后，我承担了大部分的模块，是太想证明自己的能力了。在项目上线并且稳定之后，我选择了离开，是我已经证明了自己的能力边界在哪里。\\n二宝已经开始上小班了，从最初不能离开妈妈的陪伴，到现在能跟老父亲吃喝玩乐一整天，我又要积极参与到他成长的关键周期了。\\n今年从最初的不安全，到现在明白了我不需要给任何人证明自己，我觉得是收获满满的一年。工作如果不能带给自己平和的心态，如果需要舍弃掉家人的陪伴，这样的工作对我而言意义不大。\\n新的一年，希望可以跟小宝一起睡觉，不熬夜。坚持阅读，写博客，坚持运动，工作顺心。\\n工作 从进入公司作为第一个后端，做后端主程已经快七年了，所以离开是需要充满勇气的。虽然挺多人不理解，但是我希望有更多的可能性。离职的时候，老板说：“我觉得你是一个理想主义者”，现在想想这句话应该是充满贬义的。\\n离职后不久我就在一家刚成立的小公司开始上班了，使用新的语言，新的框架最开始总是充满激情的。因为工期特别赶。我承担大部分的模块，特别是家园这种玩家强交互型的复杂模块。从三月份底开始，到八月底上线，几乎没怎么休息过，也没有加班费，甚至请假还会被扣工资。上线之后的运营节奏更快，当然后续也陆续招了三个后端，十一底，在人员基本招够的情况下，我选择了离职。\\n代码 借助于 Wakatime，每年可以详细统计我的编码数据。\\n今年总编码时长超过 1100 小时，排名前三的是 Lua、Go 和 C++。\\n年度编程语言：Lua。毕竟要使用 Skynet 框架，必须学习 Lua。但是在我看来，这个框架已经落伍了，不建议再花费时间在其上面。但是 Lua 解决好多问题的思路是没有问题的。\\n年度 IDE：Cursor。从去年上线开始的尝试就放弃，到今年的重新加入，这一年 Cursor 的提升着实已经碾压了 VS Code。虽然这个 IDE 我暂时的使用时长远小于 VS Code，但是未来两到三年时间肯定会变成第一名。\\n顺便也也将 ChatGPT 的订阅取消了，还是 Claude 更胜一筹。\\n个人成长 英语 英语四级单词任务结束，开始使用多邻国更加有目标的学习英语。在多邻国的上学习会更加实用和有趣，更加切近生活。\\n从九月中旬开始跟我家大宝一起使用多邻国学习英语，一开始就快停不下来了。从九月中旬到十二月，我花费了近 5500 分钟在英语上面，平均每天近 70 分钟。\\n在拿到了钻石锦标赛的第二名之后，我减少了花在该 App 上的时间，因为排行榜竞争挺上头的。但是学习最终还是要归于平淡。坚持到最后都是胜利，不能忘了学习。\\n今天主要看了《Programming in Lua》，并没有看其他完整版本的英语书籍。需要在新的一年中学习更多英文的书籍或者文章。\\n阅读 今天读书笔记整理近 20 万字。\\n书籍 《认知觉醒》 《自学是门手艺》 《穷查理宝典》 《家庭教育指南》 《只有偏执狂才能生存》 《你就是孩子最好的玩具》 《活出生命的意义》 《把时间当朋友》 《人人都能用英语》 《古都》 《人间值得》 《人类群星闪耀时》 《早起的奇迹》 《富爸爸、穷爸爸》 《境界》 《脉络》 《卓越》 《底层逻辑》 《被讨厌的勇气》 《Programming in Lua》 专栏 《学习力 30 讲》 《数学通识 50 讲》 《阅读与写作 50 讲》 习惯养成 在阅读了《认知觉醒》之后，作者在此书提到一堆书籍，其中就有微习惯，于是我听了这本书的解读，也非常认可“微习惯”带来的收益，于是给自己制定了三个微习惯。\\n8 月底到 10 月期间因为公司糟糕的作息，这几个习惯并未能正常继续。\\n每天一个俯卧撑 选择俯卧撑是因为每天几乎没有锻炼的时间，而且一个甚至三十个几乎可以在一分钟完成。做了这个决定之后，也正好看到有人讲 NVIDA 的 CEO 黄仁勋每天做六十个俯卧撑完成每日的锻炼任务。\\n当然六十个对我而言还是相当困难的，但是今年平均每天我可以做到十个俯卧撑，新的一年争取做到二十个。\\n冥想一分钟 这个也是容易做到的，细心去感受，时间久了，人会容易变得平静，没有那么容易暴躁。在《早起的奇迹》中作者也专门讲解过，如何来冥想以避免无法专注于当下。\\n记日记 从一毕业我一直有这个想法，但是做的并不好。19 年以前，平均每年大概可以写个位数篇。但是从 19 以后，开始听樊登读书，开始有了写日记的想法。在本子上大概写了几十篇，最后放弃了，本子携带不方便。后面开始在 LogSeq 上写，断断续续的写了一些。今年觉得应该要好好坚持下来，于是我又更换了工具，使用了苹果自带的日历。建立了个分组“每日反思”来记录。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/2024-annual-summary-courage\/"
