  {
    title: "《我与地坛》读书笔记",
    content: "\"很久没有阅读过文学类的作品了，读完之后真心觉得，后续还是要多读一些相关的书籍。\\n作者在书中多次提到自己的母亲，讲述了年轻的自己觉得自己如何不幸，却忘了孩子的不幸在母亲的身上会加倍。\\n关于上下课的摇铃声，小学的时候，村里的小学只有四年级，四年的时光都是有人专门去摇铃的。上了五年级就要到隔壁村子去上了，电铃替代了摇铃，的确是缺少了灵魂。\\n作者将其细腻的观察以及深刻的反思不断的呈现到我们眼前，对于词汇量贫乏的我，只能不断感叹，写的真好，怎么能写的这么好。同时也在反思，如果要我去写一篇这样的文章，我到底应该从哪些方面去努力呢。\\nAI 虽然能写文章了，但是人类的真情实感 AI 还是无法模拟的，我始终觉得 AI 还是无法完成如此感性的文学作品，这也是为什么要在这个时间仍要坚持自己手写读后感的原因。\\n笔记 地坛离我家很近。或者说我家离地坛很近。\\n仿佛这古园就是为了等我，而历尽沧桑在哪儿等待了四百多年。\\n四百多年里，它一面剥蚀了古殿檐头浮夸的琉璃，淡褪了门壁上炫耀的朱红，坍圮了一段段高墙又散落了玉砌雕栏，祭坛四周的老柏树愈见苍幽，到处的野草荒藤也都茂盛得自在坦荡，这时候想必是我该来了。\\n在满园弥漫的沉静光芒中，一个人更容易看到时间，并看见自己的身影。\\n在人口密聚的城市里，有这样的一个宁静的去处，像是上帝的苦心安排。\\n蜂儿如一朵小雾稳稳地停在半空；蚂蚁摇头晃脑捋着触须，猛然间想透了什么，转身疾行而去；瓢虫爬得不耐烦了，累了，祈祷一回便支开翅膀，忽悠一下升空了；树干上留着一只蝉蜕，寂寞如一间空屋；露水在草叶上滚动，聚焦，压弯了草叶，轰然坠地摔开万道金光。\\n一个人，出生了，这就不再是一个可以辩论的问题，而只是上帝交给他的一个事实；上帝在交给我们这件事实的时候，已经顺便保证了它的结果，所以死是一件不必急于求成的事，死是一个人必然会降临的节日。\\n味道是最说不清楚的，味道是能写只能闻，要你身临其境去闻才能明了。味道甚至是难于记忆的，只有你又闻到它能记起它的全部情感和意蕴。\\n事实上我也真的没为她想过。那时她的儿子还太年轻，还来不及为母亲想，他被命运击昏了头，一心以为自己是世上最不幸的一个，不知道儿子的不幸在母亲那儿总是要加倍的。\\n坐在小公园安静的树林里，我闭上眼睛，想：上帝为什么早早地召母亲回去呢？很久很久，迷迷糊糊地，我听见了回答：‘她心里太苦了。上帝看她受不住了，就召她回去。’我似乎得到一点儿安慰，睁开眼睛，看见风从树林里穿过。\\n我想想告诫所有长大的男孩子，千万不要跟母亲来这套倔强，羞涩就更不必，我已经懂了可我已经来不及了。\\n我放下书，想，这么大一座园子，要在其中找到她的儿子，母亲走过了多少焦灼的路。多年来我头一次意识到，这园中不单是处处都有过我的车辙，有过我的车辙的地方也都有过母亲的脚印。\\n如果以一天中的时间来对应四季，当然春天是早晨，夏天是中午，秋天是黄昏，冬天是夜晚。如果以乐器来对就四季，我想春天应该是小号，夏天是定音鼓，秋天是大提琴，冬天是圆号和长笛。要是以这园子里的声响来对应四季呢？那么，春天是祭坛上空漂浮着的鸽子的的哨音，夏天是冗长的蝉歌和杨树叶子呼啦啦的对蝉歌的取笑，秋天是古殿檐头的风玲响，冬天是啄木鸟随意而空旷的啄木声。以园中的景物对应四季，春天是一径时而苍白里面黑润的小路，时而明朗里面阴晦的天上摇荡着串串杨花；夏天是一条条耀眼而灼人的石凳，或阴凉而爬满了青苔的石阶，阶下有果皮，阶上有半张被坐皱的报纸；秋天是一座青铜的大钟，在园子的西北角上曾丢弃着一座很大的铜钟，铜钟与这园子一般年纪，浑身挂满绿锈，文字已不清晰；冬天，是林中空地上几只羽毛蓬松的老麻雀。以心绪对应四季呢？春天是卧病的季节，否则人们不易发觉春天的残忍与渴望；夏天，情人们应该在这个季节里失恋，不然就似乎对不起爱情；秋天是从外面买一盆花回家的时候，把花搁在阔别了的家中，并且打开窗户把阳光也放进屋里，慢慢回忆慢慢整理一些发过霉的东西；冬天伴着火炉和书，一遍遍坚定不死的决心，写一些并不发出的信。还可以用艺术形式对应四季，这样春天就是一幅画，冬天是一群雕塑。经梦呢？以梦对应四季呢？春天是树尖上的呼喊，夏天是呼喊中的细雨，秋天是细雨中的土地，冬天是干净的土地上的一只孤零的烟斗。\\n我听来，他的技术不算精到，在关键的地方常出差错，但他的嗓子是相当不坏的，而且唱一个上午也听不出一点儿疲惫。太阳也不疲惫，把大树的影子缩小成一团，把疏忽大意的蚯蚓晒干在小路上。\\n无言是对的，要是上帝把漂亮和弱智这两样东西都给了这个小姑娘，就只有远方和回家去是对的。\\n假如世界上没有了苦难，世界还能够存在么？要是没有愚钝，机智还有什么光荣呢？要是没了丑陋，漂亮又怎么维系自己的幸运？要是没有了恶劣和卑下，善良与高尚如何界定自己又如何成为美德呢？要是没有了残疾，健全会否因其司空见惯而变得腻烦和乏味呢？\\n一个失去差别的世界将是一潭死水，是一块没有感觉没有肥力的沙漠。\\n我常以为是丑女造就了美人。我常以为是愚氓出了智者。我常以为是懦夫衬照了英雄。我常以为是众生度化了佛祖。\\n恐慌日甚一日，随时可能完蛋的感觉比完蛋本身可怕多了，所谓不怕贼偷就怕贼惦记。\\n别忘了人真正的名字是：欲望。所以您得知道，消灭恐慌的最有效的办法就是消灭欲望。\\n每一个有激情的演员都难免是一个人质。每一个懂得欣赏的观众都巧妙地粉碎了一场阴谋。每一个乏味的演员都是因为他老以为这戏剧与自己无关。每一个倒霉的观众都是因为他总是坐得离舞台太近了。\\n这一声叹，暴露了当代医学的爱莫能助。他们没有别的办法帮助我，只能让我住得好一点儿，安静些，读读书吧——他们可能是想，说不定书中能有”这孩子“一条路。\\n可我已经没了读书的兴致。整日躺在床上，听各种脚步从门外走过；希望他们停下来，推门进来，又希望他们千万别停，走过去走他们的路去别来烦我。\\n我记得我久久地看过一个身着病号服的老人，在草地上踱着方步晒太阳。只要这样我只想要这样！只要能这样就行就够了！\\n我用目光在所有的地方写下”上帝保佑“，我想，或许把这四个字写到千遍万遍就会赢得上帝的怜悯，让它是个瘤子，一个善意的瘤子。要么干脆是个恶毒的瘤子，能要命的那一种，那也行。\\n那影子将长久地在我心里晃动，给未来的日子带来幸福也带来痛苦，尤其带来激情，把一个绝望的生命引领出死谷；无论是幸福还是痛苦，都会成为永远的珍藏和神圣的纪念。\\n因此偶尔有人说我是活在世外桃源，语气中不免流露了一点儿讥讽，仿佛这全是出于我的自娱甚至自欺。我颇不以为然。我既非活在世外桃源，也从不相信有什么世外桃源。但我相信世间桃源，世间确有此源，如果没有恐怕谁也就不想再活；倘此源有时弱小下去，依我看，至少讥讽并不能使其强大。千万年来它作为现实，更作为信念，这才不断。它源于心中再流入心中，它施于心又由于心，这才不断。欲其强大，舍心之虔诚又向何求呢？\\n他不知道，他还不懂，命运中有一种错误只能犯一次的，并且没有改正的机会，命运中有一种并非是错误的错误（比如淘气，是什么错误呢），但它却是不被原谅的。\\n如禅，不能说不能说，一说就错。\\n我似乎得到一点儿安慰，睁开眼睛，看见风正在从树林里穿过。\\n人有时候只想独自静静地待一会儿，悲伤也成享受。\\n又是秋天，妹妹推我去北海看了菊花。黄色的花淡雅，白色的花高洁，紫红色的花热烈而深沉，泼泼洒洒，秋风中正开得烂漫。我懂得母亲没有说完的话。妹妹也懂。我俩在一块儿，要好好儿活……\\n有人的地方一定有墙。我们都在墙里。没有多少事可以放心到光天化日下去做。规规整整的高楼叫人想想图书馆的目录柜，只有上帝可以去拉开每一个小抽屉，查阅亿万种心灵秘史，看见破墙而出的梦想都在墙的封护中徘徊。还有死神按期来到，伸手进去，抓阄儿似的摸走几个。\\n墙永久地在你心里，构筑恐惧，也牵动思念。\\n其实秘密就已经是墙了。肚皮和眼皮都是墙，假笑和伪哭都是墙，只因为这样的墙嫌软嫌累，要弄些坚实耐久的来加密。\\n不是人有欲望，而是人即欲望。这欲望就是能量，是能量就是运动，是运动就走去前面或者未来。前面和未来都是什么和都是为什么，这发来的疑问使意义诞生，上帝便在第六天把人造成。\\n寂静的墙和寂静的我之间，野花膨胀着花蕾，不尽的路途在不尽的墙间延展，有很多事要慢慢对它淡，随手记下谓之写作。\\n人类的一切歌唱大概正就是这样起源。或者说一切艺术都是这样起源。艰苦的生活需要希望，鲜活的生命需要爱情，数不完的日子和数不完的心事，都要诉说。\\n道法自然，民歌以真诚和素朴为美。真诚而素朴的忧愁，真诚而素朴的爱恋，真诚而素朴的希冀与憧憬，变成曲调，贴着山走，沿着水流，顺着天游信着开游；变成唱词，贴着心走沿着心流顺着心游信着心游。\\n不管是异时的还是异域的，只要是从心里流出来的，就必定能够流进心里去。\\n一代人与一代人的历史是不同的，这是代沟的永恒保障。沟不是坏东西，有山有水就有沟，地球上如果都是那么平平展展的，虽然希望那都是良田但事实那很可能全是沙漠。\\n世上的一些事多是出于瞎操心，由瞎操心变为穷干涉。\\n上帝从来不对任何人施舍”最幸福“这三个字，他在所有人的欲望前面设下永恒的距离，公平地给每一个人以局限。\\n既然是梦想不妨就让它完美些罢。何必连梦想也那么拘谨那么谦虚呢？\\n一个幸运的母亲必然是一个幸运的母亲，一个明智的母亲，一个天才的母亲，她自打了当了母亲就得了灵感，她教育你的方法不是来自于教育学，而是来自她对开一切生灵乃至天地万物由衷的爱，由衷的颤栗与祈祷，由衷的镇定和激情。\\n地球如此方便如此称心地把月亮搂进了自己的怀中，没有阴晴圆缺，没有潮汐潮落，没有了距离便没有了路程，没有了斥力也就没有了引力，那是什么呢？很明白，那是死亡。\\n所谓好运，所谓幸福，虽然不是一种客观的程序，而完全是心灵的感受，是强烈的幸福感罢了。\\n幸福感不是能一次给够的，一次幸福感能维持多久这不好计算，但日子肯定比它长，比它长的日子却永远要依靠着它。\\n梦想使你迷醉，距离就成了欢乐；追求使你充实，失败和成功都是伴奏；当生命以美的形式证明其价值的时候，幸福是享受，痛苦也是享受。\\n生命的意义就在于你能创造这过程的美好与精彩，生命的价值就在于你能够镇静而又激动地欣赏这过程的美丽与悲壮。\\n死，从来不是一次性完成的。陈村有一回对我说：人是一点一点死去的，先是这儿，再是那儿，一步一步终于完成。\\n可能，生和死都不过取决于观察，取决于观察的远与近。\\n所有的人都在白昼的魔法之下扮演着紧张、呆板的角色，一切言谈举止，一切思维与梦想，都仿佛预设的程度所圈定。\\n我平生第一次看见了教堂，细密如烟的树枝后面，夕阳正染红了它的尖顶。\\n对于故乡，我忽然有了新的理解：人的故乡，并不止于一块特定的土地，而是一种辽阔无比的心情，不受空间和时间的限制；这心情一经唤起，就是你已经回到了故乡。\\n那时我才发觉她们与一般的老太太确有不同，脸上的第一条皱纹里都涌现着天真，那琴声我现在还能听见。\\n母亲走来走去搅乱着那道斜阳，二姥姥仿佛静止在幽暗里，素色的旗袍与幽暗浑成一体，唯苍白的脸表明她在。\\n但这虚缈并不是无，就像见，风是什么样子？是树的摇动，云的变幻，帽子被刮跑了，或者眼睛让尘沙迷住……\\n童年，在这一时刻漂流进一种叫作”历史“的东西里去了，永不复返。\\n那四十多年，要是我愿意我是可以去问个究竟的，他现在在住得离我并不太远。但我宁愿保留住猜想。这也许是因为，描摹实际并不是写作的根本期冀。\\n往日，像个昏睡的老人慢慢苏醒，唏嘘叹惋之间渐渐生气勃勃起来。历史因此令人怀疑。循着不同的情感，历史原来并不确定。\\n一九四八年，母亲十九岁，未来其实都已经写好了，站在我四十六岁的地方看，母亲的一生已在那一阵喜庆的唢呐声中一定一句地写好了，不可更改。那唢呐声，沿着时间，沿着阳光和季节，一路风尘雨雪，传到今天才听出它的哀婉和苍凉。\\n每个人都必然是这一个。所有的人都是一样，从老家久远的历史中抽取一个点，一条线索，作为开端。这开端，就像那绵绵不断的唢呐，难免会引出母亲一样的坎坷与苦难，但必须到达父亲一样的煎熬与责任，这正是命运要你接受的”相信与恐惧“吧。\\n那铃声，上课时摇得紧张，下课时摇得舒畅，但无论紧张还是舒畅都比后来的电铃有味道，浪漫，多情，仿佛知道你的惧怕和盼望。\\n设若确有那样的极乐之地，设若有福的人果真到了那里，然后呢？我总是这样想：然后再往哪儿去呢？心如死水还是再有什么心愿？无论再往哪儿去吧，都说明此地并非圆满。丑弱的人和圆满的神之间，是信者永远的路。这样，我听见，那犹豫的音乐是提醒着一件事：此岸永远是残缺的，否则彼岸就要坍塌。\\n饿就是肚子里在叫，而脑子里不断涌现出好吃的东西，饿就是晚上早早地睡觉，把所有好吃的东西都带到梦里去。\\n记忆，所以是一个牢笼。印象是牢笼以外的天空。\\n那个可怕的孩子已经长大，长大得到处都在。\\n一个人，生命中最美丽的时光竟似消散得无影无踪。一个人丰饶的心魂，竟可以沉默到无声无息。\\n我现在也已年过半百，才知道，这个年纪的人，心中最深切的祈盼就是家人的平安。于是我越来越深地感受到了我的母亲当年的苦难，从而越来越多地想到了孙姨的当年，她的苦难唯加倍地深重。\\n一颗七岁的心已经懂得，要靠赢得别人对你的好感，来改善自己的处境。\\n那时的日子好像过得特别饱满、色彩斑斓，仿佛一条充盈的溪水，顾自欢欣地流淌，绝不以为梦想与实际会有什么区别。\\n母亲把那双”回力“颠来倒去地看，再不问它的价格。料必母亲是懂得，世上有一种东西，其价值远远超过它的价格。这儿的价值，并不止于”物化劳动“，还物化着春天整整一个季节的能量。\\n要是有些事我没说，地坛，你别以为是我忘了，我什么也没忘。但是有些事只适合收藏，不能说，也不能想，却又不能忘。\\n柔弱，是信者仰慕神恩的心情，静聆神命的姿态。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/the-temple-of-earth-and-me-notes\/"

  {
    title: "《我看见的世界》读书笔记",
    content: "\"从本书中学到了机器学习发展的历程，也了解到了作者青春期全家移民到美国后生活的不易，多亏了鲍勃一家人的帮助，才让作者有幸给整个人工智能做出如此巨大的贡献。\\n从机器学习到深度学习，到人工智能大模型，让我对这些关键词有了更进一步的了解。\\n作者因为我经常往返与医院，照顾生病的母亲，所以在科技与人文方面有更深入的思考。这也是科技发展永远绕不过的话题，希望科技的发展永远能让人类过上更加美好的生活。\\n笔记 我意识到，即便身为一个生活在社会边缘的少女，我心目中的理想国度依然是科学世界。\\n人工智能的崛起速度和影响范围可谓史无前例，仅仅从这个角度看，也值得我即将面对的立法者予关注。\\n我相信人类文明正处在一场科技革命的风口浪尖，这场革命将重塑我们的生活方式。\\n科技革命必须深深根植于人类奋斗的基础之上，必须尊重全球社会的集体尊严，必须始终牢记自己的起源：人类的身体素质在自然界中并不起眼，只是因为人类拥有无尽的想象力，人类社会才取得长足发展。人类对自己的本质如此困惑，以至现在希望用硅重塑自己。因此，人工智能革命必须明确地以人为本。\\n父亲带我出去玩，不是为了教给我什么东西——他喜欢大自然，但并不是专家——可这种经历却在我心中播下了哲学的种子，成为塑造我人生的最大力量：我对探索自己视野以外的事物产生了永不满足的渴望。\\n每当读完一本书，那些故事就会在的脑海中久久索绕，仿佛是另一个现实世界与我所处的世界相抗衡。无论是在步行上学的路上、骑车去公园的途中，还是去小卖部买东西的时候，我眼中看到的生活日常都与脑中遥远的景象交织在一起：狄更斯笔下的英国的鹅卵石街道，海明威书中波涛汹涌的大海，大仲马描写的欧洲海岸的浪漫冒险。\\n我的努力只是为了自己。\\n在最好的时候，学校像是对母亲分享书籍和父亲鼓励探索的延续。\\n思维障碍出现得快，消失得也快。我突然感受到物理学的新维度，我只能将其描述为一种我从未意识到的浪漫。仿佛白昼如洪流般涌入，我看到物理学的本质，就像父亲看到自然世界的本质一样：纯粹的奇迹之源。\\n物理学的历史如同戏剧一般，丰富而生动，跨越几个世纪，让我深深着迷。\\n我爱物理学，就像父母爱着他们从我幼年时期就跟我分享的追求一样，这份爱简单而纯粹。父母向我展示了世界上还有更多可能性，他们给了我冒险、故事和想象力。\\n以前他虽然英语不好，但总是幽默开朗，而现在变得孤僻阴郁。挨打的那一刻是残酷的——身体的疼痛、精神上的屈辱、纯粹的身体侵犯，但让人感觉最不人道的还是这种转变：他与生俱来的积极乐观被剥夺了。\\n爱因斯坦是我心中最伟大的英雄，看着他的纪念雕像，我能感到这种热情又回来了。\\n风在树枝间嘶嘶作响，干枯的树叶发出微弱的辅音。苍白的水泥小径将绿色的草坪切割成多边形。褐色的砖墙静静地守望着，表面是几个世纪的历史留下的坑坑洼洼。最重要的是，天空如此湛蓝清澈，有时我还是很难相信这是真的。\\n如果我要把自己的一生奉献给科学——无论以何种形式，我都要感谢我在人生最低迷、最迷茫的日子里遇到的那些人。我越来越有一种久违的感觉：我怀感恩。\\n图灵的设想得到了美国计算机科学家同行的呼应。1956 年，他们将好奇心编撰成文，提出了现在广为人知的《达特芧斯人工智能夏季研究项目提案》，“人工智能”一词就是在这份提案中诞生的。提案呼吁举办一次非正式研讨会，探讨如何通过计算机编程来完成类似人类的推理、感知和知识概括等活动。项目主要由约翰·麦卡锡（John McCarthy）和马文·明斯基（Marvin Minsky）主导，他们二位都是长期对大脑保持好奇心的数学家；此处还有 IMB 701 计算机的设计都纳撒尼尔·罗切斯特（Nathaniel Rochester），以及被誉为“信息论之父”的克劳德·香农（Claude Shannon）。\\n事实上，人工智能与物理学不仅仅是主题上存在联系，还有更深层次的连接：人工智能的许多奠基人都兼容并蓄，涉足包括心理学和认知科学在内的各种领域，但他们的背景主要集中在数学、电子工程和物理学领域。\\n20 世纪 80 年代开到 90 年代初，潮流开始转向更自然的方法。杨立昆的成果就预示着一个大胆的未来。随着时间的推移，行业研究重点从”通过明确编程来解决问题“转变为”从示例中发现模式“。\\n算法不是被告知该做什么，而是去学习做什么。研究人员给它起了一个贴切的名字：”机器学习“。\\n在科学的发展进程中，思想孕育的过程相对富有诗意。没有任何一条自然法则规定洞察只有在能够付诸实践的前提下才会出现。很多灵感的火花都领先自己所处的时代几年、几十年、甚至几个世纪，历史上的例子比比皆是。而真正鼓舞人心的是，这些早期的思想家对于自己的发现抱有坚定的信念：无论前进的道路看起来多么不切实际，无论实验成功的前景多么渺茫，伟大的科学家都被与生俱来的探索欲所驱使，再艰难的环境也浇不灭他们孜孜以求的热情。机器学习几十年的发展历程即是如此。\\n机器学习自诞生之初就从人类认识中汲取了一定的灵感，这在很大程度上得益于神经科学等领域的同步发展。\\n大脑可以被看作由简单元素组成的大型网格，元素之间的联系可以随着时间的推移而改变；通过将复杂的行为分布于网络中，我们几乎可以完成无限的任务，并且可以不断学习新的任务，即使到了晚年也可以。\\n休伯尔和威塞尔的研究发现，感知不是发生在单个神经元层次上，而是通过由多层神经元组成的层次结构进行的。\\n由于大脑的网络结构允许无数步骤同时进行，我们的感知体验是连续不断、充满活力的。休伯尔和威塞尔的研究成果改变了我们对感官知觉的理解，二人因此获得了 1981 年的诺贝尔生理学或医学奖。\\n1986 年，由加州大学圣迭戈分校分校教授大卫·鲁梅尔哈特（David E. Rumelart）领导的一个研究人员小组在科学杂志《自然》上发表短篇研究报告，介绍了一种能让新认知机等算法有效学习的技术。他们将其称为”反向传播“，名字起源于这一技术最显著的特征：在这种级联效应中，每个训练实例（具体来说，是网络对给定刺激的反应与正确答案之间的差异）通过网络的一端传递到另一端，并逐层进行误差的递减调整。\\n虽然鲁梅尔哈特是首席研究员，但他的两位合著都之一的杰弗里·辛顿（Geoffrey Hinton）才是反向传播联系最紧密的人物。辛顿当时是卡内基梅隆大学的教授，从小就被智能之谜所吸引，其职业生涯致力于探索重视智能的新方法。\\n那是一个神经网络稳步发展的时代，网络层数越来越多，神经元连接越来越复杂，训练技术也越来越完善。杨立昆是辛顿的第一批学生，他把这些研究成果应用到了识别手写邮编这一极具实用性的场景，引起广泛关注。在不到十年的时间里，机器学习这样一个曾经遥不可及的梦想终于在现实世界中开花结果。\\n因为观念的不同，我们飞越半个地球，来到陌生的国度，深陷贫困，每天都在为生存苦苦挣扎。但从父亲身上看不出这些。他正在专注于研究别人家的滑雪镜或咖啡机，他的满足感如此纯粹，让我也感同身受，几乎忘却了尘世间的烦恼。\\n尽管课程内容早已了然于胸，但他们讲起课来总会双眼放光。我一直觉得我的激情定义了我，但这些人真正活出他们的激情，达到了我从未想象过的程度。\\n”请大家深呼吸，让这张图片荡涤你的心灵。“他措辞严谨，语调轻柔，”那些微小的光点不是恒星，甚至不是恒星系统。它们是整个星系，成千上万的星系，其规模之大，非我们渺小的大脑所能理解。但借助哈勃望远镜这样的工具，人类终于第一次瞥见了宇宙之宏大。我之所以在最后一堂课给大家看这张照片，就是希望你们能够永远铭记这种感受，永远保持好奇心和勇气，永远愿意追问那些看似不可能的问题。‘哈勃深场’的镜面曝光，让我们看到了答案有多么美妙。\\n我如饥似渴的读着爱因斯坦、费曼和玻尔等思想家的传记，像学习学校的课程一样认真研究他们的个人历史。\\n薛定谔是我最喜欢的例子之一。他的整个职业生涯都走在 20 世纪量子力学的最前沿，然而他却在那本短小精悍的《生命是什么》一书中探究了遗传学和生物体的行为，甚至研究了生物的伦理意义。这本书对我产生了深远的影响，通过更有机的视角探索世界的想法令我深深着迷。\\n我的阅读清单越来越五花八门，无所不包。我沉浸在侯世达（Douglas Richard Hofstadter）所写的《哥德尔、艾舍尔、巴赫：集异璧之大成》中，也被罗杰·彭罗斯（Roger Penrose）的《皇帝新脑》的广度和深度所吸引。就这两本书而言，挑战我的不仅仅是其思想之精辟、智慧之高深，还有它们之间丰富的联系。\\n从本质上说，对智慧的全面描述揭示的不是魔法，而是一种过程，是规则和原则的动作。\\n当神经元以千亿计的数量级复制，当它们之间的连接达到 10 的 11 次方时，质变就发生了。物质变成了思维，产生了爱、喜悦、悲伤、愤怒、恐惧和欢笑，也造就了我们在科学、艺术、音乐和数学等方面的能力。\\n正是因为大脑，我们所珍视的一切生命体验才成为可能。\\n比起普林斯顿大学，伯克利更能代表父母来到这个国家所追求的东西：自由地认清自己的激情，毫不妥协、无怨无悔地活出激情。\\n父母对无限机会的追求是他们的北极星。这个愿景让他们焕发出无与伦比的活力，在他们的生命中打下了深深的烙印，是他们生而为人的定义。\\n与此同时，我发现自己开始在天宇中追寻属于自己的北极星，那是每一位科学家都会穷尽一切追逐的坐标，无论是一个问题、一个假设，还是一个赌注。哪怕要追到天涯海角，我也会毫不犹豫。\\n在一个没有感官输入的世界里，生物没有能力收集关于世界的信息，因此大脑完全没有存在的必要。\\n我们的大脑多么复杂，其中的思维活动最终都可以追溯到来自其边界之外的刺激。\\n帕克认为，与其说带来改变的是一种外部力量，不如说是一种内部力量。他认为，引发寒武纪生命大爆发的导火线是一种能力的出现：光敏感性，这也是现代眼睛形成的基础。\\n光敏感性的出现是地球生命史上的一个转折点。\\n对光的感知打响了进化军备竞赛的第一枪。\\n神经网络是一种生物电系统，原理简单，但功能强大。神经网络将对运动功能和感觉功能的控制融合到同一个反应机制中，这种机制适合执行“应对身体攻击”和“觅食”等基本任务。在进化过程中，神经网络虽然原始，却是与竞争日益激烈的外部世界保持同步的权宜之计，即使今天也依然存在，尤其是在水生生物中，例如某些种类的水母。\\n为了处理五花八门的信息，神经系统不断发展，最终形成一个集中枢纽，其中的组成部分被越来越密集地压缩到一个器官里。我们把这个器官称之为大脑。\\n大脑并不是内部某种神秘的智力火花的产物，而是对外部世界的反应。愈加清晰和纷杂的外部世界影像，通过感官到达生物体内部，感知周围环境的能力促使我们发展出了整合、分析并最终理解这种感知的机制。视觉就是感知系统最为活跃的组成部分。\\n随着视野广度和深度的扩大，大脑不得不以更强大的智能来适应环境，逐渐融入了对因果关系、时间流逝，甚至对操纵环境本身的影响的认识。这不仅为强大的捕食者和灵活的被食者创造了条件，也为真正的智能、为现代人类的出现奠定了基础。\\n视觉研究是对人类认知中一个核心现象的探索。视觉在很大程度上是人类身份和独特性的基础，无论是在生物学上、人际关系方面，还是在文化层面。研究视觉是通往我们体验最基础层面的旅程。\\n特雷斯曼的研究范围很广，解释翔实，但她的核心理论是统一的，即人类视觉从识别微小细节开始，然后建立它们之间的关系，直到揭示出一幅完整的画面。\\n事实上，从最早的处理阶段开始，我们在感知周围环境时，并不是将其看作颜色和轮廓的组合，而是以类别的方式来理解。\\n大脑能够以惊人的辨别力和迅捷的速度识别出无数视觉概念，这是大脑的独特特点，不仅极其强大，而且似乎完全是自动的。\\n视觉在更高、更有意义的层面上发挥作用，用知识武装我们的头脑——我们可以想象树叶随微风摇曳的样子或夹在指间的感觉，我们也可以立刻估计出一根树枝的质地和重量，这两者都与高悬在数英里高空的不可触摸的大气层和彩色光线截然不同。\\n分类的能力赋予了我们难以估量的力量。视觉没有把我们埋没在光线、颜色和形状的无数细节中，而是把我们的世界变成了可以用语言描述的离散概念。\\n从本质上讲，这与人类的感知能力恰恰相反。人类的感知能力是由泛化能力决定的，泛化能力增强了我们的灵活性和适应性，甚至让我们富有创造力，让我们能够随时利用新想法的力量锐意进取，而不是停留在过去的经验中止步不前。\\n视觉是定义人类思维情感最为重要的能力之一，是通往整个记忆、联想、概念和推理世界的入口，所有这些都交织在我们与周围环境的视觉联系中。\\n事实上，我想得越多，就越担心像“家”一样舒适的地方在这种时候可能会过于安逸。搬到一个新地方之所以吸引我，正是因为那里不舒适。它会让我感到不确定，甚至可能有些冒险，而我就需要这种感觉。\\nImageNet 不仅仅是一个数据集，甚至也不仅仅是一个视觉类别的层次结构。它是一个假设、一个赌注，它受到我们自身生物学起源的启发，即实现真正机器智能的第一步，是沉浸在完整的视觉世界中。\\n邓嘉认为，ImageNet 不仅代表了规模的扩大，还代表了分类逻辑的转变，类似于物理学领域的“相变”，在这种转变中，甚至现象的最基本属性也会发生变化。ImageNet 极大地拓宽了算法面临的可能性，但因为规模太大，也给算法造成了挑战（相比而言，小型数据集就不会有这个问题）。\\n一切都很美好，只可惜，这种美好太过短暂。\\n我的职业生涯致力于理解人类心灵的本质，而我此生最大的荣耀之一就是有机会更好地了解鲍勃的本性。\\n有时候，假设需要一些时间才能赢得所有人的认同。\\n神经网络是由生物学启发、层次分明的相互连接的决策单元阵列。\\nAlexNet 是卷积神经网络（Convolutional Neural Network，CNN）的一个实例。卷积神经网络的叫法源于图形卷积的过程。在这个过程中，一系列滤波器在图像上扫过，寻找与网络所识别事物相对应的特征。这是一种独特的有机设计，灵感来自休伯尔和威塞尔对哺乳运动视觉系统的观察，即视觉处理在多个层次上进行。就像在自然界中一样，卷积神经网络的每一层都会逐渐整合更多的细节信息，从而形成越来越高层次的感知，最终将真实世界的物体完整地呈现在我们的视野中。\\n技术已经取得了长足的进步，尤其是出现了针对特定应用进行了优化的计算机硬件，价格低廉但性能出色，让大规模数据集训练成为可能。有意思的是，一切都要归功于电子游戏的流行。\\n与所有神经网络一样，AlexNet 的初始状态是无形的、隋性的，就像虚空中的一块挂毯。然后，学习过程就开始了：面对从 ImageNet 库中随机选择的图片，神经网络的任务是从上千个标签中选择一个正确的标签，对图片进行标注。这个过程周而复始，不断重复。一开始，标注几乎是不可能完成的任务；AlexNet 的数千万个神经元是随机配置的，对世界甚至连一点儿模糊的理解都没有，只会产生错误的结果。把一张蘑菇图片标注为“瓶盖”。错误，把一张拖车图标标注为“电吉他”。错误。把一张棱皮龟图片标注为“浴巾”。错误。\\n作为整体，这些连接提供了一张巨大的画布，足以描绘整个世界。在一轮又一轮的标注中，权重不断变化，有的变弱，有的摇摆不定，形成了一种柔韧结构，对训练做出有机的优雅反应。承载这些庞大数据的是两个英伟达图形处理器，高度专业化的硅芯片并行工作，以最快速度进行着一轮又一轮运算。\\n在经过 140 万轮标注后，最后几张图片与其说是一场磨炼，不如说是一场加冕礼。网络的焦点穿过像素，随着熟悉模式的识别而亮起，并传递到下一层，与其他模式相结合，形成越来越强大的感知。算法的反应不再是随机的，大多数也不再是错误的。\\n我在来时飞机上的狂躁的思绪和焦灼的问题一扫而空，取而代之的是一种意外的感觉。不是平静，而是大悟，是深思。这一次，从起飞到着陆，我一直静静地从着，脑子里只回荡着一个念头：历史刚被创造出来，而世界上只有少数人知道。\\n虽然对范畴的研究可以追溯到亚里士多德，但罗施的实验方法将简洁清晰的逻辑与经验数据相组合，在 20 世纪 70 年代掀起了范畴研究的热潮。\\n我一直认为，ImageNet 的真正贡献在于它的双重性质。其庞大的规模之所以强大，是因为其中数据的组织遵循了本体层级结构，而其本体层级结构之所以强大，是因为数据规模足够庞大和全面，涵盖了如此多样化的类别。\\n科学最伟大的优点之一，就是能够将让人谦卑的一刻重塑为充满可能性的一刻。\\n早在 20 世纪 70 年代，研究员兼数学家阿纳托尔·霍尔特（Anatol Holt）就总结过在研究领域这种小成既满的短视现象。他说，人工智能这种技术，就算房间着火也会不管不顾，完美地走出下一步棋。即使是现在，这一论断依然非常贴切。现代人工智能的表现就像玩游戏的天才，可以熟练应对孤立的任务，应对“错误率”等狭隘指标，却无法注意到落在棋盘上的余烬正在燃烧。\\n人类的感知力虽然有种种局限，但与机器截然相反。我们从整体上看待世界，不仅能识别世界的内容，更可以进一步理解不同事物之间的关系、意义、过去和未来。\\n语言文字和视觉图像像是两个完全不同的领域。图像的基本单位是“像素”，这个术语最初是“图像元素”的缩写，现在已经很常用。像素是一个几乎无法察觉的点，捕捉了场景中单个小点的颜色。要描绘出有意义的画面，可能需要数百甚至数千个像素，或者更多。\\n递归神经网络是一组专门为处理线性单词序列而设计的算法，能够快速推断文本的基本属性，就像 AlexNet 这类卷积神经网络处理图像的方式一样。\\n世界各地的实验室都在构建更加丰富的分层网络，与此相对应的，一个新的名字正在流行——这不仅仅是机器学习的时代，更是深度学习的时代。\\n在我自己的实验室里，我们已经看到，数据中隐藏的东西远超出我们意识到的范围。数据从来都不仅仅是图像、音频或文本。只有通过数据，模型才能对世界形成表征，而更大的数据意味着更强大、更细致的表征；意味着关系、联系和想法；意味着真理与谬误；意味着洞察和偏见；意味着新的理解，同时也伴随着新的陷阱。深度学习革命已经到来，而我们还没有做好准备。\\n北极星象征着科学家最独特的品质；充满永不停歇、永无止境的好奇心，这份好奇心跟满足感永远同极相斥。夜空中的一颗星，远方的海市蜃楼，没有尽头的道路。我意识到，这就是人工智能对我的影响。\\n场景越是混乱，理解场景所需要的时间就越长。\\n根据美国疾病预防控制中心的说法，“洗手是预防感染传播的最重要手段”，即便在今天也依旧如此。然而，反复的研究表明，在经历了 150 多年的发展之后，不洗手或洗手方法不当仍然是造成医疗环境中疾病传播的重要因素。\\n如果想让人工智能帮助人类，那么我们必须从人类自身开始思考。\\n我对医院中人类脆弱的程度感到震惊，也为有机会为此做出一些贡献而备受鼓舞。但我学到的最深刻的一课是，个体的尊严是至高无上的——这是任何数据集都无法解释、任何算法都无法优化的变量。\\n人工智能最伟大的胜利不仅是科学上的，也是人文上的；伟大的胜利，没有他人的帮助是不可能实现的。\\nResNet 是教科书式的范例，充分说明了在人工智能领域，创造力是推动着辉煌时刻出现的力量。\\n有果必有因，正如记者兼评论员杰克·克拉克（Jack Clark）所言，问题的根源在于人工智能“男性之海”问题：科技行业的代表性不足，导致算法无意中带有偏见，在非白人、非男性用户身上表现不佳。\\n人工智能已经走出了实验室，基本脱离了我们的控制。虽然新思想、新面孔和新机构的旋风令人振奋，但也带来许多新的担忧。对我们这样经费极其紧张的研究人员来说，对人工智能领域进行商业投资的承诺似乎是天赐之物；但商业资金以巨大的力量冲刷着一切，好像是一场豪赌，让人感到的不是幸运，而是不详和担忧。\\n用机器学习模型来设计机器学习模型，并且能够迅速超越人类的能力，的确非常富有诗意。\\n人工智能正在成为一种特权，一种排他性极强的特权。\\n先进技术无法辨认野生动物照片的场景可能会让人觉得好笑，但如果对抗攻击的目的是愚弄自动驾驶汽车，导致汽车对停车标志，甚至人行横道上的儿童进行错误分类，就绝对不能用好笑来形容了。\\n世界正在逐渐意识到，数据不仅有价值，而且具有影响力，甚至可以产生前所未有的决定性影响。\\n在几十年的新生活之下，埋藏着他最古老、最深沉的悲伤，现在他把这份悲伤挖掘出来，这样我们才有勇气共同面对新的伤痛。他是在保护我。这么多年来，我一直以为他的青春期从未结束，但事实是，他的青春期早已结束了，而且结束得太快。他一直像个被时间定格的孩子，但在医院的那一刻，我看到了新的一面。在这一切的背后，是一颗父亲的心在跳动。\\n但当我穿过首都的街道返回酒店时，一个新词占据了我的思维。如今，人工智能是一种责任，是我们所有人共同承担的责任。\\n我一遍又一遍地看到类似的情况：才华横溢的技术专家几乎可以建造任何东西，但问及工作的伦理问题时，他们却一脸茫然。\\n我们要从根本上重新构想人工智能，使其成为以人为本的实践，这个共同的目标就是下一颗北极星。\\n人工智能一直以来都是追求科学性，而现在，它必须也追求人性。人工智能应该秉承最优秀的学术传统，保持合作和敬畏，同时不惧怕直面现实世界。\\n要使人工智能成为真正具有包容性的追求，我们还有很长的路要走，但国家研究云平台这样的成就就是朝着正确方向迈出的重要步伐。\\n最好的研究往往不是在我们各自的领域的象牙塔中孤立完成的，而是在科学的整体共享空间中实现的，研究人员应该毫不犹豫地在全球范围内展开跨学科合作。\\n我认识到，人工智能应始终致力于提高人类的能力，而不是与人类竞争。\\n要形成现实生活的整体观，为了创造比以往任何时候都更加真实的世界表征，我们需要深度和保真度，而在我看来，即使目前最先进的技术也达不到这种需求。\\n这个模型是如此庞大，却又如此浓缩，只需要简短的提示，就可以让想法的种子变成茂密的参天大树，将一句话（无论是问句、陈述名还是对话）扩展成一篇洋洋洒洒的生动散文。这些模型现在通常被称为“大型语言模型”，其所呈现的语句极为流畅，与人类的语言能力惊人地接近，让读者很容易忘记自己阅读的人字其实并不是真人写的。\\n我们要做的，只是把一个简单的想法变得足够宏大而已。\\n随着大型语言模型生成的文本、图像、语音和视频越来越复杂，真与假之间的界限愈加模糊。越来越多的评论家开始质疑，为我们敲响警钟：作为个人、机构，甚至社会，我们究竟有没有能力区分真实和虚构？当人们意识到这一切还只是 1.0 版本时，这种发问尤其令人警醒。\\n即使是现在，北极星依然照耀着我前行的道路。旅程仍在召唤，还有更多的目标等待我去追逐。\\n萨贝拉一家无疑是我自己家庭的延伸。我无法想象没有他们的生活，就像我无法想象没有父母的生活一样。这就是为什么十多年后，鲍勃的离去仍然让我感到心痛。但我们的对话从未停止过，他的记忆仍在倾听，我仍在向他倾吐心声。\\n在我们创造的过程中，是什么在激励着我们的心灵和思想？我相信，这个问题的答案也许比其他任何问题的答案都更能决定我们的未来。很多事情都取决于问题由谁来回答。随着人工智能领域逐渐变得更加多元、更加包容、对其他学科的专业知识更加开始，我也越来越有信心：我们能正确回答这个问题。\\n在现实世界中，存在着一颗北极星，那是小熊星座中最明亮的恒星。而在思想的世界里，却存在无数个类似的导航指引。每一种新的追求，每一个新的痴迷，都悬挂在黑暗的地平线上，闪烁着耀眼的光芒，向不懈追寻的人们招手致意。这就是为什么我最大的快乐在于知道旅程永远不会结束，我也永远不会停歇。总会有新的事物等着我去追逐探索。对科学家而言，想象力就如同布满北极星的璀璨天空。\\n做母亲是最令我谦卑的体验，我相信，这也将永远是独属于人类的体验。\\n\"",

  {
    title: "《活好：我这样活到 105 岁》读书笔记",
    content: "\"第一次了解这本书是在樊登读书，19 年就购买这本书的实体书，一直没有找到机会阅读。惊喜的是，老丈人竟然翻过这本书，因为他几乎不会看书。\\n“疾病是上天的恩赐”。我深有体会，回想 18 年的时候，跟整个团队的关系特别糟糕，自己也一度特别压抑，最终因为身体的原因在医院待了半个月。这半个月，因为头疼几乎做了所有可能的检查，但最终没有查出啥问题，却因为规律的作息，恢复了健康。这半个月，想明白了很多事情。回到公司，跟团队相处日益融洽，也是这之后，我们做出一个非常不错的产品。\\n另外，日野原先生提到，他特别感谢母亲对他的放任。作为两个男孩的父亲，我其实也不想过多的干涉他们的选择。也时刻提醒自己，他们的路终究要自己去探索，我也应该多采取“放任”的态度。\\n笔记 百岁老人发自肺腑的每一句话，都是生命酿造出来的原浆。\\n叶曼先生说：“我现在是时时可死，步步求生。”日野原重明先生说：“单是被你问到这个问题我就已经怕的要命了！但还是喜欢活着，而且每天都要活得更好！”\\n因为一位百岁老人，没理由浪费时间，没理由追名逐利，没理由故弄玄虚。去掉这一切包袱，每句话就都显得弥足珍贵。\\n“只要迈出第一步，看到的景色就会发生变化。只有行动才能打消不安。”\\n“人这一生一定会遇到很多很多的困难。但是困难越大，越会发现那个了不起的自己……与苦难相比，得到的喜悦更多。”\\n“开始一个新的爱好本身就是一件有意义的事情，从中你会有很多新的发现。”\\n日野原先生曾在与日本小学生交流时说：“生命存在于我们能够支配的时间里……儿童时代的时间几乎全部用在了自己身上。等你们长大成人后，才有能力为他人、为社会贡献你们的时间。”\\n所谓爱，就是接受最真实的对方。如果不顾及对方，只考虑自己，那么即使有人爱着你，你也注意不到。当感觉到与对方的关系有点冷淡时，首先应该考虑是不是自己的原因，以及如何改善。\\n”太初有言，言与神同在，言就是神。“就如语言支撑我的一生一样，我希望我说的话，能进入你内心深处，慰藉你曾困惑受伤的心灵。\\n大多数人在死亡面前都会惊慌失措，我们大可不必为此感到羞愧。\\n死和生是不可分割的，没有生就没有死，没有死就没有生。领悟其内涵，方知生和死本质是一样的。\\n一天当中，午后比上午的时间还要长。\\n虽然一个人不可能彻底明白自己，可是越来越了解自己所带来的喜悦远远胜过年老体衰的痛苦。\\n我对孩子们说：“生命存在于我们能够支配的时间里。”\\n活出真实的自己，不用在乎那些身外之物、也不被别人的任何评价左右。运用上天赋予的能力，积极利用现在所处的环境，去做那些自己应该做的事情。这看似艰难，究其实质，就是一种简单的生活方式。\\n顺其自然，不要勉强。\\n任何人都想做真实的自己，当理想无法实现的时候，我们会讨厌自己，甚至自暴自弃。我希望你不要这样，甚至当我们不为他人接受时，也要好好珍惜你自己。\\n人身上有一种不可思议的力量，病痛会让身体日益衰弱，可是不久，生命会从衰弱中产生一种类似于种子般的强韧力量。\\n确实，人一生病，随之而来的是难以诉诸笔墨的痛苦。不过全然仰欶有如此切肤之痛，才能警醒一直无知妄为的自己，让自己对健康心生敬畏与感激。\\n我从心底认可：疾病是上天的恩赐。\\n所谓的“使命”，就是你如何使用生命。\\n一旦某一天我也面临着是否要延命治疗的选择的时候，我也不知道该怎么办。为什么这么说？因为那时的我不是此时此刻的我。不管此时的我曾经做过什么样的的决定，我最终都会遵从上天的旨意，它将生命赋予我，我会感恩所有的结果。\\n预知死亡，才能感悟活着的意义。\\n要赢得全体观众的喜爱，演员必须对到场的每个人发自内心地表示感谢。\\n如果你接受了他/她本来的样子，接受了对方身上让你不喜欢甚至厌恶的地方，你一定会惊喜地发现他/她身上了不起的和美好的特质。\\n爱那个最真实的他/她，这样，你的一切也会被对方真挚地热爱着。\\n把逝去的爱人一直放在心里，想象她的一举一动，仿佛能与她对话交流，慢慢你会发现内心那个真实的自己。\\n无论发生什么状况，先要问自己，我是否拥有一颗温暖柔软的心。\\n自己先决心拥有一颗温暖柔软的心，每当感受到与对方的关系变冷时，先考虑是不是自己的原因，从而加以改善。\\n想与某个人建立更加亲密的关系，不妨邀请对方“一起吃顿饭吧”。聚餐可以产生亲近感，还是我从家庭生活中学到的智慧。\\n生命中有一个真正的朋友已经足够。\\n我认为最重要的是你内心的感觉。如果遇到一个人，你心里觉得这个会成为真正的朋友，那么相信这种感觉。\\n医学是一门不确定的科学和可能性的艺术。\\n音乐、绘画与出色的文学作品一样，可以鼓舞人心，而医疗作为一种艺术，也应该有能力去鼓舞人心。\\n永远懂得理解他人，这样才能拥有一颗包容之心。\\n把自己喜欢的分享给大家，并为此不懈努力，这就是爱。\\n没有宽容、谅解之心，会让自己沉陷负面情绪，身心疲惫甚至心力交瘁；反之，如果你能够宽恕别人，则会让自己生活更轻松、愉悦。\\n每到这种时候，我就对自己说：活了 100 多岁，我对真正的自己都还没完全搞清楚，别人不理解我很自然啊。\\n我深刻体悟到，那些让自己不开心的人际关系中，反而蕴藏着可以丰富我们人生经历的启示。\\n因为有能力，所以被依赖。正因为有依赖自己的人存在，我们才努力让自己可以肩负更大的挑战，人生才变得更加有价值。\\n尊重他人是一种良好的修为，总是感同身受为别人着想，我觉得这各年龄、职务无关。\\n离别的痛苦，很快会变成思念的柔情。\\n我们会为此深陷自责，甚至认为也许这辈子自己再也笑不出来了。其实人类天生就具有这样的一种特殊能力，就是随着时间的推移，最终会遗忘一切悲痛的能力。\\n温柔待人的人也一定会被温柔以待。\\n即使无法亲眼见到，但相信富士山就矗立在那里。这样去想的思维方式才会让运气好起来。\\n奇迹，属于那些有精神追求并确信的人。\\n即使不被当时的人们理解，真正有价值的东西、真正美好的东西，一定能跟得上时代步伐，经得起历史评判。\\n当挑战没有人做过的事情时，你要不停地问自己：“为什么要这么做呢？”也许你心中有一种强烈的“想做”的意愿，这时候就要仔细去想为什么要去做，这点非常重要。\\n我们要“向远看”、向他人做“解释”，然后不断“重复”我们的观点。\\n如果没有反对的声音就不存在什么挑战，正因为有人反对，我们才有机会应对挑战。\\n我这一生最感谢母亲的是，她一直相信“重明是不用管就会自觉学习的孩子”，她对我一直采取放任自由的态度。\\n孩子身上的潜能如同宇宙，深不可测，远远超乎你的想象。\\n上天已经赋予每个孩子特殊才能，家长要做的是耐心等待。我从母亲那里学到，这种耐心才是做好家长最重要的因素。\\n把愿望分成几块，实现愿望，先从最小的那块开始吧！\\n人如果从未遭遇困难，也就没有机会警醒过来。\\n也许有些不可思议，但人类只有身陷痛苦或者身处逆境时，才能明白自己内心最想要的是什么。\\n要经常反省自己：我的行为是否以爱为出发点。这个时代机械化程度越高，就越需要我们重视爱。\\n世上的确有很多看得到的好东西，但也有很多更宝贵的东西是用眼睛看不到的。\\n伟人会珍惜自己的生命，拥有感恩之心，愿意把自己的时间奉献给他人，“时间就是金钱”，这就等同于把金钱花费在别人身上。我认为，能为别人花时间的人就是伟人。\\n在奉献的过程中，不断探索未知的自己，不断发现新的自我，并坚持生命最后一刻。\\n昨之艰辛，今有所报。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/living-long-living-good-notes\/"

  {
    title: "《一句顶一万句》读书笔记",
    content: "\"本书分了两部分，出延津记与回延津记。还记得是在国庆从老家回来之后，开始发烧，晚上烧的睡不着，一连看了几个小时。\\n前半部分讲了杨百顺/杨摩西/吴摩西的故事，后半部分讲述牛爱国的故事。\\n书中的人，在一个地方待不下去的时候，便会离开，去寻找新的居住地，走啊走，到了某个地方，突然心不乱了，便停下来开始新生活。\\n高中以前基本上都在农村老家，真心能体会到老家好多人的那种坏。他们真如作者描述的那样：“遇事都不往好处想，盼着事坏”。工作之后，再也不用回去体验那种糟糕的感觉。虽然离开了农村，但是糟心事其实也没少多少。\\n杨百顺被他爹算计，怀恨在心，离开了家。现实中我的父母/媳妇的父母也一直在算计，只是他们越算计，生活却过的更糟糕。可能说他们是坏太过人，但是用愚蠢形容其实不过分。\\n我的父母不愿提供帮助买房，但是却能贷款加贷款去购买县城一百五十万的商铺，最终由于经济崩盘，无力偿还，多次要求我帮助还贷款。他们从来没有考虑过我的感受，却要我们去承担还货款的责任，真令人无语。\\n我的丈母娘，给媳妇花店帮忙。生意越来越惨淡的情况下，依然希望每月支付她一千元的工资，平时吃饭买药几乎都是我们付钱，每到换季都要买新衣服，新鞋子。直到媳妇发现她比我们家的其他成员都要花更多的钱在衣物上时，拒绝给她付三百多买衣服后。出商场门给孩子买临期面包的时候，发表了惊人言论：“给我花钱就舍不得，给娃就舍得花钱。”几乎没有怎么带过孩子，也没有做过什么饭。但是给老家的人视频，孩子都是她带大的，每天都给孩子做饭等等。最终媳妇忍无可忍，选择让丈母娘去令寻工作。\\n书中几乎所有的人都在找一个可以说得上话的人，也几乎都是一部现实版本的悲剧世界。但幸运的是，我很早就找到了自己说得上话的人，那就是我的媳妇。\\n笔记 慢性子容易心细，心细的人容易记仇。\\n一个人说正经话，说得不对可以劝他；一个人在胡言乱语，何劝之有。\\n因为在他看来，所有人都生错了年头；所有人每天干的，都是不命里该有的，奔也是白奔；所有人的命，都和他这个人别着劲和岔着道。\\n好把的是病，猜不透的是人心。\\n病相同，人却不同；不同的人，开同样的方子，药也未必管用。\\n老曾：“患难之交可以做朋友，咋能做师徒呢？”\\n人心毒不是说它狠，是说大家遇事都不往好处想，盼着事坏。\\n平时说一千句坏话无碍，关键时候说人一句坏话，就把一个人变成了另一个人。\\n叔，我不怕冷，我怕狼。\\n世上的事情，原来件件藏着委屈。\\n詹虽在延津熟人多，但不求人办事是熟人，一求人办事人就生了。\\n老詹和主没办成的事，没出面的瞎老贾却办成了。杨摩西也是无意之中，沾了瞎老贾的光。\\n过去我以为帮我的会是人，或是主，谁知是个社火。\\n人要一赌上气，就忘记了事情的初衷；只想能气着别人，忘记也耽误了自己。\\n街上的事，一件事就是一件事；家里的事，一件事扯着八件事。你只给我说了一件事，我如何去断八件事呢？\\n吴摩西想想，觉得老高说得也有道理；虽然老高什么也没说，便好像什么都说了，起码吴摩西将这些窝心事说了，有人听着，心里也畅快不少。\\n反正与好说不明白道理，这里再计较道理，反倒是不懂道理了。\\n一个人总顺着别人的心思来，自己心里就有些别扭；但一个人自己别扭，也比再让别人别扭自己强。\\n早上起来，鼻子齈齈的，开始咳嗽。\\n现在看，顺着你说的人，心里就是憋着坏。\\n原以为小张不爱说话、爱笑靠得住，谁知不爱说话、爱笑的人皆一肚子坏心眼。\\n牛爱国在部队遇到心烦事，这件事想不清楚，可行，不可行，拿不定主意，便把这件事攒下来，一个礼拜，总能攒几件烦心事；到了礼拜天，去找杜青海，两人在戈壁滩上，或开汽车，或坐在弱水河边，牛爱国一件一件说出来，杜青海一件件剥肉剔骨，帮牛爱国码放清楚。\\n两人也通信，有时也打电话，但不管是通信，或是打电话，都跟见面是两回事。有时事情很急，当下要做决断，更是远水解不了近渴。\\n一开始觉得没有话说是两个人不爱说话，后来发现不爱说话和没话说是两回事。\\n世上人遍地都是，说得着的人千里难寻。\\n我还看穿一件事，过日子是过以后，不是过从前。\\n世上的人千千万，到了走投无路之时，能指上的才有两个人，牛爱国不禁感叹一声。\\n牛爱国没有接着去乐陵，留在了沧州，不单是牛爱国适合开车，不合适跟曾志远贩枣，而是他进了泊头地界，突然感到自己心不乱了。\\n心不乱了，牛爱国再仔细想，自己心乱之时，原来并不合适找熟人，还是跟不熟的人在一起自在些。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/someone-to-talk-to-notes\/"

    title: "《异星危机》读书笔记",
    content: "\"在 Apple TV 追剧之后，看的这本小说。小说很短，讲述了未来有大量的机器人协同人类去其他星球探险。\\n某天，一个机器人自我觉醒之后，给自己取名为“杀手机器人”，陪伴人类外星探险时发生的故事。在一次救援中，而他本该待在基地，为了安抚受伤的队员，不小心暴露了自己的异常。\\n故事从这里展开：从最初人类对杀手机器人的怀疑，到一次次任务中它屡次救人于危难；再到机器人遇险，人类领队不顾反对拯救机器人。\\n最终，机器人陪伴人类成功返航。任务结束之后，人类成员满足了机器人的愿望，让他成为一个自由“人”，像一个真正的人那样，去过属于自己的生活。\\n笔记 一般在紧急情况下，没有人会注意到那些设备仪器——大家通常更关心活人的性命安全，而不是一些可量产的死物。只不过这帮客户偏偏反其道而行，在他们眼里，活生生的人命还比不上研究数据重要。\\n每个调查队都拥有烽火装置，一般建在基地周围的安全范围之外上，它的用途是向公司发送紧急信号。我们公司一旦收到信号，就会立即派返程运输器来接人，不然就得等到任务结束那天才会派运输器来。一般情况下这么运作的，嗯，一般来说。\\n原来“德落”的护卫战并不是失控叛变，而是被植入了战斗覆盖模块。换句话说，它们是被恶意控制了。因为个人能够通过这种中枢控制护卫战士，将它从一个能够自主活动的合成体变成一具没有灵魂的杀戮傀儡，届时它的权限会被全面切断，连同通信也被掌控，运行功能倒可以保留一定的执行力，具体视命令复杂程度而定，但“杀死人类”这条指令就一点也不复杂。\\n在这种情况下，它自主选择保护、照顾我们，不离不弃，我认为这正是它值得依赖的体现。\\n谁都知道公司一向抠门，能省就省，最痛恨的就是花钱，他们连基地的室内装饰品家具都会专门回收，以便下次可以继续使用。\\n如果你把合成体看作一半机械一半有机的组合形式，那就大错特错了。因为这样听上去，好像把两个部分完全分离似的，机械那一半就该无条件听从上级命令完成任务，有机那一半则一心只想保全自身并从混乱中逃离。事实恰恰相反，我就是一个完完整整的个体，我一直满心疑惑，从来不清楚自己想要做什么、应该去做什么，到底需要做什么。\\n地图上未标示的区域存在一些残留物，它们发出的信号强大到足以混淆我们的地图成像功能，所以你们才能发现它们，对吗？\\n虽然我时常说不清楚自己想要什么，其实我心底早已有了答案。我不想通过别人来告诉自己想什么，也不希望由别人来替自己做决定。\\n只有从官方和人们的视线中消失无踪，我才能获得真正的自由。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/all-system-red-notes\/"
  },
  
  {
    title: "《我在北京送快递》读书笔记",
    content: "\"因为从更多的生活经验中，我逐渐认识到，怀着怨恨的人生是最不值得过的。\\n这本书是近几年中读过到轻松的一本书了，作者使用生动有趣的语言描述了他的多份工作经历，道出了打工人的不易。其中不乏金句频出，凸显了作者丰富的阅读量。\\n作者的打工经历是我们千千万万牛马人的真实写照。但有多少人有作者那样的好心态，面对各种问题，最后都能跟自己达成和解。这种精神值得我去学习，不要活在怨恨中，勇敢的去走每一步。\\n我跟作者的年龄相差无几，却一直从事着几乎没有啥差别的事业，虽然也曾辗转换了几家公司，但做的事情依然差异性不大，远不及作者的丰富。七月份，因为没有合适的工作，也曾短暂想要离开西安的想法。但是在面试的一家公司之后，突然意识到，即使离开西安，只是换了一个不同的地方继续当牛马。跟我当前的环境其实几乎一模一样，另外我已经习惯了媳妇孩子热炕头的生活，真心没有必要为了几千块钱离开西安。\\n笔记 我真真切切地感觉到，每一步踏下去，路面的高度都不相同，而且说不清楚是我的身体在摇晃，还是这个世界在摇晃。\\n男的脾气倒很好，从来不发火，可是脾气好有什么用——你像一只没底的锅，哪怕锅盖很结实，又能派上什么用场。\\n我们也各有各的压力，各有各家里不顺心的事，谁也没有余力顾别人。在那种工作场所里，每个人都被生活压榨着，同情心因此透支，然后不知不觉地变得麻木、冷漠。\\n总的来说，那些经常摸鱼的人脾气反而更好，大概他们也是有点心虚吧。\\n送快递虽然也辛苦，但不用熬夜，而且收入更高。其实我就不该去上夜班，最初就该去送快递。\\n不过话说回来，我也支持物尽其用，只怪之前自己预期太高，此时难免有心理落差。\\n既然我已经换了控制器，我决定还是相信他，毕竟他可能是诚实的。\\n新人刚来时一般都不会太计较，但逐渐就会察觉到其中的不公平。这种心态的转变一般只需要一两个月，甚至更短。\\n我是一个怎样的人，很大程度上是由我所处的环境，而不是由我的所谓本性决定的。\\n没人能够小觑我在省钱这件事上的决心，哪怕是在我病了的时候。\\n淡季时是领导拿着鞭子指挥我们干活儿，可是到了旺季，他们就得跪着求我们送货了。到了那个时候，哪怕我们出了投诉，他们也会帮忙摆平。\\n可是我的觉悟没有达到她的水平，而且我还想反过来建议她：不如你晚上吃个饭出来散个步，顺便找个快递站把货寄掉。\\n这令我不由得想到，有些我以为显而易见的事情，别人可能根本想象不到，因此沟通时需要耐心。\\n对于一个在假日逛街的女孩来说，城里的任何两个商场之间都不存在距离。可是快递员很多每天只在一两个小区里活动，对我们来说，几公里的万达广场和几十公里外的天安门广场都同样遥不可及。\\n我的身体会自觉地调整分泌水平，就像逆来顺受的劳工在发现雇主并不打算满足自己的需求后，默默地放弃了自己的权益。\\n我像被一列火车迎头撞翻在地，精神上再也爬不起来。事后我完全不记得，那天在接下来的时间里，我都做了些什么。\\n我的时间突然变得宽裕了，就像一个被人看不起的穷光蛋一夜暴富，我可以报复性享受一下挥霍时间的奢侈。因为我被所谓的分秒必争压迫很久了，一直以来我的时间都是紧绷绷的，就像我的神经一样，只能左支右绌地应付工作。\\n用一句现有的话来形容我的感受就是，时间仿佛停止了一般，每一秒都好比一年那么漫长。\\n这证明了假设没有利害得失，这个世界确实可以变得和谐融洽。然而即使如此，我也没有用完我的所有时间。\\n我被迫去工作的时候，我很容易烦躁、怨恨、满腹牢骚，而且总是不公正地把我每天伺候的客户看得比真实的他们更自私自利、蛮不讲理和贪得无厌。\\n我觉得客户在评价一个快递员不好的时候，很少会考虑到他收入高不高这个方面。\\n对我来说，去和顾客打招呼，是一件要预先做心理建设的事，但对她来说仿佛就是一种至高享受。\\n我以为贪污是一个是非黑白的问题，但在他们眼里，Y 做的事林比那个收银员可恶得多。不过他们对我倒很好、很友善，因为我对他们也很友善。\\n我反感被卷入一切人事纠纷，这令我过得不愉快，损害我的生活质量。他们之间的矛盾他们自己解决就好，我会保持中立，也只能保持中立。\\n可是假如由老板亲自带队，她看见员工闲着，就会觉得自己吃亏，无论如何都想让员工动起来。\\nY 有一种过度行为的倾向：一边过度地索取，一边又过度地施予；一边过度地伤害，一边过度地补偿……总之，她也很心平气和，她活在一种持续的激动中——她是个天生的斗士。\\n不过我没有告发 D 和 W，倒不是出于和他们的交情。说到底，在店里我只是个打杂的，不是什么不可或缺的角色。而店里所有同事已经同仇敌忾地反对 Y 了。\\n从你交上第一个女友时起，你其实已经在和最后一个好友交往。你到了一个新公司上班，看到新的上司和同事，不用说，他们很快会变成你以前的上司和同事。你已经可以预料会被怎样对待，你可以预言将经历些什么，因为他们只是你的人生的演员们。你终于领悟到这个世界的结构：这些人都是以你的圆心的圆，他们的半径就是你和你的关系。自然了，同样的半径上可能重叠着很多个圆，这不是一组平面的图形，而是你螺旋上升的人生的一个切片。难怪人们羡慕那些头脑简单的人，因为他们的目光不穿过表象，他们的思想不抵达实质。他们度过的每一天都是全新的一天，他们认识的每个人都是陌生人。他们把同样的痛苦和快乐经历了无数遍，每一遍都像是初次经历。\\n我已经不像年轻时那样，总是惶惶地想向别人证明自己，甚至故意去吃亏，生怕别人怀疑我表里不一。\\n每个人都会以己度人，你永远无法让一个不真诚的人相信你的真诚。\\n其实他们是在恼恨我，因为我太卖力，领班就会以同样的标准要求他们。\\n可能在他们眼里，我是一个奇怪而无害的人，一个无欲无求的旁观者，或是一个不知道跑来做什么的傻瓜。\\n我始终不明白他们是怎么从一个学生摇身一变成为成人的。我怀疑他们早在还是个学生时，身体里就已经藏了一个成人。\\n卑贱的人如果心怀不满，就只会欺负别的卑贱的人，因为反抗权势就要吃苦头的。\\n但在我看来，爱情恰恰最不盲目、最不功利、最忠于本心，相反，仇恨才是盲目的。\\n前面我说自己并不无辜，不仅仅是因为我没的揭发这件事，而且我还在知情的前提下，和她们一起用这笔钱去喝了几次早茶。可见一个人要腐化是多么容易。\\n我父母满脑子老旧保守思维，那段时期正为单位和社会的剧烈变化感到坐立不安。他们自己都孤独困苦，对社会不能理解、不能接受、自然也无暇过问我的了。\\n渐渐地，我意识到，大多数人都只能从自己的角度，而不能从别人的角度看待问题。我的胸怀并没有宽广到吃亏也毫无怨言。\\n人们常说性格决定命运，对于我们生活的这个小时代来说，命运这个词或话太大，但性格确实会在很大程度上影响一个人的生活历程。\\n我们后来离开是因为觉得那个老板太精明，给他打工很容易吃亏。而且他的工作室毕竟不是正规公司，我们的权益没有什么保障，只能看他的良心。而对于他的良心，我们不敢信任太多。\\n他们教我的处世之道，在这个社会上根本行不通。他们从不鼓励我去追求，而只训诫我要克己。他们告诉我不对的事情，现在人人都在做，可是社会并没有惩罚他们而奖励我，反倒是奖励他们而惩罚我。\\n可是人活在世上，很难不受到奴役——要么受这个的，要么受那个的——无论工不工作。古希腊的哲人也也说肉郤是对人的奴役，但他们并没有说肉卻是可以涤除的——除了等着自己慢慢老去。\\n我们当年单纯、偏激、幼稚、热切、做事不顾后果，一心要改变世界。\\n他们还说，作品最重要的是灵魂。他们认为我有灵魂，这令我受宠若惊，因为他们还说，很多人是没有灵魂的。\\n这种变化并非在一瞬间发生，不是在当时就完成了，而是像播下了种子，在此后漫长的岁月里，缓慢但坚韧地扎根、发芽、直到今天，仍然在我身上持续地发生着作用。\\n所谓树挪活、人挪活，君子不立危墙之下，主编决定离开公司，自己去创业。\\n我每天在制造垃圾、驱逐良币、污染视听，我还可以怎么自辨啊？难道自欺欺人地说：“我没有别的选择，大家都在这么做？”这跟直接和他们说绝交没有什么分别。\\n不过海明威提过一个“冰山理论”——他认为冰山之所以雄伟壮观，是因为露出海面的只有八分之一，而水下的八分之七我们只能想象。\\n我不敢说这些内容全是客观的，因为不存在客观的写作。\\n况且世上从来没有全见，只有偏见。\\n摇滚在本质上是一种把个人和生活艺术公的形式而不是对音乐形式本体的探索。\\n但是对自我过度演绎和诠释是平庸者难以察觉的巢穴；真正的摇滚艺术家都是天才，而且具备天才的自觉。\\n和浮士德一样，摇滚歌手拿灵魂和魔鬼做交易，伴随才华而来的是孤独、矛盾、痛苦和疲惫；真正的摇滚哪怕表面听起来欢快或生机勃勃，实质都是艺术家在堕入深渊的过程中发出的哀号。\\n他们不觉得用工作囚禁自己、限制自己的自由是可悲的。\\n就如毛姆所说，并不是每个人在不用为温饱奔忙后，依然知道自己该干些什么。\\n确实有人天生适合在社会规则下通过工作——我指的是大众认可的有物质回报的工作——取得成就和享受快乐。但并非人人如此。工作本是生存的手段，而不是人生的目的。\\n我认为自己写作上的平庸，是受了我过的平庸生活的影响。我渴望以一种全新的眼光看待生活，发现生活。\\n老鼠是灭之不尽的，在商场里从事过餐饮的都清楚，慢慢地人就麻木了。\\n无私是一种高尚情操，但或话并不是做人的基本原则。我也不想经营人际关系，因为我原本就很不擅长。这时我只想和所有人保持最简单的关系——越简单越好。\\n我不觉得自己在虚掷光阴、蹉跎岁月。在我看来，只要是认真度过的日子，最后都不会没有意义。这个时候假如亚历山大大帝来问我需要什么，我也会说，别挡我的光线就好。\\n不过放烟花和喝酒，都是晚上才能做的事，白天我们还是面对现实为好。现实就像一个力大无穷、整天在胡说八道的野蛮人，不过最后他总能证明自己是对的。\\n如果我被石头绊了一跤，就爬起来自己再摔一跤，然后拍拍屁股继续走路。这样一来就显出了石头的可笑。在接下来的几十万年里，它将孤独地反省到自己施与人的痛苦都是那么地毫无必要和微不足道。最后它会成佛，学会善待这个世界。\\n据说没必要迁居到乡村去，因为大隐隐于市，因为心远地自偏。\\n看到他们这种积极的生活态度，我不由得在心里感慨，看来少懂一些道理，对大多数人来说是有益的。\\n在今天，任何一个不快乐的人都是可耻的、不负责任的。要不是我此刻还坐在小巴里，我真恨不得立刻放声讴歌生命，讴歌世界，讴歌这个美好的时代！\\n她在一生的历险过程中经历沟沟坎坎、反复无常时仍然保持着乐观的精神，保持着女士的那份教养、那份勇敢。这种精神、教养和勇敢在她短暂一生的最后日子里，让她能够谈笑风生，能够在心死之时喜欢她的鸭子及枕边的昆虫。除此之外，她的一生都在伤痛和挣扎中度过。\\n由此我想到，所谓的自由，实际上在于你能意识到什么，而不是在于你享有什么。\\n我觉得假如更多人向往这种自由，世界将会变得更多样化、多元化，更平等和包容，更丰富和多彩。因为向往自由，人们才会有不同的追求，而不必总在狭窄的独木桥上互相倾轧。\\n虽然我写得不多，但对我来说，写作就是我生活的另外部分，属于自由的那部分。\\n事实上，我今天我对自己所有的打工经历，只怀有感激和怀念，没有丝毫的不满和怨忿——我承认曾经有过，但已经全部放下了。因为从更多的生活经验中，我逐渐认识到，怀着怨恨的人生是最不值得过的。\\n\"",

  {
    title: "《工作、消费主义和新穷人》读书笔记",
    content: "\"虽然是薄薄的一本书，但是我竟然断断续续从 25 年看到了 26 年。究其原因，我之前几乎没有接触过与经济相关的书籍，这本书还是当时湊单购买的。所以这本与经济相关的书籍，阅读起来并没有想象的那么容易。却正因为不轻松，带来的更深的冲击感。\\n读到第一章的时候，我就意识到问题了，“工作伦理”，这个名词我真是第一次听说，因为好多意识中的东西，竟然不是天生就有，而是被资本灌输到我的大脑之中。\\n都说“眼见为实，耳听为虚”，但你所看见的，也往往只是别人希望你看见的。在意识到这个问题时，我几乎不再看什么新闻和热点。因为这些东西恰恰是统治者和资本家想要控制普通人的一个最简单的手段，而且也在潜移默化的影响着我们。即使尽可能的远离这些内容，依然也很难逃脱。就如作者提到的消费主义，因为我们的周围几乎都是各种炫耀，真得很难不被影响。从而掉入了消费主义陷阱，并误以为是自己的选择。\\n消费主义对我影响倒还好，因为追求“简单”，好多的消费主义陷阱，终将会因为我追求简单的目标而失效。但是依然要注意，这个陷阱永远都会尝试以更猛烈的方式进攻，在我不注意间又消耗没有必要的支出。\\n书中令我印象比较深刻的是关于“少数族群”在获得一定的成功后，反而集体反对或者拒绝这种“照顾”。因为他们认为所获得的成功均源于自己的努力，而非外部帮助，因此推断其他成员也可以在不依靠外部的情况下成功。这像极了，如今的七零八零后几乎掌握了大量的财富，却告诉九零后以及后来的人，你们可以靠自己的努力成功。改革开放初期，南下打拼成功的概率，与当今的毕业生去一线城市发展的难度，显然不可同日而语。时代不一样了，我们也要以以更广的视角看待这些问题。\\n我看到作者对于“穷人”的理解与关怀。那些别有用心的人，一方面将人划分为不同的阶级，另一方面又将个体行为上升到群体属性，将少数人的问题归因于整个群体，从而制造恐惧与对立。在这种叙事之下，社会更容易为自身的冷漠寻找正当的理由，进而在道德层面获得解脱。最终，被边缘化的底层群体，只能“社会性自杀”。\\n所有的创造性都是创造性的破坏。而社会的发展，减少的岗位一直是远多于带来的新岗位，这也是导致了“穷人”的重要原因。他们不是因为自己不努力，而是“经济为王”的牺牲品。\\n未来到底会怎么样，我无法预测。我只能居安思危，时刻强壮自己，避免成为“失业”者，更不能成为作者笔下“多余的人”。\\n读书笔记 工作论理本质上是一条戒律，它有两个外显的前提和两个内隐的假定。第一个前提是：为了维持生活并获取快乐，每个人都必须做一些他人认同的有价值的事，并以为获取回报。第二个前提是：安于现状，不思进取是可耻的——道义上来说愚蠢又有害。内隐的一个假定是，绝大多数人都有能力工作，可以通过出售工作能力获取相应收益，用以维持生活。另外一个内隐的假定是：只有公认的有价值的工作——那些可以要求薪水回报的，可以用于交易的——才会被工作论理认同。\\n工作即正义，不工作是一种罪恶。\\n每当有人谈论论理，你都应当意识到一定有某些人对另一些人的行为方式不满，并希望他们有所改进。\\n这场道德改革运动意图在工厂内部，在工厂所有者掌控的纪律之下，重塑全心投入、具有奉献精神的工作态度，以及艺术级的工作表现。然而，这些追求，是过去的工匠在自己掌控工作时，自然而然地表现出来的。\\n约翰·斯图尔特·密尔（John Stuart Mill）曾抱怨：”我们徒劳地在工人阶层中寻找自尊，这会驱动他们选择在优秀的工作回报高薪，但在绝大多数情况下，单方面的善意被报以竭尽所能的偷懒。“\\n在过去，人们通过自己设定目标、自己控制进程，获得工作的意义和动力，但现在，他们只能被动地完成由他人设置和控制的任务，工作对他们而言失去了意义。\\n解决方案是机械地训练工人，让他们习惯于不假思索的盲从，并且剥夺他们完善工作的自豪感。\\n维尔纳·桑巴特（Werner Sombart）说，新的工厂系统需要的只是人的一部分；身处复杂机器这中，如同没有灵魂的小齿轮一样工作的那部分。\\n就目的而言，工作伦理改革运动是一场关于控制和服从的战争。\\n工作伦理改革运动的另一个目的，是把人们所做的事和他们认为值得做、有意义的事分离开来，把工作本身和任何切实的、可理解的目的分离开来。这最终将形成一个新时代的悖论：“为增长而增长”。\\n工人参加暴动是因为他们“被教导只行动，不思考”。\\n上层阶级希望劳动者只具有奴隶的价值。\\n我们平时赞赏的人类美德，到了奴隶身上就成了罪恶。\\n一旦传统的束缚被打破，随着人们创造力的发展和对自然的掌控，呈现在人们面前的将是一个美好的、神奇的、丰富的世界。\\n凝聚了人类智慧的辉煌世界领路人（那些机器的设计者和使用机器的先驱）坚定认为，只有发明家的创造性思维才能引领人类世界的进步。\\n工作论理是意义深远的道德教育议程中的关键项目之一，它为思想者和行动者设定的任务，构成了后来现代化的拥趸所谓的“文明化进程”之核心。\\n正如迈克尔·罗斯（Michael Rose）总结的，马克斯·韦伯（Max Weber）指出，工作伦理是对“这些普通工人的传统主义”进行攻击，他们“依据一种固化的物质需要想象做事，这导致他们倾向于懒散，放弃通过更努力、更长时间的工作来增加收入”。传统主义“受到了诋毁”。\\n对现代性美丽新世界的开拓者来说，“传统”是个肮脏的词。它代表了工作伦理所反对的、道德上可耻的、应该被谴责的那种倾向：满足于当下和已经拥有的东西，不愿意付出任何额外的努力去获取更好的生活（事实上，是屈服于一个粗暴、残酷、令人厌恶、不可思议的外部制度）。\\n工作伦理主张：无论生活多么悲惨，只要它是由劳动报酬支撑的，就具有道德优越性。\\n一旦有了比较，工厂中微薄的工资和无趣繁重的苦役，似乎也没那么不能接受，甚至令人向往。\\n简而言之，所有这些人都必须被剪除各种各样的习惯和爱好，以适应相同的行为标准。\\n事实上，若真的希望工人道德完善，就必须扩大其自由的边界——这才是道德能够生长并最终开花结果的唯一土壤。\\n勤奋工作被赞颂为令人振奋的体验——这是一种精神层面的升华，只有通过全心全意为社会福祉提供服务才能实现。\\n在一个擅长分类且喜欢分类的社会里，工作类型是一种关键的、决定性的分类，是所有其他社会生活的锚点。它将人们分类，让他们找到自己的位置，尊重自己的上级，让下级服从自己。\\n职业生涯标记了人生的旅程，是回溯人生成败最重要的记录，是自信与彷徨、自满与自责、骄傲与耻辱的主要源头。\\n工厂生产花样繁多的商品，除此之外，它们也生产顺从于现代国家的公民。\\n资本的活跃和就业的增长是政治的主要议题。衡量政策成败的主要指标是：资本的雇佣能力和民众对生产过程的参与程度。\\n工作是获得更多财富，从而更加独立的手段，是摆脱令人厌恶的必须为他人工作这种境遇的手段。\\n美国梦劝告人们，所有工厂里遭受的苦难只是暂时的烦恼，屈从老板的虚妄只是成为老板的必经这路。\\n曾经依靠首先承诺及抬高工作的道德意义来确保的工作投入，现在需要找到新的出路。\\n任何承诺、任何忠诚的誓言，都应该有一个附加的有效期。契约的有效期、既定的时效是最关键的，比契约本身更重要，它不应该超过满足欲望的消费所花费的时间（或欲望消退的时间）。\\n事实上，越是陌生的需求越具吸引力，能获取的未知生活体验会带来大量的乐趣。\\n“欲望不求被满足。恰恰相反，欲望永无止境”。—— 马克·C.泰勒（Mark C. Taylor）和埃萨·萨里宁（Esa Saarinen）\\n想要提高消费者的消费能力就不能让他们休息。\\n他们的生活从吸引到吸引，从诱惑到诱惑，从吞下一个诱饵到寻找寻找另一个诱饵，每一个新的吸引、诱惑和诱饵都不尽相同，似乎从之前的更加诱人。\\n本来是市场选择了他们，并把他们培养成消费者，剥夺了他们不受诱惑的自由，但每次来到市场，消费者都觉得自己掌控一切。\\n寻求自我认同，获取社会地位，以他人认为有意义的方式生活，这些都需要日复一日地到访消费市场。\\n人首先要成为消费者，才能再拥有其他特别的身份。\\n“经济增长”是衡量现代社会是否正常有序运行的首要标准。\\n消费取代了工作，把个人动机、社会整合和系统再生产链接在一起。\\n今天流行的口号是“灵活”，这个越来越时髦的概念代表的是一场几乎没有任何规则的雇佣和解雇游戏，而且在游戏进行时，单方面就可以随时更改规则。\\n正如里卡多·佩雷拉（Ricardo Petrella）所言，目前的全球趋势是“通过大幅减少产品的服务的寿命，以及提供不稳定的工作（临时的、灵活的，兼职的工作），将经济导向短周期和不确定的生产”。\\n文化潮流前赴后继地涌进浮华的公众市场，又迅速过时，变成荒唐滑稽的老古董，衰败的速度比获取注意的速度更快。\\n对社会身份的渴望和恐惧，社会身份唤起的吸引和排斥，混合在一起，产生了一种持久、矛盾、困惑的复杂心态。\\n任何规范的唯一目的，都是利用人们自由选择的能动性来限制或完全消除选择自由：除规范所倡导的选项外，人们别无其他选择。\\n履行消费者的责任意味着更多地做选择，无论这最终是否带来更多的消费。\\n选择的自由设定了消费者社会的阶层，设定了消费者社会的成员（消费者）绘制生活理想的框架，为他们定义了自我改善的方向，以及“美好生活”的图景。\\n消费者社会不会轻易呼吁延迟满足。这是一个信用卡社会，而非存折社会。消费者社会“活在当下”，物欲横流，没有耐心等候。\\n如果说生产者社会的柏拉图式的，追求牢不可破的规则和事物的终极模式，那么消费者社会就是亚里士多德式的——务实、灵活，遵循船到桥头自然直的原则。\\n消费者社会也是咨询和广告的天堂，是预言家、算命先生、贩卖魔法药水的商人和点金术的沃土。\\n评判世间万物的标准是激发人们感受和体验的能力——唤起欲望的能力，这是消费生活中最愉悦的阶段，比欲望得到满足更令人陶醉。\\n最常用的地图是美学的，而不是认知的或道德的。\\n工作的价值取决于产生愉悦体验的能力，不能使人获得“内在满足”的工作没有价值。\\n为了让那些已经皈依消费主义的人去从事那些经不起美学考验的工作岗位，必须人为地重新创造一种没有选择、迫不得已、为最基本的生存而奋斗的处境。只有这一次，不会再扯上什么崇高的道德救赎。\\n道德说教或许可以在短期获得成功，但长远来看都会适得其反，因为这会转移人们的注意力，使他们偏离真正的使命——身为消费者的追求。\\n它使人们相信，上层人士热情追求、自愿选择、珍惜且拥护的“灵活性”，对其他人也一定是一种无上的祝福，哪怕这种“灵活性”最终带来的与其说是选择的自由和自主的权力，不如说是安全感的丧失、被迫背井离乡的前途未卜。\\n艾曼纽利指出，“让穷人的孩子出发流浪是他们的‘启蒙之旅’，让他们能够‘找到自我’”，没有什么想法比这种理念更加错误了。“启蒙之旅”绝不是这种漫无目的、毫无前途的游荡，“没有什么比这更有破坏性”。\\n查尔斯·布斯（Charles Booth）和西伯姆·朗特里（Seebohm Rovwntree）等人认为，“充分就业的情况下也存在贫困，因此贫困现象不能用工作论理的传播不充分来解释”。\\n贫穷意味着被排除在“正常生活”之外，意味着“达不到标准”，从而导致自尊心受到打击，产生羞愧感和负罪感。\\n失业者无法以任何有意义的、令人满意的或有价值的方式安排时间。\\n消费市场确保任何人在任何时间都不会因为“尝试过所有的东西”，而绝望或沮丧，从而推动生活的乐趣。\\n在欲望被安抚之前激发新的欲望，在因占有而感到厌倦、烦躁之前替换新的猎物。永远不出现厌倦——这才是消费者的生活准则，也是切实可行的准则，触手可及的目标。\\n欲望是免费的，但实现欲望，进而体验实现欲望的愉悦状态，需要资源。\\n西布鲁指出，“穷人与富人并非存于相互独立的文化中。他们只能生活在同一世界里，而这个世界是为有钱人的利益设计的。穷人的贫困不但因经济而加剧，也因经济衰退和停滞而加剧”。\\n实现个人价值的自由需要免于匮乏，免于失业，也免于对匮乏和失业的恐惧。\\n只有当社会服务面向整个社会，惠及所有民众时，才能“像战争期间那样促进社会融合和团体意识”。\\n福利国家的持久存在曾用它缔造与维持和平的能力来解释：它更能确保工人接受资本家设定的规则，且代价更低——相对于依靠强制措施的工作伦理而言。\\n伴随着劳动力在生产过程中的作用迅速下降，以及企业全球化布局的自由，投资福利供应的吸引力大幅下降，以更少的代价就能获得等价甚至更好的效果。\\n这个星球上，部分地区已经充满老于世故的消费者，但也还存在广袤的处女地，那里存在不需要激发消费欲望就能获得的顺从劳动力，那里的人为了维持生计而卑微地工作。但是，在本地市场，你需要源源不断地创造新的欲望，并保持雇员工资增长，以确保这些欲望能够变成普遍切实的需求。\\n对“劳动力再商品化”的投资已经没有任何收益，一旦被要求承担社会福利成本，优秀的商人就会利用新获得的全球化自由，把他们的资金和企业带到国外，带到那些索求更少的地方。\\n对福利国家的态度长期具有大众意识，但是在近半个世纪，这个共识从普遍支持走向普遍反对。\\n他们（中层选民）认为，相对于质量低劣的国家保险而言，能够负担的私人保险会提供更多、更好的福利。这种新的态度与其说自信，不如说是一种清醒的反思：相比依靠自己不可避免带来的风险，其他可选方案似乎更糟糕。\\n有趣的是，国家保障体系的恶化也降低了私人保险服务的质量，降低了人民普遍的期望水平。\\n一个“被自由选择”的物品能使其主人变得与众不同，而“被分配”的物品显然不具备这种能力。\\n“平权法案”的存在，使很多“业已成功”的非裔遭受轻视和贬低。如果没有人能找到理由质疑他们的成就名不副实，认为那只是一种恩赐，而非自觉努力、个人天赋、勤奋工作和正确抉择的产物，他们当然会更加欣慰。\\n这些受益者们不愿承认，他们之所以能有今天的地位，并不是因为他们像其他美国人一样发挥了自己的智慧和勤奋，而是因为得到了帮助。这是他们争取尊严无法回避的问题。他们大声又明确地宣布，如果他们“做到了”，那么其他人也能做到，如果有人做不到，一定是因为他/她不够努力。毕竟，这意味着，他们取得的所有成功完全源于自己的努力。\\n最先获益的人最先宣布它一无是处，抱怨它给受益者带来的不公平的、有辱人格的心理阴影。\\n福利国家和非福利国家的社会成本都很高，但介于两者之间的转型阶段的社会成本却可以被无知或虚伪地描绘为很小。或许很小，但这只是暂时的。——马丁·伍拉科特\\n工作仍然是生存的源泉，但不是生命意义的源泉，当然也不是培育人与人之间纽带的温室，它不足以支撑和维持道德信念和道德实践。\\n曾经由专业能力带来的自豪感，现在可以从（以任何的价格）购买精美商品中获得——在迷宫般的大型购物中心发现最好的“店铺”，发现推车上最好的衣服或货架上最好的商品。\\n无论国民生产总值（GNP）和国内生产总值（GDP）的统计数字多么振奋人心，工作岗位仍在持续流失，徒劳寻找工作或因绝望放弃寻找工作的人持续增加。\\n失业不再是一种暂时的烦恼，到了某个时候就会自然消失。“失业者”虽然暂时没有工作，但一旦环境好转，他们就有望回到生产者的行列，一切也将回到正轨。“过剩”的人则不同，他们是多余的、编外的、不被需求。\\n事实上，人们普遍认为，正是为达到“经济健康”标准所做的努力，严重阻碍了能够真正提升就业水平的有效措施——创造就业机会。\\n“经济增长”和就业率的提升，实际上是相互矛盾的；技术进步是以劳动力的替代和淘汰为标准的。\\n工作伦理虽然不再是减少贫困的手段，却能帮助调和社会众生和永恒存在的穷人之间的关系，有助于整个社会的安宁平和。\\n应该不是巧合，当底层阶级进入人们视线的时候冷战正好趋于停止，冷战制造恐怖的力量迅速消散。\\n有人倾向于认为，即使不存在底层阶级，它也会被创造出来。事实上，它确实恰到好处地出现了。\\n社会上并非不存在乞丐、吸毒者和未婚母亲——每当有人质疑底层社会的存在，这些“可怜又可恶”的人总是被例举出来。然而，他们在社会中的存在丝毫不足以证明底层社会的存在。把他们归为一类是一种分类决策，而非依据事实的裁决。把他们混为一体，指责他们是无用的，会给社会的其他部分带来可怕的危险，这是一种价值而非真实叙述。\\n在缪尔达尔看来，底层社会的成员选择是被驱逐的受害者，他们在社会中新的定位并非因为自己选择了退出，而是经济逻辑的产物，受害者对之无法控制或施以影响。\\n如果有穷人能够“在社会许可的界限内生活”，那么堕入底层阶级一定是因为贫穷之外的原因。这些归因于心理或行为上的疾病，在贫困时这些疾病可能会更加频繁地发作，但贫困并非决定性因素。\\n从我对底层这社会和穷人的报道中，我深刻认识到，把他们统一是理解他们的敌人。笼统地概括”底层阶级“……或”受害者“……或贫穷”几乎被消灭“——或说政府是问题所在，都是危险的。从 3 万英尺的高空俯视，所有人都和蚂蚁无异。—— 奥莱塔\\n随着劳动力迅速变成提高生产力的障碍，工作仍然可以发挥作用，但这次是作为另一种有效手段：洗涤社会中正常人的双手和良知，帮他们从抛弃同胞致使同胞永久失业的罪恶中摆脱出来。在对穷人的道德进行谴责的同时，对非穷人的道德实施赦免，通过这种双管齐下的方法，达到双手和良心的洁净。\\n美国人对底层阶段真正的不满意在于，这些人的梦想，他们渴望的生活模式居然和自己如此相似。\\n市场诱惑，既是伟大的均衡器，也是伟大的分化器。为了取得效果，消费的诱惑、消费更多的理念必须传达到每一个角落，不加区别地传达给每一个愿意聆听的人。\\n终点线和参赛者一起进行，人们力图到达的目标永远领先一步之遥。记录被不断打破，人的欲求似乎永无止境。\\n美国那些沉默的大多数需要对底层阶段进行恐吓，以驱逐自己内心的恐惧。\\n大规模慈善的景象使日常的镇静和道德的冷漠更容易忍受。最终，它们强化了在道德世界放逐穷人的信念。\\n”贫穷=饥饿“，这则等式掩盖了贫穷的复杂性：”令人恐怖的生存和居住条件、疾病、文盲、敌视、支离破碎的家庭、衰弱的社会关系、没有未来、没有生产能力“。\\n一个人造的咎由自取的景像沉淀公众意识中：一个显而易见的”贫民街区“和”危险区域“的形象，一个夸张演绎的黑社会，一个没有道德、无法救赎的低等人的世界。把他们从自己酿造的苦酒中拯救出来只能短暂有效，长期来看则注定失败，所有抛出的救命索必然纠缠在一起，形成死结。\\n一说到我们（富人们）对世界上穷人的持续痛苦负有集体责任，经济计算就会占据上风，自由贸易规则、竞争力和生产力取代了道德准则。经济发言的时候，道德最好保持沉默。\\n现代化被视为一种工具，一种用来实现理性社会这个终极目标的工具。\\n当需要治疗的病症很大程度上是医源性的，即病症是治疗本身的副产品，当重组的对象大多数是过去重组的产物，是过去破坏性喧嚣的恶报时，幻觉就不再能够维系。\\n除了装睡的人，大家都清楚，所有的创造性都是创造性的破坏。\\n有效可行的商业被破坏和弃置，有能力的员工被解雇而非获得奖励，只因为组织必须向市场证明它有能力改变。\\n正如查尔斯·达尔文对欧洲主导的”蛮荒开化“这个传奇进程的总结，”欧洲人走到哪里，死神就降临哪里“。\\n每种秩序都会丢弃现存人口中”不协调“”不合适“或”不受欢迎“的部分。经济发展不可能不破坏和废弃之前行之有效的谋生方式，必定会剥夺一些从业者的生计。\\n没有足够的就业，也没有足够的福利保障，全球人口过剩的警报已经拉响。\\n远方的人遭受苦难的直接或间接源头，或许正是我们此时此地的所作所为，但由于距离遥远，它们并不会引起道德上的共鸣，也不会像身边所见的苦难那样能够引发强烈的行动意愿。\\n迄今为止，在这些后来者的土地上，唯一快速发展繁荣的产业也许就是大量生产难民。\\n如今，社会问题越来越趋向于犯罪化。——吉鲁\\n狱墙，而非狱墙内发生的事情，”被视为这种机构最重要也最有价值的元素“。\\n非常明显，监狱的主要目的，或许也是唯一目的，不是暂时性处理”废弃人口“，而是对其进行终极的不可逆的处理。一旦被拒绝，永远被拒绝。对于假释或缓刑的囚犯来说，重返社会几乎是不可能的，他们只能重返监狱。\\n威胁必须被渲染上最邪恶的色彩，这样一来，无形的不可预测的威胁，就可以作为一个非常事件展现在惊惶失措的公众面前，当然更重要的是让他们认识到国家机关应对这些威胁的卓越能力、警惕性和良好意愿。\\n然而，向往秩序就是向往死亡，因为生命本身就是不断破坏秩序的过程。或者换句话说：对秩序的渴望是一种堂皇的托辞，是强烈厌世的借口。\\n任何秩序都在不顾一切地把一致性、规律性和可预测性强加给人类世界，但人类倾向于多样化、反复无常、不可预测。\\n人类是”一种能够创造其他事物的存在，是变化的源泉，因此他们也不断改变自身“，人类的世界（除非是墓地）不可能是同一的、规律的、可预测的。\\n秩序和规范的概念，正是源于对于现状的不满以及想要积极改变现状的冲动。\\n秩序和规范旗帜鲜明地宣告，不是所有现在事物都可以被包含在这个公设的、正常运作的集合体中，也不是每个选择都被许可。秩序和规范的概念是对准社会现状的尖刀，传送的首先是分离、截断、切除、驱逐和排斥的意图。\\n因此被驱逐表现为社会性自杀的结果，而非社会性处决的结果。\\n有些人可能只是因为自己的出身”违背了秩序“。他们因为自己无法决定的一些特质而被驱逐，他们没有做错什么，只是”像他们这样的人“不符合其他人的秩序观。\\n无论它的动力是什么，这种冲动只是化为全力”他律“（heterono-mous），剥夺那些不知道正确使用自己力量的人力量，千方百计使他们屈从于他们逃避、反抗的”超越个人的制度“。\\n当某种特定的人存于世的模式被提升到规范的地位，其他的选项就会被降格到低于标准或不正常的范畴。穷人正是这种”不合适“和”不正常“的典型和原型。\\n每个社会都根据自己特定的秩序和规范模式，塑造出不同的穷人形象，对穷人的存在作出不同的解释，为他们找到不同的价值，并制定不同的解决贫困问题的战略。\\n一个依靠来世寻求尘世生活的意义的社会，如果没有穷人的存在，就需要另外寻找一种救赎的手段。\\n这确实是一个恶性循环：穷人反抗他们遭受的苦难导致叛乱和革命，穷人妥协于他们悲惨的命运遏制和阻碍工业企业的进步。强迫穷人在工厂长期劳作似乎是解决这种循环的一种有效方法。\\n把枯燥无味的工作提到崇高的道德责任，或者能够让从事这些工作的人甘之如饴，并迎合那些提供工作的人的道德良知。\\n”置穷人于工作“是”人对上帝的责任“这则观念迂回地暗示了，把穷人限制在贫穷状态是一种道德要求。\\n用阿瑟·杨格（Arthur Young）的话说，”只要不是白痴，所有人都知道底层阶级必须保持贫穷，否则他们永远不会勤奋“。\\n然而，问题在于，曾经用于把握和阐述工业时代初期现实的哲学，已经迷失在工业时代末期的现实之中。这种哲学曾致力于建立新秩序，却慢慢地变成了烟幕，掩盖了穷人前所未有的新困境。把穷人塑造成”劳动力后备军“的工作伦理，在诞生时是一种启示，在死后却变成了一种掩饰。\\n今天的穷人是”非消费者“，而非”失业者“。他们首先被定义为有缺陷的消费者，因为他们没有履行最重要的社会责任——积极有效地购买市场提供的商品和服务。\\n他们是一项糟糕的投资，永远不可能收回成本，更不用说带来收益。\\n对穷人应该零容忍，没有他们的世界会变得更加美好。没有人需要他们，所以他们最好不存在。他们可以被无情地抛弃，没有人会因此懊悔或内疚。\\n这种细微的差别很重要，就像昔日一个好的印第安人是一个死的印第安人那样，今天”好的穷人“是隐形的穷人，他们不造成负担，没有任何要求。简而言之，就像不存在一样。——卢克·华康德\\n把穷人驱逐出街头的同时，还可以把他们驱逐出整个人类社会，驱逐出道德责任的世界。\\n阿兰·芬基尔克劳特（Alain Finkielkrant）在他最近的著作中提醒我们，当道德老师被彻底压制，同情心消亡，道德的障碍被拆除时，可能会发生什么？\\n一旦道德共同体的消亡与解决棘手问题的先进技术相结合，”你的生存机会几乎为零“。解决麻烦的理性方案，辅之以道德上的冷漠，造就一件爆发性混合物。很多人会死于这场爆炸，而最醒目的牺牲品是躲过这场劫难的幸存者的人性。\\n现在和过去一样，选择权在我们手中。\\n质疑自己是可行的，事实上是必不可少的，因为我们所有的规划都建立于主观之上，并且注定只能是主观的。既然是主观的，它们当然可以被其他规划取代，只要这种替换有足够的说服力。\\n一旦忘记这点，我们就不再追问那些推动社会不断前进的问题。比如：”一切都以有效性优先，但对谁有效？基于什么？目的是什么？经济增长是实现了，但这是什么的增长？为谁而增长？付出了什么代价？达到了什么目的？\\n当所有依靠选举的政治力量都在奔向相反的方向，把疾病的症状看作康复的迹象，把疾病的原因看作良药，这些建议不可能引起任何关注。\\n梅利莎·本（Melissa Benn）最近指出：“当男性政治家谈论工作时，他们指的总是有偿工作。”\\n马克斯·韦伯早就指出，他们把自己的事业从家庭中分离出来。在这种情况下，他们让女人去从事其他所有必需的生活家务。由于这些工作看不到经济收益，所以就不再被看作是工作。\\n工艺伦理将恢复人类本能的尊严，恢复社会公认的意义。现代资本主义社会形成且根深蒂固的工作伦理却否认了这种尊严和意义。\\n我们不是第一次站在历史的十字路口，需要选择走向何方。首先，至关重要但并不那么显而易见的是，需要认识到我们身处十字路口，认识到有多个选择都可以通向未来，认识到前行的路上或许随时需要紧急转换方向。\\n德鲁瓦的结论是：“我们的时代并未阻止乌托邦的脚步，反而为其回归做好了准备。我们越是复述政治没有梦想的空间，就越是渴望一个完全不同的世界。”\\n群体自愿的返璞归真，正成为群体贫困的唯一有意义的替代。\\n\"",
