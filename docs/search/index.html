const data = [
  
  {
    title: "《本杰明·富兰克林自传》读书笔记",
    content: "\"The Autobiography of Benjamin Franklin\\n富兰克林被印在 100 美元钞票上，百元大钞常被称为 Benjiamins，但他却不是美国总称。\\n富兰克林被大家熟知的故事除了风筝实验、练习写作的高效方法还有如何如何培训自己的十三项美德（节制、缄默、秩序、决心、节俭、勤奋、诚信、正义、中庸、清洁、平静、贞洁和谦卑）的训练方法。\\n能被印在钞票上，显然对于美国作出过巨大的贡献。因为对于历史不太了解，本书关于历史事件的描写，读起来并不容易。\\n但除了历史事件以外，作为一个从普通家庭成长起来的人而言，富兰克林的经历可以说非常的有借鉴和学习意义。虽然做着最苦最累的短工，但是却没有放弃学习，逐渐成长为非常成功的印刷商。在成为商人的道路人，用现在的话而言是卷到家了。因为邻居常常说，我睡觉时他在工作，早上起床后，他依然在工作。\\n他的爱好丰富，在学习了科学相关的一系列知识之后，为了证明“闪电是电”这一假设，他在雷雨天通过放风筝来进行实验。这一发现导致了避雷针的发明，保护了当时无数的木质建筑。\\n除了在商业上的成功以外，他的的确确是个道德高尚的人。主导了许多有益于公共事业，帮助了广大的劳苦大众，但是却坚持自己并非是发起人，而是以代理人的称号。穷理查年鉴、读书会、消防事业以及众多教会的教导事业等等。\\n富兰克林提到的“放东西各归其位”，我也是在工作之后，看到媳妇经常找不到东西，我领悟出来的。找不到东西，往往因为养成了一个不良的习惯。而要做到这一点，其实是相当难的，太多的人对自己的要求低的可怕。却称别人的习惯为“太过极端”。通过阅读传人的传记，我渐渐了释怀了。\\n我对于吃的东西挺挑剔的，但是吃的比较少，也基本上吃素为主，肉食吃一点点。富兰克林提到素食能提供人体所需的营养，我个人也是比较认同的。我在平时的饮食中，很少有对肉的渴望。\\n诚实是我坚定的最高道德法则，在一个环境中若无法实现这个目标的时候，我会选择离开。在平时的工作中，我很难对别人撒谎，因为撒谎意味着需要更多的谎言来掩盖，会累死我的。\\n笔记 一个学说如果能够解决问题和困难，就是真理，犹如医生能够把病人治好的方子就是良方一样，效用就是检验真理的标准。\\n人大多不喜欢他人爱慕虚荣，而自己的那颗虚荣心再大也安之若素，然而我无论在哪里遇到虚荣，总是以相待，因为我相信，虚荣对于爱慕者也好，对于他周围的人也好，往往都是有有益无害的：因此，在很多情况下，如果有人将自己的虚荣当作人生的慰藉之一而感谢上帝，那也不足为怪。\\n无论读书还是做练习，时间只能定在晚上，下班后或早上上班前，要么就是礼拜天。\\n由于阅读沙夫茨伯里和柯林斯，我对我们的宗教教义中很多观点都产生了真正的怀疑，我发现这种方法既能使自己万无一失，又能将我用这种方法反驳的对手引入窘境，因此乐不可支，便继续实践，逐渐驾轻就熟，得以应手，诱使对手，甚至是学识渊博的对手，步步退让，因为这种后果他们是预见不到的，还让对手陷入困境不能自拨，就这样取得了我自己和我的理由常常不应取得的胜利。\\n教人时要让人觉得你不是在教他，人所不知的事情你就说他是忘啦。\\n与其言之凿凿，不如故显怯懦。\\n有时候一个人钱少时比钱多时出手更大方，也许是怕别人小瞧的缘故吧。\\n人和人有天壤之别，年长难保事事谨慎，年幼未必处处唐突。\\n想做一件事，它总能使人找出一个或者造出一个理由来。\\n丢了这位朋友，我倒是发现自己甩掉了一个包袱。\\n因为我相信，跟自己必须朝夕相处的人交恶是愚蠢透顶的。\\n维持一个人的生命和健康需要的收入微乎其微。\\n虽然我没有增进自己的财富，却结识了一些非常聪明的朋友，他们的言谈让我受益匪浅，再说我还读了不少书。\\n但凡存在的都是正确的。——尽管半盲之人只看见部分链条，即最近的一环，但他的双眼看不到上面那衡量一切的平等的秤杆。\\n我逐渐确信人际关系中的真实、诚信、正直对于人生的幸福至关重要，我写成了决心书（这些仍然保留在我的日记本里），在有生之年时时躬行实践。\\n青年时代是人生的转折点；青年时代甚至是对下一代的教育期，青年时代是公私两种人格的决定期；尽管人生的期限从青年延伸到老年，但人生应当从青年时代就有个良好开端；在我们对自己的主要目标做出决定之前，这尤为重要。\\n眼下牺牲一点虚荣，往后会得到厚厚的回报。如果一时难以确定是谁的功劳，那么某个比你还要虚荣的人就会觉得理直气壮，便当仁不让，到那时候，连嫉妒也愿意还你一个公道，拔掉这些冒领的羽毛，还给它们真正的主人。\\n你看见办事殷勤的人吗？他必站在君王面前，必不站在下贱人面前。\\n我们有句英国谚语说，要致富，求妻助。\\n譬如说，我决不怀疑上帝的存在，决不怀疑是他创造了世界，世界是由他的旨意统治的；决不怀疑对上帝最可取的侍奉就是与人为善；决不怀疑我们的灵魂是永生的；决不怀疑罪恶将得到惩罚、美德将获得奖励，不在今生，就在来世；我认为这些就是每一门宗教的精髓，由于它们在我国的所有宗教中都可以找到，所以我统统予以尊重，不过尊重的程度有所不同，因为我发现它们或多或少夹杂着一些别的条规，这些条规无意激发、促进或巩固道德伦理，却主要用来分化瓦解我们，挑斗我们的彼此为敌。\\n于我于己不利的话不谈，避免碎语闲言。\\n放东西各归其们，办事情各按其时。\\n我的意图是把这些美德养成习惯，所以我认为最好不要同时全面开花，分散了注意力，而应当一次专注于一项，等把这一项掌握透了，然后再试下一项，这样秩序渐进，直到我把十三项统统做到。\\n在这里我愿意相信：如果我头上有一种神力，（确实有，整个大自然通过她的造物高呼）他肯定会对美德格外喜欢，而且他喜欢的对象也一定快活。\\n“哲学啊，生活的指南，你是美德的求索者，罪孽的祛除者！……宁肯按照你的规诫好好活一天，也不愿过罪恶的永生。”\\n她右手有长寿，左手有富贵。她的道是安乐，她的路全是平安。\\n光明与生命之父哟，您是至善，教我如何为善，您亲自教教我！脱离所有低级的追求，用知识、宁静、纯德充满我的灵魂，赐予我神圣、充实、永不调零的福祉！\\n我惊讶地发现自己的过错比原先想象的多得多，但也满意地看到它们日益减少。\\n我相信很多人都是这种情况，他们由于缺少我用的手段，发现树立良风破除陋习十分艰难，在善与恶的其他一些交锋上放弃了斗争，还说什么麻脸斧头是最好的。\\n一种完美的品格会惹来遭人嫉妒的麻烦：而且一个善人应当允许自己有点毛病，好给他的朋友留点面子。\\n虽然我从来没有达到我曾经雄心勃勃要达到的那种完美境界，而且还相去甚远，但我通过努力成为一个比较优秀、比较快乐的人，若不努力我是做不到这一步的；就像有些人临摹字帖，一心要练就一笔好字，尽管他们永远达不到他们希望达到的字帖的那种优秀水准，但通过努力书法大有长进，字写得漂亮清晰，也算说得过去了。\\n余年还有什么不测，皆在上帝手中：即使这些不测出现，对往日享受的幸福加以反思应当帮助他以乐天知命的心态将它们一一扛过去。\\n单独就人性考虑，恶行并不是因为遭禁才有害，而是因为有害才遭禁，因此具备美德是每个人的利益所在，因为人人都希望今生幸福，从这种情况（世界上总有许多富商、贵胄、皇亲国戚，他们需要管理自己事务的诚实工具，而这种工具又如凤毛麟角），我尽力让年轻人相信，要使一个人穷人致富，什么品质也不可能像诚实那么有效。\\n我给自己立了一条规矩，克制一切跟别人针锋相对的言论和我自己的武断说法。\\n实际上，在我们的生性情中最难制服的也许就是骄傲了，你尽可以千方百计地将它伪装，跟它拼搏，把它打翻在地，掐住它的脖子，将它狠狠羞辱一顿，但就是弄不死它，一有风吹草动，它又窥见伺隙表演一番。\\n尽管一个政党在推动一项总计划，各人却有各人着眼的具体私利。\\n一旦一个政党达到了自己的总目标，每个成员就开始关注一己的私利从而妨碍了其他成员，这就造成了政党分裂，招致了更多的混乱。\\n在公众事务中更少有人做事是从人类利益着眼的。\\n因为我一直认为，一个能力尚可的人可以在人类中促成大变革，成就大事业，只要他首先制订一个好计划，然后剪除一切娱乐活动或其他可以让他分心旁难鹜的事务，把推行这一计划当作他唯一的研究和事业。\\n美德只有修养到了习惯成自然的程度，彻底摆脱了与之对立的倾向，才能算牢固可靠。\\n我之所以提这些事，是为了给年轻的出版商敲个警钟，千万不可做种不光彩的事情，把自己的报刊搞得乌烟瘴气，给自己的职业抹黑，所以这类文字应断然拒绝；他们也许会从我的例子中看出，这样一种办报方针总的来说是不会损害他们的利益的。\\n我的例子表明，如果两种做法都可能造成同样的悔恨，还是应当两害权取其轻。\\n若一次施恩与你，必将二次施恩于你，其乐意之情为受恩于你者所不及也。\\n我之所以提这件事，无非是给受聘替别人管理事务的年轻人上上课；他们应当始终如一地报账、缴款，做到清楚透明、如期准时。为人做事能信守这一准则，人们就会有口皆碑，不愁找不到新工作，做不成大事情。\\n我怀疑世界上是否有哪个城市在刚起火时有比费城更好的制止手段；实际上自从这些机构建立以来，这座城市一次起火最多只会损失一两座房屋，而火焰往往在房屋被烧掉一半以前就被扑灭了。\\n报纸上报道他在露天场地上给两万五千人布道，古代史上也有将领给全军慷慨陈词的记载，对于这些我有过怀疑，现在我算是信服了。\\n后者由于屡屡重复宣讲，不断得到改进，以致声音抑扬顿挫，百转千回，达到了炉火纯青的境界，一个人哪怕主题不感兴趣，光听演讲也觉得心旷神怡，其感受就像听了一段优美的音乐一样。\\n我倒是有这么一种看法，如果从从来没有写过任何东西，他反而会留下一个人数多得多、重要性大得多的教派。要是哪样，他的声名也许还有蒸蒸日上，即使在他乱世以后；因为他没有文章，就不好挑刺；没有文章，就没法贬低他的人格，他的追随者就可以随心所欲替他涂脂抹粉，树碑立传，全看他们热烈崇拜的心理需要了。\\n因为在签订合同时无论合伙双方多么互敬互信，但在生意的打理和负担上总会有不够平等的想法，于是难免产生一些小小的猜忌和厌恶，这就往往造成了友谊破裂，关系断绝，也许还少不了对簿公堂，还造成其他种种不愉快的后果。\\n按照我的惯例，尽量避免把自己表现成任何公益计划的首创人。\\n我认为我当了议员就会增大做好事的能量。不过我也不想暗示，我的雄心并没有因这些提示而有所满足。它肯定得到了一定的满足。因为考虑到自己起点低，这些职务对来来说都非同小可。更使我感到欣喜的是，它们是大众良好口碑的自发见证，全然不是我奔走乞求来的。\\n我说，首先，我劝你向你知道愿意出点钱的人去募捐；然后向你拿不准会不会给钱的人去募捐；最后，不要忽略那些你肯定是一毛不拨的铁公鸡，因为有些人你也许会看错。他大声笑了，千恩万谢，说他会接受我的劝告。\\n伦敦的居民宁愿在烛光下生活，在日光下睡觉；又常常抱怨对蜡烛课税，烛油价太高，这就未免有点荒唐了。\\n人的幸福，因撞到千载难逢的大运而得者为数寥寥，由日积月累的小惠而生者比比皆是。\\n将茫茫人间用眼一扫，知善行善者何其稀少。\\n执政者手里事务纷繁，一般不喜欢自找麻烦去考虑和实施新的计划。因为最好的公益措施之所以被采纳，很少出于远见卓识，而是由于形势所迫。\\n因为经过我长期的观察，这些爱争长论短、反驳辨难的人帮事一般都不走运。他们有时候能获得胜利，但永远也得不到友善，而友善对他们则更有用处。\\n人们专心致志地做事的时候，往往最为满足。\\n我的回答是中肯的，感谢上帝，我的情况还可以，尚不需要领主恩赐，而且作为一名议员，我也不可能接受；我对领主没有个人恩怨，只要他提出的公共举措于百姓有益，我就会以最大的热情拥护和推动，我过去之所以表示反动，是因为所主张的那些举措显然是为领主的利益服务的，严重地损害了百姓的利益。\\n“邻居们，税实在太重，如果我们要交的仅仅是政府征的税，那交起来倒比较容易。可是我们还有许许多多的税，对有些人来说更难以接受。懒惰抽我们两倍的税，骄傲抽我们三掊的税，愚蠢抽我们四倍的税，税务局长们即使允许减税，也不能替我们减轻或交纳这样的一些税。不过咱们听听中午，也许还有办法。自助者天助，穷理查在他一七三三年的的历书中就是这么说的”\\n倘若你热爱生命，那就别浪费光阴，因为光阴正是构成生命的原料。\\n睡着的狐狸抓不住鸡，人在坟墓里将会睡个够。\\n戴手套的猫逮不住老鼠。\\n要想得到闲暇，就好好利用时光。既然你对一分钟没有把握，就别丢掉一小时。\\n不监督工人，就等于把钱包敞开让他们瓜分。\\n学问归勤奋的人，财富归仔细的人，权力归勇敢的人，天堂归有德行的人。\\n你若不买需要的东西，过不了多久你就会卖你必需的东西。\\n智者从别人的失败中吸取教训，愚者从自己的失败也不大吸取。可是，对别人的不幸引以为戒的人是幸运的。\\n站着的农夫比跪着的绅士高。\\n穷人模仿富汉，犹如青蛙鼓足气跟公牛比高低，真是愚不可及。\\n趁早把老年的贫穷提防，没有整天普照的朝阳。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/the-autoboiography-of-benjiamin-franklin-notes\/"

  {
    title: "《黑客与画家》 读书笔记",
    content: "\"我与这本书的渊缘始于刚开始工作的半个月，要熟悉环境，还要熟悉那么多的代码，压力山大，连续有半个月晚上失眠睡不着觉，有个晚上看完了这本书，但是唯一有印象的是作者提到了 Lisp 这门语言，其它相关的内容就是大家都“黑客”概念的误解。\\n“黑客”一词在高中的时候就听说，对于农村家庭的孩子，电脑都接触不到。有天放学的时候，准备去网吧。同桌问我，你去干啥，我说，去网吧，我准备要成为一名“黑客”。但是当时的我，根本就不清楚这意味着什么。\\n第一次高考完，成绩相当糟糕，只能让专科。因为高三都跟女朋友谈恋爱了（她现在是我媳妇），当时全部报的志愿都是计算机专业。但是最后选择了复读，第二年倒是听了堂姐的话，报了大连外国语的英语相关专业，但是没被录取，最后又回到了软件行业。我当时就觉得我适合干这行，但是具体是什么样子的，我根本不知道。\\n如今我已经从业十多年，从一个菜鸟变成了一个老鸟，再重新读这本书，感触良多。\\n对于没有从事开发的人而言，读这本书可能没有多少感觉。这也是为什么我当时看了一遍书籍几乎没有感觉，加上当时读书的习惯很不好，没有涂涂画画，也没有整理笔记。\\n这次读，读的也比较慢，在讲书呆子如何应对这个世界时，一边想着上小学被别人欺负的场景，也一边再思考上小学的大宝给我们讲他是如何应对来自同伴的压力。\\n工作的前三年，只会一门 C++，别的都不会。到现在语言已不再是问题，数据库，WEB 前台以及后端架构与实现，可以信手拈来之后。重新看这本书，关于设计方面的内容，只觉得自己平时书看的太少了。往往是在不停的踩过坑之后，才看过已经有很多大神帮我们总结过了。\\n作为一个程序员，无时无刻不再设计。从函数名到变量名，都在设计，都在提高自己的品味。最常见的当然属于制定各种交互接口，因为与我对接的同事，要么不愿意做，要么设计之后，不愿意修改。而我会以最快的速度先实现第一个版本，然后自测，去发现其中的不足，然后在自测的过程不断优化。开始对接的时候，遇到不合理的地方，我也会习惯性的去修改，而不以时间为理由，回复一句就这样吧，或者下个版本再说之类的话。我希望设计的接口足够的简洁，尽可能的无歧义。因为别人根据名称发现调错接口时，设计接口的人负有主要责任。\\n实习的第一个月，我一度觉得自己坚持不下来了，想要去做产品。但是现在回头想想，多亏自己坚持下来了，因为我的性格本身就适合往“黑客”的方向去深入。随着不停的深入，发现自己需要学习的东西就越多，但我不会因为这些退缩，反倒会有更多的动力去学习。\\n笔记 设计是技术和人类需求的桥梁，只有通过好的设计，技术才能源源不断地满足需求。\\n运营创业公司，每天都像在战斗；而为大公司工作，就像在窒息中挣扎。\\n我们生活中的一切，都正在成为计算机。所以，如果你想理解我们目前的世界以及它的未来动向，那么多了解一些黑客的想法会对你有帮助。\\n许多伟大的公司，一开始的时候做的都是与后来业务完全不同的事情。乔布斯创建苹果公司后的第一个计划是出售计算机零件，然后让用户自己组装，后来才变成开发苹果计算机。你需要倾听用户的声音，琢磨他们需要什么，然后就去做。\\n所有东西都在变成软件。印刷机诞生后，人类写过多少个字，未来就有多少家软件公司。\\n德国哲学家马丁·海德格尔（Martin Heidegger）说过一句著名的话：人应该”向死而生“（Being-toward-death）。\\n正如格雷厄姆所说，你要做的就是“活在未来，然后选出现在还没有的部分”（Live in the future, then build what\\u0026rsquo;s missing）。\\n想要把握这个时代，就必须理解计算机。理解计算机的关键，则是要理解计算机背后的人。\\n程序员的审美决定了你看到的软件界面，程序员的爱好决定了你有什么样的软件可以使用。\\n我们的时代是程序员主导的时代，而伟大的程序员就是黑客。\\n自由软件基金会创建人理查德·斯托曼（Richard M.Stallman）说：”出于兴趣而解决某个难题，不管它有没有用，这就是黑客。”\\nAll information should be free.\\nHackers should be judged by their hacking, not bogus criteria such as degree, age, race, or position.\\nYou can create art and beauty on a computer.\\n黑客价值观的核心原则则可以概括成这样几点：分享、开放、民主、计算机的自由使用、进步。\\n对于黑客来说，关着的门就是一种挑衅，而锁着的门则是一种侮辱。\\n真正的黑客致力于改变世界，让世界运转得更好。媒体对黑客的定义未免过于片面。\\n和画家一样，黑客只是杯有一门特殊手艺、有创造天赋的普通人。\\n编程语言就是程序员的思维方式。\\n优秀的黑客养成了一种质疑一切的习惯。\\n计算机世界就像是智力世界的大西部，在那里没有你不敢想的事情，只要你愿意承担冒险的后果。\\n文艺复兴时期的代表人物阿尔伯蒂有一句名言：“任何一种艺术，不管是否重要，如果你想要在该领域出类拔萃，就必须全身心投入。”\\n受欢迎也不是天生的，而是需要你自己争取的。\\n书呆子被教导追求正确答案，而受欢迎的小孩被教导要讨人喜欢。\\n仅有很少的聪明小孩，能够分配出足够的心思，去关心如何让自己受欢迎。他们往往碰巧还具有俊俏的外表、运动员的体格，或者受人瞩目的兄弟姐妹。不然的话，你就别无选择，只能成为”书呆子“了。\\n在一个人产生良知之前，折磨就是一种娱乐。\\n在任何社会等级制度中，那些对自己没自信的人会通过虐待他们眼中的下等人来突显自己的身份。\\n没有什么比一个共同的敌人更能使得人们团结起来了。\\n这就好些一个政客，他想让选民忘记糟糕的国内局势，方法就是为国家找出一个敌人，哪怕敌人并不真的存在，他也可以创造一个出来。\\n不受欢迎是一种传染病，虽然善良的孩子不会去欺负书呆子，但是为了保护自己，也依然会与书呆子保持距离。\\n你不去埋头探寻，就不会发现具体的证据，就会永远以为这件事是抽象的。\\n当你所做的事情能产生真实的效果，那就不仅仅是好玩而已了，发现正确的答案就开始变得重要了，这正是书呆子的优势所在。\\n书呆子已经在思考的东西，正是真实世界看重的东西。他们与别人不一样，不把所有时间用来玩一种耗尽全力但又毫无意义的游戏。\\n整个镇子就像一个巨大的幼儿园，所有一切都是为了教育下一代而有意识地造出来的。\\n生活在这个扭曲的世界，不仅仅对书呆子，对所有孩子来说，都是充满压力的。就像任何一场战争，胜利方也是要付出代价的。\\n成年人对自己说，孩子们不快乐的原因是他们身体内部不出现了大量的化学物质——激素。激素在血液中奔流，把所有事情都搞得一团糟。\\n在世界上大多数地方，你的工作就是你的身份证明。\\n成年人已经达到共识，认定通往大学的途径就是这样的。逃离这种空虚生活的唯一方法，就是向它屈服。\\n当工作的专业程度越来越高时，我们就必须接受更长的时间的训练。\\n学校是一个很奇怪的、人为设计出来的体系，一半像是无菌室，一半像是野蛮洪荒之地。\\n黑客的最高境界是创造规格。虽然看起来做到这一点的最好方法就是先做出一个样品把规格实现了。\\n优美的软件并不总是论文的合适题材。\\n创造优美的方式往往不是从头做起，而是在现有成果的基础上做一些小小的调整，或者将已有的观点用比较新的方式组合起来。\\n我现在认为，大学时教给我的编程方法都是错的。你把整个程序想清楚的时间点，应该是在编写代码时，而不是在编写代码之前，这与作家、画家和建筑师的做法完全一样。\\n编程语言是用来帮助思考程序的，而不是用来表达你已经想好的程序。\\n作家和画家没有对“数学家的妒忌”，他们认为自己在从事与数学完全不相关的事情。我认为，黑客也是如此。\\n当你排斥差异的时候，你不仅将失败的可能性排除在外，也将获得高利润的可能性排除在外。\\n真正竞争软件设计的战场就是新兴领域的市场，这里还没有人建立过防御工事。\\n黑客的出发点是原创，最终得到一个优美的结果；而科学家的出发点是别人优美的结果，最终得到原创性。\\n开源运动最鲜为人知的优点之一，就是使得学习编程变得更容易了。\\n一种好的编程语言，应该像油画颜料一样，能够使得我们很从容地改变想法。\\n我对待代码的认真程度远远超过我对待其他事情，如果我以这种态度对待日常生活的每件事，那么我就够资格找心理医生开处方药了。看到代码前面的缩进乱七八糟，或者看到丑陋的变量名，都会把我逼疯的。\\n在你厌倦的时候再去做那些比较容易的工作，这是一个不错的主意。\\n正确的合作方法是将项目分割成严格定义的模块，每一个模块由一个人明确负责。模块与模块之间的接口经过精心设计，如果可能话的，最好把文档说明写得像编程语言规范那样清晰。\\n几乎所有最伟大的绘画作品都是画人的，因为人类总是对自身感兴趣。\\n有些黑客很聪明，但是完全以自我为中心，根本不会设身处地为用户考虑。这样的人很难设计出优秀软件，因为他们不从用户的角度看待问题。\\n软件的使用方式最好能符合用户的直觉，别指望用户去读使用手册。\\n程序必须定得能够供人们阅读，偶尔供计算机执行。\\n声望这个东西，问题经过漫长的时滞以后才会确立，它就像遥远星系发生的光，经过了许多光年才能被我们看到。\\n所谓”时尚“，本质上就是自己看不见自己的样子。好比我们在地球上，却感觉不到地球在动。\\n你一定要小心自己的说的话。自以为无害的言论会给你惹来大麻烦。\\n历史的常态似乎就是，任何一个年代的人们，都会对一些荒谬的东西深信不疑。\\n一种可能是，也许事情并没有这么巧合，你的观点就是从别人那里听来的，别人告诉你什么，你就相信了什么，你把别人灌输的观点当作了自己的观点。\\n有时候，别人会对你说：“要根据社会需要，改造自己的思想。”这种说法隐含的意思似乎是，如果你不认同社会，那么肯定是你的问题。你同意这种说法吗？事实上，它不仅不对，而且会让历史倒退。如果你的真的相信了它，凡是不认同社会之处，你连想都不敢想，马上就放弃自己的观点，那才会真正出问题。\\n触怒他人的言论是那些可能会有人相信的言论。我猜想，最令人暴跳如雷的言论，就是被认为说出了真相的言论。\\n当一个政治家说自己的对手是错的，这是直截了当的批评。但是，如果他不谈论对错，却使用”对种族问题不敏感“这样的标签攻击对手，那么我们就应该多注意了。\\n这样的自问自答是不是太主观了？表面上确实很主观 ，但是实际上不是，因为最先从你头脑中跳出来的想法，往往就是最困扰你、很可能为真的想法。你已经注意到它们，但还没有认真思考过。\\n很多看似叛逆的”异端邪说“，早说”潜伏“在我们的思维深处。如果我们暂时关闭自我审查意识，它们就会第一个浮出出来。\\n孩子眼中的世界是不真实的，是一个被灌输进他们头脑的假想世界。将来当孩子长在以后接触社会，就会发现小时以为真实的事情，在现实世界中是荒唐可笑的。\\n流行的首先观念不是这样，它们往往不是偶然产生的，而是被刻意创造出来的。如果有些观点我们不能说出口，原因很可能是某些团体不允许我们说。\\n我猜想，首先禁忌的最主要制造者是那些在权力斗争中略占上风的一方。你会发现，这一方有实力推行禁忌，同时又软弱到需要禁忌来保护自己的利益。\\n优秀作品往往来自其他人忽视的想法，而最容易被忽视的想法就是那些被禁止的思想观点。\\n在科学领域，质疑他人的结论和公认的假设最尤其重要的一件事，会提供巨大的科学创造的机会。\\n智力越高的人，越愿意去思考那些惊世骇俗的思想观点。这不仅仅因为聪明人本身很积极地寻找传统观念的漏洞，还因为传统观念对他们的束缚力很小，很容易摆脱。\\n训练自己去想那些不能想的事情，你获得的好处会超过所得到的想法本身。\\n与笨蛋辩论，你也会变成笨蛋。\\n自由思考比畅所欲言更重要。\\n每个时代都有自己的忌讳，如果你触犯它们，就算没有坐牢，至少也会为自己惹来麻烦，干扰正常生活。\\n讨论一个观点会产生更多的观点，不讨论就什么观点也没有。\\n人们喜欢讨论的许多问题实际上是很复杂的，马上说出你的想法对你并没有什么好处。\\n哲学家笛卡尔虽然被认为是法国人，但是他的思想大部分是在荷兰境内形成的。\\n实际上，人们脑子里有一条界线，早就认准了什么是对的，什么是错的。换言之，在他们看来，所有观点都是可以讨论的，除了那些错的观点。\\n只有保持一定的距离，才能观察到人们观念的变化，发现流行（也就是人们自以为正确的事情）到底是什么。\\n你不要让自己成为人群的一分子，而要尽可能地远离人群，观察正在发生的事情，特别注意那些被压制的思想观点。\\n如果一个命题是错的，这就是它所能得到的最坏评价，足够用来批判它了，根本不用再加上任何其他标签。但是，如果一个命题不是错的，却被加上各种标签，进行压制和批判，那就是问题。\\n小时候，每个人都会鼓励你不断成长，变成一个人心智成熟、不再耍小孩子脾气的人。但是，很少有人鼓励你继续成长，变成一个怀疑和抵制社会错误潮流的人。\\n如果自己就是潮水的一部分，怎么能看见潮流的方向呢？你只能永远保持质疑：什么话是我不能说的？为什么。\\n在计算机工业在历史上，新技术往往是由外部人员开发的，而且所占的比例可能要高于内部人员开发的技术。\\n黑客是不服从管教的，这就是他们的本性，也是美国人的本性。硅谷出现在美国，而不是出现在法国、德国、英国或日本，这绝非偶然，因为后面那些国家的人总是按部就班地行事。\\n计算机确实是非常精确、有条不紊的，但是黑客的所作所为完全出于兴趣，想到哪里就做到哪里，没有明确的计划，只求开发。\\n一个人们拥有言论自由和行动自由的社会，往往最有可能采纳最优方案，而不是采纳最有权势的人提出的方案。专制国家会变成腐败国家，腐败国家会变成贫穷国家，贫穷国家会变成弱小国家。\\n那些占据高位、本能地想要约束黑客、强迫黑客服从的人，请谨慎施为，因为他们真有可能成为千古罪人。\\n只要你控制了硬件，就能为用户提供更多的功能。如果你的产品是桌面软件，你就只能规定硬件的最低配置，无法为了某一功能而要求用户增加硬件。\\n互联网软件每时每刻都在被使用。你的代码一上线，就会经历严酷考验，bug 很快就会浮出水面。\\n早一点发现 bug 就不容易形成复合式 bug，也就是互相影响的两个 bug。\\n计划这个词，只是将构思束之高阁的另一种表达方式。只要想到好的构思，我们就会立刻着手实现。\\n如果你出错了，没有人会提醒你，唯一的代码保护机制就是你的羞耻心，你不想被同事当成傻瓜，这就够了。\\n提高软件可靠性的关键在于开发时全神贯注，而不是降低开发速度。正是因为飞行员全神贯注，他才能在夜间让一架 18 吨重的飞机以 225 公里的时速平安降落在航空母舰的甲板上，做得比小孩子切面包还要安全。\\n人数越来越多，开会讨论各个部分如何协同工作所需的时间越来越长，无法预见的互相影响越来越大，产生的 bug 也越来越多。\\n我不记得我们在 Viaweb 开过讨论如何编程的会议。在步行去吃午饭的路上，我们就能把该说的话说完，从来没有例外。\\n互联网软件是活的，每时每刻都在你的服务器上运行。\\n不要在半夜发布代码，然后回家睡觉。\\n我认为，如果公开收取软件的订阅费，而不是让用户购买软件的所有权，操作起来会更自然、更简便。\\n“订报纸模式”正是互联网软件天然的收费模式。\\n一定数量的盗版对软件公司是有好处的。不管你的软件定价多少，有些用户永远都不会购买。如果这样的用户使用了盗版，你并没有任何损失。事实上，你反而赚到了，因为你的软件现在多了一个用户，市场影响力就更大了一些，而这个用户可能毕业以后就会出钱购买你的软件。\\n创立一家公司专门开发大型机软件是一项艰巨的任务，比你自己利用晚上的业余时刻在苹果计算机上写一个东西艰巨的多。所以，只有很少几家为大型机开发应用程序的创业公司。\\n如果你现在开发桌面软件，就不得不接受微软公司的授权条款，调用它的的 API，为它那个 bug 百出的操作系统伤透脑筋。历尽了千辛万苦，你最终写出一个大受欢迎的软件，这时你可能发现，你所做的一切其实只是在为微软公司做市场调查。\\n纵观创业公司的历史，你会发现它们变得越来越小，越来越快，越来越不像正规的企业。\\n因为你能做到，所以你必须做到。这简直就是逆向的帕金森定律。\\n互联网软件提供了一种天然的途径，使得你可以用较少的人力完成较多的工作，从而超过竞争对手。创业公司对这一点应该感到心满意足。\\n如果你是一个黑客，并且梦想自己创业，可能会有两件事情令你望而却步，不敢真正开始采取行动。一件是你不懂得管理企业，另一件是你害怕竞争。可是实际上，这两件事都是没有通电的电篱笆。\\n制造简洁的产品着手，首先要保证自己愿意使用。然后，迅速做出 1.0 版，并且不断加以改进，整个过程中密切倾听用户的反馈。用户总是对的，但是不同的用户要求不一样。低端的用户要求简化操作和清晰易懂，高端的用户要求你增加新功能。\\n软件最大的好处就是让一切变得简单。但是，做到这一点的方法是正确设置默认值，而不是限制用户的选择。\\n只有懂得设计的黑客，才能设计软件，不能交给对软件一知半解的设计师。如果你不打算自己手动设计和开发，那就不要创业。\\n几个黑客搞懂如何租用办公室，或者如何雇用销售员，要比那些公司（不管大公司还是小公司）扩搞懂如何正确写出软件容易得多。\\nViaweb 被雅虎收购后，我突然发现自己在为一家大公司工作，那感觉就好像在齐腰深的水中艰难行走。\\n微软公司的恐怖之处在于，它大到可以开发任何软件，就像一座能够行走的大山。\\n创业公司其实就是解决了某个技术难题的小公司。\\n从经济学观点看，你可以把创业想象成一个压缩过程，你的所有工作年份被压缩成了短短几年。你不再是低强度地工作 40 年，而是以极限强度工作 4 年。在高技术领域，这种压缩的回报尤其丰厚，工作效率越高，额外报酬就越高。\\n承受较大压力通常会为你带来额外的报酬，但是你还是无法逃避基本的守恒定律。如果创业那么轻松，所有人就都去创业了。\\n通过创造有价值的东西而致富，这种方法的优势不仅仅在于它是合法的（许多其他方法如今都是不合法的），还在于它更简单，你只需要做出别人需要的东西就可以了。\\n要是你身处南极洲内陆，再多的钱对你也是无用的，因为没有东西可买，你真正需要的财富。\\n大多数生意的目的是创造财富，做出人们真正需要的东西。\\n通过修理一辆老爷车，你使自己更富有。与此同时，你也并没有使得任何人更贫穷。所以，这里明显不是一个面积不变的大饼。事实上，当这样观察的时候，你会很好奇，为什么有人会觉得大饼的面积无法增大。\\n在程序员看来，事情再明显不过，财富就是被做出来的，而不是某个想象出来的神秘人物分发的大饼。\\n一个有经验的程序员很可能也认为这是不公平的，因为最顶尖的 5% 的程序员写出了全世界 99% 的优秀软件。\\n人们需要的东西就是财富，治愈疾病肯定就是人们需要的东西。黑客经常开发开源软件让所有人免费使用，以此把自己的工作捐献给社会。\\n公司一切行为的目的都是盈利，从而生存下去。创造财富是大多数公司盈利的手段。\\n真正重要的是做出人们需要的东西，而不是加入某个公司。\\n工作就是在一个组织中，与许多人共同合作，做出某种人们需要的东西。\\n我认为，任何一个通过自身努力而致富的个人，在他身上应该都能同时发现可测量性和可放大性。\\n如果你有一个令你感到不安的工作，你是不会致富的，因为没有危险，就几乎等于没有可放大性。\\n乔布斯曾经说过，创业的成败取决于最早加入公司的那 10 个人。\\n团队越大，每个人的贡献就越接受于整体的平均值。\\n大公司的规模决定了它们无法快速行动，也无法测量并奖励表现优异的员工。\\n麦当劳是快餐连锁集团，它的发展依靠的就是设计出了一个快餐服务体系，可以复制到全世界每一个角落。每一家麦当劳连锁店都必须严格遵守操作规定，这使得它就像软件一样运作。\\n创业公司就像游击队一样，喜欢选择不易生存的深山老林作为根据地，政府的正规军无法追到那种地方。\\n一开始就选择较难的问题，此后的各种决定都选择较难的那个选项。\\n真正创业以后，你的竞争对手决定了你到底要有多辛苦，而他们做出的决定都是一样的：你能吃多少苦，我们就能吃多少苦。\\n创业公司不像能经受打击的黑熊，也不像有盔甲保护的螃蟹，而是像蚊子一样，不带有任何防御，就是为达到一个目的而活着。\\n一家大到有能力收购其他公司的公司必然也是一家大到变得很保守的公司，而这些公司内部负责收购的人比其他人更保守，因为他们多半是从商学院毕业的，没有经历过公司的创业期。他们宁愿花大钱做出更安全的选择，所以向他们出售一家已经成功的创业公司要比出售还在早期阶段的创业公司更容易，即使会让他们付出很多的价码。\\n缓慢工作的后果并不仅仅是延迟了技术革新，而且很可能会扼杀技术革新。只有在快速获得巨大利益的激励下，你才会去挑战那些困难的问题，否则你根本不愿意去碰它们。\\n一旦自己的财产有了保证，那些想致富的人就会愿意去创造财富，而不是去偷窃。\\n要鼓励大家去创业，只要懂得藏富于民，国家就会变得强大。让”书呆子“保住他们的血汗钱，你就会无敌于天下。\\n一个人的工作具有多少价值不是由政府决定的，而是由市场决定的。\\n人与人之间的差别并不是那么稳定的线性关系。也许 CEO 和运动员的技能与决心只比普通人高 10 倍（倍数不重要），但是人与人之间就是存在着重大差别。\\n技术的发展使得通过创造而积累财富的速度第一次有可能超过通过偷窃而积累财富的速度。19 世纪典型的富人不是宫廷朝臣，而是实业家。\\n我认识的富人朋友，与其他朋友相比，开着相同的车，穿着相同的衣服，使用同样的家具，吃着同样的食品。虽然他们的房子是在不一样的地方，或者即使与普通人在同一个社会，面积也要大得多，但是他们的生活确实与普通人是一样的。房子的建造方法也一样，屋里的东西也基本接近。拥有定制的昂贵商品反而不方便。\\n今天的人们多多少少还是有一些互相隔离的趋势，但主要是因为教育层次的差别，而不是财富的差别。\\n我想提出一种相反的观点：现代社会的收入差距扩大是一种健康的信号。技术使得生产率在差异加速扩大，如果这种扩大没有反映在收入上面，只有三种可能的解释：（a）技术革新停顿了；（b）那些创造大部分财富的人停止工作了；（c）创造财富的人没有获得报酬。\\n在一个剥夺个人财产的社会，财富创造活动中所有那些没有乐趣的事情都会急剧地放慢，乃至停顿。\\n总的来说，你要避免的是绝对贫穷，而不是相对贫穷。\\n大多数黑客是好性心很强的人，一般人往往意识不到这一点。\\n数学家诺伯特·维纳（NorbertWiener）说，如果你与奴隶比赛，你也会变成一个奴隶。\\n所谓“伟大的艺术家”，就是这个人的作品要比其他人的杰出。\\n不管每个人的工作是什么，他们内心里都有一种愿望——把自己的工作做好。\\n好设计是简单的设计。\\n当你被迫把东西做得简单时，你就被迫直接面对真正的问题。当你不能用表面的装饰交差时，你就得不做好真正本质部分。\\n好设计是永不过时的设计。\\n数学家哈代才会说：“丑陋的数学在世界上无法生存。”他的意思与飞机设计师恺利·约翰逊的观点是一样的；如果解决方法是丑陋的，那就肯定还有更好的解决方法，只是还没有发现而已。\\n如果一件东西长盛不衰，那么它的吸引力一定来自本身的魅力，而不是来自风潮的影响。\\n好设计是启发性的设计。\\n在科学领域中，总体上可以把引用次数看作对他人启发性大小的粗略指标。\\n好设计通常是有点趣味性的设计。\\n好设计是艰苦的设计。\\n解决难题的痛苦对设计师有好处，但是对付挑剔的客户的痛苦或者对付质量低劣的建材的痛苦就是另外一回事了。\\n人们常常觉得野生动物非常优美，原因就是它们的生活非常艰苦，在外形上     title: "《好的家庭教育》读书笔记",
    content: "\"这是一本相当薄的一本书，我是清明陪孩子爬山前一天，在酒店抽空看完的这本书，大概只花了两个半小时。\\n24 年读了《富爸爸穷爸爸》，觉得要提升自己的财商，因为我成长的过程中，没有人教过我。\\n读这本书的时候，我意识到，我也应该在日常教育我的两个儿子的过程中，加入财商相关的知识，教给他们这个世界是如何运转的，爸爸妈妈是如何挣钱的，让他们也要从小思考自己未来的人生选择。\\n我给孩子买了薛兆丰漫画经济学，我也要抽空将薛老师在得到的课程好好学习一下，关于经济方面的知识学习的太少了。\\n在这本书中我学习到，尽量不要给孩子买一些非生活必需品，爱玩具也不能无限制的买买买。并且时常得提醒孩子，关于物品的“产权”概念。\\n前段时间看一个富豪跟一个网约车司机的对话，网约车司机为了结婚买了三十万的车，后面也没有能挣钱的工作，开网约车，每个月挣五六千块钱，看不到希望。富豪告诉他，想要挣钱，把车卖掉，但是司机一直不理解。因为这辆车，不是财富，而是负债，因为这个负债，年轻人付出了相当大的代价。富豪说他有两千万的时候，才在出新款车型的时候，买了一辆旧款的车，并且价格都不到二十万。但是生活中，贷款买车的人比比皆是。\\n因为买车对我而言一直不是刚需，对于别人说的有车会有多方便的话，我觉得只有在回老家，交通不便利的时候才有一些用，但是我们一年也回不了几次家。所以，我甚至连驾照也没有，好在没有考驾照。因为在没听到前面的故事之前，我可能都要想买二三十万的车，但是现在我不会那么傻，就是一个代步工具，有和没有有些区别。但是买贵了，只是为了图个面子，根本就是最傻的选择了。\\n关于“传承”，作者提到应该传递价值观，而不是财富的权力。受用良多，之前从来没有想到能给孩子们带来什么有价值的东西，现在我想明白了，应该尽可能给他们传递普世的价值观。\\n笔记 一个正常的人，从一开始就应该有正确的产权观念——什么是我的，什么不是我的。是我的，我要，并且我要保护；不是我的，我不要。不能争，不能抢，不能偷，不能骗。\\n孩子的不懂事都是大人允许的，都是大人教的。\\n”怎么赚钱“是个需要终身思考的问题。而赚钱能力，也是一个人最基础的生存能力，兴趣爱好、生活幸福、自由平等、独立自主等，都建立在这种能力之上，说得正式一点，就是“都建立在经济基础之上”。\\n所谓的体面，就是做到“不是我的，我不要”。\\n到了信息时代，一个重要的趋势发生了：抽象的生产资料越来越多，越来越复杂，收益也越来越高。\\n我们的主要生产资料有两个：钱和时间。无论哪个都是极为抽象的生产资料。发展规律告诉我们：生产资料越抽象，收益可能越高。\\n若运输成本可控，生产出来的东西，卖得越远越划算。\\n组织，是突破个人能力局限的方式。个体的局限很多，而组织生产效率更高，创造的财富量级更大。所以，成为组织从来都是个体突破的重要方式之一。\\n在任何组织里，这样的人最赚钱：能够完全理解组织目标设定的人，能够在行动上采取最有效措施的人。\\n财富这个概念，如果没有积累的话就不会存在。\\n家庭是个组织，不仅家庭需要积累，家庭中的个体也需要积累。\\n懂生产的人更会发现，更会做贸易，更会组织，更会积累。\\n这世界上的物资永远是稀缺的，永远是不够的。\\n想要的得不到，是人生常态。\\n”私有财产神圣不可侵犯“是根据“物资永远是稀缺的，因此必然产生冲突”这一原则而建立的文明法则，是相当有效且意义深远的。\\n我的处理方式是告诉孩子“你喜欢，就多看一会儿吧”，以及“看差不多了就该走了”。我从来不会因为他们喜欢，就给他们买。作为家长，我只给他们买必要的东西，保障他们的衣食住行——这是父母的责任。\\n不要用童话糊弄孩子。邪不压正是肯定的，但邪恶可能猖狂很久，正义可能会迟到。童话有童话的下面意义，但我们不能依赖童话，尤其不能用童话欺骗自己的子女。\\n我认为，做决策的时候需要遵守三个原则：谁承担后果，谁做决策；共同承担后果的时候，谁执行，谁决策；共同执行的时候，最有判断力的人做决策。\\n判断力，是一切能力的核心与基础，也是最难习得的、人们最少磨炼的能力。\\n“所有的选择成本都是机会成本”。对机会成本的理解，越早开始越好。\\n绝对不做承担不了后果的决策。无论发生多坏的后果，家人都要相互支持。\\n问题总是绵延不断的，人生就是解决一个又一个问题的过程。\\n批评+建设性意见=有效意见。\\n进取型价格的人就像一片肥沃的土壤，能长出很多好东西，而固定型人格的人就像一片贫瘠的土壤，啥都长不出来。\\n无法改进，才是中途放弃的根本原因。\\n一切都靠积累，财富靠积累，技能靠积累，实力靠积累，友谊靠积累，亲情靠积累，信誉靠积累，连人品都靠积累。积累，是一切重要事务的放大器。\\n持续的积累会产生复利效应。\\n读书读多了，自然越读越快；写字写多了，自然越写越好；长期持续锻炼，不仅会让身体好，还会因为精力旺盛而让工作时间更长，工资效率更高，体力提升带来的智力变化难以估量。\\n问题需要很长时间的实践，很长时间的历练，很长时间的磕磕碰碰，最后才能像酿酒一样得到成品。\\n在 20 岁前后，一定要找到自己愿意做一辈子的事情，至少一件。\\n体力会限制脑力。一个人的精力旺盛程度，决定了他在有意义的上事情上能倾注多少时间和精力，而在一件事情上倾注的时间、精力越多，这件事就会做得越好。\\n多吃动物蛋白而非植物蛋白，尽量降低糖的摄入量。\\n判断\\u0026gt;选择\\u0026gt;努力。\\n一个好学生几乎可以在任何地方获得良好的教育。\\n判断本身并不难，想出判断方法，找出判断依据却是门学问。\\n提高判断力，是终身教育的核心内容。这辈子学任何东西都有一个辅助目的，那就是继续提升自己的判断力。也就是说，痴迷改进的我们，当然要痴迷的改进自己的判断力。\\n复杂的结果，并不一定需要复杂的设计；很多复杂的结果，更可能源自简单的规则反复迭代，而不是复杂的设计。\\n大自然就是个复杂系统，它已经被证明是发展出来的，而不是设计出来的。\\n目标适用于短期，方向适用于长期；实现目标在于执行，持续发展依赖基础；实现目标看重步骤，持续发展重视选择。\\n所以，选项设定目标是合理的，长大不能靠设计目标，要靠发展。\\n但行好事，莫问前程。\\n长期亲密关系会会大量降低沟通成本、交易成本、信任成本，以至于无限度提高效率，不管是哪方面的效率。\\n无法承诺并不丢人，承诺之后无法兑现才丢人。\\n时间跟钱一样是排他性资源，用在这里就不能用在那里。你在伙伴身上投入的时间决定了关系的质量。\\n在任何方面都一样，孩子越早理解“很多我想要的，并不是随时可以满足的”这个道理就越好。\\n我会花很多时间想，自己和孩子们在一起相处的时间里，能不能完整地完成一项任务。任何时候，完整完成一件事都是很重要的习惯，也是成年人能做给孩子看的最重要的展示。\\n不仅要做个热爱生活的人，还要以热爱生活为荣。这是习惯，也是好榜样。\\n简而言之，作为父母，更大的责任在于此生有所成就，并让自己的子女见识到。在我看来，在家庭教育中没有什么是比这个更重要的责任了。\\n所谓的“内卷”，就是把大量的时间、精力、资源耗费在事实上并没有重大意义的方面。\\n传承可以说是一切家庭教育的基础，没有它作为底层，那么上面构建的所有东西都只是海市蜃楼，虚无缥缈。\\n财富和权力的传承可能招来敌人，导致内斗，但价值观的传承，不仅安全，而且具备永恒价值。\\n随时鼓励他人的你，在遇到困难和挫折的时候，就不需要他人的鼓励了。因为你鼓励了他人太多次，早就在潜意识里鼓励过自己很多回了。\\n凡事都可以简化，简化到了极致，反而更高级。\\n做任何事都一样，通过思考“什么更重要”，找到“什么最重要”，然后优先处理并完成最重要的部分。这是提高效率的关键，也是绝大多数人终身没有学会的基础技能。\\n人的时间和精力是有限的，注意力也是有限的。要是处处都对自己严格要求，就没有足够的能量去做最重要的事情。对自己要求简单点，只在最重要的地方严格要求自己，这样就多点轻松，少点焦虑。\\n你已经是大人了，所以你得对自己的选择负责。我可以帮你，但你是为了你自己做，而不是为了满足我们的要求。\\n简单其实是快乐的源泉，因为简单保证稳定，容易持续，不容易出问题，受意外的情况影响。生活中，你很容易观察到，简单的人更乐观，反过来也一样，乐观的人更简单。\\n一切极致到最后都是效率的极致，是投入产出比的极致。事物的本质就是这么简单。\\n虚无缥缈的天赋不值得讨论。相比于专注，努力的重要性太渺小了。努力的有效性建立在专注的基础上，不专注的人再怎么努力也都是效率低下的，专注错焦点的人越努力越吃亏。\\n任何时候都一样，改善任何关系的有效方法都是先把自己变得更好更强。解决问题要找到关键。\\n所有的陪伴都应该有计划，既然你是父母，你关心他们的成长，你就必须这么做，还要做好，每次都要改进。\\n安静的环境对专注没有太大帮助，专注的能力就体现在一个人能多大程度上屏蔽外界，无论外界怎样，都无法影响一个专注的人的状态。\\n贝叶斯定理就是通过新的证据修订之前的假说的工具。\\n贝叶斯定时是通过新证据修订之前假说的工具，它可以被设计成一个可迭代的递归算法。\\n自己的事情必须自己做，自己承担后果的决策也必须自己做，每一次都应该如此，不能有例外。\\n真正的兴趣是未知的，但通过反复迭代肯定找得到。年轻的时候经常半途而废其实很正常，并且一点都不可怕。\\n\"",
    url: "https:\/\/luojiego.com\/posts\/good-family-education-notes\/"

  {
    title: "《洞见》读书笔记",
    content: "\"在樊登读书 APP 上听所有与佛教相关的书籍，唯独这本从进化心理学入手的书籍我听了应该超过十遍，正好前段时间看完了《金刚经说什么》，突然想读一下这本书了。\\n我们今天生活变化太快了，以至于进化心理留下来的痕迹往往对我们造成很多误导，也即是幻觉。印象最深刻的案例是樊登老师讲的：在北京的三环上因为别车，打架，进派出所，然后想忘于江湖。我们已经不生活在部落里面了，也不需要向别人证明我们的能力，但是上面的案例明明对彼此都没有好处，却依然时常发生。\\n通过阅读这本书，能让我们了解到幻觉是如何控制我们的，也能在出现幻觉时，让我们更加容易的看到真相，避免被控制。\\n这本书有一部分主要是在写冥想的好处，去年坚持了一段时间，平均每次大约五分钟的时间。但感觉并不好，我中止了这个习惯。因为好的习惯，是需要专注，需要努力的去达到的，若没有通过刻苦的训练，往往都没有什么效果。因为今年主要在练划船机，没有固定的时间去练习冥想，只能后面找时间训练了。\\n关于没有一个真正的“我”，这个一直都是佛家最难以理解的内容，当然我也不例外，只能慢慢去体会了。\\n笔记 佛学并不是一种盲目的信仰，而是一门特别喜欢讲道理、讲逻辑而且喜欢辩论的学问。\\n不要用佛教教义来使自己成为更好的佛教徒，用它来做更好的自己。\\n进化心理学研究的是大脑如何由自然选择设计来误导我们，甚至奴役我们的。\\n我们的大脑有很多特性，其中一个就是欺骗我们。\\n焦躁、绝望、仇恨、贪婪……尽管这些情绪和噩梦这种毋庸置疑的幻觉不一样，但是如果你仔细观察就会发现，它们都具有幻觉的构成要素。如果能摒弃这些要素，你就会拥有更好的生活。\\n佛陀传达的重要信息之一就是，我们寻求的快感会迅速消失，然后令我们渴求更多。\\n藏传佛教的冥想老师咏给·明就仁波切（Yongey Mingyur Rinpoche）曾经说过：“归根结底，幸福就是在因意识到精神痛苦而不适和被这种痛苦控制而不适之间做出选择。”\\n所谓“正念生活”就是留心、注意当下发生的事情，用清晰、直接的方式体验，不要被各种精神困惑蒙蔽。停下来，闻闻玫瑰花香。\\n人类生来便陷入了很深的幻觉，岂知佛教描绘的图景反而更加夸张。佛教认为，幻觉以微妙、更为普遍的方式渗透到日常的感知和思考中，其发挥影响力的方式超我们的想象，且看起来合情合理。\\n正如墨菲斯对尼奥所说的：“我只能给你提出门的所在。真正跨过那扇的是你自己。”\\n冥想的人最好不要想着成功，那是因为想着成功会阻碍成功。\\n在冥想中，不去追求成功反而容易成功，要取得这样的成功或许意味着不过多纠结于成功，至少不纠结世俗意义上的成功。\\n最难成为冥想者的人反而更需要冥想带来的益处。\\n我认为这种部落主义是当今时代最大的问题。在科技终于有望实现一个凝聚力强的全球社区的关头，这种部落主义可能会毁掉千年来走向全球一体化的努力，瓦解社会网络。\\n我是人类面临的最大问题的具象。我就是微观的世界顽疾。\\n我已经不再等同于这种感觉，可以说我是在客观地观察它。在那一刻，这种感觉已经不再能控制我。令人厌烦的感觉并没有消失，却已不再令人厌烦，这种情况真是奇怪。\\n接受甚至欣然接纳某种令人厌烦的感觉，可以使你与之产生一种临界距离，最终使厌烦的感觉消退。\\n我们看世界时所见的事物，并不似表面看起来那般独特、真切。\\n人们利用冥想，尝试着更清晰地看世界，在这个过程中减少痛苦，求得解放和自由，与此同时也广泛助力了人性的发展，对个人救赎的追求推动了对社会救赎的追求。\\n如果我们接受感觉的起落，认为它就是生命的一部分，而不是认为它有别的深意才去孜孜追求，结果往往会更好。\\n接近和躲避是最基本的行为决定，感觉则像自然选择的工具，用于引导生物体从自然选择的角度做出正确的决定。\\n正如在达尔文的《物种起源》问世二十五年的 1884 年，生物学家乔治·罗曼斯 George Romanes）所说：“快感和痛苦一定是伴随着对生物体有益或有害的过程而进化出来的主观产物，进化而来的目的或根源在于驱使生物体追寻一种，躲避另一种。”\\n如果感觉引导生物体走入歧途，生物体跟随感觉会走向对其不利的事物，那么就可以说这种感觉是“假的”，或者说是“幻觉”。\\n自然选择是在特定的环境下设计出我们的感觉的，在当时的环境中没有垃圾食品，能获取的食物中最甜的就是水果了。\\n很多这样的感觉被嵌入我们的血统，它们能够很好地服务我们的祖先，却不一定总能符合我们当下的利益。\\n佛陀说，愤怒有“毒根和蜜端”。\\n从自然选择的角度测算，在关乎生死的问题上，1% 的正确率值得以 99% 的错误为代价，即使在那 99% 的情况下你会感到短暂的恐惧。\\n自然选择设计大脑的初衷并非要我们看清世界，自然选择设计的大脑会产生有利于基本延续的感知和信念。\\n”环境错位“还带来了另外一种令人不悦的产物，即痛苦的自我意识。我们经由自然选择设计，会在意——特别在意——别人怎么看待我们。在进化进程中，受人喜爱、钦佩和尊重的人能够更有效地实现基本传播。\\n我母亲以前经常说：“我们如果意识到他人很少会在心里评价我们，就不会花那么多时间担忧别人对我们的评价了。\\n有可能这种焦虑正是事情最终进展顺利的原因之一，或许焦虑激励你做出了一次很好的演讲。\\n狩猎——采集时代的祖先不需要面对一屋子的陌生人，不用送孩子去一个素未谋面的家庭过夜，也不用向一群根本不认识或大部分都不熟悉的人做演讲。\\n很多困扰我们的感觉在某种意义上都是幻觉，如果你认同这种观点，那冥想就可以被看作一种驱散幻觉的过程。\\n我不能说那种感觉很好，但是我越接纳这种感觉，越是不加判断地观察它，它带来的不悦就越弱。\\n感觉出现的目的就是帮助我们狩猎-采集时代的祖先将基因传递给下一代。\\n我们由自然选择塑造，自然选择的目标是实现基因增殖的最大化，别无他求。自然选择不仅不关心真相，也不关心我们的长期幸福。\\n正如亚伦·贝克（Aaron Beck）——有时被称为认知行为疗法的创始人——所写的那样：”血统存续的代价或许就是一生的不适。“\\n或者，可以用佛陀的说法，是一生的”若“（dukkha）。而且佛陀可能还会补充说，如果你能够直面”苦“的心理原因，这种代价就是可以避免的。\\n所有的感觉都有一个共同点：它们最初被”设计“出来，就是为了说服你遵从它们。\\n感觉还会通过其他一些方面影响我们，使我们难以转劣势为优势，改变与它们的主仆关系。\\n有益的事情总是需要耗费心力才能实现。\\n思绪游荡的时候，大脑想到的往往不是当下的直接经历。\\n难的是，在不做任何事情的时候关闭默认模式网络。比如说，坐在禅室里闭上眼睛时。这也是为什么要努力专注于呼吸：大脑需要某种关注对象，使其摆脱习惯性的思维游荡。\\n标准的指导意见是，不要在这上面浪费时间，只要注意到思绪在游荡就好，甚至可以注意一下大脑思量的是什么（担忧工作、期待早餐、惋惜某一杆高尔夫打得不好），然后让注意力回到呼吸上。\\n研究还显示，有数千小时冥想经验的资深冥想者，已经完全超越我的境界，冥想时，默认模式网络会得到明显的抑制。\\n默认模式网络弱化，思绪不再游荡——这种感觉很好。有一种从喋喋不休的大脑中解放的感觉，那是一种安宁甚至尝试的安宁。\\n根据冥想传统的不同，专注的对象可以是咒语、想象中的视觉形象、反复出现的声音，或者其他任何东西。\\n习得了专注的能力才能从默认模式网络中得到解放，停止平日头脑中喋喋不休的杂音。\\n深深沉浸在每日的感觉中，可以极大限度地改变你的知觉。鸟鸣听起来会无比动听。砖石、柏油、木头等所有东西的纹理都会变得迷人。\\n闭上双眼，味觉就会发挥近乎 100% 的潜力。这样尝试的结果非常好。吃一口沙拉，慢慢咀嚼，不仅仅品味滋味，还要体味质感，这会带来将近十五秒钟的极乐感觉。\\n在第一次静修期间，有一次我在卧室里，在索引上记录着观察的结果，抬头看到了拉上的百叶窗，记下了这样一段话：”写下这张卡片的时候，太阳透过树木和幕帘，显出斑驳陆离的形状，美得令人眩晕。这种感觉好似注射了麻药。“\\n我有时候会告诉人们，经历一次长时间的冥想静修就好似做一次大脑的极限运动：它能使你的精神得到升华，也会给你带来痛苦。\\n“活在当下”尽管是正念冥想的内在组成部分，但并非这种修行的关键所在。它是达成目标的手段，并非最终的目标。\\n佛教中所谓的达到开悟，就是要摆脱使人受苦的两种并生幻觉：关乎你头脑中事情的”内在“幻觉和关乎其他事物的”外在“幻觉。\\n”正念“的日常修行——以无尽的专注观察”内在“和”外在“世界——不仅能缓和困扰的感觉，提升感知美的能力，还能慢慢地、一步一步地改变你对”外在“和”内在“真谛的认识，虽然过程崎岖，但最终也能系统化。\\n根据佛教教义，真正深刻地认识到你是无自我的（认识到没有自我）可以使你更好地理解”无我“的理念。\\n最深层次的”自我“是不存在的，但是人类语言还不足以描述最深层次的那个特别的存在。因此，从实用角度考虑，也就是出于语言习惯方面的考虑，我们不得不称之为”我“，”你“，”他“和”她“。换言之，在终极意义上，”自我“是不存在的，但是在传统意义上是存在的。\\n人们依附于情绪、思想和其他”五蕴“元素，好似这些都是私人所有。但其实不是。\\n如果你遵从佛陀的教导，摒弃平时以为已有的大量心像，你将取得突破，你对何为”人“的认识将发生巨大的转变。\\n只你当你占用牙齿，牙痛才会伤到你。\\n佛陀认为，越少评价——包括你自己头脑中的内容——就越能清晰地看待它们，也就越少被误导。\\n根据佛陀关于”自我“的理念，我对它们缺乏控制正好证明了它们并非”自我“的组成部分。一旦我遵从了这个逻辑，不再将这些我无法控制的感觉看作”自我“的组成部分，我就能从这些感觉中得到解脱，在一定程度上重新获得控制权。\\n或许这种重新定义就是走向某日体验”无我“境界的第一步。\\n学者彼得·哈维（Peter Harvey）曾写过：”那么，我们或许可以将‘自我’概念的作用类比为运载火箭，它抵抗地心引力，乘载物体上天。‘自我’的概念驱动大脑摆脱依恋个人要素（五蕴）的‘力场’。完成这项工作之后，它就‘坠落、烧毁’，变成一个无根基的概念。“\\n不要把”无我“的观念看得太重。或许，沉思之路最终会带来完全的”无我“境界的体验，你将产生一种深刻又难以言传的感觉，且开始相信”我“并不存在。\\n我们通常将”自我“与”控制“”恒常“联系在一起，但是细细体察之后，我们会发现自己受到的控制比想象中的少，而且感觉更自由，身份也更具灵活性。\\n正如宾夕法尼亚大学心理学教授罗伯特·库尔茨班（Robert Kurzban）所说：”‘你’不是总统，不是首脑，不是总理。“\\n大脑好似一片丛林，你并非丛林的国王。有个很矛盾的好消息：意识到你不是国王，可能会成为你获得真正权力的第一步。\\n科学家总结称：”支持潜意识动机和意识动机都是基底前脑的同一块区域。“\\n你以为自己是电影导演，但其实你只是个观众。或者用一种很难理解的隐喻来表达，那就是电影在导演你，除非你能从中得到解放。\\n如果我们相信自己，就有助于说服别人相信我们。向他人证明我们是始终如一、理性、有掌控力的行动者，当然是对我们有利的——或者更准确地说，对我们狩猎-采集时代祖先的基因传播是有利的。\\n从自然选择的角度来看，把自己描述成一个始终如一、理性、有自知之明的行动者，对你是有好处的。所以，当你的真实动机和你的大脑中与外界沟通的部分推动联络时，大脑的这片区域就会编造出一个合理的动机。\\n有一项研究调查了五十个人，结果发现，他们都认为自己的驾驶技术高于平均水平——可以这五十个人在参与调查之前不久都遭遇车祸，其中三分之二的人被警察认定是事故的主要责任方。\\n总体来说，我们更容易记住自己表现好的时候，忘却表现不好的时候。\\n从全球范围来看，自我夸耀还是占主流，特别是在公平、正义等伦理道理方面，一般来讲，人们都认为自己的品德高于平均水平。\\n人类学家杰罗姆·巴可（Jerome Barkow）曾写道：”我们有理由认为，自我在进化上的首要功能是作为印象管理器官，而不是大众心理学中认为的决策者。“\\n大脑是由很多专门的模块组成的，模块可以评估境况并做出反应，模块之间的相互作用塑造了你的行为。\\n模块之间的大多数互动是你意识不到的。\\n在真实的情况中，不同的大脑模块之间的交互和重叠比瑞士军刀刀片之间的交互和重叠要多，甚至比智能手机应用程序的交互和重叠还多。\\n裂脑实验的先驱加扎尼加就曾写道：”尽管模块内部有分级处理的情况出现，但是模块之间好像并没有等级分化。所有这些模块都不需要向部分领导汇报——这是一个放任自由、自组织的体系。“\\n接纳”自我没有控制权，甚至在一定意义上不存在“这个理念，可以使你的”自我“——或者某种类似的东西——掌握控制权。\\n当你通过正念关注某种感觉，将其摒弃的时候，你也摒弃了之前被认作”自我“一部分的某种东西，你一点一点地凿下了”自我“的碎片。\\n任何因忌妒而愤怒的人都可以做证，不管是忌妒时是谁控制着你的行为，但那个人肯定不是平常的你。\\n心中不怀执念地观察感觉，这样才能避免模块控制你的意识。\\n有充分的理由证明，在人类进化的过程，能够获取资源（比如食物）和更高的社会地位，有利于吸引异性。\\n这个实验再次提醒我们，模块的激活不仅不需要”意识自我“的作用，而且不需要”意识自我“了解激活过程背后的进化论逻辑。\\n有些幻觉是无害的，有些甚至是有益的。我绝对不是想要说服各位摒弃一切幻觉。总体来说，我的处世哲学就是宽以待人：如果你喜欢生活在”母体“里的感觉，那么就尽情狂欢吧。\\n那句古谚说：”禅宗适合诗人，藏传佛教适合美术家，而内观适合心理学家。“\\n思绪的列车会进站，你会看着它驶离车站，但并不会上车。\\n葛斯汀说，有一种方法就是”想象大脑中涌起的每一种想法都是身边人的“。那么你又将如何与这些想法联系起来呢？他认为，你不必与这些想法有任何联系。”想法出现和消失，就像声音一样，但与之建立的联系是我们强加上去的。“\\n模块在意识之外生出想法，然后将想法注入意识。\\n冥想时，你能够逐渐意识到……尽管你终其一生可能都认为是自己想出的想法——你想象中的’你‘想出的想法——其实更接近真实情况的是，想法俘获了你，俘获了你想象中的’你‘。\\n我们的生活就是这样，需要通过练习才能打破这种条件作用，要用正念看待我们的想法，而不是在想法中迷失。\\n我们认识了想法本质的基本智慧，就有能力选择，哪一种想法是健康的、哪一种想法不那么健康——这样的想法我们就可以摒弃。\\n正念冥想背后的一种理念——与你的感觉保持临界距离，可以使你对某一时刻何为“真的”你有更强的掌控力——在大脑模块化模型下完全合理的。\\n如果你把注意力特别集中到“无法”冥想上，那就算不上无法冥想了——因为，不管专注于正在发生的事情是什么，都算正念冥想。\\n正如 19 世纪的约翰·拉斯金（John Ruskin）所说：“好奇是一种天赋，是一种从求知中获取快乐的能力。”\\n18 世纪作家塞缪尔·约翰逊（Samuel Johnson）持有不同的观点：“好奇心带来的满足感，更多的是来自从不安中解放，而不是获取的快乐；无知带来的痛苦一重于受教带来的喜悦。”\\n好奇到底是迫切的渴望还是令人愉悦的诱惑，还要取决于这件事在自然选择定义下与我们的利益的相关程度，关联的直接性和紧迫性越低，感觉就越微妙和惬意。\\n感觉其实是一种判断，判断的对象是各种事物如何与一种动物的进化论利益关联。\\n感觉是大脑标记想法重要的一种方法，而重要性（以自然选择有些粗糙的角度）决定了哪一种想法进入意识。\\n尽管理性在人类动机中起重要作用，但是在某种意义上做决定的永远都不是理性。我们做某事，是基于感觉做出的决定。\\n正如休谟所说：“单纯的理性根本不可能成为任何意志行动的动机。”\\n毕竟，感觉是原始动机。好的感觉和坏的感觉是自然选择用于激励动物接近或躲避、获取或排斥事物的工具，好的感觉匹配进食等事情，坏的感觉匹配被吃等事情。\\n在人类进化过程中，思考对行动的作用越来越大，但是思考的起点和终点一直都是感觉。\\n研究显示，诱惑越强大，试图抗拒诱惑的人的前额叶就越活跃。\\n理性的作用并非直接抑制一种感觉，而是强化能够抑制这种感觉的另外一种感觉。\\n前额叶中嵌入的理性能力本身也受感觉的控制。感觉中嵌入的价值体系——自然选择认为的何为好、何为坏，认为的我们该追求什么，该躲避什么——大体上还是占据主导的价值体系。\\n神经科学家路易斯·佩索阿（Luiz pessoa）曾写道：“大脑’情绪‘区域会参与到认知中，而大脑’认知‘区域也会参与到情绪中。”\\n库尔茨班说，“你的意识观察辩论过程和获胜理由的原因在于’如果有人质疑你，问你为什么要做 x、y 或 z 时‘，你就能给出一个合理的理由。”\\n我们的“理性能力”从来都没有真正处于控制地位；其议题——理性对待的是什么——是由感觉设定的，它只能通过影响我们的感觉才能影响到我们的行为。\\n从足够近的角度观察感觉，能使你与这种感觉保持临界距离。感觉对你的控制放松了，如果放松到一定程度，它们就不再属于你。\\n布鲁尔称这种疗法就是不要“喂养”这种抽烟的欲望。他说：“如果你不喂流浪猫，它就不会再来到你的门前。”\\n随着时间的推移，欲望一次又一次地涌起，但都没有带来满足感，欲望就会终止。\\n我也不确定到底是哪个模块在我的脑中注入了“为什么不研究一下智能手机”这个想法——显然应该是一个喜欢获取物品的模块。不管怎样，这个模块完美地把握了想法的时机，在对写作开始感觉不舒服的时候冒了出来。模块就是这么狡猾。\\n当你用正念审视感觉时，就使得产生感觉的模块得不到奖励。\\n仇恨和注意力短暂都是自控问题，都可以通过正念来解决。\\n不要纠结有没有一个所谓的“自我”存在。只需要关注“无我”教义中有用的部分，特别是你的任何感觉——抽烟的欲望、搜索智能手机的欲望、仇恨的欲望——都并非你的内在固有组成。\\n正念冥想是增强平静激情力量、弱化暴力激情力量的一种方法。\\n我认为我们赋予了现实太多的“相”和内容，其中包含着重要但却微妙的意义，我还认为认识到这一点应该可以对我们的生活产生根本性的影响。\\n知觉不是一种消极的过程，而是一种主动的过程，是一种持续构建世界模型的过程。\\n我们喜欢编造故事，论述事物的真实面目，阐释其深层的意义。\\n或许“电锯”的内涵——还有这些内涵引发的负面感觉——使我们对这种声音产生了厌恶。\\n声音不过是声音。是我自己有了扰动。如果我不管那声音，它就不会恼到我……如果我不牵扰于那个声音，它也就不会牵扰我。\\n从某种意义上讲，如果声音令人不悦，肯定就是你对它做了加工。\\n我们在故事上一层又一层地构建故事，而问题就出在作为根基的故事上。正念冥想正是一种细致检视故事的工具，使我们能够将真相与编造的故事区分开来。\\n冥想一方面可以弱化感知和想法之间的联系，另一方面可以淡化通常伴随感知和想法出现的感觉、情感共鸣。\\n人们倾向于在几乎所有类型的事物上附着积极或消极的联系。\\n这样看来，扎伊翁茨是对的，人类就是无意识的评判者。我们倾向于给名词分配一些形容词，有意的或无意的、明确或隐含的都有。\\n大脑中负责给事物分配感觉的机器，原本是设计来实现基因传播最大化的。\\n任何从自然选择角度来看值得注意的事物，理论上讲都会引发感觉。\\n之所以能够得到平静，都是因为意识到事物并非你所想象的模样。\\n根本没有纯粹的快感，所有的快感都是受你的信念左右。\\n布鲁姆认为，我们的快感在某种意义上比我们想象的更深奥：“快感总是有深度的。”\\n事物伴随着故事而来，不管故事的真假，它都塑造了我们对事物的感觉，由此也塑造了事物本身，给了事物我们所感知的全貌。\\n从进化论的角度来看，人们赋予他人本质的原因，与人们赋予其他事物本质的原因是相同的。\\n“归因”一词意指某人行为是倾向于“性格”因素——换言之，就是某人是个怎样的人——还是“情境”因素，比如他们是否恰好要演讲迟到了。“错误”一词意指这些归因经常是错的，我们倾向于低估情境的影响，高估性格的影响。换言之，我们偏向了事物本质的影响。\\n我之所以把自己排除在外，是因为我知道自己是在压力达大的情况下才出现不当行为的，做坏事的并不是“真正的我”。但是换作他人，我就不太会思考这种可能性。这正是基本归因错误：我将他们的行为归因为性格，而不是情境；我认为恶可以追溯到他们自身，而不是环境因素。\\n为什么人脑要这样设计，在评判他人时忽视或视情境因素的影响？首先要记住，自然选择设计人脑并非要我们准确地评判他人，而是要引导人们做有助于本人基因传播的交流。\\n宣扬你的敌人是坏人也是合理的，因为你越多损害他们的身份，他们就越难伤害到你。\\n自然选择给了我们爱、怜悯和得利他的能力，这是非常好的，但这并不意味着我们就要完全接受自然选择的引导，分配宝贵的资源。\\n道德角度来看，冥想修行的影响，不仅仅体现在你本来就爱的人身上，这个问题甚至都不是核心的问题。\\n摒弃事物中的部分本质，很可能使你成为一个更好的人，但并不能确保你成为一个更好的人。\\n但是我要说，依我的经验，我认为，持续佛学修行，可以丰富情绪，使人的情感就得更敏锐，使人变得更幸福喜乐。我认为，一个人对待世界的方式可以更自由、更快乐、更喜悦。\\n不给事物归因太强的本质，正是自由的源头。\\n伟大的美国心理学家威廉·詹姆斯（William James）曾写道：“个人所谓的’我‘和’我的‘，二者之间的界限很难划定。”就此他观察到：“我们的近亲也是我们的一部分。我们的父母、我们的妻子和儿女都如我们的骨肉。他们死去时，我们的一部分也随之而去。”\\n我们对自我及其界限的本能认知具有随意性。\\n坏消息是你不存在；好消息是你便是一切。韦伯针对这段话向我做了阐释：“如果你什么都不是，如果你消失了，你就可以是一切。但是如果你不能什么都不是，就不能成为一切。从逻辑上讲就是这样的。”\\n一切事物都缺乏自性，都缺少独立存在性。\\n事实上，生物体被看作统一的整体，原因之一就是各个组成部分之间的互相依赖性太强，如肾脏、肺等等。\\n我们有理由认为，这种基本的佛教-印度教思想——自我的界限其实并非界限——可以导致善行。\\n阿巴哈瑞说，“贪爱”毫无疑问与自我的感觉联系在一起，因此，克服贪爱便可与无我体验相联系。\\n爱不仅增强了诱惑性事物的吸引力，还强化了恼人事物令人厌恶的程度。\\n加里·韦伯曾尝试向我描述他的意识状态（显然是一种几乎没有自我或本质的状态）：“在那个空间里，你想象不出加入什么东西可以改善它，也想象不出拿走什么东西会使它变得更好。”他的描述基本就是贪爱的反面。在贪爱的预设下，事物总可以通过什么拿走些什么或加入些什么而变得更好。\\n佛教中的“有为法”皆为因缘和合。\\n我们通过感官器官感知到的事物，往往都附着了感觉，虽然有时只是细微的感觉。\\n如果一个人有意识地正念思考感觉的本质，理解了感觉的真面目，不屈服于渴求，不屈服于对快感的渴望，这个人就能避免渴求结晶固化。\\n人类的大脑是自然选择设计的机器，对感官输入冲击的反应差不多是反射性的。从某种意义上讲，大脑的设计就是要它受输入信息的控制。而控制这台机器的关键就是伴随输入信息产生的感觉。如果你以贪爱处理这些感觉——自然、反射性地渴望令人愉悦的感觉，自然、反射性地抵触令人不悦的感觉——你将继续被周围的世界控制。但是，如果你能以正念审视这些感觉，而不是简单地响应，就能在某种程度上摆脱控制。你可以抵抗平常塑造行为的因，从而接近“无为法”的境界。\\n斯蒂芬·巴彻勒（Stephen Batchelor）长期宣扬“世俗佛教”，著有《没有信仰的佛教》（Buddhism Without Beliefs），他曾写道：“根本就没有无为法，只不过存在不受某种事物局限的可能而已。”\\n巴彻勒说冥想练习带来世界的再魅化。\\n还记得佛陀强调我们自认为的身体部分的无常吗？不断升起、来去的想法，情感和态度，这些也都是施于我们身上、引发我们内部各种连锁反应的力量不断变化的结果。我们的内心受因缘左右——因缘变，随之而变的是“有为法”。而因缘几乎无时无刻不在变化。\\n佛教意义上的开悟与西方科学意义上的启蒙是有共同点的：都是更多地意识到什么因带来什么果。\\n正念冥想可以助力你以前所未有的全新感知方式体验愤怒、爱、忧伤和喜悦等情感，看到它们的质地，甚至感觉到它们的质地。之所以能够做到这一点，一定程度上是因为你没有做判断——你没有刻意去给感觉打上坏的或好的标签，没有逃避感觉或积极渴求它们。因此你能够靠近这些感觉，但同时又不至迷失其中，你可以专注于它们带来的真实感受。\\n平常的生活就是一场幻觉，刺破幻觉，看到事物的本想，你才能得到真正的自由。\\n从外在无我体验视角来看，反抗自然选择这些暴君的价值观，似乎确实能够在一定程度上实现日常概念中的开悟：使我们更近于看到相对真实的世界。\\n我们的直觉认为事物具有本质，如果这种直觉确实受到我们对这些事物的微妙感觉的影响，那么对这件事本身就应该激起对这种直觉的质疑。\\n如果你真正彻底地遵从爱因斯坦的方法——如果你超脱自我的视角，以无源之见看事物——本质就会消失，同时消失的还有最初创造本质的感觉。\\n还便是感觉的影响，在我们探讨感觉塑造本质的作用时尤为突出：它们可以极为巧妙地提供判断，我们根本未曾意识到是感觉提供的判断，我们以为自己的判断是客观的。\\n从爱因斯坦认为的最真实的视角——没有特定视角——来看，感觉根本不存在，本质也就同时不存在了。\\n你观察现实时，任何为了将基因传递给下一代而进化出的人类或其他物种的感觉，都不能左右你。你要像爱因斯坦一样，得到无源之见。\\n自然选择就是要创造许许多多不同的视角，每一种的成形从根本上讲都遵从一种原则：它比与之相抵触的视角更真实，没有另一种视角天然具备对这种真相的意识，而对其荒谬性的意识则更淡漠。佛教开悟就是要超越所有这些视角。\\n人类在现实扭曲力场的影响下行动，这些力场以很多微妙的方式控制着我们，使我们相信我们和我们拥有的一切是正义的一方，我们的本性是好的，一旦我们偶尔做了坏事，也并非“真实的我们”的体现；然而他们和他们所拥有的则不是正义的一方，本性也不是好的，即使他们偶尔做了一件好事，也并非“真实的他们”的体现。更糟糕的是，这些现实扭曲力场经常会放大，甚至凭空捏造他们和他们所拥有的所造成的威胁。\\n虽然我们不能理解所有现实的真相，并一生保持这种理解力，但我们可以理解一些现实的边角真相，并短暂保持这种理解力。\\n或许最好的解释是开悟和解放二者互相强化：你从痛苦中解放出来的事情做得越多，看事物就越清明；你看事物越清明，就越容易从痛苦中解放出来，这也将使你获得更清明的远见。\\n我们不需要去爱敌人，但清醒地认识他们是至关重要的。\\n想要清醒地认识敌人，就要抵制恐惧和嫌恶，但不仅于此，还要超越更微妙的感知和认知扭曲，而这种扭曲深深隐藏在更微妙的感觉中。\\n佛教和基督教都认为我们生而道德混乱，驱散这种道德混乱便是二者的目标之一。\\n詹姆斯说，从最广泛的意义上讲，宗教可以看作“信仰一种存在，它有不可见的秩序，我们的至善在于就此秩序和谐地调整自身”。\\n达摩既是关于事物本相的真相，也是事物如何顺应自然合理而为的真相。它既是症状也是药方，既是真相也是方法。\\n事实上，达摩可以看作两层意义上的自然法则，一方而是实体宇宙遵循的自然法则，另一方面是我们努力遵守的道德法则。\\n我认为，建立在真相基础上的幸福，比没有这个基础的幸福更好——不仅是因为建立在真相基础上的事物比其他有更牢靠的根基，还因为依照这些想想行动，恰好意味着对同类更友善。\\n\"",

    title: "《影响人类历史进程的 100 名人排行榜》读书笔记",
    content: "\"回想高一的时候，我无任何学习的心思，下学期的其中考试，地理+历史+政治总共考了 90 分，而我的同桌一本地理 95 分。\\n一直以来，对中国历史的朝代更替搞不清楚，对外国著名事件或者人物发生的大概时间也没有什么概念，这本书对我这个历史渣而言简直就是一本阅读指引。\\n作为一个中国人，我肯定会觉得中国人在这份排名中的占比太少了。而且就我个人感觉，老子的排名太靠后了，作者有提到对于某些历史人物是否真正存在存疑，这个有可能是导致老子排名比较靠后的一个原因。\\n书中提到的许多历史人物，往往不是某个物品/概念的创造者，他们只是在原有的基础做出了改进，让其变得实用，从而使大众受益。创造对于普通人而言太难了，但是通过日积月累对某些东西做出改进还是容易实现。日常生活中，用心去思考如何逐步优化各种痛点，借助 AI，兴许我们就能对人类做出属于自己的贡献。\\n阅读书籍的过程中，我也对宗教有了比较深入的了解，原来历史上流血最多的战争，其实是宗教战争。但好在中国这片土地上，因为宗教引发的战争没有那么国外那么疯狂。\\n同样，我也了解过，真正的莎士比亚竟然身份有这么多的疑问，我还以为这个名字是真名呢。\\n人物表 排名 姓名 生卒 原因 1 穆罕默德 约 570~632 创立伊斯兰教 2 牛顿 1642~1727 诸多科学发现以及精准阐述 3 耶稣基督 公元前 6~30 基督教的创立者 4 释迦牟尼 公元前 563~公元前 483 佛教的创立者 5 孔子 公元前 551~公元前 479 中国儒家学说的创立者 6 保罗 4~64 继耶稣之后，将基督教发扬光大 7 蔡伦 ？~121 造纸术的发明者 8 谷登堡 1400~1468 印刷术的发明者 9 哥伦布 1451~1506 发现了美洲大陆 10 阿尔伯特·爱因斯坦 1879~1955 狭义相对论、广义相对论等 11 巴斯德 1822~1895 巴氏消毒以及人体接种 12 伽利略 1564~1642 望远镜以及科学发现等 13 亚里士多德 公元前 384~公元前 322 古代史最伟大的哲学家和科学家 14 欧几里德 公元前 450~ 公元前 374 《几何原本》 15 摩西 公元前 13 世纪 政治人物，犹太教《圣经》作者等 16 达尔文 1809~1882 进化论、自然选择 17 秦始皇 公元前 259~ 公元前 210 统一中国并奠定了后续中的统一形态 18 奥古斯都 公元前 63~公元 14 政治家，奠定了罗马的未来 19 哥白尼 1473 ~ 1543 日心说 20 拉瓦锡 1743 ~ 1794 化学学科的祖师爷 21 君士坦丁大帝 280 ~ 337 进一步加快基督教发展历程 22 瓦特 1736 ~ 1819 改良了蒸汽机 23 迈克尔·法拉第 1791 ~ 1867 发明了电动机 24 麦克斯韦 1831 ~ 1879 精确描述电磁场的行为与互相作用 25 路德 1483 ~ 1546 将《圣经》译成德文 26 乔治·华盛顿 1732 ~ 1799 美国第一任总统，品德高尚 27 卡尔·马克思 1818 ~ 1883 社会主义学说的奠基人 28 莱特兄弟 Orville Wright 1871 ~ 1948; Wilbur Wright 1867 ~ 1912 飞机的发明者 29 成吉思汗 1162 ~ 1227 短暂统治过世界上大部分区域 30 亚当·斯密 1723 ~ 1790 经济理论发展开拓性人物 31 爱德华·德·维尔 1550 ~ 1604 ”威廉·莎士比亚“ 32 约翰·道尔顿 1766 ~ 1844 将原子假说引入主流科学 33 亚历山大大帝 公元前 356 ~ 公元前 323 古代世界最著名的征服者 34 拿破仑·波拿巴 1769 ~ 1821 30 岁就成为法国的统治者，制定了《拿破仑法典》，意义深远 35 托马斯·爱迪生 1847 ~ 1931 发明大王，让电灯走进了普通家庭 36 安东尼·范·列文虎克 1632 ~ 1723 在水中发现了微生物，发现了一个未知的世界 37 威廉·莫顿 1819 ~ 1868 将麻醉方法引入了外科手术 38 马可尼 1874 ~ 1937 无线电的发明人 39 希特勒 1889 ~ 1945 第二次世界的始作俑者 40 柏拉图 公元前 427 ~ 公元前 347 西方政治哲学家，许多道德观察和形而上学的奠基人 41 克伦威尔 1599 ~ 1658 英国功名显赫的军事领袖 42 亚历山大·贝尔 1847 ~ 1922 电话的发明者 43 亚历山大·弗莱明 1881 ~ 1955 青霉素的发现者 44 洛克 1632 ~ 1704 英国著名哲学家，首位集民主立宪思想之大成者 45 贝多芬 1770 ~ 样重要，穆罕默德通过《古兰经》传播他的思想。他对伊斯兰教的影响，超过耶稣和圣保罗两个人加起来对基督教的影响。\\n牛顿是有史以来最伟大、最有影响力的科学家。他于 1642 年圣诞节那天在英格兰的伍尔斯托普。这年正是伽利略去世的前一年。\\n17 世纪中叶是一个孕育伟大科学的时代。在这个世纪初，望远镜的发明已经使整个天文学研究发生了革命性的变化。英国哲学家弗朗西斯·培根和法国哲学家笛卡尔极力向全欧洲的科学家呼吁停止对亚里士多德权威的依赖而依靠他们自己的实验和观测。\\n牛顿公布的第一项发现是他在研究光的性质上的具有突破性的工作。经过一系列精心的实验，牛顿发现普通的白光实际是构成彩虹的所有颜色组成的混合光。他还仔细分析了光的反射和折射定律的结果。\\n牛顿不仅阐明了这些力学定律，而且他本从还亲自运用微积分等数学工具，示范了如何应用这些基本定律解决实际问题。\\n莱布尼茨并不是牛顿的朋友，他们之间曾有过非常激烈的争论。他写道：“从世界的开始直到牛顿生活的时代为止，对数学发展的贡献绝大部分是牛顿做出的。”\\n伟大的法国科学家拉普拉斯写道：“《原理》是人类智慧的产物中最卓越的杰作。”\\n拉格朗日经常说牛顿是有史以来最伟大的天才。而马赫在 1901 年时写道：“所有自他那个时代以来在数学上所取得的成就，只是建立在牛顿定律基础之上的关于力学在演绎上、形式上和数学上的发展。”牛顿的伟大成就的关键或许是：他面对的科学是一堆孤立的事实和定律，可用来描述某些现象但几乎不能预测任何东西，而他留给我们的一个统一的定律体系，它可用来解释众多的物理现象，也可用作精确的预测。\\n科学发现不仅带来了技术上和经济上的革命，它还完全改变了政治和宗教思想，艺术和哲学。\\n西方学者普遍认为，上座部是古代佛教的主流，最接近释迦牟尼的原始思想。\\n在中国情况也是如此，虽然很多人不认为自己是佛教徒，然而他们的思想却深受佛教哲学的影响\\n孔子把“仁”和“礼”视为道德的最高原则，它规范着高尚者的行为。“仁”在有些时候可以解释为“爱”，但我们最好将它理解为对人类的关心。“礼”是道德、礼节、规矩、传统等观念的总和。\\n儒家学说强调的是个人服从，而不是个人权力。\\n保罗对基督教学产生了无法估量的影响，他的思想可概括为：耶稣不仅是人类的告知，而且确实是神。他为我们的罪过而死，他以自己受难来拯救我们。\\n谷登堡的贡献，不仅是发明了铸字盒、印刷机，而且还提出了一套完整的生产程序。\\n谷登堡的近代印刷术出现之后，欧洲科技发展迅速，中国的发展却处于停滞状态，原始的印刷技术在中国使用了相当长时间。\\n本排行榜的衡量标准不是道德是否完善，而是对人类历史影响的大小。因此，哥伦布应被排在本排行榜的显著位置。\\n通过否定有任何绝对的时间，爱因斯坦的理论引起了科学思想上的革命。\\n爱因斯坦探索的结果之一就是，广义相对论被公认为最优美、最优雅、最强有力、理智上满足所有科学理论的科学学说。\\n不仅仅是他的光电定律具有重要的实际应用，而且他的光子假说对于量子理论的发展也有重要的影响。光子假设今天已成为量子理论不可或缺的一部分。\\n牛顿墓碑上的墓志铭更合适用在爱因斯坦身上：”让生灵欢呼吧，为人类曾出现过这样辉煌的人物！“\\n病菌可以通过食物和饮料进入人体。巴斯德发明了一种消灭饮料中微生物的技术（被称为巴氏消毒法）。这一技术在它被使用的地方几乎清除了所有成为感染源的被污染的牛奶。\\n巴斯德本人最为著名的成就是发明了一项对人体进行预防接种的技术。\\n伽利略因发明望远镜并由望远镜带来的一系统发明变得知名。\\n伽利略的重要性部分是根据的科学发现，如惯性定律，发明望远镜，对天体的观测，以及他对哥白尼假说的天才证明。\\n亚里士多德是世界古代史上最伟大的哲学家和科学家。他创立了形式逻辑家，丰富和发展了哲学的各个分支学科，对科学做出巨大的贡献。\\n亚里士多德的著作所表述的观点是，人类生活及社会的每个方面，都是思考与分析的客体；宇宙万物不被神、机会和幻术所控制，而是遵循着一定的规律运行；人类对自然界进行系统而深入的研究是值得的；我们应当通过实验和逻辑分析，得出自己的结论。\\n亚里士多德对世界的贡献之大，令人震惊。他至少撰写了 170 种著作，其中流传下来的有 47 种。\\n在哲学方面，亚里士多德最大贡献在于创立了形式逻辑学这一重要分支学科。\\n伊斯兰世界最重要的思想写阿威罗伊，将伊斯兰的传统学说与亚里士多德的理性主义整合成自身的思想体系。\\n亚里士多德在研究方法上，习惯于对过去和同时代的理论持批判态度，提出并探讨理论上的盲点，使用演绎法推理，用三段论的形式论证。\\n《几何原本》作为教科书使用了两千多年。在形成文字的教科书之中，无疑它是最成功的。\\n我们不清楚为什么科学产生在欧洲而不是在中国或日本。但可以肯定地说，这并非偶然。毫无疑问，像牛顿、伽利略、哥白尼和凯普勒这样的卓越人物所起的作用是极为重要的。也许有一些基本的原因，可以解释为什么这些出类拔萃的人物都出现在欧洲，而不是东方。或许，使欧洲人易于理解科学的一个明显的历史因素，是希腊的理性主义以及从希腊人那里流传下来的数学知识。\\n中国人对实际的几何知识理解得不错，但他们的几何知识从未被提高到演绎体系的高度。\\n今天，摩西成了犹太教徒、基督教徒和穆斯林共同拥戴的人。感谢现代传播媒介，它使摩西的名字在今天较之以往任何时刻，都更为响亮。\\n达尔文并不是进化论的创始人。\\n达尔文的伟大贡献在于，他不仅提出了自然选择这一作用过程，通过这一过程进化可能发生，而且用了大量具有说服力的证据来支持他的假说。\\n我们现在所理解的进化论，整合了达尔文的自然选择学说和门德尔的遗传定律，它比由达尔文提出的理论要完善得多。\\n在西方，人们常把秦始皇与拿破仑相提并论，也许，秦始皇与罗马帝国的创建者恺撒相去甚远。大体说来，罗马帝国与秦统治时期的人口、面积差不太多。但罗马帝国统治时间比秦短，恺撒死后，帝国分崩离析。秦王朝则不然，这是秦始皇独具影响力的原因。\\n奥古斯都的与众不同之处在于，他在历史上树立了一个有能力的、仁慈的独裁者的榜样。他是一个位真正的政治家，他的和解政策成功地抚平了内战所造成的创伤。\\n奥古斯都奠定了罗马的未来，他对人类历史的影响深远而广大。\\n哥白尼从来不是专业的天文学家，给他带来巨大声誉的天文学著作是用业余时间完成的。\\n旅居意大利期间，哥白尼了解了古希腊萨摩斯的哲学家阿里斯塔克斯（公元前 3 世纪）的思想，即地球和其他行星是围绕太阳运行的。哥白尼确信这一思想是正确的。\\n在书中哥白尼准确地指出地球及其他行星绕太阳转动。但是，他同前人们一样，大大低估了太阳系的大小。同时，他还错误地认为行星的轨迹是圆形或卵形的。这样一来，他的理论不仅在数学上复杂起来，而且是不精确的。尽管如此，他的书还是迅速引起了人们极大的兴趣，同时也激起了其他天文学家更准确地观测行星的运行。这其中最知名的是丹麦天文学家第谷。正是从第谷积累的观测数据中，约翰尼斯·凯普勒推导出了正确的行星运动定律。\\n哥白尼的书是伽利略和凯普勒两人的工作不可或缺的序幕。而这两人又成为牛顿的主要先驱。\\n历史地看，《天体运行论》的出版不仅是现代天文学的起点，而且是现代科学的开始。\\n首先，拉瓦锡说，燃素理论是完全错误的，根本就不存在像燃素这样的物质。燃烧过程是由正在燃烧的物质同氧气间的化学结合构成的。第二，水根本不是基本元素而是氢和氧的化合物。空气也不是基本元素，而是主要由两种气体即氧气和氮气组成的。\\n拉瓦锡是第一个明确阐述化学反应中质量不灭定律的人。\\n拉瓦锡坚持仔细衡量进行化学反应的化学品重要的重要性。这种做法使化学成为了一门精密的科学，并为后来化学的大多数进步铺平了道路。\\n伟大的数学家拉格朗日说：”砍掉他的头仅需片刻，但 100 年中也不会再产生一个像他那样的人。“\\n君士坦丁从未把基督教定为国教，然而他的立法以及其他一些政策却是鼓励该教的发展。在他统治期间，信奉基督教成了晋升国家高级职位的一个重要途径。\\n在仅仅一个世纪的时间里，基督教从一个小的宗教团体，演变而成在地球上最大的帝国内具有主宰地位的宗教。\\n瓦特对纽科门型蒸汽机的改造意义重大，以至于可以公正地认为，瓦特是第一个实用蒸汽机的发明者。\\n从实践中看，这种效率的提高，表明了一种精巧但不实用的装置和一种具有工业用途的设备之间的区别。\\n事实上法拉第发明的是世界上第一台电动机，第一个利用电流使物体运动的装置。\\n正是法拉第将磁力钱和电力线这一重要思想引入物理学中。通过强调重要的不是磁本身而是它们之间的场，法拉第为包括麦克斯韦方程在内的许多物理学上的进步提供了准备。法拉第还发现，如果极化光通过磁场，它的极化强度可能会改变。这一发现意义非常重要，因为它首次指出了光与磁之间的关系。\\n在麦克斯韦的有 4 个简短的方程的方程组里，麦克斯韦能够精确描述电磁场的行为和相互作用。\\n麦克斯韦方程最大的优点是，它是一组通用方程，可以适用于所有环境，所有已知的电磁学定律都可以从麦克斯韦议程中推导出来。\\n麦克斯韦通常被认为是牛顿和爱因斯坦之间最伟大的理论物理学家。他的辉煌生涯过早地结束了，1879 年，在他 48 岁生日之前，他死于癌症。\\n路德最伟大的功绩之一，是把《圣经》译成德文，使任何一个有阅读能力的人都可以不依赖教会或者神父，直接阅读该书。\\n宗教改革以后，许多国家接受了宗教自由的思想，人们可以自由地思考其他问题。\\n路德并不是完人。虽然他抗议教廷的权力，他自己却不能容忍与他意见相左的人。也许这是由于德国的宗教战争比英国及其他国家的更为残酷。此处，他极为憎恶犹太人，他的那些语气强硬的反对犹太人的著作，为 20 世纪德国出现希特勒时代铺平了道路。\\n华盛顿是美国第一任总统。由他这样人员高尚的人担任美国首任总统，实在是美国人的幸运。\\n对于华盛顿来说，无论是在战争中，还是在和平时期，他都起了至关重要的领袖作用，如果没有他，任何政治运动都不可能成功。\\n马克思的著作构成了共产主义和近代社会主义理论的基础。马克思去世时，没有任何一个国家将他的理论付诸实践。然而，一个世纪之后，共产主义国家在很多地区建立，如中国、俄国。\\n总体来说，马克思主义运动强调以下四个观念：\\n世界上只有少数人过着奢侈的生活，而大多数劳动者生活在相对贫穷的状态； 改变这种不公平现状的途径是建立社会主义制度，生产资料归政府所有，而不是归个人所有； 大多数情况下，建立这种制度的唯一可行的办法是通过武力夺取政权； 为了维护社会主义制度，应当相当长的时间内，坚持无产阶级专政。 马克思逝世一个世纪之后，信仰马克思主义的人数已超过 10 亿。这个数字超过人类历史上持任何一种信仰的人数。这一事实使许多共产主义坚信，马克思主义将在全世界赢得最终胜利。\\n很多以前的飞行器设计者主要考虑的是如何使飞行器离开地面飞起来。莱特兄弟认识到最大的问题应是在空中如何控制飞行器。\\n几百年来，人们梦想能飞上天空。但实际上，他们认为阿拉丁所乘坐的”飞毯“只是一个不可能在现实世界中存在的梦想。莱特兄弟的天才创造，把人类过去的梦想从神话变成了现实。\\n我们可以公正地说，《国富论》是现代政治经济学研究的起点。\\n斯密反对旧有的重商主义理论，该理论强调国家拥有大量黄金的重要性。同时，他也拒绝了重农主义的观点，该理论认为土地是价值的重要来源。\\n《国富论》的中心思想是，看似混乱的自由实际是一种自我调控机制，它能自动倾向于以最合适的数量生产那些社会最欢迎和最需要的产品。\\n在《国富论》里有一段典型的话：”同业中人难得一聚，而他们的谈话或是在反对公众的阴谋中，或是在以抬高价格的愉快讨论中结束。“\\n斯密关于反对政府干预经济与商业事务，以及崇尚低关税及自由贸易的论点对整个 19 世纪的政府政策具有决定性的影响。的确，他对这些政策的影响今天仍然能够感觉到。\\n艺术是促成社会相互联系的黏合剂。艺术是已存在的每一种人类文明的不可缺少的组成部分，这不偶然的现象。\\n艺术将我们同我们的灵魂联结起来；它表达了我们内心最深处的情感并为我们证实这些情感。\\n道尔顿如此令人信服地提出了他的理论以至于在 20 年内大多数科学家都采纳了这一理论。而且化学家们遵循他书中建议的步骤：精确测定原子的相对重量；通过重量来分析化合物；测定包含每一种类分子的精确的原子组合。这一步骤的成功的的确确已使它流行开来。\\n在很长一段时间里，亚历山大最重要的影响是希腊文明和中东文明之间发生密切的接触，因而极大地丰富了这两种文化。\\n然而其中有一项改革的影响却命中注定要远远超越法国国界。这就是法国民权法典，即著称的《拿破仑法典》。这部法典在很多方面将法国大革命的思想具体化。\\n衡量一个将军是否伟大的标准之一是看他避免错误的能力。\\n希特勒的动机大部分来自一种非常可怕的信念；与希特勒不同，拿破仑仅仅是一个野心勃勃的机会主义，对于恐怖屠杀没有什么特别的兴趣。\\n据认为拿破仑时代在法国大革命时代建立起的变革提供了制度化的保障，并为法国资产阶级巩固阵营维护其既得利益提供了时间。\\n拿破仑无疑并不是惟一对出售踢易斯安那负有责任的人。很显然美国政府也发挥了良好的作用。但法国提供的这样一笔交易很可能是任何一届美国政府都愿意接受的，而法国政府售卖路易斯安那的决定仅仅是拿破仑个人的随意判断。\\n爱迪生并不是第一个发明电灯的人。在此之前的几个电弧灯已用于巴黎街道上的照明。但是爱迪生的电灯与由他发明的电力分配系统相结合，使普通百姓都可以使用它。\\n爱迪生首创了现代化的、设备良好的研究实验室。在那里很多人像一个团队一样在一起工作。尽管他不可能为此获得专利，但这是他最重要的一项发明。\\n爱迪生大半生忍受着失陪的痛苦。但他惊人的毅力极大地弥补了这一缺陷。\\n爱迪生的许多专利是对别人的发明进行改革，而那些原来的发明实际上已是相当实用的东西了。\\n列文虎克是位极其耐心和细致的观察者。他拥有一又敏锐的眼睛和无限的好奇心。借助于那些精致的透镜，他观察了数量繁多的各种各样的物质，从人的头发到狗的精液，从雨水到小昆虫，以及肌肉组织、皮肤纤维和许多其他的标本。他将他观察到的东西细心地记录下来，并绘制了精细的观察图。\\n列文虎克最伟大的发现发生了 1674 年，他第一次观察到了微生物。这是人类历史上导致人类取得重大进步的伟大发现之一。在一小滴水中，列文虎克发现了一个完整的新世界，一个完全未知的新世界，它充满了生机——尽管此时他还没有明白这个新世界对从类是多么的重要。\\n列文虎克的发现是技巧和努力工作结合的结果，这与仅仅靠运气恰恰相反。\\n莫顿在 1846 年 10 月的那个早晨所做的关于一种实用麻醉方法的公开表演，是人类历史上伟大的分界点之一。关于莫顿的成就，可能没有什么总结能比他墓碑上的墓志铭说得更好：”威廉·莫顿，麻醉剂吸入法的发明人和揭示人，由于他，外科手术中的疼痛被防止和消除；在他之前外科手术总是极度痛苦的事，自他以后科学控制了疼痛。“\\n一个外国人（希特勒生于奥地利，不是德国人），既没有政治经验，也没有资金和政治背景，居然能在不到 14 年的时间内，当上了当时世界上一个主要大国的首脑，这的确是一件不可思议的事情。他作为一个鼓动者的能力也超乎寻常，他也许是历史上最能言善辩的人。最后，他的残忍不会被人们遗忘。\\n公元前 399 年，70 岁高龄的苏格拉底被指挥腐蚀雅典青年的灵魂，交被处以死刑。柏拉图称苏格拉底是”我所看到的世界上最智慧、最公正、最杰出的人“。\\n柏拉图认为最理想的社会形态是贵族国家。他所指的不是世袭的，或是帝王式的国家，而是讲求资格和才能的国家。这个国家的权力掌握在最杰出的、最聪明的人手中。这些人不是公民投票选出的，而是根据一定的原则挑选出来的。统治阶层或管理阶层，应允许其他人，依据能力和资格，进入他们的行列。\\n为了保证机会均等，柏拉图建议国家让所有的儿童接受教育。儿童应当首先接受体能训练，但不应忽视音乐、数学及其他学科。\\n只有那些能够把所学知识运用到实际工作中的人，方能进入管理阶层。\\n柏拉图的思想对美国也产生了影响。美国宪法中许多条目与柏拉图的政治理想相似，它试图尊重民意，让最杰出的、最优秀的人掌管国家。\\n克伦威尔在任期间，依靠军队进行统治。实际上，他是一个军事独裁者。但是，他曾几次进行民主实践，甚至拒绝加冕。这表明，实行军事独裁并不是他的初衷，其实他是想建立一个有效率的政府。\\n民主制为法国启蒙运动和法国大革命发生、以及民主制在欧洲最终得以确立的重要因素。它同样为美国以及一些英联邦国家，如澳大利亚、加拿大等国建立民主制树立了榜样。虽然英国在世界上所占领土很小，但民主所传播的范围却极为广大。\\n青霉素的发现极大地激发起寻找其他抗菌素的热潮，并导致发现了其他许多种”灵丹妙药“。便青霉素仍然是使用最广泛的抗菌素。\\n青霉素的另外一个优点是治疗时使用量的安全系数很大。5 万单位剂量的青霉素可以有效地抵抗某些感染，但每天注射 1 亿单位的青霉素也不会产生副作用。\\n洛克所撰写的第一本重要著作，是发表于 1690 年的《人类理解论》。他在书中探讨了人类知识起源、性质及局限。洛克的理论是纯经验主义的，培根、笛卡儿对其思想的影响是显而易见的。\\n洛克说：”不论是多神论者，还是穆斯林、犹太教徒，都不应因宗教信仰而被剥夺公民权利。“但是，洛克认为这种宽容不应扩大到天主教徒，因为他们忠于外国统治者。此时，无神论都也应排除在外。如果按照今天的标准，洛克应当被认为是极为不宽容。\\n洛克坚信，每个人都享有自然权利，这不仅包括生命权，还包括个人自由和私有财产权。政府的主旨是保证公民人身和财产安全。这种观点有时被称为”政府守夜者理论“。\\n洛克认为社会契约是可以解除的：当立法人试图夺取和破坏公民财富，或是利用手中的权力奴役人民、把人民推向战争时，他的权力就应因此而无条件地被解除，离开上帝赋予所有人反对战争和暴力的安身之处。\\n洛克深信权力分离原则，认为立法权应高于执法权，也高于司法权。洛克反对给予法院宣布法律违宪的权力。\\n命运最残酷的玩笑，是使历史上许多天才的作曲家都受到过听力障碍的折磨。贝多芬以其超人的毅力克服耳聋的困扰，创做出了更加辉煌的作品。1827 年，他在维也纳与世长辞，享年 57 岁。\\n贝多芬的作品集古典音乐之大成，开浪漫派音乐之先河，给许多浪漫主义音乐家以莫大启迪。\\n1932 年的诺贝尔物理学奖授予了德国物理学家海森堡，因为他在创建量子力学理论方面发挥了重要作用。\\n海森堡理论的一项成果是著名的”测不准原理“，这是由他自己于 1927 年提出的。\\n我认为，玻利瓦尔比恺撒和查理曼大帝更重要，这是因为他影响的时间更持久，面积更为广大。但在本书中，我把玻利瓦尔排在亚历山大大帝、希特勒、拿破仑的后面，是因为如果没有这 3 个人，很多历史事件不可能发生。但如果没有玻利瓦尔，南美终将会获得独立。\\n玻利瓦尔从殖民者手中解放出来的土地面积，比美国初期的领土面积大。尽管如此，他的作用仍然不如华盛顿重要，因为美国在历史上的作用，比玻利尔所解放的国家的作用大得多。\\n笛卡尔对于几何学的论述，为牛顿创立微积分学铺平了道路。\\n笛卡尔通过一系列形而上学的争辩，证明了自己的存在（”我思，故我在“）。他也由此证明了上帝以及外部世界的存在。这是笛卡尔理论的出发点。\\n笛卡尔认为，从本质上说，动物是一种复杂的机器，人体也是如此，是机械运动的主体。这一思想，为近代心理学研究奠定了基础。\\n笛卡尔的思想至少有 5 个方面对欧洲思想产生了影响：（1）用机械原理解释宇宙万物；（2）对科学实验所采取的积极态度；（3）强调将数学原理在科学中运用；（4）怀疑论学说；（5）对认识论的关注。\\n米开朗琪罗一生曾写过很多诗歌，约有 300 首流传下来。这些诗歌大多是在他去世后才得以收集出版。这些作品反映了他的个性和情感，并表明他确实是一个有天赋的诗人。\\n由于 1095 年乌尔班在法国克莱蒙召集的一次大规模的宗教集会上，面对成千上万信徒，他发表了也许是历史上惟一的一篇最有号召力的演说。\\n如果没有教皇的激动人心的演说和领导，这场”圣战“可能不会发生。\\n欧麦尔的功绩的确使人印象深刻。他是穆罕默德之后伊斯兰教最重要的传播者。没有他势如破竹的征服活动，伊斯兰教不会传播得这样广。\\n在阿育王的王国里，所有宗教都被容纳，阿育王对佛教所采取的鼓励政策，使印度境内的佛教徒迅速增加。他还不断派僧侣到临近国家传教，传教最为成功的地区是锡兰。\\n除乔达摩外，阿育王是使佛教发展成为世界性宗教的第一人。\\n按照奥古斯丁的说法，所有的人都有亚当那样的罪过，人类不可能通过自身的努力和辛勤工作而获得拯救，必须依靠上帝。虽然这一思想以前就存在，但奥古斯丁强化了这些观念。他把这种思想写入基督教信条中\\n奥古斯丁是中世纪黑暗降临前的最后一位伟大的神学家。他的著作构成的教会教义的主要轮廓一直统治着整个中世纪。他对于拯救、性和原罪说的见解及其他一些观点都具有影响力。\\n欧纳斯特·卢瑟福被公认为 20 世纪最伟大的实验物理学家。他对于我们了解放射性起了举足轻重的作用。他还是最先研究核物理的人。除了理论上非常重要以外，他的发现还在很大范围内有重要的应用，这包括：核武器、核电站、放射标志物以及运用放射性测定年代。他对世界影响力相当深厚，并正在增长，其影响有可能持久保持下去。\\n卢瑟福最初的发现之一，就是发现从铀中放射出两种区别很大的成分构成的放射性现象。他将这两种成分分别命名为阿尔法射线 ⍺ 和贝塔射线 β。\\n卢瑟福关于原子核的发现是所有现代原子结构理论的基础。\\n在加尔文的领导下，日内瓦变成了欧洲主要的新教中心。加尔文继续努力推动新教在欧洲其他国家的传播，特别是在法国。\\n加尔文热心鼓励勤劳工作。他还支持教育。正是在他统治时期建立了日内瓦大学。\\n我们不会因为我们行善而获得拯救，但我们行善是因为上帝已选择了拯救我们。尽管这样的信条看起来似乎有点奇怪，但毫无疑问的是它鼓舞了许多加尔文主义者异常虔诚和正直的生活。\\n孟德尔发现如果两个被继承的基因被给定的性状是有区别的（例如一个基因来自绿色的种子，另一个基因来自黄色的种子），那么通常只有显性基因的作用（在这个例子里是黄色的种子）在这一个体中表现出来。但隐性基因并没有被破坏并有可能也传递给该植物的后代。\\n普朗克的假设标志着量子力学的发端。自那时起他已使物理学发生了革命性的变化，并使我们更深刻地理解了物质和辐射的性质。\\n普朗克的假说与当时流行的物理学概念截然不同；但运用这一假说普朗克发现了一个在理论上很精确的关于黑体辐射的正确公式。\\n到 1918 年普朗克获诺贝尔奖时，事实清楚地表明该分说是完全是正确的，他的物理学理论具有绝对重要性。\\n量子力学的发展可能是 20 世纪最重要的科学发展，甚至比爱因斯坦的相对论还重要。普朗克常数 h，在物理学理论中扮演了非常重要的角色。\\n或许有人认为，利斯特的思想明显来源于巴斯德，不应给他如此高的荣誉。但我们应当看到，巴斯德的理论需要有人来发展和推广使用。\\n1876 年，奥托终于设计出一种改进的点火系统，装备在一台实用的四冲程发动机上。\\n戴姆勒的汽车上市比本茨晚些，但也获得了成功（后来本茨和戴姆勒的工厂合并，著名的奔驰汽车就是这个厂生产的）。\\n皮萨罗指挥 180 人征服一个人口约 600 万的帝国，这是军事史上最惊人的一件事。科尔特斯曾用 600 人征服了人口 500 万的帝国，其力量之悬殊仍低于皮萨罗。\\n皮萨罗对南美的征服，使西班牙的宗教和文化传播到整个被征服地区。印加帝国灭亡后，整个南美洲再也没有能力抵抗欧洲人的统治。千百万的印第安人生活在南美，但他们的政权从未被恢复。欧洲的语言、宗教和文化此后一直主宰着南美洲。\\n科尔特斯还得到了阿兹特克人所崇拜的神——魁扎尔科亚特尔的支持。根据印第安传说，这们神指导印第安人从事农业、冶金以及建立政府。\\n事实证明，西班牙人的征服生活是不可避免的，科尔特斯的胆识和领导能力加快了征服者的步伐。\\n杰弗逊的宗教自由法案的可贵之处在于，提出了宗教包容和政教分离原则。\\n1789 年，杰弗逊回到美国，出任美国第一位国务卿。不久，他与财政部长汉密尔顿之间出现摩擦，两人的政见极为不同。汉密尔顿的支持者组成联邦党，杰弗逊的支持者组成民主共和党，这就是后来民主党。\\n杰弗逊是一们政治实干家，他把自己关于宗教自由的思想变成法律，并付诸实践。\\n”一个明智而节俭的政府，应当防止人们彼此相残，让人们自由地从事他们自己的工作和不断进步“。\\n这桩由伊莎贝拉和费迪南做主的婚姻，在他们死后影响了欧洲近一个世纪。\\n尽管费迪南和伊莎贝拉建立的西班牙宗教审判制度距离今天已有 5 个世纪，审判制度被废止也有 150 多年了，但西班牙依然不能从它的影响中全面恢复过来。\\n斯大林的目的是清除异己，他不允许苏联境内出现任何一种反对派势力。\\n斯大林的经济政策之一是强制推行农业集体化。农民并不欢迎这一政策，许多人对些进行抵制。30 年代初期斯大林的这一政策可能造成了数百万人的死亡。\\n如果从统治人数、统治时间以及个人控制权力的程度上讲，斯大林可以说是历史上首屈一指的。\\n两个超级大国间的军备竞争，耗费数以兆计的美元，而换来的，却是多年以来人类生活在对有可能摧毁全部文明的核武器的恐惧之中。\\n恺撒也许是第一位认识到罗马的共和政体不仅没有保留价值，而且的确已经无可救药的政治领袖。\\n但在他所有改革措施中，其中一个历时最久，即他引入的新历法。该历法除进行少量修正外，一直待续至今。\\n恺撒对历史的实际影响，并不能等同于他的巨大声望。虽然他对罗马共和国的解体起到了重要作用，但这种作用不应被夸大。因为当时罗马共和国政府已经摇摇欲坠。\\n令人费解的是，虽然威廉一世可能是英国所有国王中最重要的，他本人却并不是英国人，而是法国人。他生在法国，死在法国，几乎一生都在那里，并且他只会说法语（顺便说一句，他未受过教育）。\\n有趣的是，威廉的征服促进了英语的发展。大量新的词汇加入到英语之中。实际上，在现代英语字典中，起源于法语和拉丁语的词汇，多于源于盎格鲁-撒克逊的词。\\n弗洛伊德对心理学理论的贡献是如此广泛，以至于很难用几句话将其概括。他强调潜意识在人的行为中的重要性。\\n弗洛伊德将精神分析法用于神经性疾病的治疗。他创造了个性结构的理论。他发展的推广了关于焦虑、防卫心理、阉割情绪、抑郁、冲动等的心理学理论。\\n弗洛伊德当然不是第一位心理学家，他的一些思想从长远看也不一定会被证明是最正确的。但他是近代心理学发展史上最重要，也是最有影响力的人。\\n詹纳无偿地把他的技术贡献给了世界，并不想从中获利。1802 年英国议会为了感谢他的贡献，奖励他 1 万英镑，几年后又奖励了 2 万英镑。\\n詹纳通过调查、实验和写作，把一种民间传说变成了拯救无数人生命的实践。\\n1895 年 12 月，伦琴写下了他有关 X-射线的第一篇论文。他的文章立刻引起了人们极大的兴趣和激动，几个月里，数百位科学家从事研究 X-射线，一年里大概有 1000 篇有关该问题的文章表示。\\n巴赫从来未得到过更好的职位，经常是勉强维持家里的生计。他从未像莫扎特、贝多芬那样在生前赫赫有名，甚至不如李斯特和肖邦，他的雇主中没有一个他的天才。\\n巴赫只有 9 个孩子活到成年，其中 4 个凭他们的才能成了著名的音乐家。\\n在今天这个世俗的社会里，巴赫的音乐比他活着时还流行。\\n巴赫的追随者并未局限在一个小的音乐精英圈子里，除了贝多芬以外，他的唱片可能比其他任何一位古典作曲家都更畅销。\\n在西方，《道德经》比孔子和其他儒家哲学家的著作更流行。事实上，该书至少有 40 种英文译本，除了《圣经》以外，任何书籍在数量上都无法与其相比。\\n在中国哲学家除了孔子，只有老子对人类思想产生了广而久的影响。\\n伏尔泰信仰宗教，但他反对宗教专断和迫害。\\n尽管伏尔泰不是近代类型的民主主义者，但他的思想主旨是反对任何形式的世袭制度，因此他的追随者趋向于赞成民主是合乎逻辑的。伏尔泰的思想是法国启蒙运动的主流，为 1789 年的法国大革命做出了巨大的贡献。\\n通过伏尔泰的著作，民主思想、宗教宽容和知识自由的精神传遍了法国，以至整个欧洲。\\n最后，开普勒发现了症结所在：第谷也好，哥白尼也好，以及其他许多古典天文学家都肯定，行星的轨道是圆的，或者是圆的组合，事实上，行星的辅道却是椭圆的。\\n第二个当行星越接近太阳时，它的运行速度越快；行星的运行速度以这样一种方式变化；连接太阳和行星之间的连线在相同的时间内所扫过的面积相等。\\n牛顿曾经说过：”如果我能比别人看得更远的话，这是因为我是站在巨人的肩膀上。“毫无疑问，开普勒就是他提到的巨人之一。\\n1933 年，费密提出了 β 射线的衰变理论，这使他成为了世界上第一流的物理学家。\\n费密的发现在核反应堆的建设上有很重要的应用。在反应堆中用来放慢中子的材料称为减速剂。\\n1938 年，因为费密的重大发现，费密获得了诺贝尔物理学奖。\\n欧勒是 18 世纪唯一一位支持光波理论的科学家。\\n欧勒最后不但不是最小的贡献涉及我们现行的数字符号系统。如他主张用希腊字母 π 代替圆周率，他还介绍了许多方便的符号，这些符号现在还用去在数学中。\\n意大利政治哲学家马基雅维利因为他的主张而声名狼藉，他劝告统治者为了巩固和增强力量，应该运用欺骗、阴谋和谎言，同时要使用残酷的暴力。\\n马基雅维利建议君主要从民众中获得支持，否则他在逆境中就没有依靠的资源。马基雅维利理解一个新的统治者为了巩固他的统治，必须做惹怒民众的事，因此他建议，开始时统治者一定要表现出残酷，这是为了以后不发生暴政。要一点点地给予人民好处，好让他们能更好地体味。\\n马基雅维利是近代政治思想的主要奠基人之一。\\n英国著名的经济学家李嘉图，他也是马尔萨斯的私人朋友，提出劳动的价值就是使劳动者维持生存，使人类永存，既不增加，也不减少。这个理论经常被称为”工资铁律“，成为马克思剩余价值理论的批判对象。\\n只有马尔萨斯，他就此问题详尽阐述了其思想并写成了著作。更重要的是，他是第一个强调人口肿胀问题重要性的人，并使该问题引起了知识界的关注。\\n即使阿波罗计划不再继续下去，它仍将作为人类的最大成就而被人们所牢记。我想阿波罗计划将继续下去，空间飞行在未来将起更大的作用。\\n平克斯提出基本思想，为研究获取经费，网罗有才能的人士参加进来，他当之无愧地获得该项殊荣。\\n任何宗教对虔诚的追随者来说都有着很大的影响。\\n列宁的重要性在于他领导布尔会维克在俄国夺取了政权，建立了世界上第一个共产主义政权。他是第一个把马克思理论转化为实践的人。\\n杨坚最重要的改革之一是用考试的方法选拔官员。在以后若干个世纪里，该制度为中国提供了一大批有能力的官员，而且是连续不断的，从国家的各个地方到各个阶层。用考试选拔官员的制度始于汉代。\\n隋文帝还制定了一种回避制度，即州一级的官员不得在原籍任职。这是一种预防措施，可以避免任人唯亲，同时防止地方官员建立太强的基础。\\n隋文帝在历史上的影响要比查理曼大得多。\\n伽马航行的深远意义在于，他开辟了从欧洲到印度和远东的直接海上航路，其结果被许多国家所分享。\\n欧洲对印度和远东的影响无法与欧洲对西半球的影响相比。印度的文明最终由于与本文的接触而变化了。\\n居鲁士确实一个卓越的军事领袖，他在统治上也是温和的。他对地方宗教和习俗很宽容，与其他的征服者不同。\\n由于居鲁士的成就，波斯帝国在他死后继续扩大，持续了近 200 年，直到被亚历山大大帝征服为止。在近两个世纪里，波斯国内和平繁荣。\\n居鲁士的作用不仅在于他赢得了一系列的战争，征服了一大片疆域，更在于创建的帝国彻底改变了古代世界的政治格局。\\n彼得的意义就在于他走了时代的前面，认识到西化和近代化的重要性。因为彼得的预见性，落后的俄国冲到了世界许多国家的前面。\\n培根认为演绎法是不对的，应该使用归纳法。为了认识世界，我们必须先观察它。首先要搜集材料，然后通过归纳的方法，从这些事实中得出结论。\\n尽管培根未提出一种完整、正确的科学方法，但他提出了一种需要学习的调查方法。\\n福特相信，关键是不要让工人因为取用所需的材料而浪费时间，福特安装了传送带、滑道及空中吊车。\\n福特的革新起到了广泛的推动作用，他对他的大规模生产技术不保密，相反他热切地希望推广。别的制造商看到他的成功，也模仿他的生产方法。结果是全国乃至世界，生产量大增。\\n孟子强调，民为贵而君为轻，国君的责任是为人民提供福利，特别是应该给他们道德指导和生活条件。\\n伊丽莎白对外交政策的处理是精明的。早在 1506 年，她便签订了爱丁堡协议，和平解决了与苏格兰的纷争。但英格兰又与西班牙出现了冲突，伊丽莎白极力避免战争。\\n伊丽莎白是个非常聪明的人，也是个敏锐的政治家，她谨慎而保守，她厌恶战争和流血，她像她的父亲那样，靠与议会合作行使权力，而不是与之对着干。\\n戈尔巴乔夫最具革命性的改革大概就是”公开化“政策，这是他 1986 年制定的。公开化的一个方面就是增加政府活动的透明度，另一方面是允许个人或出版物自由议论政治，苏联杂志可以批评政府政策、共产党、政府高官，甚至戈尔巴乔夫本人。\\n戈尔巴乔夫在使东欧获得自由方面做出很大贡献。东欧 6 国摆脱了苏联的控制，戈尔巴乔夫的个人作用不容质疑。\\n戈尔巴乔夫在限制军备竞赛和结束冷战方面的作用也是重要的。\\n”公开化“不是他在人民的压力下做出的，也不是别的政治委员坚持的，只是戈尔巴乔夫个人的思想，他提倡它，并顶住反对，继续坚持它。\\n政治家的影响是由他的行动结果所决定，而不是由其初衷决定的。\\n美尼斯之后的两千年里，埃及从财富和文化的角度，都是世界上最先进的国家。\\n历史告诉我们，一个王国如果在一个无能的国王领导下，是不可能完成如此重大的征服的，没有得力的领导，也不能保持和巩固这种征服。\\n经过一番战争，路易的儿子签证了《凡尔赛条约》，三分查理曼帝国，第一部分包括现在的法国，第二部分是德国的大部分，第三部分是意大利北部和法-德边境地带。\\n在古代，《荷马史诗》要比现在流行得多。在希腊，该部史诗在很长时间里影响了宗教和伦理观。不仅知识分子读《荷马史诗》，政治家和军事家也读，亚历山大大帝在战争中还随身带着《伊利亚特》。\\n查士丁尼能在本书中占一席之地主要归功于《法典》的重要性，《法典》成为罗马法的权威解释，影响了拜占庭帝国，对欧洲的影响主要在中世纪的后期，成为法律学习、训练和论述的基础。\\n耆那教徒是个成功的团体，他们对印度文学艺术的发展做出了贡献。\\n\"",

    title: "《金刚经说什么》读书笔记",
    content: "\"《道德经》中开篇即：“道可道，非恒道；名也名，非恒名”。这句跟《金刚经》反复中提到的：“说XX，即为非XX，是名XX”的道理一模一样。\\n作者除了佛经以外，也在文章中提到《中庸》、《孟子》等著作与佛家理论不谋而合的很多观点。\\n我前几天整理去年的笔记，在《我与地坛》的笔记中，发现自己的划出来的内容：“如禅，不能说不能说，一说就错。”\\n读到“真正的真理是在最平凡之间”，突然没有那么想要成为伟大的人，也意识到身边那些看似平凡的人可能就是我们身边的“佛”。\\n人生的痛苦是可以通过学习《金刚经》来缓解的，或者说能让我们将好多虚假的事情看的更加清楚。目前以我的能力，只能算是了解一点点皮毛。后续还需要阅读更多的书籍，强化个人的理解。争取可以去“智慧布施”。\\n我基本上是在地铁通勤时光中读完这本书的，一直听的是古典音乐 chopin-orbit，毕竟普通有歌词的音乐，很难静下心来看《金刚经》。\\n《金刚经》用键盘亲自敲一遍 法会因由分 如是我闻，一时，佛在舍卫国祇树给孤独园，与大比丘众。千二百五十人俱。尔时，世尊。食时，着衣持钵，入舍卫大城乞食。于其城中。次第乞已。还至本处。饭食讫。收衣钵。洗足已。敷座而坐。\\n善现启请分 时长老须菩提。在大众中。即从座起。偏袒右肩。右膝着地。合掌恭敬。而白佛言。希有世尊。如来善护念诸菩萨。善付嘱诸菩萨。世尊。善男子。善女人。发阿耨多罗三藐三菩提心。云何应住。云何降伏其心。佛言。善哉善哉。须菩提。如汝所说。如来善护念诸菩萨。善付嘱诸菩萨。汝今谛听。当为汝说。善男子。善女人。发阿耨多罗三藐三菩提心。应如是住。如是降伏其心。唯然。世尊。愿乐欲闻。\\n大乘正宗分 佛告须菩提。诸菩萨摩诃萨。应如是降伏其心。所有一切众生之类。若卵生。若胎生。若湿生。若化生。若有色。若无色。若有相。若无相。若非有相。非无相。我皆令入无余涅槃而灭度之。如是灭度无量无数无边众生。实无众生得灭度者。何以故。须菩提。若菩萨有我相。人相。众生相。寿者相。即非菩萨。\\n妙行无住分 复次。须菩提。菩萨于法。应无所住。行于布施。所谓不住色布施。不住声香味触法布施。须菩提。菩萨应如是布施。不住于相。何以故。若菩萨不住相布施。其福德不可思量。须菩提。于意去何。东方虚空。可思量不。不也，世尊。须菩提。南西北方。四维上下。虚空可思量不。不也，世尊。须菩提。菩萨无住相布施。福德亦复如是。不可思量。须菩提。菩萨但应如所教住。\\n如理实见分 须菩提。于意云何。可以以身相见如来不。不也。世尊。不可以身相见如来。何以故。如来所说身相。即非身相。佛告须菩提。凡所有相，皆是虚妄。若见诸相非相，即见如来。\\n正信希有分 须菩提白佛言。世尊。颇有众生。得闻如是言说章句。生实信不。佛告须菩提。莫作是说。如来灭后。后五百岁。有持戒修福者。于此章句。能生信心。以此为实。当知是人。不于一佛二佛三四五佛而种善根。已于无量千万佛所。种诸善根。闻是章句。乃至一念生净信者。须菩提。如来悉知悉见。是诸众生。得如是无量福德。何以故。是诸众生。无复我相人相众生相寿者相。无法相。亦无非法相。何以帮。是诸众生。若心取相。即为着我人众生寿者。若取法相。即着我人众生寿者。何以故。若取非法相。即着我人众生寿者。是故不应取法。不应取非法。以是义故。如来常说。汝等比丘。知我说法。如筏喻者。法尚应舍。何况非法。\\n无得无说分 须菩提。于意云何。如来得阿耨多罗三藐三菩提耶。如来有所说法耶。须菩提言。如我解佛所说义。无有定法。名阿耨多罗三藐三菩提。亦无有定法如来可说。何以故。如来所说法。皆不可取。不可说。非法非非法。所以者何。一切贤圣。皆以无为法。而有差别。\\n依法出生分 须菩提。于意云何。若人满三千大千世界七宝。以用布施。是人所得福德。宁为多不。须菩提言。甚多。世尊。何以故。是福德。即非福德性。是故如来说福德多。若复有人。于此经中受持。乃至四句偈等。为他人说。其福胜彼。何以故。须菩提。一切诸佛。及诸佛阿耨多罗三藐三菩提法。皆从此经出。须菩提。所谓佛法者。即非佛法。\\n一相无相分 须菩提。于意云何。须陀洹。能作是念。我得须陀洹果不。须菩提言。不也，世尊。何以故。须陀洹。名为入流。而无所入。不入色声香味触法。是句须陀洹。须菩提。于意云何。斯陀含能作是念。我得斯陀含果不。须菩提言。不也，世尊，何以故。斯陀含。名一往来。而实无往来。是名斯陀含。须菩提。于意云何。阿那含能作是念。我得阿那含果不。须菩提言。不也，世尊。何以故。阿那含。名为不来。而实无不来。是故名阿那含。须菩提。于意云何。阿罗汉能作是念。我得阿罗汉道不。须菩提言。不也。世尊。何以故。实无有法。名阿罗汉。世尊。若阿罗汉作是念。我得阿罗汉道。即为着我人众生寿者。世尊。佛说我得无诤三昧。人中最为第一。是第一离卻阿罗汉。世尊。我不作是念。我是离欲阿罗汉。世尊。我若作是念。我得阿罗汉道。世尊。则不说须菩提。是乐阿兰那行者。以须菩提实无所行。而句须菩提。是乐阿兰那行。\\n庄严净土分 佛告须菩提。于意云何。如来昔在然灯佛所。于法有所得不。不也，世尊。如来在然灯佛所。于法实无所得。须菩提。于意云何。菩萨庄严佛土不。不也。世尊。何以故。庄严佛土者。即非庄严。是名庄严。是故须菩提。诸菩萨摩诃萨。应如是生清净心。不应住色生心。不应住声香味触法生心。应无所住。而生其心。须菩提。譬如有人。身如须弥山王。于意云何。是身为大不。须菩提言。甚大。世尊。何以故。佛说非身。是名大身。\\n无为福胜分 须菩提。如恒河中所有沙数。如是沙等恒河。于意云何。是诸恒河沙。宁为多不。须菩提言。甚多。世尊。但诸恒河尚多无数。何况其沙。须菩提。我今实言告汝。若有善男子。善女人。以七宝满尔所恒河沙数三千大千世界。以用布施。得福多不。须菩提言。甚多。世尊。佛告须菩提。若善男子。善女人。于此经中。乃至受持四名谒等。为他人说。而此福德。胜前福德。\\n尊重正教分 复次。须菩提。随说是经。乃至四句谒等。当知此处。一切世间天人阿修罗。皆应供养。如佛塔庙。何况有人。尽能受持读诵。须菩提。当知是人。成就最上第一希有之法。若是经典所在之处。即为有佛。若尊重弟子。\\n如法受持分 尔时须菩提白佛言。世尊。当何名此经。我等云何奉持。佛告须菩提。是经名为金刚般若波罗蜜。以是名字。汝当奉持。所以者何。须菩提。佛说般若波罗蜜。即非般若波罗蜜。是名般若波罗蜜。须菩提。于意云何。如来有所说法不。须菩提白佛言。世尊。如来无所说。须菩提。于意云何。三千大千世界所有微尘。是为多不。须菩提言。甚多。世尊。须菩提。诸微尘。如来说非微尘。是名微尘。如来说世界。非世界。是名世界。须菩提。于意云何。可以三十二相见如来不。不也。世尊。不可以三十二相得见如来。何以故。如来说三十二相。即是非相。是名三十二相。须菩提。若有善男子。善女人。以恒河沙等身命布施。若复有人。于此经中。乃至受持四句偈等。为他人说。其福甚多。\\n离相寂灭分 尔时须菩提。闻说是经。深解义趣。涕泪悲泣。而白佛言。希有世尊。佛说如是甚深经典。我从昔来所得慧眼。未曾得闻如是之经。世尊。若复有人。得闻是经。信心清净。即生实相。当知是人。成就第一希有功德。世尊。是实相者。即是非相。是故如来说名实相。世尊。我今得闻如是经典。信解受持。不足为难。若当来世。后五百岁。其有众生。得闻是经。信解受持。是人即为第一希有。我相即是非相。人相众生相寿者相。即是非相。何以故。离一切诸相。即名诸佛。佛告须菩提。如是如是。若复有人。得闻是经。不惊不怖不畏。当知是人。甚为希有。何以故。须菩提。如来说第一波罗蜜。即非第一波罗蜜。是名第一波罗蜜。须菩提。忍辱波罗蜜。如来说非忍辱波罗蜜。是句忍辱波罗蜜。何以故。须菩提。如我昔为歌利王割截身体。我于尔时。无我相。无人相。无众生相。无寿者相。何以故。我于往昔节节支解时。若有我相人相众生相寿者相。应生瞋恨。须菩提。又念过去于五百世。作忍辱仙人。于尔所世，无我相。无人相。无众生相。无寿者相。是故须菩提。菩萨应离一切相。发阿耨多罗三藐三菩提心。不应住色生心。不应住声香味触法生心。应生无所住心。若心有住。即为非住。是故佛说菩萨心。不应住色布施。须菩提。菩萨为利益一切众生故。应如是布施。如来说一切诸相。即是非相。又说一切众生。即非众生。须菩提。如来是真语者。实语者。如语者。不诳语者。不异语者。须菩提。如来所得法。此法无实无虚。须菩提。若菩萨心。住于法而行布施。如人入暗。即无所见。若菩萨心。不住法而行布施。如人有目。日光明明照。见种种色。须菩提。当来之世。若有善男子。善女子。能于此经受持读涌。即为如来。以佛智慧。悉知是人。悉见是人。皆得成就无量无边功德。\\n持经功德分 须菩提。若有善男子。善女人。初日分。以恒河沙等身布施。中日分。复以恒河沙等身布施。后日分。亦以恒河沙等身布施。如是无量百千万亿劫。以身布施。若复有人。闻此经典。信心不逆。其福胜彼。何况书写受持读涌。为人解说。须菩提。以要言之。是经有不可思议。不可称量。无边功德。如来为发大乘者说。为发最上乘者说。若有人能受持读诵。广为人说。如来悉知是人。悉见是人。皆得成就不可量。不可称。无有边。不可思议功德。如是人等。即为荷担如来。阿耨多罗三藐三菩提。何以故。须菩提。若乐小法者。着我见人见众生见寿者见。即于此经不能听受读诵。为人解说。须菩提。在在处处。若有此经。一切世间天人阿修罗。所应供养。当知此处。即为是塔。皆应恭敬。作礼围绕。以诸华香而散其处。\\n能净业障分 复次。须菩提。善男子。善女人。受持读诵此经。若为人轻贱。是人先世罪业。应堕恶道。以今世人轻贱故。先世罪业。即为消灭。当得阿耨多罗三藐三菩提。须菩提。我念过去无量阿僧祇劫。于然灯佛所。得值八百四千万亿那由他诸佛。悉皆供养承事。无空过者。若复有人。于后末世。能受持读诵此经。所得功德。于我所供养诸佛功德。百分不及一。千万亿分。乃至算数譬喻。所不能及。须菩提。若善男子。善女人。于后末世。有受持读诵此经。所得功德。我若具说者。若有人闻。心即狂乱。狐疑不信。须菩提。当知是经义。不可思议。果报亦不可思议。\\n究竟无我分 尔时须菩提白佛言。世尊。善男子，善女人。发阿耨多罗三藐三菩提心。云何应住。云何降伏其心。佛告须菩提。善男子，善女人。发阿耨多罗三藐三菩提心者。当生如是心。我应灭度一切众生。灭度一切众生已。而无有一众生实灭度者。何以故。须菩提。若菩萨有我相人相众生相寿者相。即非菩萨。所以者何。须菩提。实无有法。发阿耨多罗三藐三菩提心者。须菩提。于意云何。如来于然灯佛所。有法得阿耨多罗三藐三菩提不。不也。世尊。如我解佛所说义。佛于然灯佛所。无有法得阿耨多罗三藐三菩提。佛言。如是如是。须菩提。实无有法。如来得阿耨多罗三藐三菩提。须菩提。若有法。如来得阿耨多罗三藐三菩提者。然灯佛即不与我授记。汝于来世。当得作佛。号释迦牟尼。以实无有法。得阿耨多罗三藐三菩提。是故然灯佛。与我授记。作是言。汝于来世。当得作佛。号释迦牟尼。何以故。如来者。即诸法如义。若有人言。如来得阿耨多罗三藐三菩提。须菩提。实无有法。佛得阿耨多罗三藐三菩提。须菩提。如来所得阿耨多罗三藐三菩提。于是中无实无虚。是故如来说一切法。皆是佛法。须菩提。所言一切法者。即非一切法。是故名一切法。须菩提。譬如人身长大。须菩提言。世尊。如来说人身长大。即为非大身。是名大身。须菩提。菩萨亦如是。若作是言。我当灭度无量众生。即不名菩萨。何以故。须菩提。实无有法。名为菩萨。是故佛说一切法。无我无人无众生无寿者。须菩提。若菩萨作是言。我当庄严佛土。是不名菩萨。何以故。如来说庄严佛土者。即非庄严。是句庄严。须菩提。若菩萨通达无我法者。如来说名真是菩萨。\\n一体同观分 须菩提。于意云何。如来有肉眼不。如是。世尊。如来有肉眼。须菩提。于意云何。如来有天眼不。如是。世尊。如来有天眼。须菩提。于意云何。如来有慧眼不。如是。世尊。如来有慧眼。须菩提。于意云何。如来有法眼不。如是。世尊。如来有法眼。须菩提。于意云何。如来有佛眼不。如是。世尊。如来有佛眼。须菩提。于意云何。如恒河中所有沙。佛说是沙不。如是。世尊。如来说是沙。须菩提。于意云何。如一恒河中所有沙。有如是沙等恒河。是诸恒河所有沙数佛世界。如是宁为多不。甚多。世尊。若干种心。如来悉知。何以故。如来说诸心。皆为非心。是名为心。所以者何。须菩提。过去心不可得。现在心不可得。未来心不可得。\\n法界通化 须菩提。于意云何。若有人满三千大千世界七宝。以用布施。是人以是因缘。得福多不。如是。世尊。此人以是因缘。得福甚多。须菩提。若福德有实。如来不说得福德多。以福德无故。如来说得福德多。\\n离色离相分 须菩提。于意云何。佛可以以具足色身见不。不也。世尊。如来不应以具足色身见。何以故。如来说具足色身。即非具足色身。是句具足色身。须菩提。于意云何。如来可以具足诸相见不。不也。世尊。如来不应以具足诸相见。何以故。如来说诸相具足。即非具足。是名诸相具足。\\n非说所说分 须菩提。汝勿渭如来作是念。我当有所说法。莫作是念。何以故。若人言如来有所说法。即为谤佛。不能解我所说故。须菩提。说法者。无法可说。是名说法。尔时慧命须菩提白佛言。世尊。颇有众生。于未来世。闻说是法。生信心不。佛言。须菩提。彼非众生。非不众生。何以故。须菩提。众生众生者。如来说非众生。是名众生。\\n无法可得分 须菩提白佛言。世尊。佛得阿耨多罗三藐三菩提。为无所得耶。佛言。如是如是。须菩提。我于阿耨多罗三藐三菩提。乃至无有少法可得。是名阿耨多罗三藐三菩提。\\n净心行善分 复次。须菩提。是法平等。无有高下。是名阿耨多罗三藐三菩提。以无我无人无众生无寿者。修一切善法。即得阿耨多罗三藐三菩提。须菩提。所言善法者。如来说即非善法。是名善法。\\n福智无比分 须菩提。若三千大千世界中。所有诸须弥山王。如是等七宝聚。有人持用布施。若人以此般若波罗密经。乃至四句偈等。受持读诵。为他人说。于前福德。百分不及一。百千万亿分。乃至算数譬喻。所不能及。\\n化无所化分 须菩提。于意云何。汝等勿谓如来作是念。我当度众生。须菩提。莫作是念。何以故。实无有众生如来度者。若有众生如来度者。如来即有我人众生寿者。须菩提。如来说有我者。即非有我。而凡夫之人。以为有我。须菩提。凡夫者。如来说即非凡夫。是名凡夫。\\n法身非相分 须菩提。于意云何。可以三十二相观如来不。须菩提言。如是如是。以三十二相观如来。佛言。须菩提。若以三十二相观如来者。转轮圣王。即是如来。须菩提白佛言。世尊。如我解佛所说义。不应以三十二相观如来。尔时世尊。而说偈言。\\n若以色见我 以音声求我 是人行邪道 不能见如来 无断无灭分 须菩提。汝若作是念。如来不以具足相故。得阿耨多罗三藐三菩提。须菩提。莫作是念。如来不以具足相故。得阿耨多罗三藐三菩提。须菩提。汝若作是念。发阿耨多罗三藐三菩提心者。说渚法断灭。莫作是念。何以故。发阿耨多罗三藐三菩提心者。于法不说断灭相。\\n不受不贪分 须菩提。若菩萨以满恒河沙等世界七宝。持用布施。若复有人。知一切法无我。得成于忍。此菩萨。胜前菩萨所得功德。何以故。须菩提。以诸菩萨不受福德故。须菩提白佛言。世尊。云何菩萨不受福德。须菩提。菩萨所作福德。不应贪着。是故说不受福德。\\n威仪寂静分 须菩提。若有人言。如来若来若去。若坐若卧。是人不解我所说义。何以故。如来者。无所从来。亦无所去。故名如来。\\n一合理相分 须菩提。若善男子，善女人。以三千大千世界。碎为微尘。于意云何。是微尘众。宁为多不。须菩提言。甚多。世尊。何以故。若是微尘众实有者。佛即不说是微尘众。所以者何。佛说微尘众。即非微尘众。是名微尘众。世尊。如来所说三千大千世界。即非世界。是名世界。何以故。若世界实有者。即是一合相。如来说一合相。即非一合相。是名一合相。须菩提。一合相者。即是不可说。但凡夫之人。贪着其事。\\n知见不生分 须菩提。若人言。佛说我见人见众生见寿者。须菩提。于意云何。是人解我所说义不。不也。世尊。是人不解如来所说义。何以故。世尊说我见人见众生见寿者见。即非我见人见众生见寿者见。是句我见人见众生见寿者见。须菩提。发阿耨多罗三藐三菩提心者。于一切法。应如是知。如是见。如是信解。不生法相。须菩提。所言法相者。如来说。即非法相。是名法相。\\n应化非真分 须菩提。若有人以满无量阿僧祇世界七宝。持用布施。若有善男子。善女人。发菩提心者持于此经。乃至四句偈等。受持读诵。为人演说。其福胜彼。云何为人演说。不取于相。如如不动。何以故。一切有为法。如梦幻泡影。如露亦如电。应作如是观。佛说是经已。长老须菩提。及诸比丘。比丘尼。优婆塞。优婆夷。一切世间天人阿修罗。闻佛所说。皆大难喜。信受奉行。\\n笔记 般若智慧不是普通的智慧，而是能够了解道、悟道、修证、了脱生死、超凡入圣和智慧，需要身心两方面投入求证，才可能得到。\\n做人是学佛的根基，学佛要先学做人，把儒家四书五经做人的道理弄通了，人成了，就是成佛。\\n真正的道体是不可思议的，是不可以用我们普通的知识、意识去思想、讨论、研究的。\\n悟了道的人，他的记忆力也特别高，不光是年轻的事想得起来，前一辈子读的书也都知道。\\n譬如说看佛经，他能够用特殊的一种方法，把难懂的立刻就懂进去，最难表达的东西，他用一种方式表达出来，别人一听就懂了，这就属于方便般若。\\n为什么敲木鱼呢？鱼是昼夜瞪着眼睛的，鱼睡觉就是停在那里不动了，休息一下就算睡觉了。所以我们庙里敲这个木鱼，是要我们精进，修道要效法鱼的精神，昼夜努力不停。\\n在北京白云观有副名对，从明朝开始的一副对子：“世间莫若候选好，天下无如吃饭难。”\\n平常就是道，最平凡的时候是最高的，真正的真理是在最平凡之间。真正仙佛的境界，是在最平常的事物上。\\n“过去心不可得，现在心不可得，未来心不可得”。时间是相对的，真正的时间，万年一念，一念万年，没有古今，没有去来，等于一道古诗：“风月无古今，情怀自浅深”。\\n在科学上的了解，时间是相对的，在佛法上时间是唯心的，不是绝对的。痛苦的时候，一分一秒却在一万年那么长，幸福快乐的时候，一万年一百年，也不过一刹那就过去了。因此佛法点题了，“一时”，就是无古今，也无未来。\\n所谓比丘是出家人，翻译为中文的意思就是“乞士”。乞士是一个好听的名词，意思是讨饭的，讨什么饭呢？不是讨一口饭吃的饭，是讨一个永远不生不灭的精神食粮。\\n比丘的道理，也含有破除一切烦恼，了一切生死，而能有所成就，能证果的意思。\\n佛学里所谓世界，有三世间和四世间的两种概念。所谓三世间是：器世间、国土世间、有情世间。\\n所谓土，有两种观念。一种是常寂光土，这个土已经不是土地，不是物质，而是说，在那个境界里，永远都是快乐的、清静的，寂灭的。另外一种观察是我指我们这个世间，是凡圣同居土，圣人与凡夫共同居住的地方。\\n佛经里所称的世界，是包括我们这个世界，也及超过这个地球范围所有世间的世界。\\n佛告诉弟子说，这个虚空中，像这样的太阳系统，带领很多星球构成的世界，是无量数、不可知，如恒河沙一样多；也像中国的大黄河里头的沙子一样的多，数不清的。\\n佛经上所说一个成佛、很大成就的人，在一个佛国里教化众生，是师道的第一位，所以称为世尊。\\n”无所从来，亦无所去，故名如来。“无来也无去，换句话说，不生也不灭，不动也不静，当然无喜亦无忧，不高也不矮，都是平等，永远存在，这个道理就是如来。\\n佛在心中莫浪求，灵山只在汝心头\\n人人有个灵山塔，只向灵山塔下修\\n照后世禅宗所讲：心即是佛，佛即是心，不是心外求法。以佛法来讲，心外求法都属于外道。\\n所谓的觉悟，觉悟什么呢？就是佛的境界，也就是所谓自利利他，自觉觉他的这个觉悟。借用孟子的话：“使先知觉后知”，就是先知先觉的人，教导后知后觉的人。\\n古人有两句名言：“不俗即仙骨，多情乃佛心。”\\n《楞严经》上说：“自未得度，先度人者，菩萨发心。自觉已圆，能觉他者，如来应世。”\\n实际上，后来禅宗五祖就曾说过，要成功悟道，专心念《金刚经》就可以了。甚至不识字，不会念的，只要念一句“摩诃般若波罗蜜多”就行了，这是经题的要点，是大智慧成就到彼岸的意思。\\n善护念。好好照应你的心念，起心动念，都要好好照应你自己的思想。\\n我们打坐，照顾自己不要胡思乱想，也是善护念。一切宗教的修养方法，都是这三个字。\\n因讲到善护念，我们晓得佛经、佛学里三十七道品菩提道次第，修大彻大悟的方法中，有个四念处，就是念身、念受、念心、念法。\\n什么叫念？一呼一吸之间叫做一念。\\n《西厢记》也有对人心理情绪描写的词句：“花落水流红，闲愁万种，无语怨东风。”\\n这里我们讲到人的心念，一念之间，包含了八万四千的烦恼，这也就是们的人生。解脱了这样的烦恼，空掉一念就成佛了，就是那么简单。\\n“善护念”是一切修行的起步，也是一切佛的成功和圆满。这个主要的问题，就是《金刚经》的一只金刚眼，也就是《金刚经》的正眼，正法眼藏。\\n”阿耨多罗三藐三菩提心“，包括心地法门，明心见性，由世俗超越而达到成佛的境界；在行为上是大慈大悲菩萨心，是菩提心，入世救一切众生；在理上是大彻大悟，超越形而上的本性之心。\\n佛法既认为一切众生个个是佛，平等平等，但是，为什么众生不能成佛呢？因为他找不到自心，迷失了。如果自己觉悟了，不再迷失，个个自性成佛。\\n佛并不是权威性，也不是主宰性。佛这个主宰和权威，都是在人人自我心中。所以说一个人学佛不是迷信，而是正信。正信是要自发自醒，自己觉悟，自己成佛，这才是学佛的真精神。\\n这一点与中国文化的精神是一样的，自求多福，自助而后天助，自助而后人助。\\n打坐不过是修定，是练习身心向学佛路上的准备工作而已，这个观念一定要搞清楚。\\n一个英雄可以征服天下，没有办法征服自己这个心念；一个英雄可以统治全世界，没有办法“降伏其心”。\\n他说你仔细听着，我讲给你听，当你有求道的心，一念在求道的时候，就是这样住了，就是这样，这个妄念已经下去了，就好了，就是这样嘛。\\n我们都知道，学佛最困难的，就是把心中的思虑、情绪、妄想停住。\\n“南无”是皈依，“阿弥陀”是他的名字，皈依阿弥陀这一位佛。\\n真要念到一心不乱，忘记了自己，忘记了身体，忘记了一切的境况，勉强算是有一点点一心不乱的样子。做到了专一、一心不乱的时候是止，念头停止了，由止就可以得定。\\n所谓真正的定，佛经有一句话：如香象渡河，截流而过。一个有大智慧、大气魄的人，自己的思想、妄念，立刻可以切断，就像香象渡河一般，连弯懒得转，便在湍急河水之中，截流而过了。\\n因为此心不能安。所以环境与事物突然改变，我们就不习惯了，因为这个心不能坦然安住下来，这是普通的道理。\\n禅宗所谓当下即是，当念即是，不要另外去想一个方法。\\n《金刚经》的内容是大乘佛法的大智慧成就，佛教同其他宗教基本不同之外，是智慧的成就，不是功夫的成就；这个智慧包括了一切的功德，一切至善的成就，所以般若是智慧的成就。\\n无所住即是住。拿禅宗来讲，住即不住，不住即住。无所住，即是住。\\n宋朝大诗人苏东坡，他是学禅的，他的诗文境界高，与佛法、禅的境界相合。他有个名句：“人似秋鸿来有信，事如春梦也无痕。”\\n人生本来如大梦，一切事情过去就过去了，如江水东流，一去不回头的。\\n应如是住，如是降伏其心，这个心无所谓降，不需要降。烦恼的自性本来是空的，所有的喜怒哀乐，忧悲苦恼，当我们在这个位置上坐下来的时候，一切都没有了，永远拉不回来了。\\n佛告诉菩提。诸菩萨摩诃萨。应如是降伏其心。所有一切众生之类。若卵生。若胎生。若湿生。若化生。若有色，若无色。若有相。若无相。若非有相。非无相。我皆令入无余涅槃而灭度之。如是灭度无量无数无边众生。实无众生得灭度者。何以故。须菩提。若菩萨有我相。人相。众生相。寿者相。即非菩萨。\\n线作长江扇作天，靸鞋拋向海东边。\\n蓬莱此去无多路，只在谭生拄杖前。\\n鬼不可怕，而人是真正的坏，连鬼都要骗。\\n人可以成仙、成佛、成鬼、成神。人也可以变化的，一切就看你自己的智慧了。\\n佛法分两种，走出世间是清净，走入世间是红尘。\\n清净的福叫做清福，人生洪福容易享，但是清福却不然，没有智慧的人不敢享清福。\\n佛经上说，一个学佛的人，你首先观察他有没有发起厌离心，也就是说厌烦世间的洪福，对洪福有厌离心，才是走向学佛之路。\\n佛说学佛的人第一个发愿使一切众生都成佛，都能够达到“我”的成就一样，“令入无余涅槃而灭度之”。\\n佛的境界谦退到极点，他要度尽了一切的众生，而心胸中没有丝毫教化人、度人之念。\\n我相又分两种，一种是人生命的个体，我是我，你是你，他是他，每个人是不同的个体。一种是属于精神上的，一个学问好的，或者地位高的，年龄大的，常看他人都是小孩子，幼稚。我现在也常常犯这个生病，会说你们年轻人懂什么？\\n做完了以后，“事如春梦了无痕”，无施者，无受者，也无施事，这才是佛法布施的道理。\\n应无所住而行布施，是解脱，是大解脱，一切事情，物来则应，过去不留。\\n“万象都缘一念波”，人生的烦恼和一切痛苦，就是一念，没有第二念，千千万万不同的现象，就是一念动了。\\n我们现在很可怜，大家学佛拼命去求空，这岂不是背道而驰吗？既然空，你求得到吗？能求到的就不是空了。\\n人生最难的就是丢开，真丢开了就是真放下，放下就是内布施。\\n真正的经典啊，一个字都不需要，本来空嘛！应如是住，如是降伏其心，这个是第一义，就是一张白纸。既然第一等的不懂，复次，只好讲差一点的。\\n“应无所住，行于布施”，什么叫修行？念念皆空，随时丢，物来则应，过去不留；就算做了一件好事，做完了就没有了，心中不存。连好事都不存在心中，坏事当然不会去做了，处处行于布施，随时随地无所住。\\n什么是人生最大的福德？悟道，成道。智慧是人生最大的福报，所谓智慧的成就，指的并不是普通的知识。\\n可是人真到了享清福的时候，往往不知道那是真正的福报来了。事实上，平安无事，清清净净，就是究竟的福报。\\n《金刚经》只告诉你无所住！无所住并不是空啊！无所住，如行云流水，你看那个流水在流，永远不停留地过去了，但是又有来的，而一切是无所住，并没有叫你空啊！\\n佛境界就是福德与智慧都圆满，这叫做福慧双修，智慧资粮圆满了，福德资粮圆满了，就成佛。\\n太阳、月亮，它永远不断地在转，因为它无住，不停留嘛！太阳、月亮有一秒钟停留不转的话，这个世界整个就没有了。\\n我们要知道此心此念，怎样叫做无住，并不是叫你求空，你定在一个空上，早就有所住了。\\n任何宗教最高的道理都是一样，不是我救了你，是你自己救了你自己。\\n所以借用《中庸》一句话，“道也者，不可须臾离地，可离，非道也。”\\n古德告诉我们，道在平常日用间。真正的道，真正的真理，绝对是平常的，最高明的东西就是最平凡的，真正的平凡，才是最高明的。\\n真正佛法是能断金刚般若波罗蜜，要想悟道，是在这个地方，是要真智慧。\\n真正悟了道的人，连悟的境界都不会存在，有一个悟的境界，你已经着法相了。\\n反正教育法的道理，是刺激你一下，使你自己的智慧之门打开就对了，所以说无有定法。\\n真正到达了佛境界是包容万象，也否定了万象，也建立了万象，这是佛境界。\\n任何的福德、福报，只有一个时期，福报享受过了那段时期，也是空，因为本身无自性。\\n所谓无自性，就是说不是固定的，也不是永远存在的。\\n真正的福报是悟道，是大智慧的成就，是超脱了现实世界而得的大成就，这个成就不是世间的一切福报能够办得到的。\\n真正的佛法，都是从自我的智慧里透露出来的。\\n真是大成就的人，绝对的谦和，谦和到非常平实，什么都没有。真正的佛不认为自己是佛，真正的圣人，不认为自己是圣人，所以真正的佛法即非佛法。\\n人人自有灵山塔，好向灵山塔下修。\\n禅宗祖师有四句话：“佛说一切法，为度一切心。我无一切心，何用一切法。”\\n应无所住，而生其心。\\n佛在佛经上说，“心净则国土净”，处处都是净土，处处都是极乐世界，只有心净就国土净。\\n在这个缺陷的世界，有福报的人没有智慧，有智慧的人没有福报。\\n世界上最值钱的东西也最不值钱，最值钱的东西没有价钱，智慧是绝对无价；但是智慧也一毛钱都不值，这就是佛常说的众生颠倒。\\n真正的佛法是超越一切宗教、哲学、一切形式之上的。也就是佛说，真正的智慧成就，即非般若波罗蜜；智慧到了极点啊，没有智慧的境界，那才是真智慧。\\n最平凡的一句话，你能懂得了，就是圣人在说法。留意，谁能把意留得住？小心，谁能把心小得了？\\n理念上虽对，但是，你嘴巴上会说，叫做口头禅，身心没有证进去。\\n真正的佛法是破除迷信的，是不着相而起正信的，法身无相正是悟道。\\n如何是修戒的般若，就是“善护念”这个要点，由开始发心修行到最后的成佛，就是善护念。接着下来，就说善护什么念？无住。无住就是定，善护念就是戒，《金刚经》的般若，本身就是慧，这是戒定慧的道理，来说明《金刚经》的本身，般若法门就是如此。\\n一个真正学佛的人，必须能深解义趣，这个信心才是绝对的正信，这一个法门，才是真正的佛法，才是宇宙中一切众生，自求解脱成佛之路。\\n无烦恼，无妄想，就是信心清净，自然达到了清净的究竟；立刻可以见到形而上的本性，即生实相。实相般若就是道，明心见性就是见这个。\\n万有的相是因缘凑合，是假合的虚妄相，不是真实。但是虚妄不是没有，只是偶然暂时的存在而已。\\n相是虚妄，因为礼拜这个虚妄相，你自己此心有真正的诚恳，发起了真实的诚敬，那就是“信心清净”，就“即生实相”。\\n戒者，戒一切坏的行为，恶的行为，此心念念在清净中，无恶亦无善，是名至善。\\n在佛法上讲，一切不如意就是辱，受一切痛苦就是辱。\\n只有生在娑婆世界，有苦有乐，有善有恶，各有一半，所以能够刺激你发生解脱的智慧，是成佛的捷路。\\n要入世忍人所不能忍，行人所不能行，才是修菩萨的基本精神。\\n众生都是自性自度，在佛教早晚功课中要念，“自性众生誓愿度，自性烦恼誓愿断”，都是自性自度。\\n以智慧悟道，起心行的作用，修忍辱行，在苦海茫茫中，做利益一切众生的事，就能成就无量无边功德。\\n站在宇宙看人类的历史，几千万亿年的时间，也只是昙花一现。大家活了几十年，回头一看，几十年像昙花一现，非实非虚，非真非假，即空即有，要从这个角度去体会。\\n真布施是舍掉自己舍不得的，是一种自我牺牲。\\n人生都是“看得破，忍不过。想得到，做不来”。\\n中国文化讲大公无私，无我相、无人相、无众生相、无寿者相；救尽天下苍生，心中留一念，这样才是大公无私，才是菩萨，否则，佛说即非菩萨。\\n无实就是空，无虚就是有，就是普通经典上讲的，非空非有，即空即有，《金刚经》不用非空非有的字眼而已。\\n一个度尽下下众生，救天下苍生的人，心中没有一念自私，没有一点自我崇高。\\n白居易学佛有两句诗：“饱暖饥寒何足道，此身长短是虚空。”\\n如果这个名词代表形而上的道体，一切众生同天诸佛菩萨心性之体，就是生命的根源。\\n所谓一切病由业而生，善有善业，恶有恶业，业由心造，都是绝对唯心的道理。\\n尽管研究佛法，道理上讲得很通，碰到事扭转不过来，这是慧的力量不够，也就是不能证果，不能成道的原因。\\n慈悲是两个观念组合起来的佛学名词，慈是父性，代表男性的爱，至善的爱；悲代表了母性至善的爱，慈悲是父母所共性的仁德。\\n《金刚经》是能断金刚般若波罗蜜，把你一切的妄念都切断了，真正的佛法，平常就是道。\\n世界上一切人的心理佛都知道；一切人都把不实在的东西当成实在，真的清净来了，他也不会去享受。\\n真正佛法到了最后是不可说不可说，不可思议；说出来都非第一义，都是第二义。\\n人世间因为一切众生有我见，所以就有人；有人就有我，就有是非；有是非，就有烦恼；有烦恼就有痛苦，如此等等一连串的下来。\\n“夜深忽闻远鸡啼”，不要灰心，远远听到鸡鸣了，总归有一个人会出来的，不要看长夜漫漫，总会有天亮的时候。\\n真正的善法是为菩提道果的行善，虽行善而不着行善之念。\\n镜花水月并不是说绝对的没有，只是告诉你是虚幻的，不实在的，是偶然暂时的存在而已。这个暂时存在的有，是把握不住的，不常的。\\n利人、救世，修一切善行，并没有特殊之处，是做一个人义所当为的事，是本分的事。\\n以有形财富来做布施，跟智慧布施比较起来，百分之一都不到，百千万亿分也不到。\\n万物是不齐的，不平等，有高低，五个指头都是不齐的，但是它变成一只手的时候，统统是齐的，它就是一只手。\\n人人都要自求解脱，自性自度，自我得救，谁都救不了你。\\n人，悟到了真正的无我，修持证到了真正的无我，就是佛了。这个佛，无我，自然无众生，无寿者，这就是佛境界。\\n无苦即是乐，清净之乐。清净没有境界，所以这个乐不是世间看的乐，是常乐。这个时候是真正的我了，不生不灭，这是不生不灭之我，并没有像我们现在世俗的观念，有个我相的存在，所以这个我是干干净净的。\\n佛经里提出来，太平盛世，全世界唯一的太平帝王，就叫转轮圣王；转轮圣王分金轮圣王、银轮圣王、铜轮圣王、铁轮圣王四种。\\n一切众生修一切善法，才产生一个太平盛世，才出一个转轮圣王。所以中国历史上孔子经常提尧舜禹三代，等于是转轮圣王的时代。\\n悬崖撒手是什么都丢光，不但人世间的一切都丢掉，连佛法也丢掉。一个人在高空撒手跳下来，什么都没有，一切都丢得干干净净，然后才能见到法身。\\n佛只说过去心不可得，现在心不可得，未来心不可得；以色见我，以音声求我，是人行邪道，不能见如来。那是教育方法，处处把你的错误挡住，他并没有告诉你是什么，只告诉你不是什么。\\n“空”是方便的说法，是个形容词，如果你把空当作真正空得一无所有，那不是空见，那就叫做断灭见。\\n一切众生，只要具备灵性的，都是因地上的菩萨；成就的菩萨，叫果地上的菩萨。\\n佛的伟大也就在此，他永远不断地以身作则，不断地善行培养功德。一切菩萨修持善果，修持功德，永远都是无穷尽的。\\n提得起，放得下，才有资格学佛；提得起，放得下，自然就可以成佛。\\n真正的道，是天下之公道，没有什么秘密，什么上天有忌讳啊！不能妄传啊！都是胡说。\\n世上人做梦，随便你做什么梦，都是你一辈子做过、听过、想过、看过的经验，不会超出这个范围。\\n如果我们拿《金刚经》的这一段，用中国儒家《中庸》这一本书来讲，就是：“极高明而道中庸。”“天命之谓性，率性之谓道，修道之谓教。道也者，不可须臾离也，可离非道也。”\\n生生灭灭，如水上的波浪一样，波浪尽管在动，动了以后那个波浪又一个个散了。尽管波浪看不见，全体的波浪是水变的呀，水没有动过，还是那么多，不多也不少，永远在那里。\\n世界上没有哪一样东西不迷你的，都在骗你，都在受骗。为什么？因为认不得自己自性如来，只看见那个水上波纹，被波纹骗走了。认清楚了波纹，就知道感情、思想都是不去也不来，此心本来清净的，你也就少上当，你就金刚般若波罗蜜了。\\n心理学研究显示，最长的梦没有超过五秒钟的。人睡着做了一个梦，梦见从小长，经过了多少事，直到最后自己死了，醒来眼泪流湿了枕头，梦中经过几十看光阴，实际上只有三秒钟。\\n一切种子包括了过去、现在、未来、聪明愚笨，善与恶。善人把善的种子引发了，慢慢再把恶的种子转变成善的，成为至善之人。这就是修一切善法，得阿耨多罗三藐三菩提。\\n修一切善法，把它统统转化了，可以产生一合相。所以佛菩萨的真正成就，是三身成就，清净法身，圆满报身，千百亿化身，三身是一合相，就是体、相、用三位一体。\\n假使以佛法来看人生，都是没有目的地来，没有结论地回去。无所从来，亦无所去，是名如来。\\n《楞严经》上也有几句很重要的话：“知见立知，即无明本，知见无见，斯即涅槃。”\\n有一个清净就会有一个不清净的力量含藏在里面，就有烦恼的力量在了，所以知见立知，即无明本。要“知见无见”，最后见到空，“斯即涅槃”，可以达到见的边缘了。\\n实际上啊，明，无可明处；见，无可见处，所以叫做我见、人见、众生见、寿者见。\\n学佛修道是理性的，不是情感的，不是盲目地迷信，是理性地如是信解。\\n人生最怕的是着魔，实际上，你学了佛法，学了道，把道跟佛法捆起来，你正是着魔了；着了佛魔，道了道魔，着了工夫魔，着了清净魔。\\n说什么走火入魔！魔从哪里来？魔完全是自心所造，没有其他的东西。“起心动念是天魔。不起心动念是阴魔。倒起不起是烦恼魔。”如此而已。\\n真正发菩提心的人，菩萨低眉，金刚怒目，大慈悲，武王一怒而安天下，这些才是菩提心，大悲心。用仙家的道理来说，菩提心是内圣外王。体是内圣之学，用是外王之学。\\n当梦幻来的时候，梦幻是真，当梦幻过去了，梦幻是存在的；但是梦幻再来的时候，它又俨然是真的一样。只要认识清楚，现在都在梦幻中，此心不住，要在梦幻中不即于相，如如不动，重点在这里。\\n要先学做人，人成了，就是成佛。\\n\"",

    title: "爱是一种能力 -《亲密关系》读书笔记",
    content: "\"在即将迈入人生的第三十个年头时，我才学会了爱。爱首先是要学会爱自己，才能有更加融洽的亲密关系。有些人可能会有疑问，人不可能不爱自己。但是生活中好多人所谓的爱，只是有时候爱，而不是时时刻刻。\\n这本书的推荐是张德芬女士，我被她的《我们终将遇见爱与孤独》这本书的给深深打动了，虽然这本书并不及她的其他作品出名，但是这本书带给我的影响却是意义深远的。我学会了如何与孤独相处，也学会了如何享受孤独，也在孤独中学会了爱自己。\\n虽然我的亲密关系相比大部分的身边人，是他们可望而不可及的存在，但是我不能停止经营，依然要不停的去学习。我们在原生家庭中所受的创伤，在我们彼此的相处中，慢慢被治愈。我们也要给孩子们竖立良好的榜样，让他们能经营好亲密关系。\\n读书笔记 伊·哈柏说的一点也没错：“大人其实也只是幼稚的小孩。”\\n我们常常认为，权力斗争的方式不外乎大吵大闹、互砸东西或拳脚相向。但事实上，权力斗争可以有许多不同的面貌，包括冷战、避不见面、冷嘲热讽或单单是互给白眼。\\n痛苦并不会消失，如果我们不好好处理，痛苦永远也不会消失。在较早的几段亲密关系中，我最不能了解的是：伴侣只让我觉到痛苦的存在。其实痛苦存在我心中已经很久了，只不过我不愿去感受。\\n我们宁愿争吵也不愿面对伤口，是因为生气比承受心碎要简单得多。\\n用较成熟、理性的态度来处理权力斗争，不只能让你面对过去的伤痛，也能让你不再受其负面影响。这些负面影响，也就是自我局限的信念。\\n种下想法，就得到行动；种下行动，就得到习惯；种下习惯，就得到人格；种下人格，就得到命运。\\n每个自我局限的信念，都来自过去的创伤。\\n潜意识和储藏室很像，都是用来收纳我们不想要却又不知怎么处理的东西的；但不同的地方是，潜意识可以无限地扩张，容纳愈来愈多的不愉快，让我们不用去面对痛苦。\\n过去的创伤如果没有愈合，我们就会对自己产生负面的想法；但如果我们用健康的方式把伤痛处理好，我们的信念也会随之改变。\\n我们都依据对自己的想法而活。如果你真心相信自己是个成功的人，那么你的失败也会帮助你迈向成功之路。\\n亲密关系让我们有机会重新面对并治好旧伤，从而改变衍生自伤痛的错误想法。\\n如果离开家的时候，你并不感到平静，那么你其实并没有离开。\\n每个都会伤害他所爱的事物……——奥斯卡·王尔德\\n但我们必须记得一件事，那就是，当我想和妻子吵架时，原因往往不是出在她身上，而是来自过去未解决的伤痛。\\n当被卷进权力斗争的旋涡时，你一定要切记：我生气的原因，不是我自己想的那回事。\\n你刚认识某个人时，他/她只是轻掠过水面；彼此熟悉之后，对方就开始浸入水面之下，并慢慢下沉。你们彼此愈亲近，对方就潜得愈深。点头之交通常是停留在水面附近，女朋友则往下潜深一些，但亲密的伴侣则会一直下潜到你所能容许的深度。潜得愈深的人，就愈能看透你的面具和外在形象而发现真正的你。然而，当你们都深潜入对方的领域时，可能会发现，真正的你和他/她并不怎么迷人。\\n要去了解、接受或宽恕，毕竟不是那么容易，相比较起来，发怒就简单得多。\\n生气的第二个好处，是能让对方有罪恶感，这样一来，就能有效地控制对方的行为。当有罪恶感时，人会很自然地因为可能被处罚而感到恐惧；我们都知道人在恐惧时是多么容易被操控。\\n从表面上看来，争执的两方似乎往往站在相对的立场。但事实上，所有的争持都起源于双方共同的痛。只要能觉察彼此有相同的问题，他们就能化争吵为理解。不幸的是，用愤怒来保护自己，永远比面对痛苦要容易得多。\\n后来我才明白，吵架时我们说的话和事情没有太大的关联，我们只是用言语来伤人，同时替自己的行为找个符合逻辑的借口而已。但是，言语攻击本身就是不合逻辑的，而只是用暴力来保护自己。所有攻击都是出于自卫。\\n愤怒背后的主要意图也就是如此：让别人有罪恶感，让他们为你内心的痛苦负责。\\n如果你感到愤怒，怒气其实是在保护你不去感受痛苦。如果我们能对自己诚实，并选择面对痛苦，我们就会了解这是治好旧痛的机会。\\n愤怒被广泛运用还有一很重要的原因。当旧痛以争执的形式浮现时，愤怒提供给我们一个美妙的机会去感觉自己是“对的”。\\n据我所知，如果无力掌控大局，又不想感觉能力不足或没安全感，最快的解决方法是证明自己是对的。你只要批评、责怪、批判或证明别人是错的，然后再理直气壮地火上浇油一下，很快，你就会全身充满肾上腺素，觉得自己像是刚完成变身从电话亭出来的超人。\\n“如果神要毁灭你，会先让你骄傲。”如果神要毁灭你的话，你只要对他们发怒，让他们变成错的一方就行了。如果你理直气壮，就连神也不敢越雷池一步。\\n如果你希望拥有健康、美好的亲密关系，你也许会考虑对自己的愤怒负责，充分地感受它，但不把怒气加在别人身上，这样他才能发现生气是为了逃避什么。\\n爱意的产生，是由于灵魂在驱策我们去学习如何真心地爱自己和对方。如果我们能明白，爱意在所有情况下都存在，那么我们就有机会了解，痛苦其实是一种转机，能让我们成长并摆脱目前所爱的限制。\\n爱意则能让我们克制冲动，用负责的态度来处理我们心中的不快，不致说出责怪或指责的话，而用理解、体谅的话来取代。\\n吵架吵得很激烈的时候，我们实在很难记得不快其实是来自过去的经历。但时时提醒自己我们生气的原因不是自己想的那回事是很重要的，否则我们便会经常把伴侣当作敌人来看待。\\n在我的经验中，痛苦和意识成长以及自觉仅一步之遥。如果我还没准备好跨出那一步，去面对痛苦并从中学习，那么我就会选择抗拒痛苦，并将其深埋在潜意识里。但如果不跨出那一步，痛苦将会永远存在，不会消失。\\n如果我们不把痛苦和受苦混为一谈，成长可能就会容易些。有时候，我会发现只要把全副心思放在比痛苦更高层级的伟大事物上，我就有能力超脱身体和心灵的痛苦，同时也让自己充分感受痛苦的存在。\\n每当痛苦浮现，我会认为我唯一的选择就是挣脱并且受苦，要不然就是控制伴侣的行为，让我不再痛苦。现在的亲密关系给了我机会去察觉过去和现在的痛苦，面对它们并做出更高层级的选择，让我能够成长并了解真正的自己。这个机会，我相信就是“爱意”，而爱意是存在于所有权力斗争之中的。\\n必须经过漫长的旅程，两颗心才能合而为一。——彼得·保罗和玛莉合唱团\\n如果没有争执的话，其实亲密关系中的两极可以和平共处，相辅相成。就像电池少不了正极和负极或一枚硬币一定得有正反面一样，亲密关系中也必定要有一方是正方，一方是反方。\\n反方给人的印象问题很糟糕，这实在太惨了，因为他们在这个世界上其实有很大的价值。正方是盖工厂的人，但反方才会让我们注意到污染，不良工作环境以及工作场所的安全问题。正方也许改善了已发达国家的生活质量，但要求大家为解决其他地方的低生活水平而尽一份力的人，却是反方。没有了反方，人类就失去了进步的动力。而另一方面，如果没有了正方，我们将会发现自己无法解决问题，而身陷愁云惨雾。毕竟正方才是能发现可能性并去实现的人。\\n反方会发现问题，并把它提出来讨论，正方则会在聆听之后，想出解决的方法。\\n状况本身并没有好坏，好坏是由你来决定的。状况是不是等于问题，要看你怎么去诠释它。你会有负面的看法，是因为过去的创痛影响了你。\\n在绝大数的文化中，反方发现问题的能力很少受到承认，他们往往被当作“制造问题的”的人；正方则被看作快乐、善良、可敬的那一类型。\\n只要你肯放下立场，不管结果是怎样，对你永远是只有好处没有坏处的，因为坚持立场所提到的，只有理直气壮和骄傲所带来的不真实的安全感。放了手，就能得到自由，让自己在智慧和成熟中成长。\\n在所有人际关系中，放下自己的立场去寻求和谐，还是有可能的。\\n我是个自尊心很强的男人，所以非常习惯于证明自己永远是对的。但是，这么做却让我得不到片刻的平静——即使我事实上真的是对的，只有放下自己的立场，接近对方，诚心希望好好沟通，我才能得到快乐。\\n只要在心中确定目标，要达到和谐、双赢的结果，并且尽全力去达成这个目标，我就一定能成功。\\n只要相信自己心灵的力量，我们就会发现，原来看似无解的难题，也能得到不可思议的，甚至是奇迹般的结果。\\n只要问题所唤醒的感觉得到了妥善的处理，问题就会神奇地转化为一份礼物、人生经验，或一个让生命更丰富的机会。\\n对自己的情绪百分百负责，你说出的话，就会是绝对的事实。如果你做不到百分之百的负责，你就还是有可能责怪、批判对方，自以为是，并且自我防卫。\\n卡尔·荣格赋予“投射”这个词一个新的意义：我们所看到的外在世界的每件事，其实都是我们内心世界的反映。\\n对自己的感觉负全责，就能让我不再误以为快乐和不快乐的源泉都是外在的。能够明白对自己负责的道理，就能更加了解自己每时每刻体验到新的事物。\\n所有的事情，事实上都没有好坏之分，但是当你感到悲哀时，你就会用悲伤的心去诠释所遇到的事。认为先有事情的发生，才引起你的情绪，这是一种自欺的想法，事实上，先出现的是你的感觉与情绪。\\n你心中无意识的部分在体验到某事时会产生反应，这种反应就是情绪。\\n你所要做的是只是去充分地感受怒气、悲伤或承认恐惧，然后你就会觉得舒服多了。你已经往更充满爱、更亲密的感受迈进了一步。\\n不管你去哪里，爱都会找到你。\\n在面对压迫性的感觉时，如果你能够选择爱，你就选择了比感觉更伟大的东西，而且同时也保有了自我。\\n当我选择用用爱来回应痛苦时，我就发现妻子跟我在一起，做出同样的选择。\\n只要听从自己内心真诚的意向，你一定能达到更高的境界。\\n我不想从伴侣身上“获得”什么东西——这样我会觉得自己像个贼一样，我情愿“接受”伴侣自愿给我的东西。\\n这些不愉快的结果并不是我的错误所造成的；错误是学习必经的过程。我心里想要的事物，才是造成不愉快的原因。\\n如果你因为伴侣的痛苦而沾沾自喜，甚至十分高兴的话，那么你就是在报复对方。你甚至会装作理性地说：“我只是想让她知道，她这样对我的时候，我有什么感觉。”\\n痛苦虽不能避免，要不要受苦却可以选择。\\n找出你身体哪些部位与你的情绪相对应。通常愤怒的感觉会在颈背、下巴和肩膀造成反应；悲伤的感觉在胸腔和喉咙，或有时在眼睛后方造成反应；恐惧的感觉反应，则往往在消化器官。但这只是一般性原则，对情绪有反应的身体部位会因人而异。\\n如果你能平静地向感觉吸入空气，只要一分钟，你就会发现感觉已经开始改变了。如此集中精神，呼吸六分钟以后，你的感觉就会完全一样了。\\n顺从是以容忍的方式掩盖拒绝的真相。\\n在黑暗中，爱就像一盏灯，能指引你们的方向，让你们重回对方的怀抱之中。\\n在沟通的时候，如果我一直坚持自己是对的，争吵就会一直继续下去\\n有时候，沟通中最快捷的方式就是诚心道歉。\\n如果伴侣说你自私，而你为自己辩驳，那就表示你内心深处一定也相信自己是个自私的人。自卫的辩驳只会让你的信念更坚定，同时也加深了你对这个信念的恐惧。\\n大自然是注重平衡的，所以如果你吸引到的另一半是倾向负面的，这也很合理，因为这样你才能达到平衡。伴侣所表达的负面感觉，其实是一部分的你，被你封杀的那一部分，现在希望和你团聚。接受“负面的自己”，能记你感觉更完整，也更接近自己的心。如果你是“负方”，吸引了“正方”的伴侣，也会经历同样的过程。\\n发生争吵时，我的目标是和对方沟通，直到我们两人发现彼此其实同病相怜，背负着相同的痛苦为止。\\n虽然要改掉这些观念很难，但我还是慢慢开始相信，除非我能对亲密关系中的所有事情百分之百负责，否则我永远不可能快乐。\\n内省是检视自己内在所有想法和感觉的过程，其终极目标是让你能和自己内在的事物和平相处，并且用爱来面对它们。\\n诚心检视反映在伴侣身上的你的内心世界，可以让你真正地、心平气和地了解自己。\\n爱能让从前你觉得丑陋的事物也转变成爱。对自己百分之百地负责，不但能让你的亲密关系起死回生，还能让一部分的你——你认为早已死去或从未存在过的那部分——也活过来。\\n不要让自己变成迫害者，不要好坏不分；要给予伴侣力量但不是同情，和伴侣分担人类共有空虚感。\\n放弃期望，用沟通来达成让对方都满意的结果，以及永远把自己与伴侣的快乐一并当作优先的选择。\\n石墙并不构成监狱，铁栅也不构成牢笼。——理查德·劳雷斯\\n来吧，让我们前往监牢。虽然只有我们两个人，我们还是可以像笼中鸟一样歌唱。——莎士比亚《李尔王》\\n坚持完美主义的迫害者认为，受害者的不完美是所有悲剧之事的肇因。愤怒则让你得以否认所有痛苦感觉的存在，而强迫心中的受害者站起来继续努力追求进步。迫害者用理直气壮的态度来鼓舞自己，让自己跟软弱的受害者保持距离。\\n要解决问题，必须先跳出问题的框架； 所有的问题，其实都是经过伪装的礼物和宝贵经验； 你所看到的每件事，都是你内心世界的投射； 每个人都有能力为自己生活中遇到的事百分百负责； 自由并非来自答案，而是来自问题； 没有什么问题是大到爱无法解决的。 卡尔·荣格说，问题不能被解决，但人可以成长从而跳脱问题。爱因斯坦在物理学上也有类似的观点——要解决问题，必须先跳脱问题的框架。\\n只依赖旧有的知识，人们永远没办法成长——只有吸收新知识才能成长。\\n我相信其中的原因，遇到问题时，我总是习惯于用忧虑、紧张、恐惧、慌张或是完全的恐怖来面对。恐惧的反应带来的则是挣扎、疑惑、拖延、以及抗拒问题。\\n这个烂摊子是我的一部分。我得到平静了、真的！在我们因了解而成长后，“责任”这个词的含义也从罪恶和羞耻变成回应和自由。\\n如果你问的问题是只有你的心灵和灵魂才能回答出来的，这就代表你的选择是要了解真理，而你想要找到答案的决心，就能让你穿越墙壁而得到真正的亲密关系。\\n两难的境地会让人既抗拒现有的选择，同时又不肯放弃它们。这也就是让陷入困境的原因。\\n有时候我会很快地想起应该选择真理，但有时候却要花上好几个星期的时间，才会了解到唯有具创造性的、受到启发的响应才能让我从受害者监牢中释放出来。\\n我想要的是慈悲，不是牺牲。\\n一旦罪恶感变成了家里的常客，宽恕就会变成陌生人。\\n牺牲也是一样。你虽然在付出，却丝毫不到感到快乐，也缺乏热情。\\n真心诚意地付出，是一种完全不同的体验。\\n如果你能为自己的生活百分之百负责的话，我们就会了解，牺牲者的角色是我们自己选择的。\\n“觉知”对我们的意识具有很大的影响力。觉知能让不实的事物变强，并让真实的事物变强。\\n只要你有意愿，有决心，就能摆脱“牺牲者”“折磨者”和“坏人”的影响，而选择对伴侣付     title: "《万历十五年》读书笔记",
    content: "\"看似风平浪静的一年，但是却是帝国走向崩溃的转折点。系统中所有的“Bug”已经积累到了无法通过局部修复来解决的程度。\\n整个帝国的运行依赖于儒家经典的解释权，而非精确的数字和逻辑，以道德代替法律显然已经无法返回灭亡的大势了。\\n笔记 但在他冲龄之际，自然也决不会预见到内阁大学士和司礼太监的密切合作，会给今后的朝政带来多么严重的后果。\\n大学士张居正的父亲在湖广江陵去世，按规定，张居正应当停职，回原籍守制，以符合“四书”中所说的父母三年之丧这一原则。\\n但是在不久之后，他就会发觉他摆脱了张、冯之后所得到的自主之权仍然受到种种约束，即使贵为天子，也不过是一种制度所需要的产物。\\n在办公时间内，皇帝和他的首辅相去不过一千米。但是这一千米，也是全世界距离最大的一千米。这种距离不在于宫寝和文渊阁之间有重重叠叠的门墙和上上下下的台阶，而在于除了早朝和讲读外，皇帝已极少接见大学士。\\n例如经过皇帝批准，人事有所任免，文渊阁公布其原因，总是用道德的名义去掩饰实际的利害。因为本朝法令缺乏对具体问题评断是非的准则，即令有时对争执如以裁处，也只能引用经典中抽象道德的名目作为依据。\\n天意必须通过亿万臣民的信念而体现出来。皇帝和他的大臣，经常以庄严美观的形式举行各式各样的礼仪，又为巩固这种信念不可或缺。无数次的磕头加强了皇帝神圣不可侵犯的意义；而他亲自主持各种礼仪，更表明他也同样受上天的节制，即受传统的道德所节制。\\n因为我们的帝国在体制上实施中央集权，其精神上的支柱为道德，管理的方法则依靠文牍。\\n总而言之，道德至高无上，它不仅可以指导行政，而且可以代替行政。\\n一项政策能否付诸实施，实施后或成或败，全靠看它与所有文官的共同习惯是否相安无扰，否则理论上的完美，仍不过是空中楼阁。\\n朝廷最大的任务是促进文官之间的互相依赖和谐。\\n在首辅申时行看来，纵使国步艰难，政府的办事能否收效，仍可以常识判断。如果各部院寺的文官几个月都见不到皇帝一面，他们就很难维持信心，认为皇帝陛下对各种事情仍能充分掌握。此念一开，他们即会怀疑他对是非善恶可能已经置为度处。信念既失，疑窦即生，他们就很难再尽忠竭力。\\n上下否鬲，中外睽携。\\n天下的大道理都可以用常情来度量。即便是最为严格的教条，也承认因情理而发生的例外。\\n因为我们的政事，注重体制的安定，而不计较对一人一事的绝对公允。牺牲少数人，正是维持大局的办法。\\n理想与装饰究竟不同于虚伪，一个人仍然能以此作为起点去推行他的诚意。\\n张居正的根本错误在自信过度，不能谦虚谨慎，不肯对事实作必要的让步。\\n张居正力图振作，要求过于严厉，以至抗拒横生。在他有生之日，他犹可利用权势压制他的批评者，可是一旦身故，他的心血事业也随之付诸流水。\\n张居正要求其他官员厉行节俭，但是他却不能以身作则，这当然不能不贻人以口实。\\n首辅的最大贡献，则在于使各种人才能在政府中发挥长处。大才小才，庸才劣才，全部如是。\\n利用这些小事可以促使公众注意，引起文官参加，假以时日，使小事积累而成大事，细微末节的局部问题转化而成为整个道德问题。\\n皇帝放弃诚意，使申时行至为不安。然而他没有更好的办法，只好自己坚持信心，静待时机的好转。\\n他在张居正事件以后，他明白了别人也和他一样，一身而具有“阴”、“阳”的两重性。有“阳”则有“阴”，既有道德论理了，就有私心贪欲。\\n申时行准备遵旨回到内阁，然而文官们的情绪已经如火如荼，不可遏制，一个接着一个递上了参劾申时行的本章。很明显，申时行无法抵御这些道德上的控诉，他的威信已经扫地以尽，再也无法取得同僚的信任。这种局势一经明朗，他除了辞职以处，别无他途可供选择。在这种情况下，皇帝的慰留也无济于事。要是再恋栈下去，他就必然成为张居正第二。\\n也许有一条理由可以作为解释，即本朝不是以法律治理天下臣民，而是以“四书”中的伦理作为主宰。皇帝和全国臣民都懂得父亲对儿子不能偏爱，哥哥对弟弟负有教导及爱护的义务，男人不能因为宠爱女人而改变长幼之序。\\n万历要弃长立幼的企图，纵使在法律有可以左右迁就之处，但在坚持传统观念的臣僚心目之中，却早已不直于纲常伦理。臣僚们从来没有听说法律的施用可以与圣贤的教导相违，即使是皇帝也不得不承认这一点。\\n一个具有高度行政效率的政府，具备体制上技术上的周密，则不致接二连三在紧急情况下依赖于道德观念作救命的符箓。\\n身为天子的万历，在另一种意义上讲，他不过是紫禁城中的一名囚徒。他的权力大多带有被动性。他可以把他不喜欢的官员革职查办，但是很难升迁拔擢他所喜欢的官员，以致没有一个人足以成为他的心腹。\\n报复的目的不是在于恢复皇帝的权威而纯系发泄。发泄的对象也不一定是冒犯他的人，而是无辜的第三者。积多年之经验，他发现了最有效的武器乃是消极抵抗，即老子所谓的“无为”。\\n军事机构受文官控制不是没有理由的。边防需要作出全面计划和长久打算，动员的程度则既不可过低也不可高。一般说来，全国的情况有千差万别，不容许中枢凡事过问。因之皇帝的领导多少带有抽象性，应当集中全力鼓舞臣工，而不必在每时每事上加以处处干预。\\n多年来，这位首辅正是巧妙地利用这种关系，促使皇帝的一举一动接近于文官集团的期望。\\n富有诗意的哲学家说，生命不过是一种想象，这种想象可以突破人世间的任何阻隔。\\n这就是说，他虽然被人仰慕，但没有人按照他的榜样办事，他的一生体现了一个有教养的读书人服务于公众而牺牲自我的精神，但这种精神的实际作用却至为微薄。\\n讼之可疑者，与其屈兄，宁屈其弟；与其屈叔伯，宁屈其侄。与其屈贫民，宁屈富民；与其屈愚直，宁屈刁顽。事在争产业，与其屈小民，宁屈乡宦，以教弊也。事在争言貌，与其屈乡宦，宁屈小发，以存体也。\\n法律的解释和执行离不开传统的伦理，组织上也没有对付复杂的因素和多元关系的能力。\\n经过慎重的考虑，阳历 11 月，海瑞向嘉靖递上了著名的奏疏。奏疏中指出，他是一个虚荣、自私、多疑和愚蠢的君主，举凡官吏贪污、役重税多、宫廷的无限浪费和各地的盗匪滋炽，皇帝本人都应该直接负责。\\n当然是极端的廉洁，极端的诚实，然而从另外一个角度来看，也可能是极端的粗线条，极端的喜欢吹毛求疵。\\n以个人而对抗强大的社会力量，加之在具体处理这些诉讼的时候又过于自信，师心自用，既没有对地方上的情形作过周密的考察，也没有宣布法律的准则，更没有建立专门的机构去调查案情、听取申辩以作出公正的裁决，海瑞的不能成功已不待言而自明。\\n洪武皇帝两百年以前创建本朝，并确立了整套的政治和经济制度，其主要的着眼点在于保存一个农业社会的俭朴风气。\\n但是他和洪武皇帝都没有想到，政府不用技术和经济的力量扶植民众，而单纯依靠政治上的压力和道德上的宣传，结果只能是事与愿违。\\n剥削是一种社会现象，绵延数千载，代代相传，在当日则为文官集团家庭经济的基础。\\n君子之泽，五世而斩，富家的没落和贫穷的兴起，其间的盛衰迭代、消替流转乃是常见的现象。\\n好心的巡抚想要用一时的政治力量去解决财政和经济政策上的问题，无疑是舍本逐末，其结果必然是事与愿违。\\n一条鞭法有其简明易行的优点，也多少限制了花样百出的舞弊营私。\\n我们帝国的圣经“四书”就为读书人所必须诵习，而其中亘古不变的观念又通过读书人而渗透于不识字的乡民之中，即幼者必须追随长者，女人必须服务男人，没有知识的人必须听命于有教养的人。帝国的政府以古代的理想社会作基础，而依赖文化的传统而生存。这也是洪武皇帝强调复古的原因。\\n他从孔子的训示中深深懂得，一个有教养的人必须抱有任重道远的决心。老骥伏枥，志在千里，他虽然闲居在贫瘠的乡村，屋子里挂着的立轴上，却仍然是“忠孝”二字。\\n散文作家海瑞的作品表明，他单纯的思想不是得之于天赋，而是来自经常的、艰苦的自我修养。\\n一个君子何以有志于作官，海瑞的回答是无非出于侧隐和义愤。\\n武人在刀剑失石之中立下的汗马功劳，在文官的心目中不过是血气之勇，即使克敌制胜，也不过是短暂和局部的成功而已。\\n这支新军在建立三十年之后，仍然还是戚继光的个人部队，这自然又和文官集团的平衡原则大相凿枘。在文官们的心目中，戚继光的军队不是社稷的干城而是国家的威胁，加之他又和张居正关系极为密切，所以必须对他作严厉的弹劾。\\n十几个单位分别按固定的数量供应，总难免有个别单位由于意外的情况而不能如额缴纳；而其他单位则并不负有补足缺额的义务，也不见得就有这样的能力。\\n组织上的低能必然造成装备上的落后。\\n穷则思变，改革已成为势所必然，而改革的初步，仍在在选择有创造精神的高级将领，他必须在战略上深谋远虑，而又精通各种战术。\\n一支经常被敌人打得落花流水的部队谈不上自尊和自信，必胜的信念有赖于能力和技术，而能力和技术又来自平时的刻苦训练。\\n我们这个庞大的帝国，在本质上无非是数不清的农村合并成的一个集合体，礼仪和道德代替了法律，对于违法的行为作掩饰则被认为忠厚识大体。各个机构之间的联系，从来也没有可资遵守的成文条例。\\n现代化的技术和古老的社会组织断然不能相容，要不是新的技术推动社会组织趋于精确和严密，那就是松散的社会组织扼杀新的技术，二者必居其一。\\n至于在一个以文人治国的农业国家之内，谁想要极端强调军事效率，提供技术的发展，而导致军人和文官的并驾齐驱，哪怕他能举出无数动听的理由，在事实上也是绝对办不到的。\\n帝国的官僚政治已经发展到登峰造极，成千成万的官僚，在维护成宪的名义下保持各方面的平衡，掩盖自己不可告人的私利。要公然宣布改组军事制度，就等于邀请别人对自己攻击，因此张居正不得不采取这种迂回的方式。\\n戚继光本人的功业固然值得表彰，同时又加上这些感情的色彩，所以，不论是正式的传记还是非正式的纪事、评论，总是对他备加称颂，有时竟把他描写成一个完人。\\n戚继光的天才，在于他看准了妥协之无法避免；而他的成功，在于他善于在技术上调和各式各样的矛盾。妥协的原则，是让先进的部门后退，使之与落后的部门不至相距过远。在组织制度上没有办法，就在私人关系上寻找出路。\\n戚继光的长处，在于他没有把这些事上的才能当成投机取巧和长官发财的本钱，而只是作为建立新军和保卫国家的手段。\\n剃发的原因是他的环境已经允许他抛却呆板、拘束的生活，得以寻求个性的自由发展。\\n社会环境把个人理智上的自由压缩在极小的限度之内，人的廉洁和诚信，也只能长为灌木，不能形成丛林。\\n指责自己缺乏诚信：“志在温饱，而自谓伯夷叔齐；质本齐人，而自谓饱道饫德。分别一介不与，而以有莘借口；分别毫毛不拨，而谓杨朱贼仁。动与物迕，心与口违。\\n我们是否应该让每个人公开承认自己的私心，也就是自己的个人打算，以免口是心非而阴阳淆混。\\n通常的方式是一家这内创业的祖先不断地劳作，自奉俭约，积铢累寸，首先巩固自己耕地的所有权，然后获得别人耕地的抵押权，由此而逐步上升为地主。这一过程常常需要几代的时间。经济条件初步具备，子孙就得到了受教育的机会。这其中，母亲和妻子的自我牺牲，在多数情形之下也为必不可少。\\n这种经过多年的奋斗而取得的荣誉，接受者只是一个人或至多几个人，但其基础则为全体家庭。因此，荣誉的获得者必须对家庭负有道义上的全部责任，保持休戚与共的集体观念。\\n对于这样背离传统的行为，他的亲族自然不能善罢甘休。但是亲族的压力越大，他的反抗也越强烈。\\n他接受佛家和道家的哲理，认为至善至美于虚无，但另一方面，却又认为任何信条如果不能在愚夫愚妇面前宣讲明白，则不成其为信条。\\n印度的思想家认为“自己”是一种幻影，真正存在于人世间的，只有无数的因果循环。\\n在他看来，一件白的物体的白色乃是因，在观察者的心中产生了白色的感觉才是果。这种对因果关系的理解推导出他的“知行合一”说。\\n按照王畿的学说，一个人理应集中他的意志，放弃或简化物质生活，避免环境的干扰，以达到无善无恶的至高境界。\\n一代人君如果专注于“文”而使之臻于极致，则已经开了祸乱之基；反之，息乱创业之君，则专注于“质”，只求使百姓免于饥寒而不去顾及是否粗粝。\\n李挚更为大胆的结构是一个贪官可以为害至小，一个清官却可以危害及大。他尊重海瑞，但是也指出海瑞过于拘泥于传统的道德，只是“万年青草”，“可以傲霜雪而不可以任栋梁者”。对于俞大猷和戚继光，李挚极为倾倒，赞扬说：“此二老者，固嘉、隆间赫赫著闻，而为千百世之人物者也。”\\n在一种社会形态之中，道德的标准可以历久不变，但把这些标准在生活中付诸实践，则需要不同的时代、环境相适应而有所通变。李挚和他同时代的人物所遇到的困难，则是当时政府的施政方针和个人的行动完全凭借道德的指导，而它的标准又过于僵化，过于保守，过于简单，过于肤浅，和社会的实际发展不能适应。\\n在道德的旌旗下，拘谨和雷同被视为高尚的教养，虚伪和欺诈成为官僚生活中不可分离的组成部分，无怪乎李挚要概乎言之：“其流弊至于今日，阳为道学，阴为宝贵！”\\n在长时期里造成了法律和道德的脱节。治理如此庞大的帝国，不依靠公正而周详的法律，就势必依靠道德的信条。而当信条僵化而越来越失去它的实用价值，沦于半瘫痪状态中的法律也当然无法填补这种缺陷。\\n张居正是政治家，李挚是哲学家，他们同样追求自由，有志于改革和创造，又同样为时代所扼止。\\n当一个人口众多的国家，各人行动全凭儒家简单粗浅而又无法固定的原则报限制，而法律又缺乏创造性，则其社会发展的程度，必须受到限制。即便是宗旨善良，也不能补救技术之不及。\\n1587 年，是万历十五年，丁亥次岁，表面上似乎是四海升平，无事可记，实际上我们的大明帝国却已经走到了它发展的尽头。在这个时候，皇帝的励精图治或者宴安耽乐，首辅的独裁或者调和，高级将领的富于创造或者习于苟安，文官的立法奉公或者贪污舞弊，思想家的极端进步或者绝对保守，最后的结果，都是无分善恶，统统不能在事业上取得有意义的发展，有的身败，有的名裂，还有的人则身败而兼名裂。\\n生命的意义，要在历史上获得，而历史的规律性，有时在短时间尚不能看清，而须要在长时间内大开眼界，才看得出来。\\n一国两制的精神需要彼此将眼光放远，在长久的历史中，找到合作的逻辑，而且今后也只有使两方更为接近，不致越来越远。\\n《万历十五年》指出道德非万能，不能代替技术，尤不可代替法律，但是从没有说道德可以全部不要，只是道德的观点应当远大。\\n\"",
